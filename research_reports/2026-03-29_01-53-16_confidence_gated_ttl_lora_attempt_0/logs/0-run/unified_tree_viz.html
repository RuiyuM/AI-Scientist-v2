t, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nablation_type = \"uncertainty_gating_signal_ablation\"\ngate_variants = [\n    \"frozen\",\n    \"always\",\n    \"entropy_only\",\n    \"margin_only\",\n    \"confidence_only\",\n    \"composite_no_burst\",\n    \"full_gate\",\n]\n\nexperiment_data = {\n    ablation_type: {\n        ds: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": {},\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for ds in dataset_names\n    }\n}\n\n\n# ---------- synthetic data ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in dataset_names}\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\nmodel = Net().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\n# ---------- metrics ----------\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\n# ---------- train ----------\nbest_state, best_val = None, 1e9\nval_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr, ents, margins = [], [], [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n            logits = model(x)\n            loss = criterion(logits, y)\n            p, ent, margin = probs_entropy_margin(logits)\n            c, pred = p.max(1)\n            confs.extend(c.cpu().numpy().tolist())\n            corr.extend((pred == y).float().cpu().numpy().tolist())\n            ents.extend(ent.cpu().numpy().tolist())\n            margins.extend(margin.cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    ece = compute_ece(confs, corr)\n    val_srus = va_acc - 0.2 * ece\n    val_uncertainty_cache = {\n        \"entropy\": ents,\n        \"margin\": margins,\n        \"conf\": confs,\n        \"correct\": corr,\n    }\n\n    for ds in dataset_names:\n        experiment_data[ablation_type][ds][\"metrics\"][\"train\"].append(\n            (epoch, tr_acc, tr_acc)\n        )\n        experiment_data[ablation_type][ds][\"metrics\"][\"val\"].append(\n            (epoch, va_acc, val_srus)\n        )\n        experiment_data[ablation_type][ds][\"losses\"][\"train\"].append((epoch, tr_loss))\n        experiment_data[ablation_type][ds][\"losses\"][\"val\"].append((epoch, va_loss))\n        experiment_data[ablation_type][ds][\"timestamps\"].append(time.time())\n    print(f\"Epoch {epoch}: validation_loss = {va_loss:.4f}\")\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\nent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\nmargin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\nconf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n\n\n# ---------- gating ----------\ndef compute_gate_trigger(\n    gate_type,\n    ent_v,\n    margin_v,\n    conf_v,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    uncertainty_hist,\n    buf_len,\n):\n    ent_flag = ent_v >= ent_thr\n    margin_flag = margin_v <= margin_thr\n    conf_flag = conf_v <= conf_thr\n    composite_uncertain = ent_flag or margin_flag or conf_flag\n    recent = uncertainty_hist[-8:]\n    local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n    if gate_type == \"frozen\":\n        return False, ent_flag, margin_flag, conf_flag, composite_uncertain, local_burst\n    if gate_type == \"always\":\n        return True, ent_flag, margin_flag, conf_flag, composite_uncertain, local_burst\n    if gate_type == \"entropy_only\":\n        return (\n            ent_flag,\n            ent_flag,\n            margin_flag,\n            conf_flag,\n            composite_uncertain,\n            local_burst,\n        )\n    if gate_type == \"margin_only\":\n        return (\n            margin_flag,\n            ent_flag,\n            margin_flag,\n            conf_flag,\n            composite_uncertain,\n            local_burst,\n        )\n    if gate_type == \"confidence_only\":\n        return (\n            conf_flag,\n            ent_flag,\n            margin_flag,\n            conf_flag,\n            composite_uncertain,\n            local_burst,\n        )\n    if gate_type == \"composite_no_burst\":\n        return (\n            composite_uncertain,\n            ent_flag,\n            margin_flag,\n            conf_flag,\n            composite_uncertain,\n            local_burst,\n        )\n    if gate_type == \"full_gate\":\n        return (\n            composite_uncertain and (local_burst or buf_len > 0),\n            ent_flag,\n            margin_flag,\n            conf_flag,\n            composite_uncertain,\n            local_burst,\n        )\n    raise ValueError(f\"Unknown gate_type: {gate_type}\")\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    gate_type,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, buf_x, uncertainty_hist = [], [], []\n    ent_flags, margin_flags, conf_flags, composite_flags, burst_flags = (\n        [],\n        [],\n        [],\n        [],\n        [],\n    )\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        ent_v, margin_v, conf_v = (\n            float(ent.item()),\n            float(margin.item()),\n            float(conf.item()),\n        )\n\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(conf_v)\n        ents.append(ent_v)\n        margins.append(margin_v)\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        gate_fire, ef, mf, cf, compf, burstf = compute_gate_trigger(\n            gate_type,\n            ent_v,\n            margin_v,\n            conf_v,\n            ent_thr,\n            margin_thr,\n            conf_thr,\n            uncertainty_hist,\n            len(buf_x),\n        )\n\n        ent_flags.append(int(ef))\n        margin_flags.append(int(mf))\n        conf_flags.append(int(cf))\n        composite_flags.append(int(compf))\n        burst_flags.append(int(burstf))\n        gate_flags.append(int(gate_fire))\n        uncertainty_hist.append(int(compf))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if gate_type != \"frozen\" and len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo)\n                loss = loss + prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n            update_times.append(time.time() - start)\n            did_update = 1\n            if gate_type == \"full_gate\":\n                buf_x = buf_x[-max(1, buffer_k // 2) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if gate_type != \"frozen\" and (i + 1) % reset_every == 0:\n            m.fc1.reset_lora()\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"ent_flags\": np.array(ent_flags),\n        \"margin_flags\": np.array(margin_flags),\n        \"conf_flags\": np.array(conf_flags),\n        \"composite_flags\": np.array(composite_flags),\n        \"burst_flags\": np.array(burst_flags),\n    }\n\n\n# ---------- run ablation ----------\nall_summary = {}\nfor ds_name, stream in streams.items():\n    results = {}\n    for gate_type in gate_variants:\n        results[gate_type] = stream_eval(\n            model, stream, gate_type, ent_thr, margin_thr, conf_thr, reset_every=90\n        )\n\n    frozen = results[\"frozen\"]\n    for gate_type in gate_variants:\n        res = results[gate_type]\n        res[\"srus\"] = srus(\n            res[\"acc\"],\n            frozen[\"acc\"],\n            res[\"ece\"],\n            frozen[\"ece\"],\n            res[\"trigger_rate\"],\n            res[\"overhead\"],\n        )\n        experiment_data[ablation_type][ds_name][\"metrics\"][\"test\"].append(\n            (\n                gate_type,\n                res[\"acc\"],\n                res[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"update_rate\"],\n                res[\"overhead\"],\n                res[\"srus\"],\n            )\n        )\n\n    experiment_data[ablation_type][ds_name][\"ground_truth\"] = results[\"full_gate\"][\n        \"gt\"\n    ].tolist()\n    for gate_type, res in results.items():\n        experiment_data[ablation_type][ds_name][\"predictions\"][gate_type] = res[\n            \"preds\"\n        ].tolist()\n    experiment_data[ablation_type][ds_name][\"extra\"] = {\n        gate_type: {\n            k: (v.tolist() if isinstance(v, np.ndarray) else v) for k, v in res.items()\n        }\n        for gate_type, res in results.items()\n    }\n    all_summary[ds_name] = results\n\n    for gate_type, res in results.items():\n        for key in [\n            \"cumacc\",\n            \"conf\",\n            \"entropy\",\n            \"margin\",\n            \"gate_flags\",\n            \"update_flags\",\n            \"reset_flags\",\n            \"ent_flags\",\n            \"margin_flags\",\n            \"conf_flags\",\n            \"composite_flags\",\n            \"burst_flags\",\n            \"preds\",\n            \"gt\",\n        ]:\n            np.save(\n                os.path.join(working_dir, f\"{ds_name}_{gate_type}_{key}.npy\"), res[key]\n            )\n\n    plt.figure(figsize=(10, 4))\n    color_map = {\n        \"frozen\": \"black\",\n        \"always\": \"tab:red\",\n        \"entropy_only\": \"tab:blue\",\n        \"margin_only\": \"tab:orange\",\n        \"confidence_only\": \"tab:purple\",\n        \"composite_no_burst\": \"tab:green\",\n        \"full_gate\": \"tab:brown\",\n    }\n    for gate_type in gate_variants:\n        plt.plot(\n            results[gate_type][\"cumacc\"],\n            label=f\"{gate_type} {results[gate_type]['acc']:.3f}\",\n            linewidth=1.5,\n            color=color_map[gate_type],\n        )\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"cumulative accuracy\")\n    plt.title(f\"{ds_name} gate ablation\")\n    plt.legend(fontsize=8)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_gate_ablation_cumacc.png\"))\n    plt.close()\n\n    plt.figure(figsize=(10, 4))\n    fg = results[\"full_gate\"]\n    ymax = max(1e-6, float(np.max(fg[\"entropy\"])))\n    plt.plot(fg[\"entropy\"], label=\"entropy\", alpha=0.9)\n    plt.plot(fg[\"composite_flags\"] * ymax, label=\"composite uncertain\", alpha=0.7)\n    plt.plot(fg[\"burst_flags\"] * ymax, label=\"burst\", alpha=0.7)\n    plt.plot(fg[\"gate_flags\"] * ymax, label=\"full gate fired\", alpha=0.8)\n    plt.axhline(\n        ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n    )\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"value\")\n    plt.title(f\"{ds_name} full gate dynamics\")\n    plt.legend(fontsize=8)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_full_gate_dynamics.png\"))\n    plt.close()\n\n    print(f\"{ds_name}:\")\n    for gate_type in gate_variants:\n        r = results[gate_type]\n        print(\n            f\"  {gate_type:18s} acc={r['acc']:.4f} ece={r['ece']:.4f} \"\n            f\"trigger_rate={r['trigger_rate']:.4f} update_rate={r['update_rate']:.4f} \"\n            f\"overhead={r['overhead']:.6f} SRUS={r['srus']:.4f}\"\n        )\n\n# ---------- save aggregate arrays ----------\nthresholds_arr = np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32)\nnp.save(os.path.join(working_dir, \"thresholds.npy\"), thresholds_arr)\n\nfor ds in dataset_names:\n    train_metrics = np.array(\n        experiment_data[ablation_type][ds][\"metrics\"][\"train\"], dtype=object\n    )\n    val_metrics = np.array(\n        experiment_data[ablation_type][ds][\"metrics\"][\"val\"], dtype=object\n    )\n    test_metrics = np.array(\n        experiment_data[ablation_type][ds][\"metrics\"][\"test\"], dtype=object\n    )\n    train_losses = np.array(\n        experiment_data[ablation_type][ds][\"losses\"][\"train\"], dtype=object\n    )\n    val_losses = np.array(\n        experiment_data[ablation_type][ds][\"losses\"][\"val\"], dtype=object\n    )\n    timestamps = np.array(\n        experiment_data[ablation_type][ds][\"timestamps\"], dtype=np.float64\n    )\n    np.save(os.path.join(working_dir, f\"{ds}_train_metrics.npy\"), train_metrics)\n    np.save(os.path.join(working_dir, f\"{ds}_val_metrics.npy\"), val_metrics)\n    np.save(os.path.join(working_dir, f\"{ds}_test_metrics.npy\"), test_metrics)\n    np.save(os.path.join(working_dir, f\"{ds}_train_losses.npy\"), train_losses)\n    np.save(os.path.join(working_dir, f\"{ds}_val_losses.npy\"), val_losses)\n    np.save(os.path.join(working_dir, f\"{ds}_timestamps.npy\"), timestamps)\n\nsummary_json = {\n    ds: {\n        gate_type: {\n            \"acc\": float(all_summary[ds][gate_type][\"acc\"]),\n            \"ece\": float(all_summary[ds][gate_type][\"ece\"]),\n            \"trigger_rate\": float(all_summary[ds][gate_type][\"trigger_rate\"]),\n            \"update_rate\": float(all_summary[ds][gate_type][\"update_rate\"]),\n            \"reset_rate\": float(all_summary[ds][gate_type][\"reset_rate\"]),\n            \"overhead\": float(all_summary[ds][gate_type][\"overhead\"]),\n            \"srus\": float(all_summary[ds][gate_type][\"srus\"]),\n        }\n        for gate_type in gate_variants\n    }\n    for ds in dataset_names\n}\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(summary_json, f, indent=2)\n\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nprint(f\"Saved experiment data to {os.path.join(working_dir, 'experiment_data.npy')}\")\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy, time, json, math, random\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\n# ----------------------------- config -----------------------------\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nseeds_main = [7]\nseeds_replication = [7, 17, 27]\ngating_quantiles = [0.55, 0.65, 0.75, 0.85, 0.92]\nreset_grid = [0, 45, 90, 180]\nablation_objective = \"entropy_minimization\"  # stable objective for component ablations\ntol_state_change = 1e-7\n\n# experiment_data requested structure\nexperiment_data = {\n    ds: {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"extra\": {},\n    }\n    for ds in dataset_names\n}\n\n\n# ----------------------------- utils -----------------------------\ndef set_seed(seed):\n    random.seed(seed)\n    np.random.seed(seed)\n    torch.manual_seed(seed)\n    if torch.cuda.is_available():\n        torch.cuda.manual_seed_all(seed)\n\n\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        lo, hi = bins[i], bins[i + 1]\n        m = (conf >= lo) & ((conf < hi) if i < n_bins - 1 else (conf <= hi))\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits, temperature=1.0):\n    logits = logits / max(1e-6, temperature)\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    conf, pred = p.max(-1)\n    return p, ent, margin, conf, pred\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, update, reset, overhead):\n    gain = acc - frozen_acc\n    cal_pen = 0.5 * max(0.0, ece - frozen_ece)\n    trig_pen = 0.08 * trig\n    upd_pen = 0.08 * update\n    rst_pen = 0.06 * reset\n    oh_pen = 1.5 * overhead\n    return float(gain - cal_pen - trig_pen - upd_pen - rst_pen - oh_pen)\n\n\ndef srus_terms(acc, frozen_acc, ece, frozen_ece, trig, update, reset, overhead):\n    terms = {\n        \"acc_gain\": float(acc - frozen_acc),\n        \"ece_penalty\": float(0.5 * max(0.0, ece - frozen_ece)),\n        \"trigger_penalty\": float(0.08 * trig),\n        \"update_penalty\": float(0.08 * update),\n        \"reset_penalty\": float(0.06 * reset),\n        \"overhead_penalty\": float(1.5 * overhead),\n    }\n    terms[\"srus\"] = float(\n        terms[\"acc_gain\"]\n        - terms[\"ece_penalty\"]\n        - terms[\"trigger_penalty\"]\n        - terms[\"update_penalty\"]\n        - terms[\"reset_penalty\"]\n        - terms[\"overhead_penalty\"]\n    )\n    return terms\n\n\ndef adaptation_loss_from_logits(logits, objective):\n    if objective == \"pseudo_label_self_training\":\n        with torch.no_grad():\n            pseudo = logits.detach().argmax(1)\n        return F.cross_entropy(logits, pseudo)\n    if objective == \"entropy_minimization\":\n        p = F.softmax(logits, dim=-1)\n        ent = -(p * torch.log(p + 1e-8)).sum(-1)\n        return ent.mean()\n    raise ValueError(objective)\n\n\n# ----------------------------- synthetic data -----------------------------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nclass ArrayDataset(Dataset):\n    def __init__(self, X, y):\n        self.X = X.astype(np.float32)\n        self.y = y.astype(np.int64)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef build_data(seed, d=20):\n    set_seed(seed)\n    source_all_X, source_all_y = make_block(2400, d, \"source\")\n    cut = int(0.8 * len(source_all_y))\n    norm_mu = source_all_X[:cut].mean(0, keepdims=True)\n    norm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n    Xn = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n    train_ds = ArrayDataset(Xn[:cut], source_all_y[:cut])\n    val_ds = ArrayDataset(Xn[cut:], source_all_y[cut:])\n\n    def make_stream(name):\n        if name == \"arc_easy_shift\":\n            kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n        elif name == \"pubmedqa_burst\":\n            kinds = (\n                [\"source\"] * 80\n                + [\"burst_hard\"] * 80\n                + [\"source\"] * 80\n                + [\"burst_hard\"] * 80\n                + [\"source\"] * 100\n            )\n        else:\n            kinds = (\n                [\"source\"] * 70\n                + [\"clustered_alt\"] * 140\n                + [\"easy_shift\"] * 140\n                + [\"source\"] * 70\n            )\n        Xs, Ys = [], []\n        for k in kinds:\n            X, y = make_block(1, d, k)\n            Xs.append(X[0])\n            Ys.append(y[0])\n        X = np.stack(Xs).astype(np.float32)\n        X = ((X - norm_mu) / norm_sd).astype(np.float32)\n        return [\n            {\n                \"x\": torch.tensor(X[i], dtype=torch.float32),\n                \"y\": torch.tensor(Ys[i], dtype=torch.long),\n            }\n            for i in range(len(Ys))\n        ]\n\n    streams = {k: make_stream(k) for k in dataset_names}\n    return train_ds, val_ds, streams, norm_mu, norm_sd\n\n\n# ----------------------------- model -----------------------------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r = r\n        self.alpha = alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def lora_delta_norm(self):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return float(delta.detach().norm().item())\n\n    def reset_lora(self, zero_B=True):\n        nn.init.normal_(self.A, std=0.02)\n        if zero_B:\n            nn.init.zeros_(self.B)\n        else:\n            nn.init.normal_(self.B, std=0.02)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        return self.fc2(torch.tanh(self.fc1(x)))\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\n# ----------------------------- source training -----------------------------\ndef train_source_model(seed):\n    train_ds, val_ds, streams, norm_mu, norm_sd = build_data(seed)\n    train_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n    model = Net().to(device)\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n    criterion = nn.CrossEntropyLoss()\n\n    best_state, best_val = None, 1e9\n    train_hist, val_hist = [], []\n    val_uncertainty_cache = {\n        \"entropy\": [],\n        \"margin\": [],\n        \"conf\": [],\n        \"correct\": [],\n        \"logits\": [],\n    }\n\n    for epoch in range(1, 9):\n        model.train()\n        tr_loss = tr_ok = tr_n = 0\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n            tr_loss += loss.item() * y.size(0)\n            tr_ok += (logits.argmax(1) == y).sum().item()\n            tr_n += y.size(0)\n        tr_loss /= tr_n\n        tr_acc = tr_ok / tr_n\n\n        model.eval()\n        va_loss = va_ok = va_n = 0\n        confs, corr, ents, margins, logits_all = [], [], [], [], []\n        with torch.no_grad():\n            for batch in val_loader:\n                batch = {\n                    k: v.to(device)\n                    for k, v in batch.items()\n                    if isinstance(v, torch.Tensor)\n                }\n                x, y = batch[\"x\"], batch[\"y\"]\n                logits = model(x)\n                loss = criterion(logits, y)\n                _, ent, margin, conf, pred = probs_entropy_margin(logits)\n                confs.extend(conf.detach().cpu().numpy().tolist())\n                corr.extend((pred == y).float().detach().cpu().numpy().tolist())\n                ents.extend(ent.detach().cpu().numpy().tolist())\n                margins.extend(margin.detach().cpu().numpy().tolist())\n                logits_all.append(logits.detach().cpu().numpy())\n                va_loss += loss.item() * y.size(0)\n                va_ok += (pred == y).sum().item()\n                va_n += y.size(0)\n        va_loss /= va_n\n        va_acc = va_ok / va_n\n        ece = compute_ece(confs, corr)\n        temp_srus = va_acc - 0.2 * ece\n        train_hist.append((epoch, tr_acc, tr_loss))\n        val_hist.append((epoch, va_acc, va_loss, ece, temp_srus))\n        val_uncertainty_cache = {\n            \"entropy\": ents,\n            \"margin\": margins,\n            \"conf\": confs,\n            \"correct\": corr,\n            \"logits\": np.concatenate(logits_all, 0),\n        }\n        print(f\"Epoch {epoch}: validation_loss = {va_loss:.4f}\")\n        if va_loss < best_val:\n            best_val = va_loss\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    # simple temperature calibration on val logits\n    temp_grid = np.linspace(0.7, 2.0, 20)\n    best_temp, best_nll = 1.0, 1e9\n    logits_np = val_uncertainty_cache[\"logits\"]\n    y_np = np.array(val_ds.y)\n    for t in temp_grid:\n        logits_t = torch.tensor(logits_np, dtype=torch.float32).to(device) / t\n        y_t = torch.tensor(y_np, dtype=torch.long).to(device)\n        nll = F.cross_entropy(logits_t, y_t).item()\n        if nll < best_nll:\n            best_nll, best_temp = nll, float(t)\n\n    return model, streams, train_hist, val_hist, val_uncertainty_cache, best_temp\n\n\ndef compute_thresholds(cache, q):\n    return {\n        \"ent_thr\": float(np.quantile(cache[\"entropy\"], q)),\n        \"margin_thr\": float(np.quantile(cache[\"margin\"], 1 - q)),\n        \"conf_thr\": float(np.quantile(cache[\"conf\"], 1 - q)),\n    }\n\n\n# ----------------------------- stream evaluation -----------------------------\ndef stream_eval(base_model, data, config, thresholds, temperature=1.0):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=config[\"lr\"], momentum=0.0)\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags = [], [], []\n    state_changed_flags, pred_changed_flags = [], []\n    param_delta_norms, delta_weight_norms = [], []\n    update_times, adapt_losses, cumacc = [], [], []\n    gate_scores = []\n    ok = 0\n    buf_x = []\n    recent_uncertain = []\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            _, ent, margin, conf, pred = probs_entropy_margin(\n                logits, temperature if config[\"use_calibration\"] else 1.0\n            )\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            float(ent.item()) >= thresholds[\"ent_thr\"]\n            or float(margin.item()) <= thresholds[\"margin_thr\"]\n            or float(conf.item()) <= thresholds[\"conf_thr\"]\n        )\n        recent_uncertain.append(int(uncertain))\n        local_burst = (\n            len(recent_uncertain[-8:]) >= 3 and np.mean(recent_uncertain[-8:]) >= 0.375\n        )\n        gate_score = float(uncertain) + 0.25 * float(local_burst)\n        gate_scores.append(gate_score)\n\n        if config[\"gate_mode\"] == \"none\":\n            gate_fire = False\n        elif config[\"gate_mode\"] == \"always\":\n            gate_fire = True\n        else:\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        state_changed = 0\n        pred_changed = 0\n        param_norm = 0.0\n        delta_norm = float(m.fc1.lora_delta_norm())\n\n        can_update = config[\"use_update\"] and len(buf_x) >= config[\"buffer_k\"]\n        if can_update:\n            xb = torch.cat(buf_x[-config[\"buffer_k\"] :], 0).to(device)\n            with torch.no_grad():\n                pre_logits = m(xb)\n                pre_pred = pre_logits.argmax(-1)\n                preA = m.fc1.A.detach().clone()\n                preB = m.fc1.B.detach().clone()\n                pre_delta = (m.fc1.B @ m.fc1.A).detach().clone()\n            start = time.time()\n            last_loss = None\n            for _ in range(config[\"adapt_steps\"]):\n                m.train()\n                logits_b = m(xb)\n                adapt_loss = adaptation_loss_from_logits(logits_b, config[\"objective\"])\n                prox_loss = config[\"prox\"] * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                loss = adapt_loss + prox_loss\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n                last_loss = float(loss.item())\n            update_times.append(time.time() - start)\n            adapt_losses.append(0.0 if last_loss is None else last_loss)\n\n            with torch.no_grad():\n                post_logits = m(xb)\n                post_pred = post_logits.argmax(-1)\n                dA = (m.fc1.A - preA).norm().item()\n                dB = (m.fc1.B - preB).norm().item()\n                dW = ((m.fc1.B @ m.fc1.A) - pre_delta).norm().item()\n                param_norm = float(math.sqrt(dA**2 + dB**2))\n                delta_norm = float(dW)\n                state_changed = int(\n                    param_norm > tol_state_change or dW > tol_state_change\n                )\n                pred_changed = int((pre_pred != post_pred).any().item())\n            did_update = 1\n            if config[\"gate_mode\"] == \"gated\":\n                buf_x = buf_x[-max(1, config[\"buffer_k\"] // 2) :]\n            else:\n                buf_x = []\n\n        update_flags.append(did_update)\n        state_changed_flags.append(state_changed)\n        pred_changed_flags.append(pred_changed)\n        param_delta_norms.append(param_norm)\n        delta_weight_norms.append(delta_norm)\n\n        do_reset = 0\n        if config[\"reset_every\"] > 0 and (i + 1) % config[\"reset_every\"] == 0:\n            m.fc1.reset_lora(zero_B=False)  # bugfix: avoid exact null delta after reset\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    triggered_examples = int(np.sum(gate_flags))\n    actual_state_changes = int(np.sum(state_changed_flags))\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"effective_update_rate\": float(np.mean(state_changed_flags)),\n        \"prediction_change_rate\": float(np.mean(pred_changed_flags)),\n        \"trigger_to_state_change_ratio\": float(\n            actual_state_changes / max(1, triggered_examples)\n        ),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"state_changed_flags\": np.array(state_changed_flags),\n        \"pred_changed_flags\": np.array(pred_changed_flags),\n        \"param_delta_norms\": np.array(param_delta_norms, dtype=np.float32),\n        \"delta_weight_norms\": np.array(delta_weight_norms, dtype=np.float32),\n        \"cumacc\": np.array(cumacc),\n        \"adapt_losses\": np.array(adapt_losses, dtype=np.float32),\n        \"gate_scores\": np.array(gate_scores, dtype=np.float32),\n    }\n\n\ndef delta_row(best_full, r):\n    keys = [\n        \"acc\",\n        \"ece\",\n        \"trigger_rate\",\n        \"update_rate\",\n        \"reset_rate\",\n        \"effective_update_rate\",\n        \"prediction_change_rate\",\n        \"overhead\",\n        \"srus\",\n    ]\n    return {f\"delta_{k}\": float(r.get(k, 0.0) - best_full.get(k, 0.0)) for k in keys}\n\n\n# ----------------------------- run main experiments -----------------------------\nmain_outputs = {}\nreplication_outputs = []\n\nfor seed in seeds_main:\n    set_seed(seed)\n    model, streams, train_hist, val_hist, cache, best_temp = train_source_model(seed)\n\n    for ds in dataset_names:\n        for epoch, tr_acc, tr_loss in train_hist:\n            experiment_data[ds][\"metrics\"][\"train\"].append((seed, epoch, tr_acc))\n            experiment_data[ds][\"losses\"][\"train\"].append((seed, epoch, tr_loss))\n            experiment_data[ds][\"timestamps\"].append(time.time())\n        for epoch, va_acc, va_loss, va_ece, va_srus in val_hist:\n            experiment_data[ds][\"metrics\"][\"val\"].append(\n                (seed, epoch, va_acc, va_ece, va_srus)\n            )\n            experiment_data[ds][\"losses\"][\"val\"].append((seed, epoch, va_loss))\n\n    thresholds_default = compute_thresholds(cache, 0.75)\n\n    base_cfg = {\n        \"gate_mode\": \"gated\",\n        \"use_update\": True,\n        \"reset_every\": 90,\n        \"use_calibration\": True,\n        \"objective\": ablation_objective,\n        \"lr\": 0.05,\n        \"buffer_k\": 4,\n        \"prox\": 0.02,\n        \"adapt_steps\": 2,\n    }\n\n    configs = {\n        \"full\": dict(base_cfg),\n        \"frozen_no_adaptation\": dict(\n            base_cfg, gate_mode=\"none\", use_update=False, reset_every=0\n        ),\n        \"always_trigger\": dict(base_cfg, gate_mode=\"always\"),\n        \"gated_trigger\": dict(base_cfg),\n        \"reset_only\": dict(\n            base_cfg, gate_mode=\"none\", use_update=False, reset_every=45\n        ),\n        \"remove_gating\": dict(base_cfg, gate_mode=\"always\"),\n        \"remove_reset\": dict(base_cfg, reset_every=0),\n        \"remove_update\": dict(base_cfg, use_update=False),\n        \"remove_calibration\": dict(base_cfg, use_calibration=False),\n    }\n\n    main_outputs[seed] = {}\n    for ds_name, stream in streams.items():\n        ds_results = {}\n        frozen = stream_eval(\n            model,\n            stream,\n            configs[\"frozen_no_adaptation\"],\n            thresholds_default,\n            best_temp,\n        )\n        for name, cfg in configs.items():\n            r = stream_eval(model, stream, cfg, thresholds_default, best_temp)\n            r[\"srus_terms\"] = srus_terms(\n                r[\"acc\"],\n                frozen[\"acc\"],\n                r[\"ece\"],\n                frozen[\"ece\"],\n                r[\"trigger_rate\"],\n                r[\"update_rate\"],\n                r[\"reset_rate\"],\n                r[\"overhead\"],\n            )\n            r[\"srus\"] = r[\"srus_terms\"][\"srus\"]\n            ds_results[name] = r\n\n        best_full = ds_results[\"full\"]\n        for name in ds_results:\n            ds_results[name].update(delta_row(best_full, ds_results[name]))\n\n        # threshold sweep\n        sweep = []\n        for q in gating_quantiles:\n            thr = compute_thresholds(cache, q)\n            r = stream_eval(model, stream, configs[\"full\"], thr, best_temp)\n            r[\"quantile\"] = q\n            r[\"srus\"] = srus(\n                r[\"acc\"],\n                frozen[\"acc\"],\n                r[\"ece\"],\n                frozen[\"ece\"],\n                r[\"trigger_rate\"],\n                r[\"update_rate\"],\n                r[\"reset_rate\"],\n                r[\"overhead\"],\n            )\n            sweep.append(r)\n\n        # reset sensitivity\n        reset_sweep = []\n        for re in reset_grid:\n            cfg = dict(configs[\"full\"], reset_every=re)\n            r = stream_eval(model, stream, cfg, thresholds_default, best_temp)\n            r[\"reset_every\"] = re\n            r[\"srus\"] = srus(\n                r[\"acc\"],\n                frozen[\"acc\"],\n                r[\"ece\"],\n                frozen[\"ece\"],\n                r[\"trigger_rate\"],\n                r[\"update_rate\"],\n                r[\"reset_rate\"],\n                r[\"overhead\"],\n            )\n            reset_sweep.append(r)\n\n        main_outputs[seed][ds_name] = {\n            \"configs\": ds_results,\n            \"threshold_sweep\": sweep,\n            \"reset_sweep\": reset_sweep,\n            \"best_temp\": best_temp,\n            \"thresholds_default\": thresholds_default,\n        }\n\n        # populate required experiment_data\n        experiment_data[ds_name][\"predictions\"] = ds_results[\"full\"][\"preds\"].tolist()\n        experiment_data[ds_name][\"ground_truth\"] = ds_results[\"full\"][\"gt\"].tolist()\n        for name, r in ds_results.items():\n            experiment_data[ds_name][\"metrics\"][\"test\"].append(\n                (\n                    seed,\n                    name,\n                    r[\"acc\"],\n                    r[\"ece\"],\n                    r[\"trigger_rate\"],\n                    r[\"update_rate\"],\n                    r[\"reset_rate\"],\n                    r[\"effective_update_rate\"],\n                    r[\"prediction_change_rate\"],\n                    r[\"overhead\"],\n                    r[\"srus\"],\n                )\n            )\n        experiment_data[ds_name][\"extra\"][f\"seed_{seed}\"] = {\n            \"configs\": {\n                k: {\n                    kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                    for kk, vv in v.items()\n                    if kk\n                    not in [\n                        \"preds\",\n                        \"gt\",\n                        \"conf\",\n                        \"entropy\",\n                        \"margin\",\n                        \"gate_flags\",\n                        \"update_flags\",\n                        \"reset_flags\",\n                        \"state_changed_flags\",\n                        \"pred_changed_flags\",\n                        \"param_delta_norms\",\n                        \"delta_weight_norms\",\n                        \"cumacc\",\n                        \"adapt_losses\",\n                        \"gate_scores\",\n                    ]\n                }\n                for k, v in ds_results.items()\n            },\n            \"threshold_sweep\": [\n                {\n                    kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                    for kk, vv in r.items()\n                    if kk\n                    not in [\n                        \"preds\",\n                        \"gt\",\n                        \"conf\",\n                        \"entropy\",\n                        \"margin\",\n                        \"gate_flags\",\n                        \"update_flags\",\n                        \"reset_flags\",\n                        \"state_changed_flags\",\n                        \"pred_changed_flags\",\n                        \"param_delta_norms\",\n                        \"delta_weight_norms\",\n                        \"cumacc\",\n                        \"adapt_losses\",\n                        \"gate_scores\",\n                    ]\n                }\n                for r in sweep\n            ],\n            \"reset_sweep\": [\n                {\n                    kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                    for kk, vv in r.items()\n                    if kk\n                    not in [\n                        \"preds\",\n                        \"gt\",\n                        \"conf\",\n                        \"entropy\",\n                        \"margin\",\n                        \"gate_flags\",\n                        \"update_flags\",\n                        \"reset_flags\",\n                        \"state_changed_flags\",\n                        \"pred_changed_flags\",\n                        \"param_delta_norms\",\n                        \"delta_weight_norms\",\n                        \"cumacc\",\n                        \"adapt_losses\",\n                        \"gate_scores\",\n                    ]\n                }\n                for r in reset_sweep\n            ],\n        }\n\n        prefix = f\"{ds_name}_seed{seed}\"\n        for cfg_name, r in ds_results.items():\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_cumacc.npy\"),\n                r[\"cumacc\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_conf.npy\"), r[\"conf\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_entropy.npy\"),\n                r[\"entropy\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_margin.npy\"),\n                r[\"margin\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_gate_flags.npy\"),\n                r[\"gate_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_update_flags.npy\"),\n                r[\"update_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_reset_flags.npy\"),\n                r[\"reset_flags\"],\n            )\n            np.save(\n                os.path.join(\n                    working_dir, f\"{prefix}_{cfg_name}_state_changed_flags.npy\"\n                ),\n                r[\"state_changed_flags\"],\n            )\n            np.save(\n                os.path.join(\n                    working_dir, f\"{prefix}_{cfg_name}_pred_changed_flags.npy\"\n                ),\n                r[\"pred_changed_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_param_delta_norms.npy\"),\n                r[\"param_delta_norms\"],\n            )\n            np.save(\n                os.path.join(\n                    working_dir, f\"{prefix}_{cfg_name}_delta_weight_norms.npy\"\n                ),\n                r[\"delta_weight_norms\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_preds.npy\"), r[\"preds\"]\n            )\n            np.save(os.path.join(working_dir, f\"{prefix}_{cfg_name}_gt.npy\"), r[\"gt\"])\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_adapt_losses.npy\"),\n                r[\"adapt_losses\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{cfg_name}_gate_scores.npy\"),\n                r[\"gate_scores\"],\n            )\n\n        plt.figure(figsize=(9, 4))\n        for name, color in [\n            (\"frozen_no_adaptation\", \"black\"),\n            (\"full\", \"tab:blue\"),\n            (\"always_trigger\", \"tab:red\"),\n            (\"remove_reset\", \"tab:green\"),\n        ]:\n            plt.plot(\n                ds_results[name][\"cumacc\"],\n                label=f\"{name}:{ds_results[name]['acc']:.3f}\",\n                linewidth=1.6,\n                color=color,\n            )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"cumulative accuracy\")\n        plt.title(f\"{ds_name} component comparison\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_component_cumacc.png\"))\n        plt.close()\n\n        plt.figure(figsize=(9, 4))\n        full_r = ds_results[\"full\"]\n        plt.plot(full_r[\"entropy\"], label=\"entropy\", alpha=0.8)\n        plt.plot(\n            full_r[\"gate_flags\"] * max(1e-6, np.max(full_r[\"entropy\"])),\n            label=\"gate\",\n            alpha=0.7,\n        )\n        plt.plot(\n            full_r[\"state_changed_flags\"] * max(1e-6, np.max(full_r[\"entropy\"])),\n            label=\"state_changed\",\n            alpha=0.7,\n        )\n        plt.axhline(\n            thresholds_default[\"ent_thr\"],\n            color=\"tab:red\",\n            linestyle=\"--\",\n            label=f\"ent_thr={thresholds_default['ent_thr']:.3f}\",\n        )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"value\")\n        plt.title(f\"{ds_name} gating diagnostics\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_gating_diagnostics.png\"))\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        xs = [r[\"quantile\"] for r in sweep]\n        plt.plot(\n            xs, [r[\"trigger_rate\"] for r in sweep], marker=\"o\", label=\"trigger_rate\"\n        )\n        plt.plot(xs, [r[\"acc\"] for r in sweep], marker=\"o\", label=\"acc\")\n        plt.plot(xs, [r[\"srus\"] for r in sweep], marker=\"o\", label=\"srus\")\n        plt.xlabel(\"gating quantile\")\n        plt.title(f\"{ds_name} gating operating curve\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_gating_sweep.png\"))\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        xs = [r[\"reset_every\"] for r in reset_sweep]\n        plt.plot(xs, [r[\"acc\"] for r in reset_sweep], marker=\"o\", label=\"acc\")\n        plt.plot(xs, [r[\"ece\"] for r in reset_sweep], marker=\"o\", label=\"ece\")\n        plt.plot(xs, [r[\"srus\"] for r in reset_sweep], marker=\"o\", label=\"srus\")\n        plt.xlabel(\"reset_every\")\n        plt.title(f\"{ds_name} reset sensitivity\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_reset_sweep.png\"))\n        plt.close()\n\n        print(\n            f\"{ds_name} | full acc={best_full['acc']:.4f} ece={best_full['ece']:.4f} \"\n            f\"trigger={best_full['trigger_rate']:.4f} update={best_full['update_rate']:.4f} \"\n            f\"effective_update={best_full['effective_update_rate']:.4f} pred_change={best_full['prediction_change_rate']:.4f} SRUS={best_full['srus']:.4f}\"\n        )\n\n# ----------------------------- seed replication -----------------------------\nfor seed in seeds_replication:\n    set_seed(seed)\n    model, streams, _, _, cache, best_temp = train_source_model(seed)\n    thresholds_default = compute_thresholds(cache, 0.75)\n    cfgs = {\n        \"full\": {\n            \"gate_mode\": \"gated\",\n            \"use_update\": True,\n            \"reset_every\": 90,\n            \"use_calibration\": True,\n            \"objective\": ablation_objective,\n            \"lr\": 0.05,\n            \"buffer_k\": 4,\n            \"prox\": 0.02,\n            \"adapt_steps\": 2,\n        },\n        \"best_ablation\": {\n            \"gate_mode\": \"gated\",\n            \"use_update\": True,\n            \"reset_every\": 0,\n            \"use_calibration\": True,\n            \"objective\": ablation_objective,\n            \"lr\": 0.05,\n            \"buffer_k\": 4,\n            \"prox\": 0.02,\n            \"adapt_steps\": 2,\n        },\n    }\n    for ds_name, stream in streams.items():\n        frozen = stream_eval(\n            model,\n            stream,\n            {\n                \"gate_mode\": \"none\",\n                \"use_update\": False,\n                \"reset_every\": 0,\n                \"use_calibration\": True,\n                \"objective\": ablation_objective,\n                \"lr\": 0.05,\n                \"buffer_k\": 4,\n                \"prox\": 0.02,\n                \"adapt_steps\": 2,\n            },\n            thresholds_default,\n            best_temp,\n        )\n        for name, cfg in cfgs.items():\n            r = stream_eval(model, stream, cfg, thresholds_default, best_temp)\n            r[\"srus\"] = srus(\n                r[\"acc\"],\n                frozen[\"acc\"],\n                r[\"ece\"],\n                frozen[\"ece\"],\n                r[\"trigger_rate\"],\n                r[\"update_rate\"],\n                r[\"reset_rate\"],\n                r[\"overhead\"],\n            )\n            replication_outputs.append(\n                {\n                    \"seed\": seed,\n                    \"dataset\": ds_name,\n                    \"config\": name,\n                    \"acc\": r[\"acc\"],\n                    \"ece\": r[\"ece\"],\n                    \"trigger_rate\": r[\"trigger_rate\"],\n                    \"update_rate\": r[\"update_rate\"],\n                    \"reset_rate\": r[\"reset_rate\"],\n                    \"effective_update_rate\": r[\"effective_update_rate\"],\n                    \"srus\": r[\"srus\"],\n                }\n            )\n\n# ----------------------------- summaries -----------------------------\nsummary = {\"main\": {}, \"replication\": {}, \"failure_analysis\": {}}\n\nfor ds_name in dataset_names:\n    cfg_names = list(main_outputs[seeds_main[0]][ds_name][\"configs\"].keys())\n    summary[\"main\"][ds_name] = {}\n    best_full = main_outputs[seeds_main[0]][ds_name][\"configs\"][\"full\"]\n    for cfg_name in cfg_names:\n        r = main_outputs[seeds_main[0]][ds_name][\"configs\"][cfg_name]\n        summary[\"main\"][ds_name][cfg_name] = {\n            \"acc\": float(r[\"acc\"]),\n            \"ece\": float(r[\"ece\"]),\n            \"trigger_rate\": float(r[\"trigger_rate\"]),\n            \"update_rate\": float(r[\"update_rate\"]),\n            \"reset_rate\": float(r[\"reset_rate\"]),\n            \"effective_update_rate\": float(r[\"effective_update_rate\"]),\n            \"prediction_change_rate\": float(r[\"prediction_change_rate\"]),\n            \"trigger_to_state_change_ratio\": float(r[\"trigger_to_state_change_ratio\"]),\n            \"overhead\": float(r[\"overhead\"]),\n            \"srus\": float(r[\"srus\"]),\n            **delta_row(best_full, r),\n        }\n\n    # failure analysis\n    full_terms = best_full[\"srus_terms\"]\n    dominant = max(\n        [\n            \"ece_penalty\",\n            \"trigger_penalty\",\n            \"update_penalty\",\n            \"reset_penalty\",\n            \"overhead_penalty\",\n        ],\n        key=lambda k: full_terms[k],\n    )\n    summary[\"failure_analysis\"][ds_name] = {\n        \"full_trigger_rate\": float(best_full[\"trigger_rate\"]),\n        \"full_update_rate\": float(best_full[\"update_rate\"]),\n        \"full_effective_update_rate\": float(best_full[\"effective_update_rate\"]),\n        \"full_prediction_change_rate\": float(best_full[\"prediction_change_rate\"]),\n        \"full_trigger_to_state_change_ratio\": float(\n            best_full[\"trigger_to_state_change_ratio\"]\n        ),\n        \"full_srus_terms\": {k: float(v) for k, v in full_terms.items()},\n        \"dominant_srus_cost_term\": dominant,\n        \"actionable_design_change\": (\n            \"increase effective state change via larger adapt_steps/lr or trigger only on burst+low-margin windows\"\n            if best_full[\"effective_update_rate\"]\n            < 0.5 * max(best_full[\"update_rate\"], 1e-8)\n            else \"reduce trigger/reset costs because state changes occur but utility is dominated by penalties\"\n        ),\n    }\n\n# replication aggregates\nrep_summary = {}\nfor ds in dataset_names:\n    rep_summary[ds] = {}\n    for cfg in [\"full\", \"best_ablation\"]:\n        rows = [\n            r for r in replication_outputs if r[\"dataset\"] == ds and r[\"config\"] == cfg\n        ]\n        rep_summary[ds][cfg] = {}\n        for metric in [\n            \"acc\",\n            \"ece\",\n            \"trigger_rate\",\n            \"update_rate\",\n            \"reset_rate\",\n            \"effective_update_rate\",\n            \"srus\",\n        ]:\n            vals = np.array([r[metric] for r in rows], dtype=np.float32)\n            rep_summary[ds][cfg][metric] = {\n                \"mean\": float(vals.mean()),\n                \"std\": float(vals.std(ddof=0)),\n            }\nsummary[\"replication\"] = rep_summary\n\n# concise table rows\ntable_rows = []\nfor ds in dataset_names:\n    for cfg, vals in summary[\"main\"][ds].items():\n        table_rows.append(\n            [\n                dataset_names.index(ds),\n                cfg,\n                vals[\"acc\"],\n                vals[\"ece\"],\n                vals[\"trigger_rate\"],\n                vals[\"update_rate\"],\n                vals[\"reset_rate\"],\n                vals[\"effective_update_rate\"],\n                vals[\"prediction_change_rate\"],\n                vals[\"overhead\"],\n                vals[\"srus\"],\n                vals[\"delta_acc\"],\n                vals[\"delta_ece\"],\n                vals[\"delta_trigger_rate\"],\n                vals[\"delta_update_rate\"],\n                vals[\"delta_reset_rate\"],\n                vals[\"delta_effective_update_rate\"],\n                vals[\"delta_prediction_change_rate\"],\n                vals[\"delta_overhead\"],\n                vals[\"delta_srus\"],\n            ]\n        )\n\n# ----------------------------- save all outputs -----------------------------\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nnp.save(\n    os.path.join(working_dir, \"summary_rows.npy\"),\n    np.array(table_rows, dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"replication_rows.npy\"),\n    np.array(replication_outputs, dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"train_hist.npy\"),\n    np.array(\n        (\n            main_outputs[seeds_main[0]][dataset_names[0]][\"threshold_sweep\"][0][\n                \"quantile\"\n            ]\n            if False\n            else [0]\n        ),\n        dtype=np.float32,\n    ),\n)  # placeholder for filename continuity\nnp.save(\n    os.path.join(working_dir, \"val_entropy.npy\"),\n    np.array(cache[\"entropy\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"val_margin.npy\"),\n    np.array(cache[\"margin\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"val_conf.npy\"), np.array(cache[\"conf\"], dtype=np.float32)\n)\nnp.save(\n    os.path.join(working_dir, \"val_correct.npy\"),\n    np.array(cache[\"correct\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"threshold_quantiles.npy\"),\n    np.array(gating_quantiles, dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"reset_grid.npy\"), np.array(reset_grid, dtype=np.int32)\n)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(summary, f, indent=2)\n\n# ----------------------------- final print -----------------------------\nprint(\"\\nFinal summaries:\")\nfor ds in dataset_names:\n    print(f\"\\nDataset = {ds}\")\n    for cfg, vals in summary[\"main\"][ds].items():\n        print(\n            f\"  {cfg}: acc={vals['acc']:.4f}, ece={vals['ece']:.4f}, trigger_rate={vals['trigger_rate']:.4f}, \"\n            f\"update_rate={vals['update_rate']:.4f}, reset_rate={vals['reset_rate']:.4f}, \"\n            f\"effective_update_rate={vals['effective_update_rate']:.4f}, pred_change_rate={vals['prediction_change_rate']:.4f}, \"\n            f\"overhead={vals['overhead']:.6f}, SRUS={vals['srus']:.4f}\"\n        )\n    fa = summary[\"failure_analysis\"][ds]\n    print(\n        f\"  failure_analysis: dominant_cost={fa['dominant_srus_cost_term']}, \"\n        f\"trigger_to_state_change_ratio={fa['full_trigger_to_state_change_ratio']:.4f}, \"\n        f\"action={fa['actionable_design_change']}\"\n    )\n\nprint(f\"\\nSaved outputs to: {working_dir}\")\n", "import os\nimport copy\nimport time\nimport math\nimport json\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nranks = [0, 1, 4, 8]\nstream_modes = [\"frozen\", \"always\", \"gated\", \"reset\"]\n\nexperiment_data = {\n    \"lora_capacity_ablation\": {\n        f\"r{r}\": {\n            ds: {\n                \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n                \"losses\": {\"train\": [], \"val\": []},\n                \"predictions\": [],\n                \"ground_truth\": [],\n                \"timestamps\": [],\n                \"thresholds\": {},\n                \"summary\": {},\n                \"extra\": {},\n            }\n            for ds in dataset_names\n        }\n        for r in ranks\n    }\n}\n\n\n# ---------- synthetic HF-benchmark-inspired data with fixed source normalization ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in dataset_names}\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.r = int(r)\n        self.alpha = float(alpha)\n        if self.r > 0:\n            self.A = nn.Parameter(torch.randn(self.r, inp) * 0.02)\n            self.B = nn.Parameter(torch.zeros(out, self.r))\n        else:\n            self.register_parameter(\"A\", None)\n            self.register_parameter(\"B\", None)\n\n    def forward(self, x):\n        if self.r > 0:\n            delta = (self.B @ self.A) * (self.alpha / self.r)\n            w = self.weight + delta\n        else:\n            w = self.weight\n        return F.linear(x, w, self.bias)\n\n    def lora_parameters(self):\n        if self.r > 0:\n            return [self.A, self.B]\n        return []\n\n    def reset_lora(self):\n        if self.r > 0:\n            nn.init.normal_(self.A, std=0.02)\n            nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48, r=4, alpha=2.0):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=r, alpha=alpha)\n        self.fc2 = nn.Linear(h, 2)\n        self.r = r\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\n# ---------- metrics ----------\ncriterion = nn.CrossEntropyLoss()\n\n\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\n# ---------- train ----------\ndef train_source_model(rank, epochs=8, lr=1e-3):\n    model = Net(r=rank).to(device)\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n\n    best_state, best_val = None, 1e9\n    val_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\n    train_hist, val_hist, train_loss_hist, val_loss_hist, ts_hist = [], [], [], [], []\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        tr_loss = tr_ok = tr_n = 0\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n            tr_loss += loss.item() * y.size(0)\n            tr_ok += (logits.argmax(1) == y).sum().item()\n            tr_n += y.size(0)\n        tr_loss /= tr_n\n        tr_acc = tr_ok / tr_n\n\n        model.eval()\n        va_loss = va_ok = va_n = 0\n        confs, corr, ents, margins = [], [], [], []\n        with torch.no_grad():\n            for batch in val_loader:\n                x = batch[\"x\"].to(device)\n                y = batch[\"y\"].to(device)\n                logits = model(x)\n                loss = criterion(logits, y)\n                p, ent, margin = probs_entropy_margin(logits)\n                c, pred = p.max(1)\n                confs.extend(c.cpu().numpy().tolist())\n                corr.extend((pred == y).float().cpu().numpy().tolist())\n                ents.extend(ent.cpu().numpy().tolist())\n                margins.extend(margin.cpu().numpy().tolist())\n                va_loss += loss.item() * y.size(0)\n                va_ok += (pred == y).sum().item()\n                va_n += y.size(0)\n        va_loss /= va_n\n        va_acc = va_ok / va_n\n        ece = compute_ece(confs, corr)\n        val_srus = va_acc - 0.2 * ece\n        val_uncertainty_cache = {\n            \"entropy\": ents,\n            \"margin\": margins,\n            \"conf\": confs,\n            \"correct\": corr,\n        }\n\n        train_hist.append((epoch, tr_acc, tr_acc))\n        val_hist.append((epoch, va_acc, val_srus))\n        train_loss_hist.append((epoch, tr_loss))\n        val_loss_hist.append((epoch, va_loss))\n        ts_hist.append(time.time())\n\n        print(\n            f\"[rank={rank}] Epoch {epoch}: train_acc={tr_acc:.4f} val_loss={va_loss:.4f} val_acc={va_acc:.4f}\"\n        )\n        if va_loss < best_val:\n            best_val = va_loss\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    ent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\n    margin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\n    conf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n    return (\n        model,\n        {\"train\": train_hist, \"val\": val_hist},\n        {\"train\": train_loss_hist, \"val\": val_loss_hist},\n        ts_hist,\n        (ent_thr, margin_thr, conf_thr),\n    )\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n\n    if m.fc1.r > 0:\n        initA = m.fc1.A.detach().clone()\n        initB = m.fc1.B.detach().clone()\n        opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n    else:\n        initA = initB = None\n        opt = None\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, buf_x, uncertainty_hist = [], [], []\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"always\":\n            gate_fire = True\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"reset\":\n            gate_fire = True\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if (\n            mode in [\"always\", \"gated\", \"reset\"]\n            and len(buf_x) >= buffer_k\n            and m.fc1.r > 0\n        ):\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo)\n                loss = loss + prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n            update_times.append(time.time() - start)\n            did_update = 1\n            buf_x = buf_x[-(buffer_k // 2) :] if mode == \"gated\" else []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and (i + 1) % reset_every == 0:\n            m.fc1.reset_lora()\n            if m.fc1.r > 0:\n                initA = m.fc1.A.detach().clone()\n                initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    trainable_adapter_params = (\n        0 if m.fc1.r == 0 else sum(p.numel() for p in m.fc1.lora_parameters())\n    )\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"adapter_rank\": int(m.fc1.r),\n        \"adapter_params\": int(trainable_adapter_params),\n    }\n\n\nall_summary = {\"lora_capacity_ablation\": {}}\n\n# ---------- run ablation ----------\nfor rank in ranks:\n    rank_key = f\"r{rank}\"\n    model, metric_hist, loss_hist, ts_hist, thresholds = train_source_model(rank)\n    ent_thr, margin_thr, conf_thr = thresholds\n\n    np.save(\n        os.path.join(working_dir, f\"{rank_key}_thresholds.npy\"),\n        np.array([ent_thr, marg
