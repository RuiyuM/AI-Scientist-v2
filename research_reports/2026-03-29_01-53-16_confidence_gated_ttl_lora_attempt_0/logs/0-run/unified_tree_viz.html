      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

const treeStructData = {"edges": [[1, 3]], "layout": [[0.0, 0.0], [0.16666666666666666, 0.0], [0.3333333333333333, 0.0], [0.16666666666666666, 1.0], [0.5, 0.0], [0.6666666666666666, 0.0], [0.8333333333333334, 0.0], [1.0, 0.0]], "plan": ["Ablation name: Source-Normalization Ablation. I\u2019ll turn the script into a two-\ncondition ablation: `with_source_norm` versus `no_source_norm`, each training\nits own model, calibrating its own uncertainty thresholds on validation, and\nevaluating the same four adaptation modes on the same streams. I\u2019ll restructure\nthe data pipeline so normalization is a switch applied consistently to source\ntrain/val and stream inputs, then save all train/val/test metrics, losses,\npredictions, thresholds, and per-stream traces into a nested `experiment_data`\ndictionary keyed by ablation type and dataset. Finally, I\u2019ll generate per-\nablation plots and a compact JSON summary while ensuring all required arrays are\nsaved, especially `experiment_data.npy`.", "Ablation name: Adaptation-Objective Ablation (Pseudo-Label Self-Training vs\nEntropy Minimization). I will keep the original training setup and stream-time\nadaptation machinery intact, but factor the update loss into two objectives: the\nbaseline pseudo-label self-training loss and the ablation entropy-minimization\nloss. Then I will run both objectives under the same stream modes (`always`,\n`gated`, `reset`) plus `frozen`, store results in a nested `experiment_data`\nstructure keyed by ablation type and dataset, and save all plottable arrays with\n`np.save`, including the required `experiment_data.npy`. This directly isolates\nwhether gains come from hard pseudo-labeling versus unsupervised entropy\nminimization while preserving LoRA parameters, gating, buffer, reset, and\nproximal regularization.", "Ablation name: Uncertainty-Gating Signal Ablation. I will extend the stream\nevaluator so the adaptation trigger is controlled by explicit uncertainty-gating\nvariants rather than a single hardcoded policy. The ablation will compare\nentropy-only, margin-only, confidence-only, composite without burst logic, and\nthe full composite-with-burst gate, while keeping the same adaptation update\nrule, reset schedule, and thresholds calibrated from validation. I will evaluate\nthese variants alongside frozen and always-adapt references on all three\nstreams, compute accuracy/ECE/trigger-update-overhead/SRUS, save all plottable\narrays into a nested `experiment_data` dict keyed by ablation type and dataset,\nand export summary plots and `experiment_data.npy` in the required format.", "The bug is that gated adaptation can fire without verifying that any downstream\nmodel state actually changed, so trigger rates become nonzero while effective\nupdates may be null or hidden. I fix this by instrumenting the adaptation\npathway: every trigger/update now records pre/post LoRA parameter norms, whether\nparameters actually changed above a tolerance, and whether the immediate post-\nupdate prediction changes on the triggering window. I also restructure the\nexperiment around the requested component ablations and threshold sweeps, using\na single \u201cfull\u201d system plus clean toggles for gate, reset, update, and\ncalibration so isolated component effects can be measured against the same\nfrozen baseline. Finally, I add multi-seed replication, SRUS decomposition, and\nsave complete per-dataset plottable diagnostics so the failure mode can be\nanalyzed directly.", "Ablation name: LoRA Capacity Ablation. I will generalize `LoRALinear` and `Net`\nto accept a configurable LoRA rank, including a clean `r=0` path with no\ntrainable adapter update while preserving the same gating, normalization, reset,\nand pseudo-label adaptation logic. Then I will train one source model per rank\nin `{0,1,4,8}`, calibrate uncertainty thresholds from each model\u2019s validation\nset, and evaluate all four stream modes on all three datasets. The script will\nsave a nested `experiment_data` structure keyed by ablation type and\ndataset/rank, plus per-rank/mode arrays and summary plots/tables, so the\ncapacity-vs-robustness/overhead tradeoff is directly inspectable. All results\nwill be written in a single self-contained file, with `experiment_data.npy`\nsaved exactly as requested.", "Ablation name: Temporal Context / Buffer Size Ablation. I\u2019ll keep the original\ntraining and stream-evaluation pipeline intact, then add a dedicated temporal-\ncontext ablation that varies only `buffer_k` for the gated online LoRA updater\nover `{1, 2, 4, 8, 16}`. For each synthetic stream, the script will run the\nfrozen baseline plus gated adaptation at each buffer size, compute\naccuracy/ECE/update efficiency/SRUS, save all plottable arrays with the required\n`experiment_data.npy` artifact, and produce compact summary plots. I\u2019ll also\nrecord short-shift versus sustained-shift segment metrics so the ablation\ndirectly tests whether larger temporal memory helps under transient bursts\nversus longer distribution changes.", "Ablation name: Adaptation Scope Ablation (LoRA-Only vs Classifier-Head vs Joint\nOnline Updates). I\u2019ll extend the stream-time adaptation code so the online\nupdate scope becomes an explicit ablation axis: `lora_only`, `head_only`, and\n`joint`, while keeping the gating, thresholds, buffering, pseudo-label\nobjective, and reset behavior unchanged. I\u2019ll restructure `experiment_data` to\nbe indexed first by ablation type and then by dataset, and I\u2019ll run the same\nstream modes (`frozen`, `always`, `gated`, `reset`) for each scope. The\nimplementation will add parameter-freezing/reset utilities for each scope,\npreserve fair proximal regularization against the initial adaptable parameters,\nand save all metrics, traces, plots, and the required `experiment_data.npy`. The\nscript remains single-file and executable as-is.", "Ablation name: Periodic Reset Mechanism Ablation. I will keep the original\nsynthetic streaming adaptation setup, but refactor the stream evaluator so reset\npolicy is an explicit ablation axis: no reset, fixed periodic reset, and\nuncertainty-triggered reset. I\u2019ll run this reset-policy ablation on top of the\nsame online adaptation mechanism, collect per-dataset/per-policy metrics\nincluding SRUS and reset statistics, and save all plottable arrays in the\nrequired `experiment_data.npy`. I\u2019ll also produce summary plots and per-run\nnumpy dumps so the effect of reset lifecycle management can be inspected step-\nby-step, especially on recurring-shift streams like `pubmedqa_burst` and\n`mmlu_clustered`."], "code": ["import os\nimport copy\nimport time\nimport json\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nablation_types = [\"with_source_norm\", \"no_source_norm\"]\n\nexperiment_data = {\n    ablation: {\n        ds: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for ds in dataset_names\n    }\n    for ablation in ablation_types\n}\n\n\n# ---------- synthetic data ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\ndef apply_norm(X, use_source_norm):\n    if use_source_norm:\n        return ((X - norm_mu) / norm_sd).astype(np.float32)\n    return X.astype(np.float32)\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\", use_source_norm=True):\n        X = apply_norm(source_all_X, use_source_norm)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, use_source_norm=True, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys, Ks = [], [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n        Ks.append(k)\n    X = np.stack(Xs).astype(np.float32)\n    X = apply_norm(X, use_source_norm)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n            \"kind\": Ks[i],\n        }\n        for i in range(len(Ys))\n    ]\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\ncriterion = nn.CrossEntropyLoss()\n\n\n# ---------- metrics ----------\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\ndef evaluate_shift_slices(preds, gt, kinds):\n    preds = np.array(preds)\n    gt = np.array(gt)\n    kinds = np.array(kinds)\n    out = {}\n    for k in sorted(set(kinds.tolist())):\n        m = kinds == k\n        out[k] = float((preds[m] == gt[m]).mean()) if m.any() else None\n    non_source = kinds != \"source\"\n    out[\"shifted_only_acc\"] = (\n        float((preds[non_source] == gt[non_source]).mean())\n        if non_source.any()\n        else None\n    )\n    src = kinds == \"source\"\n    out[\"source_only_acc\"] = (\n        float((preds[src] == gt[src]).mean()) if src.any() else None\n    )\n    return out\n\n\n# ---------- training ----------\ndef train_and_calibrate(use_source_norm, ablation_name):\n    train_ds = SourceDataset(\"train\", use_source_norm=use_source_norm)\n    val_ds = SourceDataset(\"val\", use_source_norm=use_source_norm)\n    train_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n    model = Net().to(device)\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n    best_state, best_val = None, 1e9\n    val_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\n\n    for epoch in range(1, 9):\n        model.train()\n        tr_loss = tr_ok = tr_n = 0\n        for batch in train_loader:\n            x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n            tr_loss += loss.item() * y.size(0)\n            tr_ok += (logits.argmax(1) == y).sum().item()\n            tr_n += y.size(0)\n        tr_loss /= tr_n\n        tr_acc = tr_ok / tr_n\n\n        model.eval()\n        va_loss = va_ok = va_n = 0\n        confs, corr, ents, margins = [], [], [], []\n        with torch.no_grad():\n            for batch in val_loader:\n                x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n                logits = model(x)\n                loss = criterion(logits, y)\n                p, ent, margin = probs_entropy_margin(logits)\n                c, pred = p.max(1)\n                confs.extend(c.cpu().numpy().tolist())\n                corr.extend((pred == y).float().cpu().numpy().tolist())\n                ents.extend(ent.cpu().numpy().tolist())\n                margins.extend(margin.cpu().numpy().tolist())\n                va_loss += loss.item() * y.size(0)\n                va_ok += (pred == y).sum().item()\n                va_n += y.size(0)\n        va_loss /= va_n\n        va_acc = va_ok / va_n\n        ece = compute_ece(confs, corr)\n        val_srus = va_acc - 0.2 * ece\n        val_uncertainty_cache = {\n            \"entropy\": ents,\n            \"margin\": margins,\n            \"conf\": confs,\n            \"correct\": corr,\n        }\n\n        for ds in dataset_names:\n            experiment_data[ablation_name][ds][\"metrics\"][\"train\"].append(\n                (epoch, tr_acc, tr_acc)\n            )\n            experiment_data[ablation_name][ds][\"metrics\"][\"val\"].append(\n                (epoch, va_acc, val_srus, ece)\n            )\n            experiment_data[ablation_name][ds][\"losses\"][\"train\"].append(\n                (epoch, tr_loss)\n            )\n            experiment_data[ablation_name][ds][\"losses\"][\"val\"].append((epoch, va_loss))\n            experiment_data[ablation_name][ds][\"timestamps\"].append(time.time())\n\n        print(\n            f\"[{ablation_name}] Epoch {epoch}: train_acc={tr_acc:.4f} val_loss={va_loss:.4f} val_acc={va_acc:.4f} val_ece={ece:.4f}\"\n        )\n        if va_loss < best_val:\n            best_val = va_loss\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    ent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\n    margin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\n    conf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n    return model, (ent_thr, margin_thr, conf_thr)\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n\n    preds, gt, confs, ents, margins, kinds = [], [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, buf_x = [], []\n    uncertainty_hist = []\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n        kinds.append(item[\"kind\"])\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"always\":\n            gate_fire = True\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"reset\":\n            gate_fire = True\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo)\n                loss = loss + prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n            update_times.append(time.time() - start)\n            did_update = 1\n            if mode == \"gated\":\n                buf_x = buf_x[-(buffer_k // 2) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and (i + 1) % reset_every == 0:\n            m.fc1.reset_lora()\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    slices = evaluate_shift_slices(preds_np, gt_np, kinds)\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"kinds\": np.array(kinds),\n        \"slice_acc\": slices,\n    }\n\n\nall_summary = {}\n\n# ---------- run ablation ----------\nfor ablation_name in ablation_types:\n    use_source_norm = ablation_name == \"with_source_norm\"\n    print(f\"\\n===== Ablation: {ablation_name} =====\")\n    model, (ent_thr, margin_thr, conf_thr) = train_and_calibrate(\n        use_source_norm, ablation_name\n    )\n    streams = {\n        k: make_stream(k, use_source_norm=use_source_norm) for k in dataset_names\n    }\n    all_summary[ablation_name] = {\n        \"thresholds\": [ent_thr, margin_thr, conf_thr],\n        \"datasets\": {},\n    }\n\n    np.save(\n        os.path.join(working_dir, f\"{ablation_name}_thresholds.npy\"),\n        np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32),\n    )\n\n    for ds_name, stream in streams.items():\n        frozen = stream_eval(model, stream, \"frozen\", ent_thr, margin_thr, conf_thr)\n        always = stream_eval(model, stream, \"always\", ent_thr, margin_thr, conf_thr)\n        gated = stream_eval(model, stream, \"gated\", ent_thr, margin_thr, conf_thr)\n        reset = stream_eval(\n            model, stream, \"reset\", ent_thr, margin_thr, conf_thr, reset_every=45\n        )\n\n        results = {\"frozen\": frozen, \"always\": always, \"gated\": gated, \"reset\": reset}\n        for name, res in results.items():\n            res[\"srus\"] = srus(\n                res[\"acc\"],\n                frozen[\"acc\"],\n                res[\"ece\"],\n                frozen[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"overhead\"],\n            )\n            experiment_data[ablation_name][ds_name][\"metrics\"][\"test\"].append(\n                (\n                    name,\n                    res[\"acc\"],\n                    res[\"ece\"],\n                    res[\"trigger_rate\"],\n                    res[\"update_rate\"],\n                    res[\"reset_rate\"],\n                    res[\"overhead\"],\n                    res[\"srus\"],\n                    (\n                        res[\"slice_acc\"][\"source_only_acc\"]\n                        if res[\"slice_acc\"][\"source_only_acc\"] is not None\n                        else -1.0\n                    ),\n                    (\n                        res[\"slice_acc\"][\"shifted_only_acc\"]\n                        if res[\"slice_acc\"][\"shifted_only_acc\"] is not None\n                        else -1.0\n                    ),\n                )\n            )\n\n        experiment_data[ablation_name][ds_name][\"predictions\"] = gated[\"preds\"].tolist()\n        experiment_data[ablation_name][ds_name][\"ground_truth\"] = gated[\"gt\"].tolist()\n        experiment_data[ablation_name][ds_name][\"extra\"] = {\n            \"ablation_name\": ablation_name,\n            \"use_source_norm\": use_source_norm,\n            \"thresholds\": {\"entropy\": ent_thr, \"margin\": margin_thr, \"conf\": conf_thr},\n            \"results\": {\n                k: {\n                    kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                    for kk, vv in v.items()\n                }\n                for k, v in results.items()\n            },\n        }\n        all_summary[ablation_name][\"datasets\"][ds_name] = {\n            mode: {\n                \"acc\": float(results[mode][\"acc\"]),\n                \"ece\": float(results[mode][\"ece\"]),\n                \"trigger_rate\": float(results[mode][\"trigger_rate\"]),\n                \"update_rate\": float(results[mode][\"update_rate\"]),\n                \"reset_rate\": float(results[mode][\"reset_rate\"]),\n                \"overhead\": float(results[mode][\"overhead\"]),\n                \"srus\": float(results[mode][\"srus\"]),\n                \"source_only_acc\": results[mode][\"slice_acc\"][\"source_only_acc\"],\n                \"shifted_only_acc\": results[mode][\"slice_acc\"][\"shifted_only_acc\"],\n            }\n            for mode in results\n        }\n\n        for mode_name, res in results.items():\n            prefix = f\"{ablation_name}_{ds_name}_{mode_name}\"\n            np.save(os.path.join(working_dir, f\"{prefix}_cumacc.npy\"), res[\"cumacc\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_conf.npy\"), res[\"conf\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_entropy.npy\"), res[\"entropy\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_margin.npy\"), res[\"margin\"])\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_gate_flags.npy\"), res[\"gate_flags\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_update_flags.npy\"),\n                res[\"update_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_reset_flags.npy\"),\n                res[\"reset_flags\"],\n            )\n            np.save(os.path.join(working_dir, f\"{prefix}_preds.npy\"), res[\"preds\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_gt.npy\"), res[\"gt\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_kinds.npy\"), res[\"kinds\"])\n\n        plt.figure(figsize=(8, 4))\n        for mode_name, color in [\n            (\"frozen\", \"black\"),\n            (\"always\", \"tab:red\"),\n            (\"gated\", \"tab:blue\"),\n            (\"reset\", \"tab:green\"),\n        ]:\n            plt.plot(\n                results[mode_name][\"cumacc\"],\n                label=f\"{mode_name} {results[mode_name]['acc']:.3f}\",\n                linewidth=1.8,\n                color=color,\n            )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"cumulative accuracy\")\n        plt.title(f\"{ablation_name} | {ds_name}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{ablation_name}_{ds_name}_stream_accuracy.png\")\n        )\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        plt.plot(gated[\"entropy\"], label=\"gated entropy\", alpha=0.9)\n        plt.plot(\n            gated[\"gate_flags\"] * max(1e-6, np.max(gated[\"entropy\"])),\n            label=\"gate fired\",\n            alpha=0.8,\n        )\n        plt.axhline(\n            ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n        )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"value\")\n        plt.title(f\"{ablation_name} | {ds_name} gated uncertainty\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(\n                working_dir, f\"{ablation_name}_{ds_name}_gated_uncertainty.png\"\n            )\n        )\n        plt.close()\n\n        print(\n            f\"[{ablation_name}] {ds_name} | \"\n            f\"frozen_acc={frozen['acc']:.4f} always_acc={always['acc']:.4f} gated_acc={gated['acc']:.4f} reset_acc={reset['acc']:.4f} | \"\n            f\"frozen_shift={frozen['slice_acc']['shifted_only_acc']:.4f} gated_shift={gated['slice_acc']['shifted_only_acc']:.4f}\"\n        )\n\n# ---------- cross-ablation comparison ----------\ncomparison = {}\nfor ds_name in dataset_names:\n    comparison[ds_name] = {}\n    for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n        a = all_summary[\"with_source_norm\"][\"datasets\"][ds_name][mode]\n        b = all_summary[\"no_source_norm\"][\"datasets\"][ds_name][mode]\n        comparison[ds_name][mode] = {\n            \"acc_delta_no_minus_norm\": b[\"acc\"] - a[\"acc\"],\n            \"ece_delta_no_minus_norm\": b[\"ece\"] - a[\"ece\"],\n            \"srus_delta_no_minus_norm\": b[\"srus\"] - a[\"srus\"],\n            \"shifted_acc_delta_no_minus_norm\": (\n                None\n                if a[\"shifted_only_acc\"] is None or b[\"shifted_only_acc\"] is None\n                else b[\"shifted_only_acc\"] - a[\"shifted_only_acc\"]\n            ),\n            \"source_acc_delta_no_minus_norm\": (\n                None\n                if a[\"source_only_acc\"] is None or b[\"source_only_acc\"] is None\n                else b[\"source_only_acc\"] - a[\"source_only_acc\"]\n            ),\n        }\n\nfor ablation_name in ablation_types:\n    print(f\"\\n=== Summary: {ablation_name} ===\")\n    for ds_name in dataset_names:\n        print(f\"{ds_name} metrics:\")\n        for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n            r = all_summary[ablation_name][\"datasets\"][ds_name][mode]\n            print(\n                f\"  {mode}: acc={r['acc']:.4f}, ece={r['ece']:.4f}, trigger_rate={r['trigger_rate']:.4f}, \"\n                f\"update_rate={r['update_rate']:.4f}, overhead={r['overhead']:.6f}, SRUS={r['srus']:.4f}, \"\n                f\"source_acc={r['source_only_acc']:.4f}, shifted_acc={r['shifted_only_acc']:.4f}\"\n            )\n\nprint(\"\\n=== No-normalization minus source-normalization deltas ===\")\nfor ds_name in dataset_names:\n    print(ds_name)\n    for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n        d = comparison[ds_name][mode]\n        print(\n            f\"  {mode}: \u0394acc={d['acc_delta_no_minus_norm']:.4f}, \u0394ece={d['ece_delta_no_minus_norm']:.4f}, \"\n            f\"\u0394srus={d['srus_delta_no_minus_norm']:.4f}, \u0394shifted_acc={d['shifted_acc_delta_no_minus_norm']:.4f}, \"\n            f\"\u0394source_acc={d['source_acc_delta_no_minus_norm']:.4f}\"\n        )\n\n# ---------- save required outputs ----------\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nnp.save(\n    os.path.join(working_dir, \"ablation_comparison.npy\"), comparison, allow_pickle=True\n)\nnp.save(os.path.join(working_dir, \"all_summary.npy\"), all_summary, allow_pickle=True)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(\n        {\n            \"all_summary\": all_summary,\n            \"comparison_no_minus_norm\": comparison,\n        },\n        f,\n        indent=2,\n    )\n", "import os, copy, time, math, json\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nablation_types = [\"pseudo_label_self_training\", \"entropy_minimization\"]\n\nexperiment_data = {\n    ablation: {\n        ds: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for ds in dataset_names\n    }\n    for ablation in ablation_types\n}\n\n\n# ---------- synthetic data ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in dataset_names}\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        return self.fc2(torch.tanh(self.fc1(x)))\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\n# ---------- metrics ----------\ncriterion = nn.CrossEntropyLoss()\n\n\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\ndef adaptation_loss_from_logits(logits, objective):\n    if objective == \"pseudo_label_self_training\":\n        with torch.no_grad():\n            pseudo = logits.detach().argmax(1)\n        return criterion(logits, pseudo)\n    elif objective == \"entropy_minimization\":\n        p = F.softmax(logits, dim=-1)\n        ent = -(p * torch.log(p + 1e-8)).sum(-1)\n        return ent.mean()\n    raise ValueError(f\"Unknown objective: {objective}\")\n\n\n# ---------- source train ----------\nmodel = Net().to(device)\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\nbest_state, best_val = None, 1e9\nval_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\ntrain_hist, val_hist = [], []\n\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        x = batch[\"x\"].to(device)\n        y = batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr, ents, margins = [], [], [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = criterion(logits, y)\n            p, ent, margin = probs_entropy_margin(logits)\n            c, pred = p.max(1)\n            confs.extend(c.cpu().numpy().tolist())\n            corr.extend((pred == y).float().cpu().numpy().tolist())\n            ents.extend(ent.cpu().numpy().tolist())\n            margins.extend(margin.cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    ece = compute_ece(confs, corr)\n    val_srus = va_acc - 0.2 * ece\n    train_hist.append((epoch, tr_acc, tr_loss))\n    val_hist.append((epoch, va_acc, va_loss, ece, val_srus))\n    val_uncertainty_cache = {\n        \"entropy\": ents,\n        \"margin\": margins,\n        \"conf\": confs,\n        \"correct\": corr,\n    }\n    print(\n        f\"Epoch {epoch}: train_acc={tr_acc:.4f} val_loss={va_loss:.4f} val_acc={va_acc:.4f} ece={ece:.4f}\"\n    )\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\nent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\nmargin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\nconf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n\n# populate common train/val logs for each ablation+dataset\nfor ablation in ablation_types:\n    for ds in dataset_names:\n        for epoch, tr_acc, tr_loss in train_hist:\n            experiment_data[ablation][ds][\"metrics\"][\"train\"].append(\n                (epoch, tr_acc, tr_acc)\n            )\n            experiment_data[ablation][ds][\"losses\"][\"train\"].append((epoch, tr_loss))\n            experiment_data[ablation][ds][\"timestamps\"].append(time.time())\n        for epoch, va_acc, va_loss, _, va_srus in val_hist:\n            experiment_data[ablation][ds][\"metrics\"][\"val\"].append(\n                (epoch, va_acc, va_srus)\n            )\n            experiment_data[ablation][ds][\"losses\"][\"val\"].append((epoch, va_loss))\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    objective,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, buf_x, adapt_losses = [], [], []\n    uncertainty_hist = []\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"always\":\n            gate_fire = True\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"reset\":\n            gate_fire = True\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            last_loss = None\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                adapt_loss = adaptation_loss_from_logits(logits_b, objective)\n                prox_loss = prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                loss = adapt_loss + prox_loss\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n                last_loss = float(loss.item())\n            update_times.append(time.time() - start)\n            adapt_losses.append(last_loss if last_loss is not None else 0.0)\n            did_update = 1\n            if mode == \"gated\":\n                buf_x = buf_x[-(buffer_k // 2) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and (i + 1) % reset_every == 0:\n            m.fc1.reset_lora()\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"adapt_losses\": np.array(adapt_losses, dtype=np.float32),\n    }\n\n\n# ---------- run ablations ----------\nall_summary = {ablation: {} for ablation in ablation_types}\n\nfor ablation in ablation_types:\n    print(f\"\\n=== Ablation: {ablation} ===\")\n    for ds_name, stream in streams.items():\n        frozen = stream_eval(\n            model, stream, \"frozen\", ent_thr, margin_thr, conf_thr, objective=ablation\n        )\n        always = stream_eval(\n            model, stream, \"always\", ent_thr, margin_thr, conf_thr, objective=ablation\n        )\n        gated = stream_eval(\n            model, stream, \"gated\", ent_thr, margin_thr, conf_thr, objective=ablation\n        )\n        reset = stream_eval(\n            model,\n            stream,\n            \"reset\",\n            ent_thr,\n            margin_thr,\n            conf_thr,\n            objective=ablation,\n            reset_every=45,\n        )\n\n        results = {\"frozen\": frozen, \"always\": always, \"gated\": gated, \"reset\": reset}\n        for name, res in results.items():\n            res[\"srus\"] = srus(\n                res[\"acc\"],\n                frozen[\"acc\"],\n                res[\"ece\"],\n                frozen[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"overhead\"],\n            )\n            experiment_data[ablation][ds_name][\"metrics\"][\"test\"].append(\n                (\n                    name,\n                    res[\"acc\"],\n                    res[\"ece\"],\n                    res[\"trigger_rate\"],\n                    res[\"update_rate\"],\n                    res[\"overhead\"],\n                    res[\"srus\"],\n                )\n            )\n\n        experiment_data[ablation][ds_name][\"predictions\"] = gated[\"preds\"].tolist()\n        experiment_data[ablation][ds_name][\"ground_truth\"] = gated[\"gt\"].tolist()\n        experiment_data[ablation][ds_name][\"extra\"] = {\n            k: {\n                kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                for kk, vv in v.items()\n            }\n            for k, v in results.items()\n        }\n        all_summary[ablation][ds_name] = results\n\n        prefix = f\"{ablation}_{ds_name}\"\n        for mode_name, res in results.items():\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_cumacc.npy\"),\n                res[\"cumacc\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_conf.npy\"), res[\"conf\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_entropy.npy\"),\n                res[\"entropy\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_margin.npy\"),\n                res[\"margin\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_gate_flags.npy\"),\n                res[\"gate_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_update_flags.npy\"),\n                res[\"update_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_reset_flags.npy\"),\n                res[\"reset_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_preds.npy\"),\n                res[\"preds\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_gt.npy\"), res[\"gt\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_adapt_losses.npy\"),\n                res[\"adapt_losses\"],\n            )\n\n        plt.figure(figsize=(8, 4))\n        for mode_name, color in [\n            (\"frozen\", \"black\"),\n            (\"always\", \"tab:red\"),\n            (\"gated\", \"tab:blue\"),\n            (\"reset\", \"tab:green\"),\n        ]:\n            plt.plot(\n                results[mode_name][\"cumacc\"],\n                label=f\"{mode_name} {results[mode_name]['acc']:.3f}\",\n                linewidth=1.8,\n                color=color,\n            )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"cumulative accuracy\")\n        plt.title(f\"{ds_name} | {ablation}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_stream_accuracy.png\"))\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        plt.plot(gated[\"entropy\"], label=\"gated entropy\", alpha=0.9)\n        plt.plot(\n            gated[\"gate_flags\"] * max(1e-6, np.max(gated[\"entropy\"])),\n            label=\"gate fired\",\n            alpha=0.8,\n        )\n        plt.axhline(\n            ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n        )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"value\")\n        plt.title(f\"{ds_name} gated uncertainty | {ablation}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_gated_uncertainty.png\"))\n        plt.close()\n\n        print(\n            f\"{ds_name} | frozen_acc={frozen['acc']:.4f} always_acc={always['acc']:.4f} gated_acc={gated['acc']:.4f} reset_acc={reset['acc']:.4f} | \"\n            f\"frozen_srus={frozen['srus']:.4f} always_srus={always['srus']:.4f} gated_srus={gated['srus']:.4f} reset_srus={reset['srus']:.4f}\"\n        )\n\n# ---------- aggregate comparison plots ----------\nfor ds_name in dataset_names:\n    plt.figure(figsize=(8, 4))\n    for ablation, color in [\n        (\"pseudo_label_self_training\", \"tab:blue\"),\n        (\"entropy_minimization\", \"tab:orange\"),\n    ]:\n        plt.plot(\n            all_summary[ablation][ds_name][\"gated\"][\"cumacc\"],\n            label=f\"{ablation} gated {all_summary[ablation][ds_name]['gated']['acc']:.3f}\",\n            linewidth=1.8,\n            color=color,\n        )\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"cumulative accuracy\")\n    plt.title(f\"{ds_name} gated ablation comparison\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_gated_ablation_comparison.png\"))\n    plt.close()\n\n# ---------- save all plottable data ----------\nthresholds_arr = np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32)\nnp.save(os.path.join(working_dir, \"thresholds.npy\"), thresholds_arr)\nnp.save(\n    os.path.join(working_dir, \"train_hist.npy\"), np.array(train_hist, dtype=np.float32)\n)\nnp.save(os.path.join(working_dir, \"val_hist.npy\"), np.array(val_hist, dtype=np.float32))\nnp.save(\n    os.path.join(working_dir, \"val_entropy.npy\"),\n    np.array(val_uncertainty_cache[\"entropy\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"val_margin.npy\"),\n    np.array(val_uncertainty_cache[\"margin\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"val_conf.npy\"),\n    np.array(val_uncertainty_cache[\"conf\"], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"val_correct.npy\"),\n    np.array(val_uncertainty_cache[\"correct\"], dtype=np.float32),\n)\n\nsummary_rows = []\nfor ablation in ablation_types:\n    for ds_name in dataset_names:\n        for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n            r = all_summary[ablation][ds_name][mode]\n            summary_rows.append(\n                [\n                    ablation_types.index(ablation),\n                    dataset_names.index(ds_name),\n                    [\"frozen\", \"always\", \"gated\", \"reset\"].index(mode),\n                    r[\"acc\"],\n                    r[\"ece\"],\n                    r[\"trigger_rate\"],\n                    r[\"update_rate\"],\n                    r[\"reset_rate\"],\n                    r[\"overhead\"],\n                    r[\"srus\"],\n                ]\n            )\nsummary_rows = np.array(summary_rows, dtype=np.float32)\nnp.save(os.path.join(working_dir, \"summary_rows.npy\"), summary_rows)\n\n# required filename\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(\n        {\n            ablation: {\n                ds: {\n                    mode: {\n                        \"acc\": float(all_summary[ablation][ds][mode][\"acc\"]),\n                        \"ece\": float(all_summary[ablation][ds][mode][\"ece\"]),\n                        \"trigger_rate\": float(\n                            all_summary[ablation][ds][mode][\"trigger_rate\"]\n                        ),\n                        \"update_rate\": float(\n                            all_summary[ablation][ds][mode][\"update_rate\"]\n                        ),\n                        \"reset_rate\": float(\n                            all_summary[ablation][ds][mode][\"reset_rate\"]\n                        ),\n                        \"overhead\": float(all_summary[ablation][ds][mode][\"overhead\"]),\n                        \"srus\": float(all_summary[ablation][ds][mode][\"srus\"]),\n                    }\n                    for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]\n                }\n                for ds in dataset_names\n            }\n            for ablation in ablation_types\n        },\n        f,\n        indent=2,\n    )\n\nprint(\"\\nFinal summaries:\")\nfor ablation in ablation_types:\n    print(f\"\\nAblation = {ablation}\")\n    for ds_name in dataset_names:\n        print(f\"{ds_name} metrics:\")\n        for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n            r = all_summary[ablation][ds_name][mode]\n            print(\n                f\"  {mode}: acc={r['acc']:.4f}, ece={r['ece']:.4f}, trigger_rate={r['trigger_rate']:.4f}, \"\n                f\"update_rate={r['update_rate']:.4f}, reset_rate={r['reset_rate']:.4f}, overhead={r['overhead']:.6f}, SRUS={r['srus']:.4f}\"\n            )\nprint(f\"\\nSaved outputs to: {working_dir}\")\n", "import os, copy, time, json, math\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Datase
