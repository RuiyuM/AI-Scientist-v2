\": float(results[mode][\"overhead\"]),\n            \"srus\": float(results[mode][\"srus\"]),\n        }\n        for mode in results\n    }\n\n    ds_store = experiment_data[ablation_name][ds_name]\n    for mode_name in [\n        \"frozen\",\n        \"no_reset\",\n        \"fixed_periodic_reset\",\n        \"uncertainty_triggered_reset\",\n    ]:\n        res = results[mode_name]\n        ds_store[\"metrics\"][\"test\"].append(\n            (\n                mode_name,\n                res[\"acc\"],\n                res[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"update_rate\"],\n                res[\"reset_rate\"],\n                res[\"reset_count\"],\n                res[\"overhead\"],\n                res[\"srus\"],\n            )\n        )\n        ds_store[\"predictions\"][mode_name] = res[\"preds\"].tolist()\n\n    ds_store[\"ground_truth\"] = results[\"no_reset\"][\"gt\"].tolist()\n    ds_store[\"extra\"] = {\n        mode: {\n            k: (v.tolist() if isinstance(v, np.ndarray) else v)\n            for k, v in results[mode].items()\n        }\n        for mode in results\n    }\n\n    for mode_name, res in results.items():\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_cumacc.npy\"),\n            res[\"cumacc\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_conf.npy\"), res[\"conf\"]\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_entropy.npy\"),\n            res[\"entropy\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_margin.npy\"),\n            res[\"margin\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_gate_flags.npy\"),\n            res[\"gate_flags\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_update_flags.npy\"),\n            res[\"update_flags\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_reset_flags.npy\"),\n            res[\"reset_flags\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_preds.npy\"), res[\"preds\"]\n        )\n        np.save(os.path.join(working_dir, f\"{ds_name}_{mode_name}_gt.npy\"), res[\"gt\"])\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_uncertainty_hist.npy\"),\n            res[\"uncertainty_hist\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_{mode_name}_reset_steps.npy\"),\n            res[\"reset_steps\"],\n        )\n\n    # cumulative accuracy plot\n    plt.figure(figsize=(9, 4.5))\n    color_map = {\n        \"frozen\": \"black\",\n        \"no_reset\": \"tab:blue\",\n        \"fixed_periodic_reset\": \"tab:green\",\n        \"uncertainty_triggered_reset\": \"tab:red\",\n    }\n    for mode_name in [\n        \"frozen\",\n        \"no_reset\",\n        \"fixed_periodic_reset\",\n        \"uncertainty_triggered_reset\",\n    ]:\n        plt.plot(\n            results[mode_name][\"cumacc\"],\n            label=f\"{mode_name} {results[mode_name]['acc']:.3f}\",\n            linewidth=1.8,\n            color=color_map[mode_name],\n        )\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"cumulative accuracy\")\n    plt.title(f\"{ds_name} reset-policy ablation\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_reset_policy_cumacc.png\"))\n    plt.close()\n\n    # uncertainty / reset plot\n    plt.figure(figsize=(9, 4.5))\n    base_ent = results[\"uncertainty_triggered_reset\"][\"entropy\"]\n    ymax = max(1e-6, float(np.max(base_ent)))\n    plt.plot(base_ent, label=\"entropy\", color=\"tab:purple\", alpha=0.9)\n    plt.plot(\n        results[\"uncertainty_triggered_reset\"][\"gate_flags\"] * ymax,\n        label=\"gate fired\",\n        alpha=0.7,\n    )\n    plt.plot(\n        results[\"uncertainty_triggered_reset\"][\"reset_flags\"] * ymax,\n        label=\"reset fired\",\n        alpha=0.8,\n    )\n    plt.axhline(\n        ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n    )\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"value\")\n    plt.title(f\"{ds_name} uncertainty-triggered reset behavior\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_uncertainty_reset_behavior.png\"))\n    plt.close()\n\n    print(\n        f\"{ds_name} | \"\n        f\"frozen_acc={frozen['acc']:.4f} \"\n        f\"no_reset_acc={no_reset['acc']:.4f} \"\n        f\"fixed_reset_acc={fixed_periodic_reset['acc']:.4f} \"\n        f\"unc_reset_acc={uncertainty_triggered_reset['acc']:.4f} | \"\n        f\"frozen_srus={frozen['srus']:.4f} \"\n        f\"no_reset_srus={no_reset['srus']:.4f} \"\n        f\"fixed_reset_srus={fixed_periodic_reset['srus']:.4f} \"\n        f\"unc_reset_srus={uncertainty_triggered_reset['srus']:.4f}\"\n    )\n\n# ---------------- save required outputs ----------------\nnp.save(\n    os.path.join(working_dir, \"thresholds.npy\"),\n    np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32),\n)\n\n# required filename exactly\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(\n        {\n            \"ablation\": ablation_name,\n            \"thresholds\": {\n                \"entropy\": ent_thr,\n                \"margin\": margin_thr,\n                \"confidence\": conf_thr,\n            },\n            \"results\": all_summary,\n        },\n        f,\n        indent=2,\n    )\n\n# also save compact summary arrays for plotting/table recreation\nfor ds_name in dataset_names:\n    modes = [\n        \"frozen\",\n        \"no_reset\",\n        \"fixed_periodic_reset\",\n        \"uncer ather than the required component\nablation matrix (single-component removals for gating, reset, update,\ncalibration; threshold sweep; reset sensitivity; seed replications; diagnostics\nof triggered-but-no-state-change cases). So the execution succeeded technically,\nbut it does not implement the intended ablation study. There is also evidence of\nan adaptation-pathway issue: gated mode has nonzero trigger/update rates yet\nusually matches or underperforms frozen, suggesting pseudo-label self-training\nupdates are weak or harmful. Fixes: (1) implement explicit ablation configs for\neach component and compare against the full system; (2) add threshold sweeps\nover at least 5 settings; (3) add diagnostics logging parameter delta norms,\nnumber of triggered examples that actually changed LoRA state, and prediction\nchanges after updates; (4) add reset-frequency sweeps and 3-seed replications;\n(5) if adaptation is intended to help, replace self-training on argmax pseudo-\nlabels with a more meaningful unsupervised objective or confidence-filtered\nupdate rule, and verify updates are nontrivial by measuring adapter norm changes\nbefore/after each step.", "The script runs to completion, but there is a clear experimental/specification\nbug relative to the stated ablation-stage goals. It does not implement the\nrequired component ablation matrix or diagnostics: only four modes are evaluated\n(frozen/always/gated/reset) across two adaptation objectives, while the\nrequested study requires isolated removals of gating, reset mechanism, update\nmechanism, and calibration module, threshold sweeps (>=5 settings), reset\nsensitivity sweeps, and 3-seed replications. In addition, the current code\ncannot diagnose the key issue 'gate fires but no downstream state change'\nbecause it records only trigger/update flags and losses, not whether parameters\nactually changed (e.g., LoRA delta norms, optimizer step effect, prediction\nchanges after trigger). A secondary methodological bug is that 'reset' mode is\nnot a true reset-only ablation: it still performs adaptation updates exactly\nlike always-on mode and merely changes reset frequency, so it does not isolate\nthe reset mechanism. Proposed fixes: (1) add explicit configs for full system\nand single-component removals, e.g. no_gate, no_reset, no_update,\nno_calibration, reset_only (resets without adaptation), gated_trigger_only,\nalways_trigger, frozen; (2) implement threshold sweeps over\nentropy/margin/confidence and reset-frequency sweeps; (3) add seed loop over at\nleast 3 seeds; (4) log actual state-change diagnostics per trigger/update,\nincluding ||A-A_prev||, ||B-B_prev||, whether optimizer steps changed parameters\nbeyond tolerance, and whether predictions/logits changed after adaptation; (5)\nreport per-dataset deltas relative to the best full system rather than only raw\nmetrics. So the code execution itself succeeded, but the experiment is\nbuggy/incomplete for the intended ablation study and one ablation label\n('reset') is semantically incorrect.", "The script ran to completion, but there is a clear experimental/implementation\nbug: the three single-signal gates (`entropy_only`, `margin_only`,\n`confidence_only`) and `composite_no_burst` produce exactly identical trigger\nrates, update rates, accuracies, ECEs, and SRUS on all three datasets. This is\nhighly implausible and indicates the gating signals are effectively redundant or\nthe thresholds were chosen so that all three boolean flags coincide almost\nperfectly. As a result, the intended uncertainty-gating ablation does not\nisolate component contributions and does not satisfy the sub-stage goal of\ngating sensitivity analysis. A second design bug is that `full_gate` uses\n`composite_uncertain and (local_burst or buf_len > 0)`, which can latch the gate\non once the buffer is non-empty, so it is not a clean burst-gated policy. Fixes:\n(1) log and compare per-example disagreement rates among `ent_flag`,\n`margin_flag`, and `conf_flag`; if they are nearly identical, recalibrate\nthresholds independently or use continuous scores/percentiles per dataset to\nensure distinct operating points; (2) add diagnostics for actual parameter delta\nnorms and prediction changes after each update to verify updates are non-null;\n(3) change full-gate logic to depend only on the intended burst criterion (or\nanother explicit condition), not `buf_len > 0`, unless that latch behavior is\ndeliberate and separately ablated; (4) implement the missing ablations requested\nin the stage goals (reset-only, no-reset, update-off, calibration ablation,\nthreshold sweep, seed replication), since the current run only covers gate\nvariants and cannot support the full component contribution table.", "There are experiment-design and reporting bugs despite successful execution.\nMain issue: the printed 'full' metrics are inconsistent with the final summary\nfor at least arc_easy_shift and likely arise because 'full' and 'gated_trigger'\nare evaluated separately with stochastic timing/optimizer effects, then\ndifferent values are reported in different places. More importantly, the\nablation matrix is not a true isolated component analysis: 'full' and\n'gated_trigger' are duplicates, 'remove_gating' duplicates 'always_trigger', and\n'reset_only' changes multiple components at once, so component contributions are\nconfounded. The targeted diagnostic from the previous stage was only partially\nfixed: effective_update_rate is nonzero, but prediction_change_rate is ~0,\nindicating updates change parameters without changing outputs; this should be\nexplicitly treated as a failure mode, not as a resolved bug. There is also a\nbookkeeping bug: train_hist.npy is saved as a placeholder [0] instead of the\nactual training history. Minor reporting issue: overhead for the first per-\ndataset print differs from the final summary because different configs/runs are\nbeing compared or recomputed. Proposed fixes: (1) define a nonredundant config\nset with one toggle per component and avoid duplicate aliases; (2) evaluate each\nconfig once per dataset and reuse the same stored result for all\nprints/summaries; (3) save real train/val histories instead of placeholders; (4)\nadd diagnostics on logit/prediction deltas after updates and treat near-zero\noutput change as ineffective adaptation; (5) if deterministic comparison is\ndesired, control all stochasticity and avoid repeated deep-copied reevaluations\nwhen summarizing.", "The run completed, but it does not satisfy the stated ablation-stage goals and\nexposes a likely implementation issue in the adaptation pathway. Main findings:\n(1) This is not a component ablation suite; it is primarily a LoRA-rank sweep\nover four stream modes. Required configurations such as single-component\nremovals, reset-only/no-reset variants, threshold sweeps (>=5 settings), and\n3-seed replications are missing. (2) The targeted diagnostic about gate firing\nwithout downstream state change is not implemented: no parameter-delta norms, no\ncount of triggered examples that actually changed model state, and no post-\ntrigger prediction-change analysis. (3) There is a likely bug/design flaw in\nonline adaptation: updates optimize cross-entropy on the model\u2019s own argmax\npseudo-labels (`pseudo = logits_b.detach().argmax(1)`), which can produce weak\nor self-reinforcing gradients and may explain why adaptation often hurts or has\nnegligible benefit. Add diagnostics comparing adapter parameter norms\nbefore/after each update, gradient norms, and prediction flips after updates;\nconsider entropy minimization or supervised oracle checks for debugging. (4)\nReset behavior is confounded: `reset_every` is applied in both `always` and\n`gated` modes, so reset is not isolated as a separate component, and the `reset`\nmode differs only by a different reset frequency at call time. To fix, add\nexplicit flags for gating/update/reset/calibration modules and evaluate true\nsingle-component removals with all else fixed. (5) The summary indicates\nnegative SRUS is dominated by the trigger penalty in always/reset modes; this is\nexpected from the metric definition rather than a crash, but the code does not\nprovide the requested SRUS term decomposition. Overall: no runtime crash, but\nthere is a methodological/implementation bug relative to the experiment plan,\nand the adaptation mechanism likely needs debugging because selective updates do\nnot yield reliable gains.", "The run completed, but it does not implement the requested sub-stage and shows a\nlikely methodological/implementation bug relative to the stated goal. Instead of\nthe required component ablation and gating sensitivity study (full, frozen,\nalways-trigger, reset-only, single-component removals, threshold sweep, reset\nsensitivity, diagnostics of trigger-without-update, seed replications), the\nscript runs a temporal context buffer-size ablation only for frozen vs gated\nmodes. This is a major experiment mismatch. Additionally, the adaptation\nobjective is self-training on the model\u2019s own argmax labels (`pseudo =\nlogits_b.detach().argmax(1)` with CE on the same logits), which tends to\nreinforce current predictions rather than correct errors; this can explain why\ngated adaptation mostly hurts accuracy/SRUS despite nonzero trigger/update\nrates. A further issue is that `overhead` is reported as mean update-time\nconditional on updates only, while SRUS penalizes it directly; this\nunderestimates per-example cost and makes comparisons across different update\nrates inconsistent. Fixes: (1) implement the requested ablation matrix\nexplicitly: frozen, full, always, gated, reset-only, no-reset, no-update, no-\ngate, calibration on/off, threshold sweep, reset-frequency sweep, and 3-seed\nreplications; (2) add diagnostics for actual state change after triggers\n(parameter delta norms, count of triggered examples leading to updates,\nprediction flips pre/post update); (3) replace or augment the self-training loss\nwith a more meaningful online objective, e.g. entropy minimization with\nconfidence masking, consistency regularization, or supervised oracle labels in a\ncontrolled synthetic setting; (4) compute overhead on a per-stream-example basis\n(total adaptation time / total examples) and separately report conditional\nupdate latency; (5) rename outputs/artifacts to match the experiment actually\nrun, since current keys/files are `temporal_context_buffer_size_ablation`, not\nthe requested component ablation.", "The script ran to completion, but there is a clear experimental/implementation\nbug relative to the stated sub-stage goals and a likely logic issue in the\nadaptation pathway. Main findings: (1) The run does not execute the required\ncomponent ablation matrix; it only varies adaptation scope\n(lora_only/head_only/joint) crossed with modes (frozen/always/gated/reset), so\ngating-threshold sweeps, single-component removals, reset sensitivity,\ndiagnostics of triggered-vs-effective updates, and 3-seed replications are all\nmissing. This is a specification mismatch. Fix by adding explicit configs for\nfull model, no adaptation, always-trigger, gated-trigger, reset-only, no-reset,\nno-update, no-calibration, and threshold/reset sweeps, then aggregate per-\ndataset deltas vs the best full system. (2) The current code cannot diagnose the\npreviously observed failure mode 'nonzero trigger rates but zero update rates';\nin fact here gated update rates are nonzero, but there is still no measurement\nof whether triggered examples changed model state or predictions. Fix by logging\nparameter delta norms before/after each update, counting triggered examples that\nlead to nonzero state change, and measuring post-trigger prediction flips. (3)\nThe reset baseline is mislabeled semantically: mode='reset' sets gate_fire=True\non every example and also performs periodic resets, so it is effectively always-\ntrigger+periodic-reset, not a true reset-only ablation. Fix by separating reset\npolicy from trigger policy and implementing a true reset-only/no-update\ncondition if required. (4) There is a likely methodological bug in test-time\nadaptation: updates use self-training on pseudo-labels from the same logits just\ncomputed, which can reinforce wrong predictions and explains the severe collapse\nfor head_only/joint and negative SRUS across adaptive modes. If this is\nintended, it should be called out; otherwise consider entropy minimization,\nconsistency loss, or delayed supervised/teacher signals. (5) Gated logic may be\noverly restrictive/odd: gate_fire for gated requires uncertain and (local_burst\nor len(buf_x)>0), so the first uncertain example usually does not trigger unless\na burst condition is already met; this couples triggering to prior buffer state\nand can distort trigger/update behavior. Consider gate_fire=uncertain, with\nburst used only for update scheduling. (6) The reported 'best' behavior is\nfrozen everywhere by SRUS=0 while all adaptive modes are negative; this is not a\ncrash bug, but it indicates the adaptation mechanism as implemented is harmful\nunder this setup. Scientifically, the main conclusion from this run is that\nLoRA-only adaptation is least harmful, while head-only and joint adaptation are\nunstable and often catastrophic. (7) Minor output issue: the printed summary is\ntruncated in the log, so not all metrics are visible, though files were saved\nsuccessfully. Overall: execution succeeded technically, but the experiment is\nincomplete for the requested sub-stage and contains design/logic issues that\nmake the ablation claims insufficient.", "The script ran to completion, but there is a methodological/implementation bug\nrelative to the stated sub-stage goals and prior diagnostic concern. The\nexecuted experiment is only a reset-policy ablation on synthetic data, not the\nrequired full component ablation suite on the same three prior datasets, and it\ndoes not include the targeted diagnostics needed to explain gate/update\nbehavior. More importantly, the reset comparison is confounded:\nfixed_periodic_reset and uncertainty_triggered_reset are both evaluated in gated\nmode only, so reset effects are mixed with different trigger/update trajectories\nrather than isolated against a matched adaptation policy. There is also a likely\nimplementation issue in the adaptation objective: pseudo-label self-training on\nthe same forward pass with LoRA initialized at B=0 can produce weak or unstable\nupdates, and no parameter-delta or prediction-change checks are logged, so\nnontrivial update_rate does not guarantee meaningful state change. Proposed\nfixes: (1) add a full factorial/controlled ablation matrix including frozen,\nalways-trigger, gated-trigger, reset-only, no-reset, no-update, no-calibration,\nand single-component removals on the same datasets/splits; (2) isolate reset by\nholding trigger/update policy fixed while varying only reset\ncondition/frequency, plus always-reset/no-reset baselines; (3) instrument\nadaptation with LoRA parameter delta norms, optimizer step norms, number of\ntriggered examples that changed state, and post-update prediction changes; (4)\nif updates remain ineffective, change the online loss or initialization (e.g.,\nnonzero B init, consistency loss across augmentations, entropy minimization with\nconfidence filtering, or supervised oracle-only sanity checks) and verify that\nupdates actually alter logits; (5) report seed-controlled replications and\nthreshold sweeps as required."], "exc_type": [null, null, null, null, null, null, null, null], "exc_info": [null, null, null, null, null, null, null, null], "exc_stack": [null, null, null, null, null, null, null, null], "exp_name": "0-run", "metrics": [{"metric_names": [{"metric_name": "final train accuracy", "lower_is_better": false, "description": "Final training accuracy at the end of training.", "data": [{"dataset_name": "arc_easy_shift", "final_value": 0.989583, "best_value
