in_thr, conf_thr], dtype=np.float32),\n    )\n\n    all_summary[\"lora_capacity_ablation\"][rank_key] = {}\n    for ds_name in dataset_names:\n        for item in metric_hist[\"train\"]:\n            experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"metrics\"][\n                \"train\"\n            ].append(item)\n        for item in metric_hist[\"val\"]:\n            experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"metrics\"][\n                \"val\"\n            ].append(item)\n        for item in loss_hist[\"train\"]:\n            experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"losses\"][\n                \"train\"\n            ].append(item)\n        for item in loss_hist[\"val\"]:\n            experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"losses\"][\n                \"val\"\n            ].append(item)\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\n            \"timestamps\"\n        ].extend(ts_hist)\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"thresholds\"] = {\n            \"entropy\": ent_thr,\n            \"margin\": margin_thr,\n            \"conf\": conf_thr,\n        }\n\n    for ds_name, stream in streams.items():\n        frozen = stream_eval(model, stream, \"frozen\", ent_thr, margin_thr, conf_thr)\n        always = stream_eval(model, stream, \"always\", ent_thr, margin_thr, conf_thr)\n        gated = stream_eval(model, stream, \"gated\", ent_thr, margin_thr, conf_thr)\n        reset = stream_eval(\n            model, stream, \"reset\", ent_thr, margin_thr, conf_thr, reset_every=45\n        )\n\n        results = {\"frozen\": frozen, \"always\": always, \"gated\": gated, \"reset\": reset}\n        for mode_name, res in results.items():\n            res[\"srus\"] = srus(\n                res[\"acc\"],\n                frozen[\"acc\"],\n                res[\"ece\"],\n                frozen[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"overhead\"],\n            )\n            experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"metrics\"][\n                \"test\"\n            ].append(\n                (\n                    mode_name,\n                    res[\"acc\"],\n                    res[\"ece\"],\n                    res[\"trigger_rate\"],\n                    res[\"update_rate\"],\n                    res[\"reset_rate\"],\n                    res[\"overhead\"],\n                    res[\"srus\"],\n                )\n            )\n\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"predictions\"] = (\n            gated[\"preds\"].tolist()\n        )\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"ground_truth\"] = (\n            gated[\"gt\"].tolist()\n        )\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"summary\"] = {\n            mode: {\n                \"acc\": float(results[mode][\"acc\"]),\n                \"ece\": float(results[mode][\"ece\"]),\n                \"trigger_rate\": float(results[mode][\"trigger_rate\"]),\n                \"update_rate\": float(results[mode][\"update_rate\"]),\n                \"reset_rate\": float(results[mode][\"reset_rate\"]),\n                \"overhead\": float(results[mode][\"overhead\"]),\n                \"srus\": float(results[mode][\"srus\"]),\n                \"adapter_rank\": int(results[mode][\"adapter_rank\"]),\n                \"adapter_params\": int(results[mode][\"adapter_params\"]),\n            }\n            for mode in results\n        }\n        experiment_data[\"lora_capacity_ablation\"][rank_key][ds_name][\"extra\"] = {\n            k: {\n                kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                for kk, vv in v.items()\n            }\n            for k, v in results.items()\n        }\n        all_summary[\"lora_capacity_ablation\"][rank_key][ds_name] = experiment_data[\n            \"lora_capacity_ablation\"\n        ][rank_key][ds_name][\"summary\"]\n\n        for mode_name, res in results.items():\n            prefix = f\"{rank_key}_{ds_name}_{mode_name}\"\n            np.save(os.path.join(working_dir, f\"{prefix}_cumacc.npy\"), res[\"cumacc\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_conf.npy\"), res[\"conf\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_entropy.npy\"), res[\"entropy\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_margin.npy\"), res[\"margin\"])\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_gate_flags.npy\"), res[\"gate_flags\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_update_flags.npy\"),\n                res[\"update_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_reset_flags.npy\"),\n                res[\"reset_flags\"],\n            )\n            np.save(os.path.join(working_dir, f\"{prefix}_preds.npy\"), res[\"preds\"])\n            np.save(os.path.join(working_dir, f\"{prefix}_gt.npy\"), res[\"gt\"])\n\n        plt.figure(figsize=(8, 4))\n        for mode_name, color in [\n            (\"frozen\", \"black\"),\n            (\"always\", \"tab:red\"),\n            (\"gated\", \"tab:blue\"),\n            (\"reset\", \"tab:green\"),\n        ]:\n            plt.plot(\n                results[mode_name][\"cumacc\"],\n                label=f\"{mode_name} {results[mode_name]['acc']:.3f}\",\n                linewidth=1.8,\n                color=color,\n            )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"cumulative accuracy\")\n        plt.title(f\"{ds_name} | LoRA rank={rank}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{rank_key}_{ds_name}_stream_accuracy.png\")\n        )\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        plt.plot(gated[\"entropy\"], label=\"gated entropy\", alpha=0.9)\n        plt.plot(\n            gated[\"gate_flags\"] * max(1e-6, np.max(gated[\"entropy\"])),\n            label=\"gate fired\",\n            alpha=0.8,\n        )\n        plt.axhline(\n            ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n        )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"value\")\n        plt.title(f\"{ds_name} | rank={rank} gated uncertainty\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{rank_key}_{ds_name}_gated_uncertainty.png\")\n        )\n        plt.close()\n\n        print(\n            f\"[rank={rank}] {ds_name} | \"\n            f\"frozen_acc={frozen['acc']:.4f} always_acc={always['acc']:.4f} gated_acc={gated['acc']:.4f} reset_acc={reset['acc']:.4f} | \"\n            f\"frozen_srus={frozen['srus']:.4f} always_srus={always['srus']:.4f} gated_srus={gated['srus']:.4f} reset_srus={reset['srus']:.4f}\"\n        )\n\n# ---------- aggregate comparisons ----------\nfor ds_name in dataset_names:\n    plt.figure(figsize=(9, 5))\n    for mode_name in stream_modes:\n        vals = [\n            all_summary[\"lora_capacity_ablation\"][f\"r{r}\"][ds_name][mode_name][\"acc\"]\n            for r in ranks\n        ]\n        plt.plot(ranks, vals, marker=\"o\", linewidth=2, label=mode_name)\n    plt.xlabel(\"LoRA rank r\")\n    plt.ylabel(\"stream accuracy\")\n    plt.title(f\"{ds_name} accuracy vs LoRA rank\")\n    plt.xticks(ranks)\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_rank_vs_accuracy.png\"))\n    plt.close()\n\n    plt.figure(figsize=(9, 5))\n    for mode_name in stream_modes:\n        vals = [\n            all_summary[\"lora_capacity_ablation\"][f\"r{r}\"][ds_name][mode_name][\"srus\"]\n            for r in ranks\n        ]\n        plt.plot(ranks, vals, marker=\"o\", linewidth=2, label=mode_name)\n    plt.xlabel(\"LoRA rank r\")\n    plt.ylabel(\"SRUS\")\n    plt.title(f\"{ds_name} SRUS vs LoRA rank\")\n    plt.xticks(ranks)\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_rank_vs_srus.png\"))\n    plt.close()\n\n    plt.figure(figsize=(9, 5))\n    for mode_name in [\"always\", \"gated\", \"reset\"]:\n        vals = [\n            all_summary[\"lora_capacity_ablation\"][f\"r{r}\"][ds_name][mode_name][\n                \"overhead\"\n            ]\n            for r in ranks\n        ]\n        plt.plot(ranks, vals, marker=\"o\", linewidth=2, label=mode_name)\n    plt.xlabel(\"LoRA rank r\")\n    plt.ylabel(\"mean update overhead (s)\")\n    plt.title(f\"{ds_name} overhead vs LoRA rank\")\n    plt.xticks(ranks)\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_rank_vs_overhead.png\"))\n    plt.close()\n\nsummary_rows = []\nfor rank in ranks:\n    rank_key = f\"r{rank}\"\n    for ds_name in dataset_names:\n        print(f\"[rank={rank}] {ds_name} metrics:\")\n        for mode in stream_modes:\n            r = all_summary[\"lora_capacity_ablation\"][rank_key][ds_name][mode]\n            print(\n                f\"  {mode}: acc={r['acc']:.4f}, ece={r['ece']:.4f}, trigger_rate={r['trigger_rate']:.4f}, \"\n                f\"update_rate={r['update_rate']:.4f}, reset_rate={r['reset_rate']:.4f}, overhead={r['overhead']:.6f}, \"\n                f\"SRUS={r['srus']:.4f}, adapter_params={r['adapter_params']}\"\n            )\n            summary_rows.append(\n                [\n                    rank,\n                    ds_name,\n                    mode,\n                    r[\"acc\"],\n                    r[\"ece\"],\n                    r[\"trigger_rate\"],\n                    r[\"update_rate\"],\n                    r[\"reset_rate\"],\n                    r[\"overhead\"],\n                    r[\"srus\"],\n                    r[\"adapter_params\"],\n                ]\n            )\n\nsummary_array = np.array(summary_rows, dtype=object)\nnp.save(os.path.join(working_dir, \"lora_capacity_summary_rows.npy\"), summary_array)\n\n# save the required filename exactly\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(all_summary, f, indent=2)\n", "import os\nimport copy\nimport time\nimport json\nimport math\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nbuffer_grid = [1, 2, 4, 8, 16]\n\nexperiment_data = {\n    \"temporal_context_buffer_size_ablation\": {\n        ds: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": {},\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for ds in dataset_names\n    }\n}\n\n\n# ---------- synthetic data ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\nstreams = {k: make_stream(k) for k in dataset_names}\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\n# ---------- metrics ----------\ncriterion = nn.CrossEntropyLoss()\n\n\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\ndef stream_segments(name):\n    if name == \"arc_easy_shift\":\n        return {\n            \"source_pre\": (0, 120),\n            \"shift_main\": (120, 300),\n            \"source_post\": (300, 420),\n            \"short_shift_probe\": (120, 160),\n            \"sustained_shift_probe\": (160, 300),\n        }\n    if name == \"pubmedqa_burst\":\n        return {\n            \"source_pre\": (0, 80),\n            \"burst_1\": (80, 160),\n            \"source_mid\": (160, 240),\n            \"burst_2\": (240, 320),\n            \"source_post\": (320, 420),\n            \"short_shift_probe\": (80, 120),\n            \"sustained_shift_probe\": (80, 160),\n        }\n    return {\n        \"source_pre\": (0, 70),\n        \"clustered_alt\": (70, 210),\n        \"easy_shift\": (210, 350),\n        \"source_post\": (350, 420),\n        \"short_shift_probe\": (70, 110),\n        \"sustained_shift_probe\": (70, 210),\n    }\n\n\ndef segment_stats(preds, gt, conf, gate_flags, update_flags, overhead, segments):\n    out = {}\n    preds, gt, conf = np.array(preds), np.array(gt), np.array(conf)\n    gate_flags, update_flags = np.array(gate_flags), np.array(update_flags)\n    correct = (preds == gt).astype(np.float32)\n    for name, (a, b) in segments.items():\n        sl = slice(a, b)\n        c = correct[sl]\n        if len(c) == 0:\n            out[name] = {\n                \"acc\": 0.0,\n                \"ece\": 0.0,\n                \"trigger_rate\": 0.0,\n                \"update_rate\": 0.0,\n                \"mean_overhead\": 0.0,\n            }\n            continue\n        out[name] = {\n            \"acc\": float(c.mean()),\n            \"ece\": compute_ece(conf[sl], c),\n            \"trigger_rate\": float(gate_flags[sl].mean()),\n            \"update_rate\": float(update_flags[sl].mean()),\n            \"mean_overhead\": float(overhead),\n        }\n    return out\n\n\n# ---------- train ----------\nmodel = Net().to(device)\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\nbest_state, best_val = None, 1e9\nval_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\n\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr, ents, margins = [], [], [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n            logits = model(x)\n            loss = criterion(logits, y)\n            p, ent, margin = probs_entropy_margin(logits)\n            c, pred = p.max(1)\n            confs.extend(c.cpu().numpy().tolist())\n            corr.extend((pred == y).float().cpu().numpy().tolist())\n            ents.extend(ent.cpu().numpy().tolist())\n            margins.extend(margin.cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    va_ece = compute_ece(confs, corr)\n    va_srus = va_acc - 0.2 * va_ece\n    val_uncertainty_cache = {\n        \"entropy\": ents,\n        \"margin\": margins,\n        \"conf\": confs,\n        \"correct\": corr,\n    }\n\n    for ds in dataset_names:\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds][\"metrics\"][\n            \"train\"\n        ].append((epoch, tr_acc, tr_acc))\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds][\"metrics\"][\n            \"val\"\n        ].append((epoch, va_acc, va_srus, va_ece))\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds][\"losses\"][\n            \"train\"\n        ].append((epoch, tr_loss))\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds][\"losses\"][\n            \"val\"\n        ].append((epoch, va_loss))\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds][\n            \"timestamps\"\n        ].append(time.time())\n\n    print(\n        f\"Epoch {epoch}: train_acc={tr_acc:.4f} val_loss={va_loss:.4f} val_acc={va_acc:.4f} val_ece={va_ece:.4f}\"\n    )\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\nent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\nmargin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\nconf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times_per_step = []\n    buf_x, uncertainty_hist = [], []\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"always\":\n            gate_fire = True\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"reset\":\n            gate_fire = True\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        per_step_overhead = 0.0\n        if mode in [\"always\", \"gated\", \"reset\"] and len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo)\n                loss = loss + prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n            per_step_overhead = time.time() - start\n            did_update = 1\n            if mode == \"gated\":\n                buf_x = buf_x[-max(1, (buffer_k // 2)) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n        update_times_per_step.append(per_step_overhead)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and (i + 1) % reset_every == 0:\n            m.fc1.reset_lora()\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    conf_np = np.array(confs)\n    correct = (preds_np == gt_np).astype(np.float32)\n    return {\n        \"acc\": float(correct.mean()),\n        \"ece\": compute_ece(conf_np, correct),\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": (\n            float(np.mean([t for t in update_times_per_step if t > 0]))\n            if np.any(np.array(update_times_per_step) > 0)\n            else 0.0\n        ),\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": conf_np,\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"update_times_per_step\": np.array(update_times_per_step),\n    }\n\n\n# ---------- ablation runs ----------\nall_summary = {\"temporal_context_buffer_size_ablation\": {}}\n\nfor ds_name, stream in streams.items():\n    frozen = stream_eval(model, stream, \"frozen\", ent_thr, margin_thr, conf_thr)\n    frozen[\"srus\"] = srus(\n        frozen[\"acc\"],\n        frozen[\"acc\"],\n        frozen[\"ece\"],\n        frozen[\"ece\"],\n        frozen[\"trigger_rate\"],\n        frozen[\"overhead\"],\n    )\n\n    ds_results = {\"frozen\": frozen}\n    segs = stream_segments(ds_name)\n    frozen_segments = segment_stats(\n        frozen[\"preds\"],\n        frozen[\"gt\"],\n        frozen[\"conf\"],\n        frozen[\"gate_flags\"],\n        frozen[\"update_flags\"],\n        frozen[\"overhead\"],\n        segs,\n    )\n\n    experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\n        \"ground_truth\"\n    ] = frozen[\"gt\"].tolist()\n    experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\"predictions\"][\n        \"frozen\"\n    ] = frozen[\"preds\"].tolist()\n    experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\"metrics\"][\n        \"test\"\n    ].append(\n        (\n            \"frozen\",\n            -1,\n            frozen[\"acc\"],\n            frozen[\"ece\"],\n            frozen[\"trigger_rate\"],\n            frozen[\"update_rate\"],\n            frozen[\"overhead\"],\n            frozen[\"srus\"],\n        )\n    )\n\n    for bk in buffer_grid:\n        res = stream_eval(\n            model, stream, \"gated\", ent_thr, margin_thr, conf_thr, buffer_k=bk\n        )\n        res[\"srus\"] = srus(\n            res[\"acc\"],\n            frozen[\"acc\"],\n            res[\"ece\"],\n            frozen[\"ece\"],\n            res[\"trigger_rate\"],\n            res[\"overhead\"],\n        )\n        res[\"segments\"] = segment_stats(\n            res[\"preds\"],\n            res[\"gt\"],\n            res[\"conf\"],\n            res[\"gate_flags\"],\n            res[\"update_flags\"],\n            res[\"overhead\"],\n            segs,\n        )\n        res[\"delta_short_shift_acc\"] = float(\n            res[\"segments\"][\"short_shift_probe\"][\"acc\"]\n            - frozen_segments[\"short_shift_probe\"][\"acc\"]\n        )\n        res[\"delta_sustained_shift_acc\"] = float(\n            res[\"segments\"][\"sustained_shift_probe\"][\"acc\"]\n            - frozen_segments[\"sustained_shift_probe\"][\"acc\"]\n        )\n        ds_results[f\"gated_buffer_{bk}\"] = res\n\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\n            \"predictions\"\n        ][f\"gated_buffer_{bk}\"] = res[\"preds\"].tolist()\n        experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\"metrics\"][\n            \"test\"\n        ].append(\n            (\n                f\"gated_buffer_{bk}\",\n                bk,\n                res[\"acc\"],\n                res[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"update_rate\"],\n                res[\"overhead\"],\n                res[\"srus\"],\n            )\n        )\n\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_cumacc.npy\"),\n            res[\"cumacc\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_conf.npy\"),\n            res[\"conf\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_entropy.npy\"),\n            res[\"entropy\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_margin.npy\"),\n            res[\"margin\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_gate_flags.npy\"),\n            res[\"gate_flags\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_update_flags.npy\"),\n            res[\"update_flags\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{ds_name}_gated_buffer_{bk}_reset_flags.npy\"),\n            res[\"reset_flags\"],\n        )\n        np.save(\n            os.path.join(\n                working_dir, f\"{ds_name}_gated_buffer_{bk}_update_times_per_step.npy\"\n            ),\n            res[\"update_times_per_step\"],\n        )\n        np.save(\n            os.path.join(\n                working_dir, f\"{ds_name}_gated_buffer_{bk}_segment_metrics.npy\"\n            ),\n            np.array([res[\"segments\"]], dtype=object),\n            allow_pickle=True,\n        )\n\n    np.save(os.path.join(working_dir, f\"{ds_name}_frozen_cumacc.npy\"), frozen[\"cumacc\"])\n    np.save(os.path.join(working_dir, f\"{ds_name}_frozen_conf.npy\"), frozen[\"conf\"])\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_entropy.npy\"), frozen[\"entropy\"]\n    )\n    np.save(os.path.join(working_dir, f\"{ds_name}_frozen_margin.npy\"), frozen[\"margin\"])\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_gate_flags.npy\"),\n        frozen[\"gate_flags\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_update_flags.npy\"),\n        frozen[\"update_flags\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_reset_flags.npy\"),\n        frozen[\"reset_flags\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_update_times_per_step.npy\"),\n        frozen[\"update_times_per_step\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{ds_name}_frozen_segment_metrics.npy\"),\n        np.array([frozen_segments], dtype=object),\n        allow_pickle=True,\n    )\n\n    experiment_data[\"temporal_context_buffer_size_ablation\"][ds_name][\"extra\"] = {\n        k: (\n            {\n                kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                for kk, vv in v.items()\n            }\n            if isinstance(v, dict)\n            else v\n        )\n        for k, v in ds_results.items()\n    }\n    all_summary[\"temporal_context_buffer_size_ablation\"][ds_name] = ds_results\n\n    # Plot cumulative accuracy\n    plt.figure(figsize=(9, 4.5))\n    plt.plot(\n        frozen[\"cumacc\"],\n        label=f\"frozen {frozen['acc']:.3f}\",\n        color=\"black\",\n        linewidth=2.0,\n    )\n    colors = [\"tab:blue\", \"tab:orange\", \"tab:green\", \"tab:red\", \"tab:purple\"]\n    for c, bk in zip(colors, buffer_grid):\n        r = ds_results[f\"gated_buffer_{bk}\"]\n        plt.plot(r[\"cumacc\"], label=f\"k={bk} {r['acc']:.3f}\", color=c, linewidth=1.6)\n    plt.xlabel(\"stream step\")\n    plt.ylabel(\"cumulative accuracy\")\n    plt.title(f\"{ds_name}: buffer_k ablation\")\n    plt.legend(ncol=2, fontsize=8)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_bufferk_cumacc.png\"))\n    plt.close()\n\n    # Plot summary vs buffer_k\n    xs = np.array(buffer_grid)\n    accs = np.array([ds_results[f\"gated_buffer_{k}\"][\"acc\"] for k in buffer_grid])\n    eces = np.array([ds_results[f\"gated_buffer_{k}\"][\"ece\"] for k in buffer_grid])\n    updates = np.array(\n        [ds_results[f\"gated_buffer_{k}\"][\"update_rate\"] for k in buffer_grid]\n    )\n    srus_vals = np.array([ds_results[f\"gated_buffer_{k}\"][\"srus\"] for k in buffer_grid])\n    short_gain = np.array(\n        [ds_results[f\"gated_buffer_{k}\"][\"delta_short_shift_acc\"] for k in buffer_grid]\n    )\n    sustained_gain = np.array(\n        [\n            ds_results[f\"gated_buffer_{k}\"][\"delta_sustained_shift_acc\"]\n            for k in buffer_grid\n        ]\n    )\n\n    plt.figure(figsize=(10, 6))\n    plt.subplot(2, 2, 1)\n    plt.plot(xs, accs, marker=\"o\")\n    plt.axhline(frozen[\"acc\"], color=\"black\", linestyle=\"--\", linewidth=1)\n    plt.xscale(\"log\", base=2)\n    plt.xticks(xs, xs)\n    plt.title(\"Accuracy\")\n    plt.xlabel(\"buffer_k\")\n\n    plt.subplot(2, 2, 2)\n    plt.plot(xs, eces, marker=\"o\", color=\"tab:red\")\n    plt.axhline(frozen[\"ece\"], color=\"black\", linestyle=\"--\", linewidth=1)\n    plt.xscale(\"log\", base=2)\n    plt.xticks(xs, xs)\n    plt.title(\"ECE\")\n    plt.xlabel(\"buffer_k\")\n\n    plt.subplot(2, 2, 3)\n    plt.plot(xs, updates, marker=\"o\", color=\"tab:green\")\n    plt.xscale(\"log\", base=2)\n    plt.xticks(xs, xs)\n    plt.title(\"Update rate\")\n    plt.xlabel(\"buffer_k\")\n\n    plt.subplot(2, 2, 4)\n    plt.plot(xs, srus_vals, marker=\"o\", color=\"tab:purple\", label=\"SRUS\")\n    plt.plot(xs, short_gain, marker=\"x\", color=\"tab:orange\", label=\"short-shift \u0394acc\")\n    plt.plot(\n        xs, sustained_gain, marker=\"s\", color=\"tab:blue\", label=\"sustained-shift \u0394acc\"\n    )\n    plt.xscale(\"log\", base=2)\n    plt.xticks(xs, xs)\n    plt.title(\"SRUS / shift gains\")\n    plt.xlabel(\"buffer_k\")\n    plt.legend(fontsize=7)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_bufferk_summary.png\"))\n    plt.close()\n\n    print(f\"\\n{ds_name}\")\n    print(\n        f\"  frozen: acc={frozen['acc']:.4f} ece={frozen['ece']:.4f} srus={frozen['srus']:.4f}\"\n    )\n    for bk in buffer_grid:\n        r = ds_results[f\"gated_buffer_{bk}\"]\n        print(\n            f\"  gated k={bk}: acc={r['acc']:.4f} ece={r['ece']:.4f} trig={r['trigger_rate']:.4f} \"\n            f\"upd={r['update_rate']:.4f} overhead={r['overhead']:.6f} srus={r['srus']:.4f} \"\n            f\"short\u0394={r['delta_short_shift_acc']:.4f} sustained\u0394={r['delta_sustained_shift_acc']:.4f}\"\n        )\n\n# ---------- save required artifacts ----------\nthresholds = np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32)\nnp.save(os.path.join(working_dir, \"thresholds.npy\"), thresholds)\n\n# required filename\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nsummary_json = {}\nfor ds in dataset_names:\n    summary_json[ds] = {}\n    ds_res = all_summary[\"temporal_context_buffer_size_ablation\"][ds]\n    for mode, res in ds_res.items():\n        summary_json[ds][mode] = {\n            \"acc\": float(res[\"acc\"]),\n            \"ece\": float(res[\"ece\"]),\n            \"trigger_rate\": float(res[\"trigger_rate\"]),\n            \"update_rate\": float(res[\"update_rate\"]),\n            \"reset_rate\": float(res[\"reset_rate\"]),\n            \"overhead\": float(res[\"overhead\"]),\n            \"srus\": float(res[\"srus\"]),\n        }\n        if mode != \"frozen\":\n            summary_json[ds][mode][\"delta_short_shift_acc\"] = float(\n                res[\"delta_short_shift_acc\"]\n            )\n            summary_json[ds][mode][\"delta_sustained_shift_acc\"] = float(\n                res[\"delta_sustained_shift_acc\"]\n            )\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(summary_json, f, indent=2)\n\n# save compact tabular summaries as numpy for plotting\nfor ds in dataset_names:\n    ds_res = all_summary[\"temporal_context_buffer_size_ablation\"][ds]\n    rows = [\n        [\n            \"frozen\",\n            -1,\n            ds_res[\"frozen\"][\"acc\"],\n            ds_res[\"frozen\"][\"ece\"],\n            ds_res[\"frozen\"][\"trigger_rate\"],\n            ds_res[\"frozen\"][\"update_rate\"],\n            ds_res[\"frozen\"][\"overhead\"],\n            ds_res[\"frozen\"][\"srus\"],\n            0.0,\n            0.0,\n        ]\n    ]\n    for bk in buffer_grid:\n        r = ds_res[f\"gated_buffer_{bk}\"]\n        rows.append(\n            [\n                f\"gated_buffer_{bk}\",\n                bk,\n                r[\"acc\"],\n                r[\"ece\"],\n                r[\"trigger_rate\"],\n                r[\"update_rate\"],\n                r[\"overhead\"],\n                r[\"srus\"],\n                r[\"delta_short_shift_acc\"],\n                r[\"delta_sustained_shift_acc\"],\n            ]\n        )\n    np.save(\n        os.path.join(working_dir, f\"{ds}_bufferk_table.npy\"),\n        np.array(rows, dtype=object),\n        allow_pickle=True,\n    )\n\nprint(\"\\nFinished temporal context / buffer size ablation.\")\n", "import os\nimport copy\nimport time\nimport math\nimport json\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nablation_types = [\"lora_only\", \"head_only\", \"joint\"]\n\nexperiment_data = {\n    ablation: {\n        name: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for name in dataset_names\n    }\n    for ablation in ablation_types\n}\n\n\n# ---------- synthetic HF-benchmark-inspired data with fixed source normalization ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in dataset_names}\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def base_parameters(self):\n        return [self.weight, self.bias]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def set_adaptation_scope(self, scope):\n        for p in self.parameters():\n            p.requires_grad = False\n        if scope == \"lora_only\":\n            for p in self.fc1.lora_parameters():\n                p.requires_grad = True\n        elif scope == \"head_only\":\n            for p in self.fc2.parameters():\n                p.requires_grad = True\n        elif scope == \"joint\":\n            for p in self.fc1.lora_parameters():\n                p.requires_grad = True\n            for p in self.fc2.parameters():\n                p.requires_grad = True\n        elif scope == \"frozen\":\n            pass\n        else:\n            raise ValueError(f\"Unknown scope: {scope}\")\n\n    def get_adapt_params(self, scope):\n        if scope == \"lora_only\":\n            return list(self.fc1.lora_parameters())\n        if scope == \"head_only\":\n            return list(self.fc2.parameters())\n        if scope == \"joint\":\n            return list(self.fc1.lora_parameters()) + list(self.fc2.parameters())\n        if scope == \"frozen\":\n            return []\n        raise ValueError(f\"Unknown scope: {scope}\")\n\n    def capture_adapt_state(self, scope):\n        if scope == \"lora_only\":\n            return {\n                \"fc1.A\": self.fc1.A.detach().clone(),\n                \"fc1.B\": self.fc1.B.detach().clone(),\n            }\n        if scope == \"head_only\":\n            return {\n                \"fc2.weight\": self.fc2.weight.detach().clone(),\n                \"fc2.bias\": self.fc2.bias.detach().clone(),\n            }\n        if scope == \"joint\":\n            return {\n                \"fc1.A\": self.fc1.A.detach().clone(),\n                \"fc1.B\": self.fc1.B.detach().clone(),\n                \"fc2.weight\": self.fc2.weight.detach().clone(),\n                \"fc2.bias\": self.fc2.bias.detach().clone(),\n            }\n        return {}\n\n    def proximal_loss(self, scope, init_state):\n        loss = torch.tensor(0.0, device=device)\n        if scope in [\"lora_only\", \"joint\"]:\n            loss = loss + ((self.fc1.A - init_state[\"fc1.A\"]) ** 2).mean()\n            loss = loss + ((self.fc1.B - init_state[\"fc1.B\"]) ** 2).mean()\n        if scope in [\"head_only\", \"joint\"]:\n            loss = loss + ((self.fc2.weight - init_state[\"fc2.weight\"]) ** 2).mean()\n            loss = loss + ((self.fc2.bias - init_state[\"fc2.bias\"]) ** 2).mean()\n        return loss\n\n    def reset_adaptation_scope(self, scope):\n        if scope in [\"lora_only\", \"joint\"]:\n            self.fc1.reset_lora()\n        if scope in [\"head_only\", \"joint\"]:\n            self.fc2.reset_parameters()\n\n\nmodel = Net().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\n# ---------- metrics ----------\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\n# ---------- train ----------\nbest_state, best_val = None, 1e9\nval_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        batch = {k: v.to(device) for k, v in batch.items()}\n        x, y = batch[\"x\"], batch[\"y\"]\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr, ents, margins = [], [], [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            batch = {k: v.to(device) for k, v in batch.items()}\n            x, y = batch[\"x\"], batch[\"y\"]\n            logits = model(x)\n            loss = criterion(logits, y)\n            p, ent, margin = probs_entropy_margin(logits)\n            c, pred = p.max(1)\n            confs.extend(c.detach().cpu().numpy().tolist())\n            corr.extend((pred == y).float().detach().cpu().numpy().tolist())\n            ents.extend(ent.detach().cpu().numpy().tolist())\n            margins.extend(margin.detach().cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    ece = compute_ece(confs, corr)\n    val_srus = va_acc - 0.2 * ece\n    val_uncertainty_cache = {\n        \"entropy\": ents,\n        \"margin\": margins,\n        \"conf\": confs,\n        \"correct\": corr,\n    }\n\n    for ablation in ablation_types:\n        for ds in dataset_names:\n            experiment_data[ablation][ds][\"metrics\"][\"train\"].append(\n                (epoch, tr_acc, tr_acc)\n            )\n            experiment_data[ablation][ds][\"metrics\"][\"val\"].append(\n                (epoch, va_acc, val_srus)\n            )\n            experiment_data[ablation][ds][\"losses\"][\"train\"].append((epoch, tr_loss))\n            experiment_data[ablation][ds][\"losses\"][\"val\"].append((epoch, va_loss))\n            experiment_data[ablation][ds][\"timestamps\"].append(time.time())\n\n    print(f\"Epoch {epoch}: validation_loss = {va_loss:.4f}\")\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\n# calibrated uncertainty thresholds from validation\nent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\nmargin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\nconf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n\n\n# ---------- stream eval ----------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    scope,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    reset_every=90,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n):\n    m = copy.deepcopy(base_model).to(device)\n    effective_scope = \"frozen\" if mode == \"frozen\" else scope\n    m.set_adaptation_scope(effective_scope)\n    adapt_params = m.get_adapt_params(effective_scope)\n    init_state = m.capture_adapt_state(effective_scope)\n    opt = torch.optim.SGD(adapt_params, lr=lr, momentum=0.0) if adapt_params else None\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, buf_x = [], []\n    uncertainty_hist = []\n    ok = 0\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"always\":\n            gate_fire = True\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"reset\":\n            gate_fire = True\n        elif mode == \"frozen\":\n            gate_fire = False\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if (\n            mode in [\"always\", \"gated\", \"reset\"]\n            and len(buf_x) >= buffer_k\n            and opt is not None\n        ):\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo) + prox * m.proximal_loss(\n                    effective_scope, init_state\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(adapt_params, 1.0)\n                opt.step()\n            update_times.append(time.time() - start)\n            did_update = 1\n            if mode == \"gated\":\n                buf_x = buf_x[-(buffer_k // 2) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\", \"reset\"] and (i + 1) % reset_every == 0:\n            m.reset_adaptation_scope(effective_scope)\n            init_state = m.capture_adapt_state(effective_scope)\n            buf_x = []\n            do_reset = 1\n        reset_flags.append(do_reset)\n\n    preds_np, gt_np = np.array(preds), np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)),\n        \"update_rate\": float(np.mean(update_flags)),\n        \"reset_rate\": float(np.mean(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n    }\n\n\n# ---------- run streams for all adaptation-scope ablations ----------\nall_summary = {ablation: {} for ablation in ablation_types}\n\nfor ablation in ablation_types:\n    print(f\"\\n=== Adaptation Scope Ablation: {ablation} ===\")\n    for ds_name, stream in streams.items():\n        frozen = stream_eval(\n            model, stream, \"frozen\", ablation, ent_thr, margin_thr, conf_thr\n        )\n        always = stream_eval(\n            model, stream, \"always\", ablation, ent_thr, margin_thr, conf_thr\n        )\n        gated = stream_eval(\n            model, stream, \"gated\", ablation, ent_thr, margin_thr, conf_thr\n        )\n        reset = stream_eval(\n            model,\n            stream,\n            \"reset\",\n            ablation,\n            ent_thr,\n            margin_thr,\n            conf_thr,\n            reset_every=45,\n        )\n\n        results = {\"frozen\": frozen, \"always\": always, \"gated\": gated, \"reset\": reset}\n        for name, res in results.items():\n            res[\"srus\"] = srus(\n                res[\"acc\"],\n                frozen[\"acc\"],\n                res[\"ece\"],\n                frozen[\"ece\"],\n                res[\"trigger_rate\"],\n                res[\"overhead\"],\n            )\n            experiment_data[ablation][ds_name][\"metrics\"][\"test\"].append(\n                (\n                    name,\n                    res[\"acc\"],\n                    res[\"ece\"],\n                    res[\"trigger_rate\"],\n                    res[\"update_rate\"],\n                    res[\"overhead\"],\n                    res[\"srus\"],\n                )\n            )\n\n        experiment_data[ablation][ds_name][\"predictions\"] = gated[\"preds\"].tolist()\n        experiment_data[ablation][ds_name][\"ground_truth\"] = gated[\"gt\"].tolist()\n        experiment_data[ablation][ds_name][\"extra\"] = {\n            k: {\n                kk: (vv.tolist() if isinstance(vv, np.ndarray) else vv)\n                for kk, vv in v.items()\n            }\n            for k, v in results.items()\n        }\n        all_summary[ablation][ds_name] = results\n\n        prefix = f\"{ablation}_{ds_name}\"\n        for mode_name, res in results.items():\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_cumacc.npy\"),\n                res[\"cumacc\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_conf.npy\"), res[\"conf\"]\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_entropy.npy\"),\n                res[\"entropy\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_margin.npy\"),\n                res[\"margin\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_gate_flags.npy\"),\n                res[\"gate_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_update_flags.npy\"),\n                res[\"update_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_reset_flags.npy\"),\n                res[\"reset_flags\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_preds.npy\"),\n                res[\"preds\"],\n            )\n            np.save(\n                os.path.join(working_dir, f\"{prefix}_{mode_name}_gt.npy\"), res[\"gt\"]\n            )\n\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_train_metrics.npy\"),\n            np.array(\n                experiment_data[ablation][ds_name][\"metrics\"][\"train\"], dtype=object\n            ),\n            allow_pickle=True,\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_val_metrics.npy\"),\n            np.array(\n                experiment_data[ablation][ds_name][\"metrics\"][\"val\"], dtype=object\n            ),\n            allow_pickle=True,\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_test_metrics.npy\"),\n            np.array(\n                experiment_data[ablation][ds_name][\"metrics\"][\"test\"], dtype=object\n            ),\n            allow_pickle=True,\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_train_losses.npy\"),\n            np.array(\n                experiment_data[ablation][ds_name][\"losses\"][\"train\"], dtype=object\n            ),\n            allow_pickle=True,\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_val_losses.npy\"),\n            np.array(experiment_data[ablation][ds_name][\"losses\"][\"val\"], dtype=object),\n            allow_pickle=True,\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_predictions.npy\"),\n            np.array(experiment_data[ablation][ds_name][\"predictions\"]),\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_ground_truth.npy\"),\n            np.array(experiment_data[ablation][ds_name][\"ground_truth\"]),\n        )\n\n        plt.figure(figsize=(8, 4))\n        for mode_name, color in [\n            (\"frozen\", \"black\"),\n            (\"always\", \"tab:red\"),\n            (\"gated\", \"tab:blue\"),\n            (\"reset\", \"tab:green\"),\n        ]:\n            plt.plot(\n                results[mode_name][\"cumacc\"],\n                label=f\"{mode_name} {results[mode_name]['acc']:.3f}\",\n                linewidth=1.8,\n                color=color,\n            )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"cumulative accuracy\")\n        plt.title(f\"{ds_name} | {ablation}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_stream_accuracy.png\"))\n        plt.close()\n\n        plt.figure(figsize=(8, 4))\n        plt.plot(gated[\"entropy\"], label=\"gated entropy\", alpha=0.9)\n        plt.plot(\n            gated[\"gate_flags\"] * max(1e-6, np.max(gated[\"entropy\"])),\n            label=\"gate fired\",\n            alpha=0.8,\n        )\n        plt.axhline(\n            ent_thr, color=\"tab:red\", linestyle=\"--\", label=f\"entropy_thr={ent_thr:.3f}\"\n        )\n        plt.xlabel(\"stream step\")\n        plt.ylabel(\"value\")\n        plt.title(f\"{ds_name} | {ablation} | gated uncertainty\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_gated_uncertainty.png\"))\n        plt.close()\n\n        print(\n            f\"{ablation} | {ds_name} | \"\n            f\"frozen_acc={frozen['acc']:.4f} always_acc={always['acc']:.4f} \"\n            f\"gated_acc={gated['acc']:.4f} reset_acc={reset['acc']:.4f} | \"\n            f\"frozen_srus={frozen['srus']:.4f} always_srus={always['srus']:.4f} \"\n            f\"gated_srus={gated['srus']:.4f} reset_srus={reset['srus']:.4f}\"\n        )\n\nfor ablation in ablation_types:\n    print(f\"\\n{ablation} metrics:\")\n    for ds_name, res in all_summary[ablation].items():\n        print(f\"{ds_name}:\")\n        for mode in [\"frozen\", \"always\", \"gated\", \"reset\"]:\n            r = res[mode]\n            print(\n                f\"  {mode}: acc={r['acc']:.4f}, ece={r['ece']:.4f}, trigger_rate={r['trigger_rate']:.4f}, \"\n                f\"update_rate={r['update_rate']:.4f}, overhead={r['overhead']:.6f}, SRUS={r['srus']:.4f}\"\n            )\n\nnp.save(\n    os.path.join(working_dir, \"thresholds.npy\"),\n    np.array([ent_thr, margin_thr, conf_thr], dtype=np.float32),\n)\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"),\n    experiment_data,\n    allow_pickle=True,\n)\n\nwith open(os.path.join(working_dir, \"summary.json\"), \"w\") as f:\n    json.dump(\n        {\n            ablation: {\n                ds: {\n                    mode: {\n                        \"acc\": float(all_summary[ablation][ds][mode][\"acc\"]),\n                        \"ece\": float(all_summary[ablation][ds][mode][\"ece\"]),\n                        \"trigger_rate\": float(\n                            all_summary[ablation][ds][mode][\"trigger_rate\"]\n                        ),\n                        \"update_rate\": float(\n                            all_summary[ablation][ds][mode][\"update_rate\"]\n                        ),\n                        \"overhead\": float(all_summary[ablation][ds][mode][\"overhead\"]),\n                        \"srus\": float(all_summary[ablation][ds][mode][\"srus\"]),\n                    }\n                    for mode in all_summary[ablation][ds]\n                }\n                for ds in all_summary[ablation]\n            }\n            for ablation in all_summary\n        },\n        f,\n        indent=2,\n    )\n\nprint(\"\\nDone. Saved all results, traces, and experiment_data.npy.\")\n", "import os\nimport copy\nimport time\nimport json\nimport math\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\n# ---------------- setup ----------------\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(\"Using device:\", device)\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\ndataset_names = [\"arc_easy_shift\", \"pubmedqa_burst\", \"mmlu_clustered\"]\nablation_name = \"periodic_reset_mechanism_ablation\"\npolicies = [\"no_reset\", \"fixed_periodic_reset\", \"uncertainty_triggered_reset\"]\n\nexperiment_data = {\n    ablation_name: {\n        ds: {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": {},\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"extra\": {},\n        }\n        for ds in dataset_names\n    }\n}\n\n\n# ---------------- synthetic data ----------------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nsource_all_X, source_all_y = make_block(2400, 20, \"source\")\ncut = int(0.8 * len(source_all_y))\nnorm_mu = source_all_X[:cut].mean(0, keepdims=True)\nnorm_sd = source_all_X[:cut].std(0, keepdims=True) + 1e-6\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, split=\"train\"):\n        X = ((source_all_X - norm_mu) / norm_sd).astype(np.float32)\n        y = source_all_y\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\n            \"x\": torch.tensor(self.X[i], dtype=torch.float32),\n            \"y\": torch.tensor(self.y[i], dtype=torch.long),\n        }\n\n\ndef make_stream(name, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    X = ((X - norm_mu) / norm_sd).astype(np.float32)\n    return [\n        {\n            \"x\": torch.tensor(X[i], dtype=torch.float32),\n            \"y\": torch.tensor(Ys[i], dtype=torch.long),\n        }\n        for i in range(len(Ys))\n    ]\n\n\ntrain_ds, val_ds = SourceDataset(\"train\"), SourceDataset(\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in dataset_names}\n\n\n# ---------------- model ----------------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=2.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=2.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\nmodel = Net().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\n# ---------------- metrics ----------------\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            (conf < bins[i + 1]) if i < n_bins - 1 else (conf <= bins[i + 1])\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef srus(acc, frozen_acc, ece, frozen_ece, trig, overhead):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.10 * trig\n        - 1.5 * overhead\n    )\n\n\n# ---------------- train source model ----------------\nbest_state, best_val = None, 1e9\nval_uncertainty_cache = {\"entropy\": [], \"margin\": [], \"conf\": [], \"correct\": []}\n\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        x = batch[\"x\"].to(device)\n        y = batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr, ents, margins = [], [], [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = criterion(logits, y)\n            p, ent, margin = probs_entropy_margin(logits)\n            c, pred = p.max(1)\n            confs.extend(c.cpu().numpy().tolist())\n            corr.extend((pred == y).float().cpu().numpy().tolist())\n            ents.extend(ent.cpu().numpy().tolist())\n            margins.extend(margin.cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    ece = compute_ece(confs, corr)\n    val_srus = va_acc - 0.2 * ece\n    val_uncertainty_cache = {\n        \"entropy\": ents,\n        \"margin\": margins,\n        \"conf\": confs,\n        \"correct\": corr,\n    }\n\n    for ds in dataset_names:\n        experiment_data[ablation_name][ds][\"metrics\"][\"train\"].append(\n            (epoch, tr_acc, tr_acc)\n        )\n        experiment_data[ablation_name][ds][\"metrics\"][\"val\"].append(\n            (epoch, va_acc, val_srus)\n        )\n        experiment_data[ablation_name][ds][\"losses\"][\"train\"].append((epoch, tr_loss))\n        experiment_data[ablation_name][ds][\"losses\"][\"val\"].append((epoch, va_loss))\n        experiment_data[ablation_name][ds][\"timestamps\"].append(time.time())\n\n    print(\n        f\"Epoch {epoch}: train_acc={tr_acc:.4f} val_loss={va_loss:.4f} val_acc={va_acc:.4f}\"\n    )\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\nent_thr = float(np.quantile(val_uncertainty_cache[\"entropy\"], 0.75))\nmargin_thr = float(np.quantile(val_uncertainty_cache[\"margin\"], 0.25))\nconf_thr = float(np.quantile(val_uncertainty_cache[\"conf\"], 0.25))\n\n\n# ---------------- streaming eval with reset-policy ablation ----------------\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr,\n    margin_thr,\n    conf_thr,\n    lr=0.05,\n    buffer_k=4,\n    prox=0.02,\n    adapt_steps=2,\n    reset_policy=\"no_reset\",\n    reset_every=45,\n    uncertainty_reset_window=10,\n    uncertainty_reset_frac=0.6,\n    min_steps_between_resets=25,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr, momentum=0.0)\n\n    preds, gt, confs, ents, margins = [], [], [], [], []\n    gate_flags, update_flags, reset_flags, cumacc = [], [], [], []\n    update_times, reset_steps = [], []\n    uncertainty_hist, buf_x = [], []\n    ok = 0\n    last_reset_step = -(10**9)\n\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        margins.append(float(margin.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n\n        uncertain = (\n            (float(ent.item()) >= ent_thr)\n            or (float(margin.item()) <= margin_thr)\n            or (float(conf.item()) <= conf_thr)\n        )\n        uncertainty_hist.append(int(uncertain))\n        recent = uncertainty_hist[-8:]\n        local_burst = len(recent) >= 3 and np.mean(recent) >= 0.375\n\n        gate_fire = False\n        if mode == \"frozen\":\n            gate_fire = False\n        elif mode == \"gated\":\n            gate_fire = uncertain and (local_burst or len(buf_x) > 0)\n        elif mode == \"always\":\n            gate_fire = True\n        gate_flags.append(int(gate_fire))\n\n        if gate_fire:\n            buf_x.append(x.detach())\n\n        did_update = 0\n        if mode in [\"always\", \"gated\"] and len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x[-buffer_k:], 0).to(device)\n            for _ in range(adapt_steps):\n                m.train()\n                logits_b = m(xb)\n                with torch.no_grad():\n                    pseudo = logits_b.detach().argmax(1)\n                loss = criterion(logits_b, pseudo)\n                loss = loss + prox * (\n                    ((m.fc1.A - initA) ** 2).mean() + ((m.fc1.B - initB) ** 2).mean()\n                )\n                opt.zero_grad()\n                loss.backward()\n                torch.nn.utils.clip_grad_norm_(m.fc1.lora_parameters(), 1.0)\n                opt.step()\n            update_times.append(time.time() - start)\n            did_update = 1\n            if mode == \"gated\":\n                buf_x = buf_x[-(buffer_k // 2) :]\n            else:\n                buf_x = []\n        update_flags.append(did_update)\n\n        do_reset = 0\n        if mode in [\"always\", \"gated\"]:\n            if reset_policy == \"fixed_periodic_reset\":\n                if (i + 1) % reset_every == 0:\n                    do_reset = 1\n            elif reset_policy == \"uncertainty_triggered_reset\":\n                recent_unc = uncertainty_hist[-uncertainty_reset_window:]\n                if len(recent_unc) >= uncertainty_reset_window:\n                    frac_unc = float(np.mean(recent_unc))\n                    enough_gap = (i - last_reset_step) >= min_steps_between_resets\n                    if frac_unc >= uncertainty_reset_frac and enough_gap:\n                        do_reset = 1\n\n        if do_reset:\n            m.fc1.reset_lora()\n            initA = m.fc1.A.detach().clone()\n            initB = m.fc1.B.detach().clone()\n            buf_x = []\n            last_reset_step = i\n            reset_steps.append(i)\n        reset_flags.append(int(do_reset))\n\n    preds_np = np.array(preds)\n    gt_np = np.array(gt)\n    correct = (preds_np == gt_np).astype(np.float32)\n    acc = float(correct.mean())\n    ece = compute_ece(confs, correct)\n\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(gate_flags)) if len(gate_flags) else 0.0,\n        \"update_rate\": float(np.mean(update_flags)) if len(update_flags) else 0.0,\n        \"reset_rate\": float(np.mean(reset_flags)) if len(reset_flags) else 0.0,\n        \"reset_count\": int(np.sum(reset_flags)),\n        \"overhead\": float(np.mean(update_times)) if len(update_times) else 0.0,\n        \"preds\": preds_np,\n        \"gt\": gt_np,\n        \"conf\": np.array(confs),\n        \"entropy\": np.array(ents),\n        \"margin\": np.array(margins),\n        \"gate_flags\": np.array(gate_flags),\n        \"update_flags\": np.array(update_flags),\n        \"reset_flags\": np.array(reset_flags),\n        \"cumacc\": np.array(cumacc),\n        \"uncertainty_hist\": np.array(uncertainty_hist),\n        \"reset_steps\": np.array(reset_steps, dtype=np.int64),\n    }\n\n\n# ---------------- run ablation ----------------\nall_summary = {}\nall_results = {}\n\nfor ds_name, stream in streams.items():\n    frozen = stream_eval(\n        model, stream, \"frozen\", ent_thr, margin_thr, conf_thr, reset_policy=\"no_reset\"\n    )\n    no_reset = stream_eval(\n        model, stream, \"gated\", ent_thr, margin_thr, conf_thr, reset_policy=\"no_reset\"\n    )\n    fixed_periodic_reset = stream_eval(\n        model,\n        stream,\n        \"gated\",\n        ent_thr,\n        margin_thr,\n        conf_thr,\n        reset_policy=\"fixed_periodic_reset\",\n        reset_every=45,\n    )\n    uncertainty_triggered_reset = stream_eval(\n        model,\n        stream,\n        \"gated\",\n        ent_thr,\n        margin_thr,\n        conf_thr,\n        reset_policy=\"uncertainty_triggered_reset\",\n        uncertainty_reset_window=10,\n        uncertainty_reset_frac=0.6,\n        min_steps_between_resets=25,\n    )\n\n    results = {\n        \"frozen\": frozen,\n        \"no_reset\": no_reset,\n        \"fixed_periodic_reset\": fixed_periodic_reset,\n        \"uncertainty_triggered_reset\": uncertainty_triggered_reset,\n    }\n\n    for mode_name, res in results.items():\n        res[\"srus\"] = srus(\n            res[\"acc\"],\n            frozen[\"acc\"],\n            res[\"ece\"],\n            frozen[\"ece\"],\n            res[\"trigger_rate\"],\n            res[\"overhead\"],\n        )\n\n    all_results[ds_name] = results\n    all_summary[ds_name] = {\n        mode: {\n            \"acc\": float(results[mode][\"acc\"]),\n            \"ece\": float(results[mode][\"ece\"]),\n            \"trigger_rate\": float(results[mode][\"trigger_rate\"]),\n            \"update_rate\": float(results[mode][\"update_rate\"]),\n            \"reset_rate\": float(results[mode][\"reset_rate\"]),\n            \"reset_count\": int(results[mode][\"reset_count\"]),\n            \"overhead
