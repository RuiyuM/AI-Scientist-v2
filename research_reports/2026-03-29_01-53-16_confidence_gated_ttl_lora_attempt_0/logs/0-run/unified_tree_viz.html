7)\n    plt.xlabel(\"Stream step\")\n    plt.ylabel(\"Value\")\n    plt.title(f\"Gating Signals: {ds_name}\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_gating_signals.png\"))\n    plt.close()\n\nprint(\"Finished. Saved metrics, arrays, and plots to:\", working_dir)\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy\nimport time\nimport math\nimport random\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\nfrom datasets import load_dataset\nfrom transformers import AutoTokenizer, AutoModel\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nBASE_SEED = 42\nrandom.seed(BASE_SEED)\nnp.random.seed(BASE_SEED)\ntorch.manual_seed(BASE_SEED)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed_all(BASE_SEED)\n\nHF_MODEL = \"distilbert-base-uncased\"\nMAX_LEN = 192\n\ndataset_names = [\n    \"ai2_arc_easy_stream\",\n    \"ai2_arc_challenge_stream\",\n    \"mmlu_elementary_math_stream\",\n    \"truthfulqa_mc1_stream\",\n    \"openbookqa_stream\",\n]\n\nexperiment_data = {\n    name: {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_results\": {},\n        \"trials\": {},\n        \"epoch_candidates\": [],\n        \"selected_epochs\": None,\n        \"selected_hparams\": None,\n        \"shift_normalized_accuracy_gain\": [],\n        \"severity\": None,\n    }\n    for name in dataset_names\n}\n\n\ndef set_seed(seed=42):\n    random.seed(seed)\n    np.random.seed(seed)\n    torch.manual_seed(seed)\n    if torch.cuda.is_available():\n        torch.cuda.manual_seed_all(seed)\n\n\ndef normalize_text(x):\n    x = \"\" if x is None else str(x)\n    return \" \".join(x.strip().split())\n\n\ndef mc_example_to_text(question, choices):\n    question = normalize_text(question)\n    choices = [normalize_text(c) for c in choices]\n    parts = [f\"Question: {question}\", \"Options:\"]\n    for i, c in enumerate(choices):\n        parts.append(f\"{chr(65+i)}. {c}\")\n    return \" \".join(parts)\n\n\ndef parse_arc(split_name=\"ARC-Easy\", n_train=512, n_val=128, n_test=256):\n    ds = load_dataset(\"allenai/ai2_arc\", split_name)\n    train_raw = (\n        ds[\"train\"]\n        .shuffle(seed=BASE_SEED)\n        .select(range(min(n_train, len(ds[\"train\"]))))\n    )\n    val_raw = (\n        ds[\"validation\"]\n        .shuffle(seed=BASE_SEED)\n        .select(range(min(n_val, len(ds[\"validation\"]))))\n    )\n    test_raw = (\n        ds[\"test\"].shuffle(seed=BASE_SEED).select(range(min(n_test, len(ds[\"test\"]))))\n    )\n\n    def convert(ex):\n        labels = ex[\"choices\"][\"label\"]\n        texts = ex[\"choices\"][\"text\"]\n        ans = ex[\"answerKey\"]\n        if ans not in labels:\n            return None\n        y = labels.index(ans)\n        if y >= len(texts) or len(texts) < 2:\n            return None\n        return {\n            \"text\": mc_example_to_text(ex[\"question\"], texts),\n            \"label\": int(y),\n            \"num_choices\": len(texts),\n        }\n\n    def filt(raw):\n        out = []\n        for ex in raw:\n            z = convert(ex)\n            if z is not None and z[\"num_choices\"] <= 5:\n                out.append(z)\n        return out\n\n    return filt(train_raw), filt(val_raw), filt(test_raw)\n\n\ndef parse_openbookqa(n_train=512, n_val=128, n_test=256):\n    ds = load_dataset(\"allenai/openbookqa\", \"main\")\n    train_raw = (\n        ds[\"train\"]\n        .shuffle(seed=BASE_SEED)\n        .select(range(min(n_train, len(ds[\"train\"]))))\n    )\n    val_raw = (\n        ds[\"validation\"]\n        .shuffle(seed=BASE_SEED)\n        .select(range(min(n_val, len(ds[\"validation\"]))))\n    )\n    test_raw = (\n        ds[\"test\"].shuffle(seed=BASE_SEED).select(range(min(n_test, len(ds[\"test\"]))))\n    )\n\n    def convert(ex):\n        labels = ex[\"choices\"][\"label\"]\n        texts = ex[\"choices\"][\"text\"]\n        ans = ex[\"answerKey\"]\n        if ans not in labels:\n            return None\n        y = labels.index(ans)\n        return {\n            \"text\": mc_example_to_text(ex[\"question_stem\"], texts),\n            \"label\": int(y),\n            \"num_choices\": len(texts),\n        }\n\n    def filt(raw):\n        return [\n            z\n            for z in (convert(ex) for ex in raw)\n            if z is not None and z[\"num_choices\"] <= 5\n        ]\n\n    return filt(train_raw), filt(val_raw), filt(test_raw)\n\n\ndef parse_truthfulqa_mc1(n_val=128, n_test=256):\n    ds = load_dataset(\"truthful_qa\", \"multiple_choice\")\n    val_raw = ds[\"validation\"].shuffle(seed=BASE_SEED)\n    n_total = min(n_val + n_test, len(val_raw))\n    val_raw = val_raw.select(range(n_total))\n\n    def convert(ex):\n        choices = ex[\"mc1_targets\"][\"choices\"]\n        labels = ex[\"mc1_targets\"][\"labels\"]\n        if not labels or sum(labels) != 1:\n            return None\n        y = int(np.argmax(labels))\n        return {\n            \"text\": mc_example_to_text(ex[\"question\"], choices),\n            \"label\": y,\n            \"num_choices\": len(choices),\n        }\n\n    parsed = [\n        z\n        for z in (convert(ex) for ex in val_raw)\n        if z is not None and z[\"num_choices\"] <= 5\n    ]\n    split = min(n_val, len(parsed) // 2 if len(parsed) < n_val + n_test else n_val)\n    val = parsed[:split]\n    test = parsed[split : split + n_test]\n    return [], val, test\n\n\ndef parse_mmlu(subject=\"elementary_mathematics\", n_dev=256, n_test=256):\n    ds = load_dataset(\"cais/mmlu\", subject)\n    dev_raw = (\n        ds[\"dev\"].shuffle(seed=BASE_SEED).select(range(min(n_dev, len(ds[\"dev\"]))))\n    )\n    val_raw = (\n        ds[\"validation\"]\n        .shuffle(seed=BASE_SEED)\n        .select(range(min(n_test, len(ds[\"validation\"]))))\n    )\n\n    def convert(ex):\n        choices = ex[\"choices\"]\n        y = int(ex[\"answer\"])\n        return {\n            \"text\": mc_example_to_text(ex[\"question\"], choices),\n            \"label\": y,\n            \"num_choices\": len(choices),\n        }\n\n    dev = [convert(ex) for ex in dev_raw]\n    val = [convert(ex) for ex in val_raw]\n    return dev, dev[: min(128, len(dev))], val\n\n\nclass HFMCQDataset(Dataset):\n    def __init__(self, examples, tokenizer, max_len=192, severity=0.0, name=\"dataset\"):\n        self.examples = examples\n        self.tokenizer = tokenizer\n        self.max_len = max_len\n        self.severity = float(severity)\n        self.name = name\n\n    def __len__(self):\n        return len(self.examples)\n\n    def __getitem__(self, idx):\n        ex = self.examples[idx]\n        enc = self.tokenizer(\n            normalize_text(ex[\"text\"]),\n            truncation=True,\n            padding=\"max_length\",\n            max_length=self.max_len,\n            return_tensors=\"pt\",\n        )\n        return {\n            \"input_ids\": enc[\"input_ids\"].squeeze(0),\n            \"attention_mask\": enc[\"attention_mask\"].squeeze(0),\n            \"y\": torch.tensor(ex[\"label\"], dtype=torch.long),\n        }\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=8, alpha=8.0, dropout=0.05):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.dropout = nn.Dropout(dropout)\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n        self.register_buffer(\"A_init\", self.A.detach().clone())\n        self.register_buffer(\"B_init\", self.B.detach().clone())\n\n    def forward(self, x):\n        x_d = self.dropout(x)\n        delta = (self.B @ self.A) * (self.alpha / max(self.rank, 1))\n        return F.linear(x_d, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def lora_reg_loss(self):\n        return ((self.A - self.A_init) ** 2).mean() + (\n            (self.B - self.B_init) ** 2\n        ).mean()\n\n    def reset_lora(self):\n        with torch.no_grad():\n            self.A.copy_(self.A_init)\n            self.B.copy_(self.B_init)\n\n\nclass MCQEncoder(nn.Module):\n    def __init__(self, encoder_name=HF_MODEL, num_classes=5, rank=8):\n        super().__init__()\n        self.encoder = AutoModel.from_pretrained(encoder_name)\n        h = self.encoder.config.hidden_size\n        self.classifier = LoRALinear(h, num_classes, rank=rank, alpha=8.0, dropout=0.05)\n\n    def encode(self, input_ids, attention_mask):\n        out = self.encoder(input_ids=input_ids, attention_mask=attention_mask)\n        hidden = out.last_hidden_state\n        mask = attention_mask.unsqueeze(-1).float()\n        pooled = (hidden * mask).sum(1) / mask.sum(1).clamp(min=1.0)\n        return pooled\n\n    def forward(self, input_ids, attention_mask):\n        pooled = self.encode(input_ids, attention_mask)\n        return self.classifier(pooled)\n\n    def freeze_backbone(self):\n        for p in self.encoder.parameters():\n            p.requires_grad = False\n        self.classifier.weight.requires_grad = False\n        self.classifier.bias.requires_grad = False\n        for p in self.classifier.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.classifier.reset_lora()\n\n    def lora_reg_loss(self):\n        return self.classifier.lora_reg_loss()\n\n\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef margin_from_logits(logits):\n    probs = F.softmax(logits, dim=-1)\n    top2 = torch.topk(probs, k=2, dim=-1).values\n    return top2[:, 0] - top2[:, 1]\n\n\ndef evaluate_loader(model, loader):\n    model.eval()\n    criterion = nn.CrossEntropyLoss()\n    total_loss, total_correct, total = 0.0, 0, 0\n    all_preds, all_gt = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            logits = model(batch[\"input_ids\"], batch[\"attention_mask\"])\n            loss = criterion(logits, batch[\"y\"])\n            total_loss += loss.item() * batch[\"y\"].size(0)\n            preds = logits.argmax(dim=1)\n            total_correct += (preds == batch[\"y\"]).sum().item()\n            total += batch[\"y\"].size(0)\n            all_preds.append(preds.detach().cpu().numpy())\n            all_gt.append(batch[\"y\"].detach().cpu().numpy())\n    all_preds = np.concatenate(all_preds) if all_preds else np.array([])\n    all_gt = np.concatenate(all_gt) if all_gt else np.array([])\n    return total_loss / max(total, 1), total_correct / max(total, 1), all_preds, all_gt\n\n\ndef collect_confidence_stats(model, loader, max_batches=8):\n    model.eval()\n    ents, mars = [], []\n    with torch.no_grad():\n        for bi, batch in enumerate(loader):\n            if bi >= max_batches:\n                break\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            logits = model(batch[\"input_ids\"], batch[\"attention_mask\"])\n            ents.append(entropy_from_logits(logits).detach().cpu())\n            mars.append(margin_from_logits(logits).detach().cpu())\n    ents = torch.cat(ents).numpy()\n    mars = torch.cat(mars).numpy()\n    return {\n        \"entropy_thresh\": float(np.quantile(ents, 0.70)),\n        \"margin_thresh\": float(np.quantile(mars, 0.30)),\n        \"entropy_mean\": float(np.mean(ents)),\n        \"margin_mean\": float(np.mean(mars)),\n    }\n\n\ndef stream_evaluate(\n    base_model,\n    dataset,\n    mode=\"frozen\",\n    entropy_thresh=0.8,\n    margin_thresh=0.15,\n    reset_every=64,\n    lr=2e-4,\n    reg_lambda=5e-3,\n    grad_clip=0.5,\n    update_steps=1,\n    warmup=8,\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.AdamW(\n        stream_model.classifier.lora_parameters(), lr=lr, weight_decay=0.0\n    )\n\n    preds_all, gt_all, ent_all, margin_all = [], [], [], []\n    triggered, cumulative_acc = [], []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        batch = {\n            k: (v.unsqueeze(0).to(device) if isinstance(v, torch.Tensor) else v)\n            for k, v in batch.items()\n        }\n        x_ids, x_mask, y = batch[\"input_ids\"], batch[\"attention_mask\"], batch[\"y\"]\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x_ids, x_mask)\n            ent = entropy_from_logits(logits).item()\n            mar = margin_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(int(pred.item()))\n        gt_all.append(int(y.item()))\n        ent_all.append(ent)\n        margin_all.append(mar)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = False\n        if i + 1 > warmup:\n            if mode == \"always\":\n                do_update = True\n            elif mode == \"gated\":\n                do_update = (ent > entropy_thresh) or (mar < margin_thresh)\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            for _ in range(update_steps):\n                opt.zero_grad()\n                logits_u = stream_model(x_ids, x_mask)\n                p = F.softmax(logits_u, dim=-1)\n                ent_loss = -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n                pseudo = logits_u.detach().argmax(dim=-1)\n                pseudo_loss = F.cross_entropy(logits_u, pseudo)\n                reg_loss = stream_model.lora_reg_loss()\n                loss_u = 0.3 * ent_loss + 0.7 * pseudo_loss + reg_lambda * reg_loss\n                loss_u.backward()\n                torch.nn.utils.clip_grad_norm_(\n                    stream_model.classifier.lora_parameters(), grad_clip\n                )\n                opt.step()\n\n        if (\n            mode in [\"always\", \"gated\"]\n            and reset_every > 0\n            and (i + 1) % reset_every == 0\n        ):\n            stream_model.reset_lora()\n\n    acc = float(np.mean(np.array(preds_all) == np.array(gt_all))) if gt_all else 0.0\n    return {\n        \"accuracy\": acc,\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"margin\": np.array(margin_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\ndef compute_shift_normalized_gain(frozen_acc, gated_acc, severity):\n    return (gated_acc - frozen_acc) / max(float(severity), 1e-6)\n\n\ndef build_loaders(tokenizer, batch_size=16):\n    arc_easy_train, arc_easy_val, arc_easy_test = parse_arc(\n        \"ARC-Easy\", n_train=512, n_val=128, n_test=256\n    )\n    arc_ch_train, arc_ch_val, arc_ch_test = parse_arc(\n        \"ARC-Challenge\", n_train=512, n_val=128, n_test=256\n    )\n    mmlu_train, mmlu_val, mmlu_test = parse_mmlu(\n        \"elementary_mathematics\", n_dev=256, n_test=256\n    )\n    _, tfqa_val, tfqa_test = parse_truthfulqa_mc1(n_val=128, n_test=256)\n    obqa_train, obqa_val, obqa_test = parse_openbookqa(\n        n_train=512, n_val=128, n_test=256\n    )\n\n    train_examples = arc_easy_train + arc_ch_train + mmlu_train + obqa_train\n    val_examples = arc_easy_val + arc_ch_val + mmlu_val + tfqa_val + obqa_val\n\n    train_ds = HFMCQDataset(\n        train_examples, tokenizer, MAX_LEN, severity=0.0, name=\"train_mix\"\n    )\n    val_ds = HFMCQDataset(\n        val_examples, tokenizer, MAX_LEN, severity=0.0, name=\"val_mix\"\n    )\n\n    test_datasets = {\n        \"ai2_arc_easy_stream\": HFMCQDataset(\n            arc_easy_test, tokenizer, MAX_LEN, severity=0.2, name=\"ai2_arc_easy_stream\"\n        ),\n        \"ai2_arc_challenge_stream\": HFMCQDataset(\n            arc_ch_test,\n            tokenizer,\n            MAX_LEN,\n            severity=1.0,\n            name=\"ai2_arc_challenge_stream\",\n        ),\n        \"mmlu_elementary_math_stream\": HFMCQDataset(\n            mmlu_test,\n            tokenizer,\n            MAX_LEN,\n            severity=1.2,\n            name=\"mmlu_elementary_math_stream\",\n        ),\n        \"truthfulqa_mc1_stream\": HFMCQDataset(\n            tfqa_test, tokenizer, MAX_LEN, severity=1.4, name=\"truthfulqa_mc1_stream\"\n        ),\n        \"openbookqa_stream\": HFMCQDataset(\n            obqa_test, tokenizer, MAX_LEN, severity=0.8, name=\"openbookqa_stream\"\n        ),\n    }\n\n    g = torch.Generator().manual_seed(BASE_SEED)\n    train_loader = DataLoader(\n        train_ds, batch_size=batch_size, shuffle=True, generator=g\n    )\n    val_loader = DataLoader(val_ds, batch_size=32, shuffle=False)\n    return train_ds, val_ds, test_datasets, train_loader, val_loader\n\n\ndef train_source_model(\n    epochs, train_loader, val_loader, seed=42, lr=2e-5, weight_decay=1e-4\n):\n    set_seed(seed)\n    model = MCQEncoder(encoder_name=HF_MODEL, num_classes=5, rank=8).to(device)\n    criterion = nn.CrossEntropyLoss()\n    model.unfreeze_all()\n    optimizer = torch.optim.AdamW(model.parameters(), lr=lr, weight_decay=weight_decay)\n\n    best_state, best_val, best_epoch = None, float(\"inf\"), -1\n    history = {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"timestamps\": [],\n        \"best_val_loss\": None,\n        \"best_epoch\": None,\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        train_loss, train_correct, train_total = 0.0, 0, 0\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            optimizer.zero_grad()\n            logits = model(batch[\"input_ids\"], batch[\"attention_mask\"])\n            loss = criterion(logits, batch[\"y\"])\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            train_loss += loss.item() * batch[\"y\"].size(0)\n            train_correct += (logits.argmax(dim=1) == batch[\"y\"]).sum().item()\n            train_total += batch[\"y\"].size(0)\n\n        train_loss /= max(train_total, 1)\n        train_acc = train_correct / max(train_total, 1)\n        val_loss, val_acc, _, _ = evaluate_loader(model, val_loader)\n\n        history[\"metrics\"][\"train\"].append((epoch, train_acc))\n        history[\"metrics\"][\"val\"].append((epoch, val_acc))\n        history[\"losses\"][\"train\"].append((epoch, train_loss))\n        history[\"losses\"][\"val\"].append((epoch, val_loss))\n        history[\"timestamps\"].append(time.time())\n\n        print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n        print(\n            f\"[epochs={epochs}, lr={lr}, bs={train_loader.batch_size}] Epoch {epoch}: train_acc={train_acc:.4f} val_acc={val_acc:.4f} val_loss={val_loss:.4f}\"\n        )\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    history[\"best_val_loss\"] = best_val\n    history[\"best_epoch\"] = best_epoch\n    return model, history\n\n\ntokenizer = AutoTokenizer.from_pretrained(HF_MODEL)\n\nepoch_candidates = [2, 3]\nlr_candidates = [2e-5, 3e-5]\nbatch_candidates = [16]\nadapt_lr_candidates = [1e-4, 2e-4]\nreset_candidates = [64, 128]\nexperiment_data[\"ai2_arc_challenge_stream\"][\"epoch_candidates\"] = epoch_candidates\n\nbest_trial_key = None\nbest_trial_score = -1e9\nall_scores = []\n\ntrial_idx = 0\nfor epochs in epoch_candidates:\n    for lr in lr_candidates:\n        for batch_size in batch_candidates:\n            for adapt_lr in adapt_lr_candidates:\n                for reset_every in reset_candidates:\n                    trial_idx += 1\n                    trial_key = f\"trial_{trial_idx}_epochs_{epochs}_lr_{lr}_bs_{batch_size}_alr_{adapt_lr}_reset_{reset_every}\"\n                    train_ds, val_ds, test_datasets, train_loader, val_loader = (\n                        build_loaders(tokenizer, batch_size=batch_size)\n                    )\n                    model, history = train_source_model(\n                        epochs,\n                        train_loader,\n                        val_loader,\n                        seed=BASE_SEED,\n                        lr=lr,\n                        weight_decay=1e-4,\n                    )\n\n                    calib = collect_confidence_stats(model, val_loader, max_batches=8)\n                    entropy_thresh = calib[\"entropy_thresh\"]\n                    margin_thresh = calib[\"margin_thresh\"]\n\n                    source_name = \"ai2_arc_easy_stream\"\n                    source_frozen = stream_evaluate(\n                        model,\n                        test_datasets[source_name],\n                        mode=\"frozen\",\n                        entropy_thresh=entropy_thresh,\n                        margin_thresh=margin_thresh,\n                        reset_every=reset_every,\n                        lr=adapt_lr,\n                    )\n                    source_gated = stream_evaluate(\n                        model,\n                        test_datasets[source_name],\n                        mode=\"gated\",\n                        entropy_thresh=entropy_thresh,\n                        margin_thresh=margin_thresh,\n                        reset_every=reset_every,\n                        lr=adapt_lr,\n                        reg_lambda=5e-3,\n                        grad_clip=0.5,\n                        update_steps=1,\n                        warmup=8,\n                    )\n                    source_penalty = (\n                        source_gated[\"accuracy\"] - source_frozen[\"accuracy\"]\n                    )\n\n                    ds_names = [\n                        \"ai2_arc_challenge_stream\",\n                        \"mmlu_elementary_math_stream\",\n                        \"truthfulqa_mc1_stream\",\n                        \"openbookqa_stream\",\n                    ]\n\n                    per_dataset = {}\n                    gains = [source_penalty]\n                    history[\"metrics\"][\"test\"].append(\n                        (\n                            epochs,\n                            source_frozen[\"accuracy\"],\n                            source_gated[\"accuracy\"],\n                            source_penalty,\n                        )\n                    )\n\n                    for ds_name in ds_names:\n                        ds = test_datasets[ds_name]\n                        frozen_res = stream_evaluate(\n                            model,\n                            ds,\n                            mode=\"frozen\",\n                            entropy_thresh=entropy_thresh,\n                            margin_thresh=margin_thresh,\n                            reset_every=reset_every,\n                            lr=adapt_lr,\n                        )\n                        always_res = stream_evaluate(\n                            model,\n                            ds,\n                            mode=\"always\",\n                            entropy_thresh=entropy_thresh,\n                            margin_thresh=margin_thresh,\n                            reset_every=reset_every,\n                            lr=adapt_lr,\n                            reg_lambda=5e-3,\n                            grad_clip=0.5,\n                            update_steps=1,\n                            warmup=8,\n                        )\n                        gated_res = stream_evaluate(\n                            model,\n                            ds,\n                            mode=\"gated\",\n                            entropy_thresh=entropy_thresh,\n                            margin_thresh=margin_thresh,\n                            reset_every=reset_every,\n                            lr=adapt_lr,\n                            reg_lambda=5e-3,\n                            grad_clip=0.5,\n                            update_steps=1,\n                            warmup=8,\n                        )\n                        gain = compute_shift_normalized_gain(\n                            frozen_res[\"accuracy\"], gated_res[\"accuracy\"], ds.severity\n                        )\n                        gains.append(gain)\n\n                        per_dataset[ds_name] = {\n                            \"severity\": ds.severity,\n                            \"frozen\": frozen_res,\n                            \"always\": always_res,\n                            \"gated\": gated_res,\n                            \"sna_gain\": gain,\n                        }\n                        print(\n                            f'[{trial_key}] {ds_name} | frozen={frozen_res[\"accuracy\"]:.4f} | '\n                            f'always= vals)), vals)\nplt.xticks(range(len(vals)), labels, rotation=60, ha=\"right\")\nplt.ylabel(\"Mean Shift-Normalized Accuracy Gain\")\nplt.title(\"Hyperparameter Tuning by Target Metric\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"baseline_tuning_sna_gain.png\"))\nplt.close()\n\nfor ds_name in dataset_names:\n    if ds_name not in selected[\"per_dataset\"]:\n        continue\n    arr = selected[\"per_dataset\"][ds_name][\"arrays\"]\n    frozen_acc = selected[\"per_dataset\"][ds_name][\"stream_results\"][\"frozen\"][\n        \"Shifted-Stream Accuracy\"\n    ]\n    gated_acc = selected[\"per_dataset\"][ds_name][\"stream_results\"][\"gated\"][\n        \"Shifted-Stream Accuracy\"\n    ]\n    always_acc = selected[\"per_dataset\"][ds_name][\"stream_results\"][\"always\"][\n        \"Shifted-Stream Accuracy\"\n    ]\n\n    plt.figure(figsize=(8, 5))\n    if len(arr[\"frozen_cumacc\"]) > 0:\n        plt.plot(arr[\"frozen_cumacc\"], label=f\"Frozen ({frozen_acc:.3f})\")\n    if len(arr[\"always_cumacc\"]) > 0:\n        plt.plot(arr[\"always_cumacc\"], label=f\"Always-LoRA ({always_acc:.3f})\")\n    if len(arr[\"gated_cumacc\"]) > 0:\n        plt.plot(arr[\"gated_cumacc\"], label=f\"Gated-LoRA ({gated_acc:.3f})\")\n    plt.xlabel(\"Stream step\")\n    plt.ylabel(\"Cumulative accuracy\")\n    plt.title(f\"Cumulative Accuracy: {ds_name}\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_cumulative_accuracy.png\"))\n    plt.close()\n\n    if len(arr[\"gated_entropy\"]) > 0:\n        plt.figure(figsize=(8, 4))\n        scale = max(float(arr[\"gated_entropy\"].max()), 1e-6)\n        plt.plot(arr[\"gated_entropy\"], label=\"Entropy\")\n        plt.plot(arr[\"gated_margin\"], label=\"Margin\")\n        plt.plot(arr[\"gated_triggered\"] * scale, label=\"Triggered (scaled)\", alpha=0.7)\n        plt.xlabel(\"Stream step\")\n        plt.ylabel(\"Value\")\n        plt.title(f\"Gating Signals: {ds_name}\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_gating_signals.png\"))\n        plt.close()\n\nprint(\"Finished. Saved metrics, arrays, and plots to:\", working_dir)\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nBASE_SEED = 42\ntorch.manual_seed(BASE_SEED)\nnp.random.seed(BASE_SEED)\n\nexperiment_data = {\n    \"batch_size_tuning\": {\n        \"bs_64\": {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"stream_results\": {},\n            \"config\": {},\n        },\n        \"bs_32\": {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"stream_results\": {},\n            \"config\": {},\n        },\n    }\n}\n\n\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, shift=False, seed=0):\n        self.X, self.y = self.make_data(n, d, shift, seed)\n\n    @staticmethod\n    def make_data(n, d, shift=False, seed=0):\n        rng = np.random.RandomState(seed)\n        X = rng.randn(n, d).astype(np.float32)\n        if not shift:\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n        else:\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        X = ((X - mu) / std).astype(np.float32)\n        return torch.tensor(X), torch.tensor(y)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=32, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef stream_evaluate(\n    base_model,\n    dataset,\n    criterion,\n    mode=\"frozen\",\n    entropy_thresh=0.62,\n    reset_every=100,\n    lr=5e-2,\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.SGD(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, triggered = [], [], [], []\n    cumulative_acc = []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = False\n        if mode == \"always\":\n            do_update = True\n        elif mode == \"gated\":\n            do_update = ent > entropy_thresh\n\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            pseudo = logits_u.detach().argmax(dim=1)\n            loss_u = criterion(logits_u, pseudo)\n            loss_u.backward()\n            opt.step()\n\n        if mode in [\"always\", \"gated\"] and (i + 1) % reset_every == 0:\n            stream_model.reset_lora()\n\n    acc = np.mean(np.array(preds_all) == np.array(gt_all))\n    return {\n        \"accuracy\": float(acc),\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\ndef train_and_evaluate(batch_size, run_key):\n    torch.manual_seed(BASE_SEED)\n    np.random.seed(BASE_SEED)\n\n    train_ds = SyntheticReasoningDataset(n=2500, d=20, shift=False, seed=101)\n    val_ds = SyntheticReasoningDataset(n=500, d=20, shift=False, seed=202)\n    test_shift_ds = SyntheticReasoningDataset(n=800, d=20, shift=True, seed=303)\n\n    g = torch.Generator()\n    g.manual_seed(BASE_SEED)\n    train_loader = DataLoader(\n        train_ds, batch_size=batch_size, shuffle=True, generator=g\n    )\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n    model = SimpleNet().to(device)\n    criterion = nn.CrossEntropyLoss()\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n    epochs = 12\n    best_state = None\n    best_val = float(\"inf\")\n\n    store = experiment_data[\"batch_size_tuning\"][run_key]\n    store[\"config\"] = {\n        \"train_batch_size\": batch_size,\n        \"val_batch_size\": 128,\n        \"epochs\": epochs,\n        \"lr\": 1e-3,\n        \"seed\": BASE_SEED,\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        train_loss, train_correct, train_total = 0.0, 0, 0\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n\n            train_loss += loss.item() * y.size(0)\n            preds = logits.argmax(dim=1)\n            train_correct += (preds == y).sum().item()\n            train_total += y.size(0)\n\n        train_loss /= train_total\n        train_acc = train_correct / train_total\n\n        model. n()),\n        },\n        \"gated\": {\n            \"Shifted-Stream Accuracy\": gated_res[\"accuracy\"],\n            \"trigger_rate\": float(gated_res[\"triggered\"].mean()),\n        },\n    }\n    store[\"metrics\"][\"test\"].append(\n        (\n            0,\n            {\n                \"frozen_acc\": frozen_res[\"accuracy\"],\n                \"always_acc\": always_res[\"accuracy\"],\n                \"gated_acc\": gated_res[\"accuracy\"],\n            },\n        )\n    )\n    store[\"predictions\"] = gated_res[\"preds\"].tolist()\n    store[\"ground_truth\"] = gated_res[\"gt\"].tolist()\n\n    print(\n        f\"[{run_key}] Shifted-Stream Accuracy | frozen={frozen_res['accuracy']:.4f} | always={always_res['accuracy']:.4f} | gated={gated_res['accuracy']:.4f}\"\n    )\n    print(\n        f\"[{run_key}] Adapt trigger rate      | frozen={frozen_res['triggered'].mean():.4f} | always={always_res['triggered'].mean():.4f} | gated={gated_res['triggered'].mean():.4f}\"\n    )\n\n    prefix = run_key\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_frozen_preds.npy\"), frozen_res[\"preds\"]\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_always_preds.npy\"), always_res[\"preds\"]\n    )\n    np.save(os.path.join(working_dir, f\"{prefix}_gated_preds.npy\"), gated_res[\"preds\"])\n    np.save(os.path.join(working_dir, f\"{prefix}_ground_truth.npy\"), gated_res[\"gt\"])\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_gated_entropy.npy\"), gated_res[\"entropy\"]\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_gated_triggered.npy\"),\n        gated_res[\"triggered\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_frozen_cumacc.npy\"),\n        frozen_res[\"cumulative_acc\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_always_cumacc.npy\"),\n        always_res[\"cumulative_acc\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_gated_cumac uracy\")\nplt.title(\"Batch Size Tuning: Stream Accuracy Comparison\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"batch_size_tuning_stream_acc.png\"))\nplt.close()\n\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nprint(\"\\nBatch size tuning summary:\")\nfor i, bs in enumerate(summary[\"batch_sizes\"]):\n    print(\n        f\"bs={int(bs)} | best_val_loss={summary['best_val_loss'][i]:.4f} | \"\n        f\"final_val_acc={summary['final_val_acc'][i]:.4f} | \"\n        f\"frozen={summary['frozen_acc'][i]:.4f} | always={summary['always_acc'][i]:.4f} | gated={summary['gated_acc'][i]:.4f}\"\n    )\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"entropy_thresh\": {\n        \"synthetic_reasoning_stream\": {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"stream_results\": {},\n            \"threshold_grid\": [],\n            \"threshold_accuracies\": [],\n            \"threshold_trigger_rates\": [],\n            \"best_threshold\": None,\n        }\n    }\n}\n\n\n# -----------------------\n# Synthetic dataset\n# -----------------------\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, shift=False):\n        self.X, self.y = self.make_data(n, d, shift)\n\n    @staticmethod\n    def make_data(n, d, shift=False):\n        X = np.random.randn(n, d).astype(np.float32)\n        if not shift:\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n        else:\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        X = ((X - mu) / std).astype(np.float32)\n        return torch.tensor(X), torch.tensor(y)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\ntrain_ds = SyntheticReasoningDataset(n=2500, d=20, shift=False)\nval_ds = SyntheticReasoningDataset(n=500, d=20, shift=False)\ntest_shift_ds = SyntheticReasoningDataset(n=800, d=20, shift=True)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\n# -----------------------\n# Model with LoRA layer\n# -----------------------\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=32, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n\nmodel = SimpleNet().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n# -----------------------\n# Train backbone on source\n# -----------------------\nepochs = 12\nbest_state, best_val = None, float(\"inf\")\n\nfor epoch in range(1, epochs + 1):\n    model.train()\n    train_loss, train_correct, train_total = 0.0, 0, 0\n\n    for batch in train_loader:\n        x = batch[\"x\"].to(device)\n        y = batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n\n        train_loss += loss.item() * y.size(0)\n        train_correct += (logits.argmax(dim=1) == y).sum().item()\n        train_total += y.size(0)\n\n    train_loss /= train_total\n    train_acc = train_correct / train_total\n\n    model.eval()\n    val_loss, val_correct, val_total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in val_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = criterion(logits, y)\n            val_loss += loss.item() * y.size(0)\n            val_correct += (logits.argmax(dim=1) == y).sum().item()\n            val_total += y.size(0)\n\n    val_loss /= val_total\n    val_acc = val_correct / val_total\n\n    ds_exp = experiment_data[\"entropy_thresh\"][\"synthetic_reasoning_stream\"]\n    ds_exp[\"metrics\"][\"train\"].append((epoch, train_acc))\n    ds_exp[\"metrics\"][\"val\"].append((epoch, val_acc))\n    ds_exp[\"losses\"][\"train\"].append((epoch, train_loss))\n    ds_exp[\"losses\"][\"val\"].append((epoch, val_loss))\n    ds_exp[\"timestamps\"].append(time.time())\n\n    print(\n        f\"Epoch {epoch}: train_acc={train_acc:.4f} val_acc={val_acc:.4f} val_loss={val_loss:.4f}\"\n    )\n    if val_loss < best_val:\n        best_val = val_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\n\n# -----------------------\n# Stream evaluation\n# -----------------------\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef stream_evaluate(\n    base_model, dataset, mode=\"frozen\", entropy_thresh=0.62, reset_every=100, lr=5e-2\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.SGD(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, triggered, cumulative_acc = [], [], [], [], []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = mode == \"always\" or (mode == \"gated\" and ent > entropy_thresh)\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            pseudo = logits_u.detach().argmax(dim=1)\n            loss_u = criterion(logits_u, pseudo)\n            loss_u.backward()\n            opt.step()\n\n        if mode in [\"always\", \"gated\"] and (i + 1) % reset_every == 0:\n            stream_model.reset_lora()\n\n    preds_all = np.array(preds_all)\n    gt_all = np.array(gt_all)\n    ent_all = np.array(ent_all)\n    triggered = np.array(triggered)\n    cumulative_acc = np.array(cumulative_acc)\n\n    return {\n        \"accuracy\": float((preds_all == gt_all).mean()),\n        \"preds\": preds_all,\n        \"gt\": gt_all,\n        \"entropy\": ent_all,\n        \"triggered\": triggered,\n        \"cumulative_acc\": cumulative_acc,\n    }\n\n\n# Baselines\nfrozen_res = stream_evaluate(model, test_shift_ds, mode=\"frozen\")\nalways_res = stream_evaluate(model, test_shift_ds, mode=\"always\")\n\n# Hyperparameter tuning for entropy threshold\nthreshold_grid = [0.50, 0.55, 0.60, 0.62, 0.65, 0.68]\nthreshold_results = {}\n\nbest_threshold = None\nbest_acc = -1.0\nbest_gated_res = None\n\nfor thresh in threshold_grid:\n    res = stream_evaluate(model, test_shift_ds, mode=\"gated\", entropy_thresh=thresh)\n    threshold_results[thresh] = res\n    acc = res[\"accuracy\"]\n    trig = float(res[\"triggered\"].mean())\n    experiment_data[\"entropy_thresh\"][\"synthetic_reasoning_stream\"][\n        \"threshold_grid\"\n    ].append(thresh)\n    experiment_data[\"entropy_thresh\"][\"synthetic_reasoning_stream\"][\n        \"threshold_accuracies\"\n    ].append(acc)\n    experiment_data[\"entropy_thresh\"][\"synthetic_reasoning_stream\"][\n        \"threshold_trigger_rates\"\n    ].append(trig)\n    print(\n        f\"entropy_thresh={thresh:.2f} | shifted_acc={acc:.4f} | trigger_rate={trig:.4f}\"\n    )\n    if acc > best_acc:\n        best_acc = acc\n        best_threshold = thresh\n        best_gated_res = res\n\n# Final records\nds_exp = experiment_data[\"entropy_thresh\"][\"synthetic_reasoning_stream\"]\nds_exp[\"best_threshold\"] = best_threshold\nds_exp[\"stream_results\"] = {\n    \"frozen\": {\n        \"Shifted-Stream Accuracy\": frozen_res[\"accuracy\"],\n        \"trigger_rate\": float(frozen_res[\"triggered\"].mean()),\n    },\n    \"always\": {\n        \"Shifted-Stream Accuracy\": always_res[\"accuracy\"],\n        \"trigger_rate\": float(always_res[\"triggered\"].mean()),\n    },\n    \"gated_best\": {\n        \"Shifted-Stream Accuracy\": best_gated_res[\"accuracy\"],\n        \"trigger_rate\": float(best_gated_res[\"triggered\"].mean()),\n        \"entropy_thresh\": float(best_threshold),\n    },\n}\nfor thresh, res in threshold_results.items():\n    ds_exp[\"stream_results\"][f\"gated_thresh_{thresh:.2f}\"] = {\n        \"Shifted-Stream Accuracy\": res[\"accuracy\"],\n        \"trigger_rate\": float(res[\"triggered\"].mean()),\n        \"entropy_thresh\": float(thresh),\n    }\n\nds_exp[\"metrics\"][\"test\"].append(\n    (\n        0,\n        {\n            \"frozen_acc\": frozen_res[\"accuracy\"],\n            \"always_acc\": always_res[\"accuracy\"],\n            \"best_gated_acc\": best_gated_res[\"accuracy\"],\n            \"best_entropy_thresh\": best_threshold,\n        },\n    )\n)\nds_exp[\"predictions\"] = best_gated_res[\"preds\"].tolist()\nds_exp[\"ground_truth\"] = best_gated_res[\"gt\"].tolist()\n\nprint(\n    f\"Shifted-Stream Accuracy | frozen={frozen_res['accuracy']:.4f} | always={always_res['accuracy']:.4f} | gated(best@{best_threshold:.2f})={best_gated_res['accuracy']:.4f}\"\n)\nprint(\n    f\"Adapt trigger rate      | frozen={frozen_res['triggered'].mean():.4f} | always={always_res['triggered'].mean():.4f} | gated(best)={best_gated_res['triggered'].mean():.4f}\"\n)\n\n# -----------------------\n# Save all plottable data\n# -----------------------\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nnp.save(\n    os.path.join(working_dir, \"train_metrics.npy\"),\n    np.array(ds_exp[\"metrics\"][\"train\"], dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"val_metrics.npy\"),\n    np.array(ds_exp[\"metrics\"][\"val\"], dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"test_metrics.npy\"),\n    np.array(ds_exp[\"metrics\"][\"test\"], dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"train_losses.npy\"),\n    np.array(ds_exp[\"losses\"][\"train\"], dtype=object),\n    allow_pickle=True,\n)\nnp.save(\n    os.path.join(working_dir, \"val_losses.npy\"),\n    np.array(ds_exp[\"losses\"][\"val\"], dtype=object),\n    allow_pickle=True,\n)\nnp.save(os.path.join(working_dir, \"timestamps.npy\"), np.array(ds_exp[\"timestamps\"]))\n\nnp.save(os.path.join(working_dir, \"frozen_preds.npy\"), frozen_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"always_preds.npy\"), always_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"gated_preds.npy\"), best_gated_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"ground_truth.npy\"), best_gated_res[\"gt\"])\nnp.save(os.path.join(working_dir, \"gated_entropy.npy\"), best_gated_res[\"entropy\"])\nnp.save(os.path.join(working_dir, \"gated_triggered.npy\"), best_gated_res[\"triggered\"])\nnp.save(os.path.join(working_dir, \"frozen_cumacc.npy\"), frozen_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"always_cumacc.npy\"), always_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"gated_cumacc.npy\"), best_gated_res[\"cumulative_acc\"])\n\nnp.save(\n    os.path.join(working_dir, \"entropy_threshold_grid.npy\"), np.array(threshold_grid)\n)\nnp.save(\n    os.path.join(working_dir, \"entropy_threshold_accuracies.npy\"),\n    np.array(ds_exp[\"threshold_accuracies\"]),\n)\nnp.save(\n    os.path.join(working_dir, \"entropy_threshold_trigger_rates.npy\"),\n    np.array(ds_exp[\"threshold_trigger_rates\"]),\n)\n\nfor thresh, res in threshold_results.items():\n    tag = f\"{thresh:.2f}\".replace(\".\", \"p\")\n    np.save(os.path.join(working_dir, f\"gated_preds_thresh_{tag}.npy\"), res[\"preds\"])\n    np.save(\n        os.path.join(working_dir, f\"gated_entropy_thresh_{tag}.npy\"), res[\"entropy\"]\n    )\n    np.save(\n        os.path.join(working_dir, f\"gated_triggered_thresh_{tag}.npy\"), res[\"triggered\"]\n    )\n    np.save(\n        os.path.join(working_dir, f\"gated_cumacc_thresh_{tag}.npy\"),\n        res[\"cumulative_acc\"],\n    )\n\n# -----------------------\n# Visualizations\n# -----------------------\nplt.figure(figsize=(8, 5))\nplt.plot(frozen_res[\"cumulative_acc\"], label=f\"Frozen ({frozen_res['accuracy']:.3f})\")\nplt.plot(\n    always_res[\"cumulative_acc\"], label=f\"Always-LoRA ({always_res['accuracy']:.3f})\"\n)\nplt.plot(\n    best_gated_res[\"cumulative_acc\"],\n    label=f\"Gated-LoRA best@{best_threshold:.2f} ({best_gated_res['accuracy']:.3f})\",\n)\nplt.xlabel(\"Shifted stream step\")\nplt.ylabel(\"Cumulative accuracy\")\nplt.title(\"Synthetic Shifted-Stream Accuracy\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"synthetic_shifted_stream_accuracy.png\"))\nplt.close()\n\nplt.figure(figsize=(8, 5))\nplt.plot(\n    threshold_grid, ds_exp[\"threshold_accuracies\"], marker=\"o\", label=\"Shifted accuracy\"\n)\nplt.plot(\n    threshold_grid, ds_exp[\"threshold_trigger_rates\"], marker=\"s\", label=\"Trigger rate\"\n)\nplt.axvline(\n    best_threshold,\n    color=\"red\",\n    linestyle=\"--\",\n    label=f\"Best thresh={best_threshold:.2f}\",\n)\nplt.xlabel(\"entropy_thresh\")\nplt.ylabel(\"Value\")\nplt.title(\"Entropy Threshold Tuning\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"entropy_threshold_tuning.png\"))\nplt.close()\n"], "term_out": ["['Using device: cuda', '\\n (e.g.,\nallenai/ai2_arc, qiaojin/PubMedQA, cais/mmlu subsets, plus two new datasets such\nas truthful_qa and winogrande for text, or ScienceQA and ChartQA for multimodal\nif model support exists). (2) Model selection is based on frozen shifted-stream\naccuracy (`if frozen_res['accuracy'] > best_trial_score`) instead of the main\nhypothesis target, which is selective/gated adaptation. This can select a\nsuboptimal epoch setting for the actual method under study. Fix: choose by gated\naccuracy, or by a composite objective including gated gain over frozen and\ntrigger/computation cost. (3) The test-time update uses self-training on the\nmodel\u2019s own argmax label (`pseudo = logits_u.detach().argmax(...)`), which can\nreinforce wrong predictions and makes the adaptation results unstable/hard to\ninterpret. Fix: use a better unsupervised objective (entropy minimization with\nregularization, consistency under augmentation, confidence thresholding with\nmargin, or delayed/batched updates) and report drift. (4) The entropy gate\nthreshold is hard-coded and not tuned/calibrated; trigger rates differ a lot\nacross epoch settings, making comparisons confounded. Fix: tune threshold on\nvalidation or target a fixed trigger budget. (5) Data normalization is performed\nseparately inside each dataset split, including the shifted test set, which\nleaks target-distribution statistics into preprocessing and can artificially\nchange the shift. Fix: compute normalization stats on train only and apply them\nto val/test. Minor issue: output says 'Execution time: 3 seconds seconds',\nindicating a formatting bug in the wrapper/logging, though not affecting\nresults.", "The script executed successfully, but there are important experimental/design\nbugs relative to the stated research stage. (1) It does not introduce the\nrequired two new Hugging Face datasets; it only uses a synthetic dataset, so the\nsub-stage goal is unmet. Fix: add at least two benchmark datasets such as\nallenai/ai2_arc and qiaojin/PubMedQA (or cais/mmlu, lmms-lab/ScienceQA,\nHuggingFaceM4/ChartQA) and report results on them. (2) The test-time adaptation\nobjective is self-training on the model's own argmax label for a single example,\nwhich often yields near-zero or confirmation-bias updates and likely explains\nwhy always-on adaptation matches frozen accuracy and gated gives only a tiny\ngain. Fix: use a more meaningful unsupervised objective (entropy minimization,\nconsistency under augmentation, confidence-masked pseudo-labeling over\nbatches/windows) and evaluate update magnitude. (3) The synthetic shift is\nlargely neutralized because each dataset split is independently standardized\nusing its own mean/std, which removes much of the intended covariate shift. Fix:\ncompute normalization stats on the source train set only and apply them to\nval/test. (4) The reset policy is inconsistent with the intended baselines: both\nalways and gated reset every 100 steps, while frozen never adapts; there is no\nexplicit periodic-reset baseline separated from always-on adaptation. Fix:\nevaluate distinct baselines: frozen, always-on without reset, periodic-reset,\nand confidence-gated. (5) The reported execution footer says '2 seconds\nseconds', indicating a minor logging bug in the harness, though not in the core\nscript.", "The script ran to completion, but there is a clear experimental/specification\nbug rather than a runtime bug. It did not satisfy the stage goal to introduce\nTWO more new Hugging Face datasets; all evaluations are on synthetic datasets\n(`shifted`, `feature_permutation`, `nonlinear_boundary`) generated locally, so\nthe claimed benchmark setting is not actually tested. In addition, model\nselection is based on mean shift-normalized gain even when all gains are\nnegative; the selected trial still has a negative mean gain (-0.000441), so the\ntuning criterion picked the least-bad configuration rather than a genuinely\nimproving one. The results also suggest the gated LoRA setup is ineffective or\nmis-tuned: gated is usually equal to or worse than frozen, and always-on often\ndegrades further. Fixes: (1) replace/add real Hugging Face datasets per the\nplan, e.g. `allenai/ai2_arc`, `qiaojin/PubMedQA`, plus two additional datasets\nsuch as `openbookqa` and `truthful_qa` for text, or `lmms-lab/ScienceQA` and\n`HuggingFaceM4/ChartQA` for multimodal; (2) add a guard that reports 'no\npositive-gain configuration found' if best mean gain <= 0, instead of implying\nsuccess; (3) tune adaptation hyperparameters separately (entropy/margin\nthresholds, adaptation LR, reset frequency, regularization) and log trigger\nrates, because current gating likely fires too rarely or on unhelpful examples;\n(4) if the intent is true test-time learning, consider evaluating periodic reset\nas an explicit baseline and calibrating thresholds on validation shift rather\nthan fixed constants.", "The script completed successfully, but there is a substantive experiment-design\nbug relative to the stated stage goals and research idea. It does not evaluate\nany real Hugging Face benchmarks or add the required two new Hugging Face\ndatasets; instead it only uses synthetic tabular variants (source, shifted,\nfeature_permutation, nonlinear_boundary, label_flip, correlated_noise). Thus the\nrun cannot support the claimed conclusions about open LLM/VLM reasoning on\nHugging Face benchmarks. Main fix: replace or augment the synthetic pipeline\nwith actual HF datasets (e.g., allenai/ai2_arc, qiaojin/PubMedQA, cais/mmlu\nsubsets, plus two additional datasets such as truthful_qa and gsm8k for text, or\nScienceQA/ChartQA for multimodal), and evaluate the same frozen/always/gated\nLoRA protocols there. Secondary issue: the selected metric is extremely weak\n(best mean shift-normalized gain = 0.000386), with gated adaptation often\nmatching or underperforming frozen/always, so there is no meaningful improvement\nfrom hyperparameter tuning. Consider widening the adaptation hyperparameter\nsearch (reg_lambda, update_steps, warmup, rank, threshold quantiles), reporting\ntrigger rates and source-stream degradation explicitly, and adding statistical\nrepeats across seeds. Minor code issue: source_penalty is added positively into\nthe optimization objective even though the comment says it should penalize hurt\non the easy stream; if gated hurts source accuracy this negative value helps,\nbut if gated improves source accuracy it boosts the score, so the objective is\nnot a pure penalty term. Rename it to source_delta or reformulate the objective\nexplicitly.", "Execution failed before training began due to an environment/library\ncompatibility bug, not a modeling bug. `AutoModel.from_pretrained('distilbert-\nbase-uncased')` crashes inside `transformers` when `loading_report._style()`\ncalls `sys.stdout.isatty()`, but the runtime replaces stdout with\n`RedirectQueue`, which lacks `isatty`. Root cause: the installed `transformers`\nversion assumes a TTY-like stdout object. Fixes: (1) monkey-patch stdout before\nmodel loading, e.g. `if not hasattr(sys.stdout, 'isatty'): sys.stdout.isatty =\nlambda: False`; or wrap with a proxy that defines `isatty`; (2) disable the\nloading report / use `from_pretrained(..., output_loading_info=False)` if\nsupported by the version; (3) pin/upgrade/downgrade `transformers` to a version\ncompatible with this execution environment. Secondary finding: the sub-stage\ngoal asked for adding two new Hugging Face datasets, but the code only uses one\nclearly new benchmark beyond the earlier core set (`allenai/openbookqa` plus\n`truthful_qa` if counted); no VLM datasets were added. Also, `parse_mmlu`\nreturns `dev` both as train and val slice, which can leak dev data into\nvalidation, and the source stream stores `always_acc=0.0` without actually\nevaluating always-on adaptation for that dataset.", "The script runs successfully, but there are important experimental/design bugs\nrelative to the stated research goal. (1) It does not use any Hugging Face\nbenchmark datasets or open LLM/VLM models; it only evaluates a tiny synthetic\ntabular classifier, so the results are not valid evidence for the proposed\npaper. Fix by replacing SyntheticReasoningDataset with actual HF datasets and\nusing text/VLM models with tokenization/processing. (2) The test-time adaptation\nobjective is self-training on the model's own argmax label (cross-entropy to\npseudo-label), which can reinforce mistakes and likely explains why both always-\non and gated adaptation underperform the frozen baseline. Fix by using a more\nprincipled unsupervised TTA loss (e.g., entropy minimization with safeguards,\nconsistency regularization, or adaptation only on calibrated high-value signals)\nand ablate reset policies. (3) The current gating threshold appears poorly\ntuned: gated trigger rates are very low (~5\u20138%), and gated still underperforms\nfrozen. Fix by tuning entropy_thresh, LoRA LR, reset_every, and adaptation\nschedule on a validation stream. (4) The requested sub-stage goal to introduce\ntwo new Hugging Face datasets was not met at all. Add at least two datasets such\nas allenai/ai2_arc and qiaojin/PubMedQA for text, or lmms-lab/ScienceQA and\nHuggingFaceM4/ChartQA for multimodal evaluation. (5) Minor reporting issue: the\nsummary prints final_val_acc rather than best-val-epoch accuracy, which can be\nmisleading when model selection is by best val loss. Store and report best\ncheckpoint epoch/metrics explicitly.", "The script runs successfully, but there is a methodological bug relative to the\nintended experiment: threshold tuning is performed directly on the shifted test\nstream and the best threshold is then reported on that same stream, causing\ntest-set leakage and optimistic gated results. In addition, the adaptation loss\nuses the model\u2019s own argmax pseudo-label on the same example, which mainly\nsharpens existing predictions rather than correcting errors, so improvements may\nbe unstable or incidental. Fix by introducing a separate adaptation-validation\nstream for threshold/LR/reset tuning and reserving the final shifted test stream\nfor one-shot evaluation only. Also consider using a more principled self-\nsupervised or delayed-label adaptation objective, and report multiple random\nseeds because the observed gain is very small (0.8438 vs 0.8387)."], "exc_type": [null, null, null, null, null, "AttributeError", null, null], "exc_info": [null, null, null, null, null, {"args": ["'RedirectQueue' object has no attribute 'isatty'"], "name": "isatty", "obj": "<ai_scientist.treesearch.interpreter.RedirectQueue object at 0x701d68553e90>"}, null, null], "exc_stack": [null, null, null, null, null, [["/workspace/AI-Scientist-v2/ai_scientist/treesearch/interpreter.py", 144, "_run_session", "exec(compile(code, self.agent_file_name, \"exec\"), global_scope)"], ["runfile.py", 610, "<module>", "model, history = train_source_model("], ["runfile.py", 528, "train_source_model", "model = MCQEncoder(encoder_name=HF_MODEL, num_classes=5, rank=8).to(device)"], ["runfile.py", 280, "__init__", "self.encoder = AutoModel.from_pretrained(encoder_name)"], ["/venv/main/lib/python3.12/site-packages/transformers/models/auto/auto_factory.py", 381, "from_pretrained", "return model_class.from_pretrained("], ["/venv/main/lib/python3.12/site-packages/transformers/modeling_utils.py", 4131, "from_pretrained", "loading_info = cls._finalize_model_loading(model, load_config, loading_info)"], ["/venv/main/lib/python3.12/site-packages/transformers/modeling_utils.py", 4293, "_finalize_model_loading", "log_state_dict_report("], ["/venv/main/lib/python3.12/site-packages/transformers/utils/loading_report.py", 262, "log_state_dict_report", "report = loading_info.create_loading_report()"], ["/venv/main/lib/python3.12/site-packages/transformers/utils/loading_report.py", 181, "create_loading_report", "tips += f\"\\n- {_style('UNEXPECTED:', 'orange')}\\t\" + _style("], ["/venv/main/lib/python3.12/site-pac 20434/synthetic_reasoning_stream_gated_entropy_triggers.png"], [], [], [], [], [], [], []], "plot_paths": [["experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_shifted_stream_accuracy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_accuracy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_loss.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_stream_results_bar.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_cumulative_stream_accuracy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_predictions_vs_ground_truth_prefix.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_confusion_matrix.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_entropy_triggers.png"], [], [], [], [], [], [], []], "plot_analyses": [[{"analysis": "The cumulative shifted-stream accuracy plot shows a consistent ranking of Gated-LoRA > Frozen > Always-LoRA over most of the stream. Final cumulative accuracies in the legend are approximately 0.844 for gated, 0.839 for frozen, and 0.834 for always-on adaptation, so the gated policy yields a small absolute gain of about 0.5 points over frozen and about 1 point over always-on. The early part of the stream is noisy, but after the initial transient the green curve remains slightly above the others with relatively stable separation. This is qualitatively aligned with the hypothesis: selective adaptation appears to capture some benefit under shift without the degradation seen when adapting on every example. At the same time, the effect size is modest, so this should be framed as a preliminary proof-of-functionality result rather than strong evidence of broad robustness gains.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_shifted_stream_accuracy.png"}, {"analysis": "The training and validation accuracy curves on the synthetic reasoning dataset indicate that the base setup is learning successfully and generalizing well on the in-distribution task. Training accuracy rises rapidly from about 0.82 to around 0.99, while validation accuracy starts high near 0.94 and plateaus around 0.98. The train-validation gap remains very small throughout, suggesting little obvious overfitting. This is useful because it means downstream shifted-stream behavior is unlikely to be explained by a poorly trained base model. For the current stage, these curves support that the implementation is basically correct and the synthetic task is easy enough to debug adaptation behavior.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_accuracy.png"}, {"analysis": "The training and validation loss curves decrease smoothly and monotonically from roughly 0.60/0.48 to about 0.06 on both splits. The close alignment between train and validation loss further supports stable optimization and good generalization in the base model. There are no visible instabilities, divergence events, or late-epoch increases that would indicate optimization problems. This is a positive sign for the initial implementation stage because it suggests that any differences among adaptation modes are likely due to the test-time adaptation logic rather than training pathologies.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_loss.png"}, {"analysis": "The bar-chart summary compresses the shifted-stream results and makes the main takeaway clear: gated adaptation attains the highest accuracy, frozen is slightly lower, and always-on adaptation is the worst of the three. The adjacent trigger-rate panel is especially informative for the paper\u2019s central claim. Frozen naturally has zero updates, always-on has a trigger rate of 1.0, and gated appears to trigger only around 0.08 of the time. This means the best-performing method also updates on only a small fraction of examples, which is encouraging from both stability and efficiency perspectives. If this pattern holds on real benchmarks, it would be a strong practical argument for confidence-gated adaptation.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_stream_results_bar.png"}, {"analysis": "The second cumulative stream-accuracy plot is consistent with the earlier stream plot and reinforces the same ranking and temporal behavior. The trajectories suggest that always-on adaptation suffers a persistent penalty rather than just a short-lived warm-up issue, while gated adaptation preserves a small but durable advantage. Because the separations are narrow, repeated runs with error bars would be important before making strong claims. Still, for a preliminary implementation milestone, the consistency across duplicated summary views is reassuring.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_cumulative_stream_accuracy.png"}, {"analysis": "The predicted-label trace against ground truth provides a qualitative sanity check that the model is not collapsing to a single class and that predictions broadly track the binary target sequence. There are visible mismatches, but the predicted sequence follows the switching structure of the labels reasonably often. As a diagnostic figure, this is useful for confirming that the gated system is producing nontrivial outputs under shift. However, the trace is visually dense and not very quantitative; for a paper, segment-level error annotations or correctness bands would likely communicate adaptation behavior more clearly than overlapping binary line traces.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_predictions_vs_ground_truth_prefix.png"}, {"analysis": "The gated-mode confusion matrix shows balanced performance across both classes: true negatives are 334 and true positives are 341, with false positives 68 and false negatives 57. This corresponds to total accuracy of 675/800, about 0.844, matching the stream summary. The errors are fairly symmetric, with slightly fewer false negatives than false positives, so there is no strong indication of severe class bias in gated mode. This is a good sign because it suggests the observed gain is not coming from exploiting class imbalance or collapsing toward one label. For a more complete analysis, comparable confusion matrices for frozen and always-on modes would help reveal whether gating improves one class disproportionately.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_confusion_matrix.png"}, {"analysis": "The entropy-and-trigger plot supports the intended mechanism of the gated policy. Triggered updates occur at high-entropy points, and the entropy series exhibits many low values punctuated by spikes, implying that uncertainty is intermittent rather than constant. This matches the idea of selective adaptation on difficult or shifted examples. The trigger frequency also appears sparse relative to the full 800-step stream, consistent with the bar chart\u2019s low trigger rate. One caveat is that the plot does not directly show whether triggers are concentrated around actual distribution-shift boundaries or whether they correlate with subsequent accuracy recovery. That causal link would be valuable in future diagnostics.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_entropy_triggers.png"}], [], [], [], [], [], [], []], "vlm_feedback_summary": ["The uploaded figures show a preliminary synthetic experiment with a base\nreasoning model that trains cleanly, then is evaluated under a shifted stream\nwith three modes: frozen, always-on LoRA, and confidence-gated LoRA. Across the\nstream-level plots and summary bars, gated adaptation is consistently best but\nonly by a small margin over frozen, while always-on adaptation is slightly worse\nthan frozen. Trigger-rate plots indicate the gated policy updates rarely\nrelative to always-on, supporting the intended selectivity/efficiency story.\nAdditional diagnostics suggest the synthetic setup is functioning:\ntrain/validation curves are stable, the gated confusion matrix is balanced, and\nentropy spikes align with trigger events. Overall, the results support\nfeasibility of the implementation and weakly support the hypothesis that\nselective adaptation is safer than always adapting, but the gains are modest and\nthe evidence is still preliminary due to the synthetic binary setting and\nlimited diagnostics on compute/calibration.", "[]", "[]", "[]", "[]", "[]", "[]", "[]"], "exec_time": [1.831456184387207, 3.299044370651245, 2.6864383220672607, 47.40269994735718, 387.4633569717407, 19.359901428222656, 3.789029121398926, 2.465216875076294], "exec_time_feedback": ["", "", "", "", "", "", "", ""], "datasets_successfully_tested": [["synthetic_reasoning_stream"], [], [], [], [], [], [], []], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nexp = {}\ntry:\n    exp = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n\nds_name = \"synthetic_reasoning_stream\"\nds = exp.get(ds_name, {})\nmetrics = ds.get(\"metrics\", {})\nlosses = ds.get(\"losses\", {})\nstream_results = ds.get(\"stream_results\", {})\n\n\ndef load_optional(name):\n    path = os.path.join(working_dir, name)\n    return np.load(path, allow_pickle=True) if os.path.exists(path) else None\n\n\nfrozen_cumacc = load_optional(\"frozen_cumacc.npy\")\nalways_cumacc = load_optional(\"always_cumacc.npy\")\ngated_cumacc = load_optional(\"gated_cumacc.npy\")\ngated_entropy = load_optional(\"gated_entropy.npy\")\ngated_triggered = load_optional(\"gated_triggered.npy\")\nground_truth = load_optional(\"ground_truth.npy\")\ngated_preds = load_optional(\"gated_preds.npy\")\n\ntry:\n    tr = metrics.get(\"train\", [])\n    va = metrics.get(\"val\", [])\n    if tr or va:\n        plt.figure(figsiz
