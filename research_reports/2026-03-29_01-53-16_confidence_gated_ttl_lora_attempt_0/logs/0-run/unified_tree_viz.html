const treeStructData = {"edges": [[0, 2], [0, 1], [1, 3]], "layout": [[0.5, 0.0], [0.0, 0.5], [1.0, 0.5], [0.0, 1.0]], "plan": ["This baseline uses a small synthetic multiple-choice reasoning stream to mimic\ndistribution shift, so we can quickly test confidence-gated test-time LoRA\nwithout depending on large Hugging Face models yet. We first train a frozen\nbackbone classifier on an in-distribution text-like feature space, then evaluate\non a shifted stream where feature statistics and class rules are perturbed. The\nmodel is a simple MLP with a LoRA-style low-rank adapter on the hidden layer,\nwhich lets us isolate test-time adaptation behavior cleanly and cheaply. We\ncompare three settings: frozen inference, always-on test-time adaptation, and\nconfidence-gated adaptation triggered by high predictive entropy. Test-time\nupdates use self-training on the model\u2019s own pseudo-label for one example at a\ntime, and we periodically reset LoRA weights to reduce drift. We track\nvalidation loss during source training and then report shifted-stream accuracy\nfor all baselines, along with adaptation-trigger rates. The script also saves\nmetrics, predictions, and ground truth as numpy files and produces a plot of\ncumulative shifted-stream accuracy over time. This gives a minimal but\nfunctional scaffold that can later be swapped with real Hugging Face datasets\nand Qwen-style models while preserving the experimental logic.", "Hyperparam tuning name: epochs. I would add a small epoch sweep for source\npretraining, evaluating candidates like 12 and 30 while keeping the same\noptimizer, validation-loss model selection, and downstream stream evaluation\nunchanged. For each epoch setting, the script will train from scratch, restore\nthe best validation checkpoint, then measure frozen/always/gated shifted-stream\naccuracy so we can compare whether longer pretraining helps. I\u2019ll store per-\nepoch train/val metrics and all downstream outputs under an\n`experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"]` structure, then\nselect the best epoch setting by frozen shifted-stream accuracy as the main\ncomparison target. The script remains self-contained and saves\n`experiment_data.npy` plus all plottable arrays with `np.save()`.", "Hyperparam tuning name: learning rate. I\u2019ll add a small log-scale learning-rate\nsweep for source training (`3e-4`, `1e-3`, `3e-3`) while keeping the existing\nbest-validation-checkpoint selection within each run. The script will train a\nfresh model for each candidate LR, record per-epoch train/val metrics and\nlosses, select the LR with the lowest validation loss, then use that best source\nmodel for the existing shifted-stream frozen/always/gated evaluations. I\u2019ll also\nrestructure `experiment_data` to reflect hyperparameter tuning results, save all\nplottable arrays with `np.save()` (including the required\n`experiment_data.npy`), and generate summary plots for both LR tuning and stream\nperformance.", "The main bug is that the \u201ctest-time learning\u201d update used the model\u2019s own argmax\nas a hard pseudo-label with ordinary cross-entropy, which produces a self-\nreinforcing update that mostly sharpens current predictions instead of adapting\nto shift. I fix this by using an entropy-minimization objective with confidence\ngating, optional margin gating, gradient clipping, and a small replay-free\ntrust-region penalty that keeps LoRA weights near their initialization to reduce\ndrift. I also tune the baseline hyperparameters more broadly, select models by\nthe target metric rather than frozen accuracy alone, and add two extra shifted\ndatasets so the study is not tied to one synthetic stream. The code remains\narchitecture-preserving, fully device-safe, logs per-epoch validation loss and\nthe required Shift-Normalized Accuracy Gain metric, and saves all plottable\narrays and figures."], "code": ["import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy\nimport math\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"synthetic_reasoning_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_results\": {},\n    }\n}\n\n\n# -----------------------\n# Synthetic dataset\n# -----------------------\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, shift=False):\n        self.X, self.y = self.make_data(n, d, shift)\n\n    @staticmethod\n    def make_data(n, d, shift=False):\n        X = np.random.randn(n, d).astype(np.float32)\n        if not shift:\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n        else:\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n        # Normalize inputs carefully for model stability\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        X = ((X - mu) / std).astype(np.float32)\n        return torch.tensor(X), torch.tensor(y)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\ntrain_ds = SyntheticReasoningDataset(n=2500, d=20, shift=False)\nval_ds = SyntheticReasoningDataset(n=500, d=20, shift=False)\ntest_shift_ds = SyntheticReasoningDataset(n=800, d=20, shift=True)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\n# -----------------------\n# Model with LoRA layer\n# -----------------------\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=32, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n\nmodel = SimpleNet().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n# -----------------------\n# Train backbone on source\n# -----------------------\nepochs = 12\nbest_state = None\nbest_val = float(\"inf\")\n\nfor epoch in range(1, epochs + 1):\n    model.train()\n    train_loss, train_correct, train_total = 0.0, 0, 0\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        x, y = batch[\"x\"], batch[\"y\"]\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n\n        train_loss += loss.item() * y.size(0)\n        preds = logits.argmax(dim=1)\n        train_correct += (preds == y).sum().item()\n        train_total += y.size(0)\n\n    train_loss /= train_total\n    train_acc = train_correct / train_total\n\n    model.eval()\n    val_loss, val_correct, val_total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in val_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            logits = model(x)\n            loss = criterion(logits, y)\n            val_loss += loss.item() * y.size(0)\n            preds = logits.argmax(dim=1)\n            val_correct += (preds == y).sum().item()\n            val_total += y.size(0)\n    val_loss /= val_total\n    val_acc = val_correct / val_total\n\n    experiment_data[\"synthetic_reasoning_stream\"][\"metrics\"][\"train\"].append(\n        (epoch, train_acc)\n    )\n    experiment_data[\"synthetic_reasoning_stream\"][\"metrics\"][\"val\"].append(\n        (epoch, val_acc)\n    )\n    experiment_data[\"synthetic_reasoning_stream\"][\"losses\"][\"train\"].append(\n        (epoch, train_loss)\n    )\n    experiment_data[\"synthetic_reasoning_stream\"][\"losses\"][\"val\"].append(\n        (epoch, val_loss)\n    )\n    experiment_data[\"synthetic_reasoning_stream\"][\"timestamps\"].append(time.time())\n\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n    if val_loss < best_val:\n        best_val = val_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\n\n# -----------------------\n# Stream evaluation\n# -----------------------\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef stream_evaluate(\n    base_model, dataset, mode=\"frozen\", entropy_thresh=0.62, reset_every=100, lr=5e-2\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.SGD(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, triggered = [], [], [], []\n    cumulative_acc = []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = False\n        if mode == \"always\":\n            do_update = True\n        elif mode == \"gated\":\n            do_update = ent > entropy_thresh\n\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            pseudo = logits_u.detach().argmax(dim=1)\n            loss_u = criterion(logits_u, pseudo)\n            loss_u.backward()\n            opt.step()\n\n        if mode in [\"always\", \"gated\"] and (i + 1) % reset_every == 0:\n            stream_model.reset_lora()\n\n    acc = np.mean(np.array(preds_all) == np.array(gt_all))\n    return {\n        \"accuracy\": float(acc),\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\nfrozen_res = stream_evaluate(model, test_shift_ds, mode=\"frozen\")\nalways_res = stream_evaluate(model, test_shift_ds, mode=\"always\")\ngated_res = stream_evaluate(model, test_shift_ds, mode=\"gated\", entropy_thresh=0.62)\n\nexperiment_data[\"synthetic_reasoning_stream\"][\"stream_results\"] = {\n    \"frozen\": {\n        \"Shifted-Stream Accuracy\": frozen_res[\"accuracy\"],\n        \"trigger_rate\": float(frozen_res[\"triggered\"].mean()),\n    },\n    \"always\": {\n        \"Shifted-Stream Accuracy\": always_res[\"accuracy\"],\n        \"trigger_rate\": float(always_res[\"triggered\"].mean()),\n    },\n    \"gated\": {\n        \"Shifted-Stream Accuracy\": gated_res[\"accuracy\"],\n        \"trigger_rate\": float(gated_res[\"triggered\"].mean()),\n    },\n}\nexperiment_data[\"synthetic_reasoning_stream\"][\"metrics\"][\"test\"].append(\n    (\n        0,\n        {\n            \"frozen_acc\": frozen_res[\"accuracy\"],\n            \"always_acc\": always_res[\"accuracy\"],\n            \"gated_acc\": gated_res[\"accuracy\"],\n        },\n    )\n)\nexperiment_data[\"synthetic_reasoning_stream\"][\"predictions\"] = gated_res[\n    \"preds\"\n].tolist()\nexperiment_data[\"synthetic_reasoning_stream\"][\"ground_truth\"] = gated_res[\"gt\"].tolist()\n\nprint(\n    f\"Shifted-Stream Accuracy | frozen={frozen_res['accuracy']:.4f} | always={always_res['accuracy']:.4f} | gated={gated_res['accuracy']:.4f}\"\n)\nprint(\n    f\"Adapt trigger rate      | frozen={frozen_res['triggered'].mean():.4f} | always={always_res['triggered'].mean():.4f} | gated={gated_res['triggered'].mean():.4f}\"\n)\n\n# Save arrays\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nnp.save(os.path.join(working_dir, \"frozen_preds.npy\"), frozen_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"always_preds.npy\"), always_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"gated_preds.npy\"), gated_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"ground_truth.npy\"), gated_res[\"gt\"])\nnp.save(os.path.join(working_dir, \"gated_entropy.npy\"), gated_res[\"entropy\"])\nnp.save(os.path.join(working_dir, \"gated_triggered.npy\"), gated_res[\"triggered\"])\nnp.save(os.path.join(working_dir, \"frozen_cumacc.npy\"), frozen_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"always_cumacc.npy\"), always_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"gated_cumacc.npy\"), gated_res[\"cumulative_acc\"])\n\n# Visualization\nplt.figure(figsize=(8, 5))\nplt.plot(frozen_res[\"cumulative_acc\"], label=f\"Frozen ({frozen_res['accuracy']:.3f})\")\nplt.plot(\n    always_res[\"cumulative_acc\"], label=f\"Always-LoRA ({always_res['accuracy']:.3f})\"\n)\nplt.plot(gated_res[\"cumulative_acc\"], label=f\"Gated-LoRA ({gated_res['accuracy']:.3f})\")\nplt.xlabel(\"Shifted stream step\")\nplt.ylabel(\"Cumulative accuracy\")\nplt.title(\"Synthetic Shifted-Stream Accuracy\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"synthetic_shifted_stream_accuracy.png\"))\nplt.close()\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nBASE_SEED = 42\ntorch.manual_seed(BASE_SEED)\nnp.random.seed(BASE_SEED)\n\nexperiment_data = {\n    \"epoch_tuning\": {\n        \"synthetic_reasoning_stream\": {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"stream_results\": {},\n            \"trials\": {},\n            \"epoch_candidates\": [],\n            \"selected_epochs\": None,\n        }\n    }\n}\n\n\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, shift=False):\n        self.X, self.y = self.make_data(n, d, shift)\n\n    @staticmethod\n    def make_data(n, d, shift=False):\n        X = np.random.randn(n, d).astype(np.float32)\n        if not shift:\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n        else:\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        X = ((X - mu) / std).astype(np.float32)\n        return torch.tensor(X), torch.tensor(y)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=32, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef make_datasets_and_loaders(seed=42):\n    torch.manual_seed(seed)\n    np.random.seed(seed)\n    train_ds = SyntheticReasoningDataset(n=2500, d=20, shift=False)\n    val_ds = SyntheticReasoningDataset(n=500, d=20, shift=False)\n    test_shift_ds = SyntheticReasoningDataset(n=800, d=20, shift=True)\n    g = torch.Generator().manual_seed(seed)\n    train_loader = DataLoader(train_ds, batch_size=64, shuffle=True, generator=g)\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n    return train_ds, val_ds, test_shift_ds, train_loader, val_loader\n\n\ndef stream_evaluate(\n    base_model, dataset, mode=\"frozen\", entropy_thresh=0.62, reset_every=100, lr=5e-2\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.SGD(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, triggered, cumulative_acc = [], [], [], [], []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = mode == \"always\" or (mode == \"gated\" and ent > entropy_thresh)\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            pseudo = logits_u.detach().argmax(dim=1)\n            loss_u = F.cross_entropy(logits_u, pseudo)\n            loss_u.backward()\n            opt.step()\n\n        if mode in [\"always\", \"gated\"] and (i + 1) % reset_every == 0:\n            stream_model.reset_lora()\n\n    acc = float(np.mean(np.array(preds_all) == np.array(gt_all)))\n    return {\n        \"accuracy\": acc,\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\ndef train_source_model(epochs, train_loader, val_loader, seed=42):\n    torch.manual_seed(seed)\n    np.random.seed(seed)\n\n    model = SimpleNet().to(device)\n    criterion = nn.CrossEntropyLoss()\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n    best_state, best_val, best_epoch = None, float(\"inf\"), -1\n    history = {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"timestamps\": [],\n        \"best_val_loss\": None,\n        \"best_epoch\": None,\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        train_loss, train_correct, train_total = 0.0, 0, 0\n        for batch in train_loader:\n            x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n\n            train_loss += loss.item() * y.size(0)\n            train_correct += (logits.argmax(dim=1) == y).sum().item()\n            train_total += y.size(0)\n\n        train_loss /= train_total\n        train_acc = train_correct / train_total\n\n        model.eval()\n        val_loss, val_correct, val_total = 0.0, 0, 0\n        with torch.no_grad():\n            for batch in val_loader:\n                x, y = batch[\"x\"].to(device), batch[\"y\"].to(device)\n                logits = model(x)\n                loss = criterion(logits, y)\n                val_loss += loss.item() * y.size(0)\n                val_correct += (logits.argmax(dim=1) == y).sum().item()\n                val_total += y.size(0)\n\n        val_loss /= val_total\n        val_acc = val_correct / val_total\n\n        history[\"metrics\"][\"train\"].append((epoch, train_acc))\n        history[\"metrics\"][\"val\"].append((epoch, val_acc))\n        history[\"losses\"][\"train\"].append((epoch, train_loss))\n        history[\"losses\"][\"val\"].append((epoch, val_loss))\n        history[\"timestamps\"].append(time.time())\n\n        print(\n            f\"[epochs={epochs}] Epoch {epoch}: train_acc={train_acc:.4f} val_acc={val_acc:.4f} val_loss={val_loss:.4f}\"\n        )\n        if val_loss < best_val:\n            best_val = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    history[\"best_val_loss\"] = best_val\n    history[\"best_epoch\"] = best_epoch\n    return model, history\n\n\nepoch_candidates = [12, 30]\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\n    \"epoch_candidates\"\n] = epoch_candidates\n\ntrain_ds, val_ds, test_shift_ds, train_loader, val_loader = make_datasets_and_loaders(\n    seed=BASE_SEED\n)\n\nbest_trial_key = None\nbest_trial_score = -1.0\nall_frozen_scores = []\n\nfor epochs in epoch_candidates:\n    trial_key = f\"epochs_{epochs}\"\n    model, history = train_source_model(\n        epochs, train_loader, val_loader, seed=BASE_SEED\n    )\n\n    frozen_res = stream_evaluate(model, test_shift_ds, mode=\"frozen\")\n    always_res = stream_evaluate(model, test_shift_ds, mode=\"always\")\n    gated_res = stream_evaluate(model, test_shift_ds, mode=\"gated\", entropy_thresh=0.62)\n\n    trial = {\n        \"epochs\": epochs,\n        \"best_epoch\": history[\"best_epoch\"],\n        \"best_val_loss\": history[\"best_val_loss\"],\n        \"metrics\": history[\"metrics\"],\n        \"losses\": history[\"losses\"],\n        \"timestamps\": history[\"timestamps\"],\n        \"stream_results\": {\n            \"frozen\": {\n                \"Shifted-Stream Accuracy\": frozen_res[\"accuracy\"],\n                \"trigger_rate\": float(frozen_res[\"triggered\"].mean()),\n            },\n            \"always\": {\n                \"Shifted-Stream Accuracy\": always_res[\"accuracy\"],\n                \"trigger_rate\": float(always_res[\"triggered\"].mean()),\n            },\n            \"gated\": {\n                \"Shifted-Stream Accuracy\": gated_res[\"accuracy\"],\n                \"trigger_rate\": float(gated_res[\"triggered\"].mean()),\n            },\n        },\n        \"test_metrics\": {\n            \"frozen_acc\": frozen_res[\"accuracy\"],\n            \"always_acc\": always_res[\"accuracy\"],\n            \"gated_acc\": gated_res[\"accuracy\"],\n        },\n        \"predictions\": gated_res[\"preds\"].tolist(),\n        \"ground_truth\": gated_res[\"gt\"].tolist(),\n        \"arrays\": {\n            \"frozen_preds\": frozen_res[\"preds\"],\n            \"always_preds\": always_res[\"preds\"],\n            \"gated_preds\": gated_res[\"preds\"],\n            \"ground_truth\": gated_res[\"gt\"],\n            \"gated_entropy\": gated_res[\"entropy\"],\n            \"gated_triggered\": gated_res[\"triggered\"],\n            \"frozen_cumacc\": frozen_res[\"cumulative_acc\"],\n            \"always_cumacc\": always_res[\"cumulative_acc\"],\n            \"gated_cumacc\": gated_res[\"cumulative_acc\"],\n        },\n    }\n    experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][\n        trial_key\n    ] = trial\n    all_frozen_scores.append((epochs, frozen_res[\"accuracy\"]))\n\n    print(\n        f\"[epochs={epochs}] Shifted-Stream Accuracy | frozen={frozen_res['accuracy']:.4f} | \"\n        f\"always={always_res['accuracy']:.4f} | gated={gated_res['accuracy']:.4f}\"\n    )\n    print(\n        f\"[epochs={epochs}] Adapt trigger rate      | frozen={frozen_res['triggered'].mean():.4f} | \"\n        f\"always={always_res['triggered'].mean():.4f} | gated={gated_res['triggered'].mean():.4f}\"\n    )\n\n    if frozen_res[\"accuracy\"] > best_trial_score:\n        best_trial_score = frozen_res[\"accuracy\"]\n        best_trial_key = trial_key\n\nselected = experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][\n    best_trial_key\n]\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"selected_epochs\"] = (\n    selected[\"epochs\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"metrics\"][\"train\"] = (\n    selected[\"metrics\"][\"train\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"metrics\"][\"val\"] = (\n    selected[\"metrics\"][\"val\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"losses\"][\"train\"] = (\n    selected[\"losses\"][\"train\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"losses\"][\"val\"] = (\n    selected[\"losses\"][\"val\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"timestamps\"] = selected[\n    \"timestamps\"\n]\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"stream_results\"] = (\n    selected[\"stream_results\"]\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"metrics\"][\"test\"].append(\n    (0, selected[\"test_metrics\"])\n)\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"predictions\"] = selected[\n    \"predictions\"\n]\nexperiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"ground_truth\"] = (\n    selected[\"ground_truth\"]\n)\n\nprint(\n    f\"Selected epoch setting: {selected['epochs']} (best checkpoint from epoch {selected['best_epoch']}, val_loss={selected['best_val_loss']:.4f})\"\n)\n\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nfor trial_key, trial in experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\n    \"trials\"\n].items():\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_metrics.npy\"),\n        np.array(trial[\"metrics\"][\"train\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_metrics.npy\"),\n        np.array(trial[\"metrics\"][\"val\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_losses.npy\"),\n        np.array(trial[\"losses\"][\"train\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_losses.npy\"),\n        np.array(trial[\"losses\"][\"val\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_timestamps.npy\"),\n        np.array(trial[\"timestamps\"]),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_frozen_preds.npy\"),\n        trial[\"arrays\"][\"frozen_preds\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_always_preds.npy\"),\n        trial[\"arrays\"][\"always_preds\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_gated_preds.npy\"),\n        trial[\"arrays\"][\"gated_preds\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_ground_truth.npy\"),\n        trial[\"arrays\"][\"ground_truth\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_gated_entropy.npy\"),\n        trial[\"arrays\"][\"gated_entropy\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_gated_triggered.npy\"),\n        trial[\"arrays\"][\"gated_triggered\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_frozen_cumacc.npy\"),\n        trial[\"arrays\"][\"frozen_cumacc\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_always_cumacc.npy\"),\n        trial[\"arrays\"][\"always_cumacc\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_gated_cumacc.npy\"),\n        trial[\"arrays\"][\"gated_cumacc\"],\n    )\n\nnp.save(\n    os.path.join(working_dir, \"epoch_candidate_scores.npy\"),\n    np.array(all_frozen_scores, dtype=np.float32),\n)\n\nplt.figure(figsize=(8, 5))\nfor trial_key, trial in experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\n    \"trials\"\n].items():\n    x = [e for e, _ in trial[\"losses\"][\"val\"]]\n    y = [v for _, v in trial[\"losses\"][\"val\"]]\n    plt.plot(x, y, label=f\"{trial_key} (best={trial['best_val_loss']:.3f})\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Validation loss\")\nplt.title(\"Epoch Tuning: Validation Loss\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"epoch_tuning_val_loss.png\"))\nplt.close()\n\nplt.figure(figsize=(8, 5))\nepochs_arr = [e for e, _ in all_frozen_scores]\nscores_arr = [s for _, s in all_frozen_scores]\nplt.plot(epochs_arr, scores_arr, marker=\"o\")\nplt.xlabel(\"Source training epochs\")\nplt.ylabel(\"Frozen shifted-stream accuracy\")\nplt.title(\"Epoch Tuning: Frozen Stream Accuracy\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"epoch_tuning_frozen_accuracy.png\"))\nplt.close()\n\nsel_key = f\"epochs_{selected['epochs']}\"\nsel = experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][sel_key][\n    \"arrays\"\n]\nplt.figure(figsize=(8, 5))\nfrozen_acc = experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][\n    sel_key\n][\"stream_results\"][\"frozen\"][\"Shifted-Stream Accuracy\"]\nalways_acc = experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][\n    sel_key\n][\"stream_results\"][\"always\"][\"Shifted-Stream Accuracy\"]\ngated_acc = experiment_data[\"epoch_tuning\"][\"synthetic_reasoning_stream\"][\"trials\"][\n    sel_key\n][\"stream_results\"][\"gated\"][\"Shifted-Stream Accuracy\"]\nplt.plot(sel[\"frozen_cumacc\"], label=f\"Frozen ({frozen_acc:.3f})\")\nplt.plot(sel[\"always_cumacc\"], label=f\"Always-LoRA ({always_acc:.3f})\")\nplt.plot(sel[\"gated_cumacc\"], label=f\"Gated-LoRA ({gated_acc:.3f})\")\nplt.xlabel(\"Shifted stream step\")\nplt.ylabel(\"Cumulative accuracy\")\nplt.title(f\"Synthetic Shifted-Stream Accuracy (selected epochs={selected['epochs']})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"synthetic_shifted_stream_accuracy.png\"))\nplt.close()\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"learning_rate_tuning\": {\n        \"synthetic_reasoning_stream\": {\n            \"metrics\": {\"train\": {}, \"val\": {}, \"test\": []},\n            \"losses\": {\"train\": {}, \"val\": {}},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"timestamps\": {},\n            \"lr_candidates\": [],\n            \"lr_summary\": [],\n            \"best_lr\": None,\n            \"best_val_loss\": None,\n            \"stream_results\": {},\n        }\n    }\n}\n\n\n# -----------------------\n# Synthetic dataset\n# -----------------------\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, shift=False):\n        self.X, self.y = self.make_data(n, d, shift)\n\n    @staticmethod\n    def make_data(n, d, shift=False):\n        X = np.random.randn(n, d).astype(np.float32)\n        if not shift:\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n        else:\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        X = ((X - mu) / std).astype(np.float32)\n        return torch.tensor(X), torch.tensor(y)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\ntrain_ds = SyntheticReasoningDataset(n=2500, d=20, shift=False)\nval_ds = SyntheticReasoningDataset(n=500, d=20, shift=False)\ntest_shift_ds = SyntheticReasoningDataset(n=800, d=20, shift=True)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\n# -----------------------\n# Model with LoRA layer\n# -----------------------\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=32, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n\ncriterion = nn.CrossEntropyLoss()\n\n\ndef train_source_model(train_loader, val_loader, lr, epochs=12):\n    model = SimpleNet().to(device)\n    model.unfreeze_all()\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n    best_state = None\n    best_val = float(\"inf\")\n\n    train_metrics, val_metrics = [], []\n    train_losses, val_losses = [], []\n    timestamps = []\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        train_loss, train_correct, train_total = 0.0, 0, 0\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            optimizer.step()\n\n            train_loss += loss.item() * y.size(0)\n            preds = logits.argmax(dim=1)\n            train_correct += (preds == y).sum().item()\n            train_total += y.size(0)\n\n        train_loss /= train_total\n        train_acc = train_correct / train_total\n\n        model.eval()\n        val_loss, val_correct, val_total = 0.0, 0, 0\n        with torch.no_grad():\n            for batch in val_loader:\n                x = batch[\"x\"].to(device)\n                y = batch[\"y\"].to(device)\n                logits = model(x)\n                loss = criterion(logits, y)\n                val_loss += loss.item() * y.size(0)\n                preds = logits.argmax(dim=1)\n                val_correct += (preds == y).sum().item()\n                val_total += y.size(0)\n\n        val_loss /= val_total\n        val_acc = val_correct / val_total\n\n        train_metrics.append((epoch, train_acc))\n        val_metrics.append((epoch, val_acc))\n        train_losses.append((epoch, train_loss))\n        val_losses.append((epoch, val_loss))\n        timestamps.append(time.time())\n\n        print(\n            f\"LR {lr:.0e} | Epoch {epoch:02d}/{epochs} | \"\n            f\"train_loss={train_loss:.4f} train_acc={train_acc:.4f} | \"\n            f\"val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    return {\n        \"model\": model,\n        \"best_state\": best_state,\n        \"best_val_loss\": best_val,\n        \"train_metrics\": train_metrics,\n        \"val_metrics\": val_metrics,\n        \"train_losses\": train_losses,\n        \"val_losses\": val_losses,\n        \"timestamps\": timestamps,\n    }\n\n\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef stream_evaluate(\n    base_model, dataset, mode=\"frozen\", entropy_thresh=0.62, reset_every=100, lr=5e-2\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.SGD(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, triggered = [], [], [], []\n    cumulative_acc = []\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = False\n        if mode == \"always\":\n            do_update = True\n        elif mode == \"gated\":\n            do_update = ent > entropy_thresh\n\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            pseudo = logits_u.detach().argmax(dim=1)\n            loss_u = criterion(logits_u, pseudo)\n            loss_u.backward()\n            opt.step()\n\n        if mode in [\"always\", \"gated\"] and (i + 1) % reset_every == 0:\n            stream_model.reset_lora()\n\n    acc = np.mean(np.array(preds_all) == np.array(gt_all))\n    return {\n        \"accuracy\": float(acc),\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\n# -----------------------\n# Learning rate sweep\n# -----------------------\nepochs = 12\nlr_candidates = [3e-4, 1e-3, 3e-3]\nexp = experiment_data[\"learning_rate_tuning\"][\"synthetic_reasoning_stream\"]\nexp[\"lr_candidates\"] = lr_candidates\n\nbest_lr = None\nbest_model = None\nglobal_best_val = float(\"inf\")\nlr_summary = []\n\nfor lr in lr_candidates:\n    result = train_source_model(train_loader, val_loader, lr=lr, epochs=epochs)\n    lr_key = f\"lr_{lr:.0e}\"\n\n    exp[\"metrics\"][\"train\"][lr_key] = result[\"train_metrics\"]\n    exp[\"metrics\"][\"val\"][lr_key] = result[\"val_metrics\"]\n    exp[\"losses\"][\"train\"][lr_key] = result[\"train_losses\"]\n    exp[\"losses\"][\"val\"][lr_key] = result[\"val_losses\"]\n    exp[\"timestamps\"][lr_key] = result[\"timestamps\"]\n\n    final_train_acc = result[\"train_metrics\"][-1][1]\n    final_val_acc = result[\"val_metrics\"][-1][1]\n    best_val_loss = result[\"best_val_loss\"]\n    lr_summary.append((lr, best_val_loss, final_train_acc, final_val_acc))\n\n    if best_val_loss < global_best_val:\n        global_best_val = best_val_loss\n        best_lr = lr\n        best_model = result[\"model\"]\n\nexp[\"lr_summary\"] = lr_summary\nexp[\"best_lr\"] = best_lr\nexp[\"best_val_loss\"] = global_best_val\n\nprint(\n    f\"Selected best source LR: {best_lr:.0e} with best val loss {global_best_val:.4f}\"\n)\n\n# -----------------------\n# Stream evaluation using best source model\n# -----------------------\nfrozen_res = stream_evaluate(best_model, test_shift_ds, mode=\"frozen\")\nalways_res = stream_evaluate(best_model, test_shift_ds, mode=\"always\")\ngated_res = stream_evaluate(\n    best_model, test_shift_ds, mode=\"gated\", entropy_thresh=0.62\n)\n\nexp[\"stream_results\"] = {\n    \"frozen\": {\n        \"Shifted-Stream Accuracy\": frozen_res[\"accuracy\"],\n        \"trigger_rate\": float(frozen_res[\"triggered\"].mean()),\n    },\n    \"always\": {\n        \"Shifted-Stream Accuracy\": always_res[\"accuracy\"],\n        \"trigger_rate\": float(always_res[\"triggered\"].mean()),\n    },\n    \"gated\": {\n        \"Shifted-Stream Accuracy\": gated_res[\"accuracy\"],\n        \"trigger_rate\": float(gated_res[\"triggered\"].mean()),\n    },\n}\n\nexp[\"metrics\"][\"test\"].append(\n    (\n        0,\n        {\n            \"best_lr\": best_lr,\n            \"best_val_loss\": global_best_val,\n            \"frozen_acc\": frozen_res[\"accuracy\"],\n            \"always_acc\": always_res[\"accuracy\"],\n            \"gated_acc\": gated_res[\"accuracy\"],\n        },\n    )\n)\n\nexp[\"predictions\"] = gated_res[\"preds\"].tolist()\nexp[\"ground_truth\"] = gated_res[\"gt\"].tolist()\n\nprint(\n    f\"Shifted-Stream Accuracy | frozen={frozen_res['accuracy']:.4f} | \"\n    f\"always={always_res['accuracy']:.4f} | gated={gated_res['accuracy']:.4f}\"\n)\nprint(\n    f\"Adapt trigger rate      | frozen={frozen_res['triggered'].mean():.4f} | \"\n    f\"always={always_res['triggered'].mean():.4f} | gated={gated_res['triggered'].mean():.4f}\"\n)\n\n# -----------------------\n# Save arrays\n# -----------------------\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nsummary_arr = np.array(lr_summary, dtype=np.float64)\nnp.save(\n    os.path.join(working_dir, \"lr_candidates.npy\"),\n    np.array(lr_candidates, dtype=np.float64),\n)\nnp.save(os.path.join(working_dir, \"lr_summary.npy\"), summary_arr)\nnp.save(os.path.join(working_dir, \"best_lr.npy\"), np.array([best_lr], dtype=np.float64))\nnp.save(\n    os.path.join(working_dir, \"best_val_loss.npy\"),\n    np.array([global_best_val], dtype=np.float64),\n)\n\nfor lr in lr_candidates:\n    lr_key = f\"lr_{lr:.0e}\"\n    np.save(\n        os.path.join(working_dir, f\"{lr_key}_train_metrics.npy\"),\n        np.array(exp[\"metrics\"][\"train\"][lr_key], dtype=np.float64),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{lr_key}_val_metrics.npy\"),\n        np.array(exp[\"metrics\"][\"val\"][lr_key], dtype=np.float64),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{lr_key}_train_losses.npy\"),\n        np.array(exp[\"losses\"][\"train\"][lr_key], dtype=np.float64),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{lr_key}_val_losses.npy\"),\n        np.array(exp[\"losses\"][\"val\"][lr_key], dtype=np.float64),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{lr_key}_timestamps.npy\"),\n        np.array(exp[\"timestamps\"][lr_key], dtype=np.float64),\n    )\n\nnp.save(os.path.join(working_dir, \"frozen_preds.npy\"), frozen_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"always_preds.npy\"), always_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"gated_preds.npy\"), gated_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"ground_truth.npy\"), gated_res[\"gt\"])\nnp.save(os.path.join(working_dir, \"frozen_entropy.npy\"), frozen_res[\"entropy\"])\nnp.save(os.path.join(working_dir, \"always_entropy.npy\"), always_res[\"entropy\"])\nnp.save(os.path.join(working_dir, \"gated_entropy.npy\"), gated_res[\"entropy\"])\nnp.save(os.path.join(working_dir, \"frozen_triggered.npy\"), frozen_res[\"triggered\"])\nnp.save(os.path.join(working_dir, \"always_triggered.npy\"), always_res[\"triggered\"])\nnp.save(os.path.join(working_dir, \"gated_triggered.npy\"), gated_res[\"triggered\"])\nnp.save(os.path.join(working_dir, \"frozen_cumacc.npy\"), frozen_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"always_cumacc.npy\"), always_res[\"cumulative_acc\"])\nnp.save(os.path.join(working_dir, \"gated_cumacc.npy\"), gated_res[\"cumulative_acc\"])\n\n# -----------------------\n# Visualization\n# -----------------------\nplt.figure(figsize=(8, 5))\nfor lr in lr_candidates:\n    lr_key = f\"lr_{lr:.0e}\"\n    arr = np.array(exp[\"losses\"][\"val\"][lr_key], dtype=np.float64)\n    plt.plot(arr[:, 0], arr[:, 1], marker=\"o\", label=f\"{lr:.0e}\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Validation loss\")\nplt.title(\"Learning-rate sweep: validation loss\")\nplt.legend(title=\"Source LR\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"lr_tuning_val_loss.png\"))\nplt.close()\n\nplt.figure(figsize=(8, 5))\nfor lr in lr_candidates:\n    lr_key = f\"lr_{lr:.0e}\"\n    arr = np.array(exp[\"metrics\"][\"val\"][lr_key], dtype=np.float64)\n    plt.plot(arr[:, 0], arr[:, 1], marker=\"o\", label=f\"{lr:.0e}\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Validation accuracy\")\nplt.title(\"Learning-rate sweep: validation accuracy\")\nplt.legend(title=\"Source LR\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"lr_tuning_val_acc.png\"))\nplt.close()\n\nplt.figure(figsize=(8, 5))\nplt.plot(frozen_res[\"cumulative_acc\"], label=f\"Frozen ({frozen_res['accuracy']:.3f})\")\nplt.plot(\n    always_res[\"cumulative_acc\"], label=f\"Always-LoRA ({always_res['accuracy']:.3f})\"\n)\nplt.plot(gated_res[\"cumulative_acc\"], label=f\"Gated-LoRA ({gated_res['accuracy']:.3f})\")\nplt.xlabel(\"Shifted stream step\")\nplt.ylabel(\"Cumulative accuracy\")\nplt.title(f\"Synthetic Shifted-Stream Accuracy (best source LR={best_lr:.0e})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"synthetic_shifted_stream_accuracy.png\"))\nplt.close()\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy\nimport time\nimport math\nimport random\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nBASE_SEED = 42\nrandom.seed(BASE_SEED)\nnp.random.seed(BASE_SEED)\ntorch.manual_seed(BASE_SEED)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed_all(BASE_SEED)\n\nexperiment_data = {\n    \"synthetic_reasoning_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_results\": {},\n        \"trials\": {},\n        \"epoch_candidates\": [],\n        \"selected_epochs\": None,\n        \"selected_hparams\": None,\n        \"shift_normalized_accuracy_gain\": [],\n    },\n    \"feature_permutation_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_results\": {},\n        \"severity\": None,\n        \"shift_normalized_accuracy_gain\": [],\n    },\n    \"nonlinear_boundary_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_results\": {},\n        \"severity\": None,\n        \"shift_normalized_accuracy_gain\": [],\n    },\n}\n\n\nclass SyntheticReasoningDataset(Dataset):\n    def __init__(self, n=2000, d=20, variant=\"source\", seed=42):\n        self.n = n\n        self.d = d\n        self.variant = variant\n        self.seed = seed\n        self.X, self.y, self.severity = self.make_data(n, d, variant, seed)\n\n    @staticmethod\n    def _normalize(X):\n        mu = X.mean(axis=0, keepdims=True)\n        std = X.std(axis=0, keepdims=True) + 1e-6\n        return ((X - mu) / std).astype(np.float32)\n\n    @staticmethod\n    def make_data(n, d, variant=\"source\", seed=42):\n        rng = np.random.default_rng(seed)\n        X = rng.standard_normal((n, d), dtype=np.float32)\n\n        if variant == \"source\":\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            y = (s1 > s0).astype(np.int64)\n            severity = 0.0\n\n        elif variant == \"shifted\":\n            X = (1.3 * X + 0.4).astype(np.float32)\n            s0 = 0.6 * X[:, :5].sum(1) + 0.4 * X[:, 10:15].sum(1)\n            s1 = 0.7 * X[:, 5:10].sum(1) + 0.3 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.2).astype(np.int64)\n            severity = 1.0\n\n        elif variant == \"feature_permutation\":\n            X = (1.1 * X - 0.2).astype(np.float32)\n            perm = np.array([5, 6, 7, 8, 9, 0, 1, 2, 3, 4] + list(range(10, d)))\n            X = X[:, perm]\n            s0 = 0.9 * X[:, :5].sum(1) + 0.15 * X[:, 10:15].sum(1)\n            s1 = 1.0 * X[:, 5:10].sum(1) + 0.1 * X[:, 15:20].sum(1)\n            y = (s1 > s0 + 0.1).astype(np.int64)\n            severity = 1.3\n\n        elif variant == \"nonlinear_boundary\":\n            X = (1.2 * X + 0.15).astype(np.float32)\n            s0 = X[:, :5].sum(1)\n            s1 = X[:, 5:10].sum(1)\n            nonlin = 0.35 * (X[:, 10:15] ** 2).sum(1) - 0.2 * np.abs(X[:, 15:20]).sum(1)\n            y = ((s1 + nonlin) > (s0 + 0.25)).astype(np.int64)\n            severity = 1.6\n\n        else:\n            raise ValueError(f\"Unknown variant: {variant}\")\n\n        X = SyntheticReasoningDataset._normalize(X)\n        return torch.tensor(X), torch.tensor(y), float(severity)\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.X[idx], \"y\": self.y[idx]}\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out_features, in_features) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out_features))\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(rank, in_features))\n        self.B = nn.Parameter(torch.zeros(out_features, rank))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n        self.register_buffer(\"A_init\", self.A.detach().clone())\n        self.register_buffer(\"B_init\", self.B.detach().clone())\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.rank)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def lora_reg_loss(self):\n        return ((self.A - self.A_init) ** 2).mean() + (\n            (self.B - self.B_init) ** 2\n        ).mean()\n\n    def reset_lora(self):\n        with torch.no_grad():\n            self.A.copy_(self.A_init)\n            self.B.copy_(self.B_init)\n\n\nclass SimpleNet(nn.Module):\n    def __init__(self, d=20, h=64, num_classes=2, rank=4):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, rank=rank, alpha=1.0)\n        self.fc2 = nn.Linear(h, num_classes)\n\n    def forward(self, x):\n        x = self.fc1(x)\n        x = torch.tanh(x)\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n    def reset_lora(self):\n        self.fc1.reset_lora()\n\n    def lora_reg_loss(self):\n        return self.fc1.lora_reg_loss()\n\n\ndef entropy_from_logits(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1)\n\n\ndef margin_from_logits(logits):\n    probs = F.softmax(logits, dim=-1)\n    top2 = torch.topk(probs, k=min(2, probs.size(-1)), dim=-1).values\n    if top2.size(-1) == 1:\n        return top2[:, 0]\n    return top2[:, 0] - top2[:, 1]\n\n\ndef make_datasets_and_loaders(seed=42, batch_size=64):\n    train_ds = SyntheticReasoningDataset(n=2500, d=20, variant=\"source\", seed=seed)\n    val_ds = SyntheticReasoningDataset(n=500, d=20, variant=\"source\", seed=seed + 1)\n    test_shift_ds = SyntheticReasoningDataset(\n        n=800, d=20, variant=\"shifted\", seed=seed + 2\n    )\n    test_perm_ds = SyntheticReasoningDataset(\n        n=800, d=20, variant=\"feature_permutation\", seed=seed + 3\n    )\n    test_nl_ds = SyntheticReasoningDataset(\n        n=800, d=20, variant=\"nonlinear_boundary\", seed=seed + 4\n    )\n\n    g = torch.Generator().manual_seed(seed)\n    train_loader = DataLoader(\n        train_ds, batch_size=batch_size, shuffle=True, generator=g\n    )\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n    return (\n        train_ds,\n        val_ds,\n        [test_shift_ds, test_perm_ds, test_nl_ds],\n        train_loader,\n        val_loader,\n    )\n\n\ndef evaluate_loader(model, loader):\n    model.eval()\n    criterion = nn.CrossEntropyLoss()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            logits = model(x)\n            loss = criterion(logits, y)\n            total_loss += loss.item() * y.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += y.size(0)\n    return total_loss / total, total_correct / total\n\n\ndef stream_evaluate(\n    base_model,\n    dataset,\n    mode=\"frozen\",\n    entropy_thresh=0.50,\n    margin_thresh=0.20,\n    reset_every=200,\n    lr=5e-3,\n    reg_lambda=5e-3,\n    grad_clip=1.0,\n):\n    stream_model = copy.deepcopy(base_model).to(device)\n    stream_model.freeze_backbone()\n    stream_model.eval()\n    opt = torch.optim.Adam(stream_model.fc1.lora_parameters(), lr=lr)\n\n    preds_all, gt_all, ent_all, margin_all, triggered, cumulative_acc = (\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n    )\n    correct = 0\n\n    for i in range(len(dataset)):\n        batch = dataset[i]\n        x = batch[\"x\"].unsqueeze(0).to(device)\n        y = batch[\"y\"].unsqueeze(0).to(device)\n\n        stream_model.eval()\n        with torch.no_grad():\n            logits = stream_model(x)\n            ent = entropy_from_logits(logits).item()\n            mar = margin_from_logits(logits).item()\n            pred = logits.argmax(dim=1)\n\n        preds_all.append(pred.item())\n        gt_all.append(y.item())\n        ent_all.append(ent)\n        margin_all.append(mar)\n        correct += int(pred.item() == y.item())\n        cumulative_acc.append(correct / (i + 1))\n\n        do_update = False\n        if mode == \"always\":\n            do_update = True\n        elif mode == \"gated\":\n            do_update = (ent > entropy_thresh) or (mar < margin_thresh)\n\n        triggered.append(int(do_update))\n\n        if do_update:\n            stream_model.train()\n            opt.zero_grad()\n            logits_u = stream_model(x)\n            p = F.softmax(logits_u, dim=-1)\n            ent_loss = -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n            reg_loss = stream_model.lora_reg_loss()\n            loss_u = ent_loss + reg_lambda * reg_loss\n            loss_u.backward()\n            torch.nn.utils.clip_grad_norm_(\n                stream_model.fc1.lora_parameters(), grad_clip\n            )\n            opt.step()\n\n        if (\n            mode in [\"always\", \"gated\"]\n            and reset_every > 0\n            and (i + 1) % reset_every == 0\n        ):\n            stream_model.reset_lora()\n\n    acc = float(np.mean(np.array(preds_all) == np.array(gt_all)))\n    return {\n        \"accuracy\": acc,\n        \"preds\": np.array(preds_all),\n        \"gt\": np.array(gt_all),\n        \"entropy\": np.array(ent_all),\n        \"margin\": np.array(margin_all),\n        \"triggered\": np.array(triggered),\n        \"cumulative_acc\": np.array(cumulative_acc),\n    }\n\n\ndef train_source_model(\n    epochs, train_loader, val_loader, seed=42, lr=1e-3, weight_decay=1e-4\n):\n    random.seed(seed)\n    np.random.seed(seed)\n    torch.manual_seed(seed)\n    if torch.cuda.is_available():\n        torch.cuda.manual_seed_all(seed)\n\n    model = SimpleNet().to(device)\n    criterion = nn.CrossEntropyLoss()\n    model.unfreeze_all()\n    optimizer = torch.optim.AdamW(model.parameters(), lr=lr, weight_decay=weight_decay)\n\n    best_state, best_val, best_epoch = None, float(\"inf\"), -1\n    history = {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"timestamps\": [],\n        \"best_val_loss\": None,\n        \"best_epoch\": None,\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        train_loss, train_correct, train_total = 0.0, 0, 0\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = criterion(logits, y)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            train_loss += loss.item() * y.size(0)\n            train_correct += (logits.argmax(dim=1) == y).sum().item()\n            train_total += y.size(0)\n\n        train_loss /= train_total\n        train_acc = train_correct / train_total\n        val_loss, val_acc = evaluate_loader(model, val_loader)\n\n        history[\"metrics\"][\"train\"].append((epoch, train_acc))\n        history[\"metrics\"][\"val\"].append((epoch, val_acc))\n        history[\"losses\"][\"train\"].append((epoch, train_loss))\n        history[\"losses\"][\"val\"].append((epoch, val_loss))\n        history[\"timestamps\"].append(time.time())\n\n        print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n        print(\n            f\"[epochs={epochs}, lr={lr}, bs={train_loader.batch_size}] Epoch {epoch}: train_acc={train_acc:.4f} val_acc={val_acc:.4f} val_loss={val_loss:.4f}\"\n        )\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    history[\"best_val_loss\"] = best_val\n    history[\"best_epoch\"] = best_epoch\n    return model, history\n\n\ndef compute_shift_normalized_gain(frozen_acc, gated_acc, severity):\n    denom = max(float(severity), 1e-6)\n    return (gated_acc - frozen_acc) / denom\n\n\nepoch_candidates = [8, 16, 30]\nlr_candidates = [1e-3, 3e-4]\nbatch_candidates = [64, 128]\nexperiment_data[\"synthetic_reasoning_stream\"][\"epoch_candidates\"] = epoch_candidates\n\nbest_trial_key = None\nbest_trial_score = -1e9\nall_scores = []\n\ntrial_idx = 0\nfor epochs in epoch_candidates:\n    for lr in lr_candidates:\n        for batch_size in batch_candidates:\n            trial_idx += 1\n            trial_key = f\"trial_{trial_idx}_epochs_{epochs}_lr_{lr}_bs_{batch_size}\"\n            train_ds, val_ds, test_datasets, train_loader, val_loader = (\n                make_datasets_and_loaders(seed=BASE_SEED, batch_size=batch_size)\n            )\n            model, history = train_source_model(\n                epochs,\n                train_loader,\n                val_loader,\n                seed=BASE_SEED,\n                lr=lr,\n                weight_decay=1e-4,\n            )\n\n            ds_names = [\n                \"synthetic_reasoning_stream\",\n                \"feature_permutation_stream\",\n                \"nonlinear_boundary_stream\",\n            ]\n            ds_objs = {\n                \"synthetic_reasoning_stream\": test_datasets[0],\n                \"feature_permutation_stream\": test_datasets[1],\n                \"nonlinear_boundary_stream\": test_datasets[2],\n            }\n\n            per_dataset = {}\n            gains = []\n            for ds_name in ds_names:\n                ds = ds_objs[ds_name]\n                frozen_res = stream_evaluate(model, ds, mode=\"frozen\")\n                always_res = stream_evaluate(\n                    model,\n                    ds,\n                    mode=\"always\",\n                    entropy_thresh=0.50,\n                    margin_thresh=0.20,\n                    reset_every=200,\n                    lr=5e-3,\n                )\n                gated_res = stream_evaluate(\n                    model,\n                    ds,\n                    mode=\"gated\",\n                    entropy_thresh=0.50,\n                    margin_thresh=0.20,\n                    reset_every=200,\n                    lr=5e-3,\n                )\n\n                gain = compute_shift_normalized_gain(\n                    frozen_res[\"accuracy\"], gated_res[\"accuracy\"], ds.severity\n                )\n                gains.append(gain)\n\n                per_dataset[ds_name] = {\n                    \"severity\": ds.severity,\n                    \"frozen\": frozen_res,\n                    \"always\": always_res,\n                    \"gated\": gated_res,\n                    \"sna_gain\": gain,\n                }\n\n                print(\n                    f'[{trial_key}] {ds_name} | frozen={frozen_res[\"accuracy\"]:.4f} | '\n                    f'always={always_res[\"accuracy\"]:.4f} | gated={gated_res[\"accuracy\"]:.4f} | '\n                    f\"Shift-Normalized Accuracy Gain={gain:.6f}\"\n                )\n\n            mean_gain = float(np.mean(gains))\n            all_scores.append((epochs, lr, batch_size, mean_gain))\n\n            trial = {\n                \"epochs\": epochs,\n                \"lr\": lr,\n                \"batch_size\": batch_size,\n                \"best_epoch\": history[\"best_epoch\"],\n                \"best_val_loss\": history[\"best_val_loss\"],\n                \"metrics\": history[\"metrics\"],\n                \"losses\": history[\"losses\"],\n                \"timestamps\": history[\"timestamps\"],\n                \"per_dataset\": {},\n                \"mean_shift_normalized_accuracy_gain\": mean_gain,\n            }\n\n            for ds_name, results in per_dataset.items():\n                trial[\"per_dataset\"][ds_name] = {\n                    \"severity\": results[\"severity\"],\n                    \"stream_results\": {\n                        \"frozen\": {\n                            \"Shifted-Stream Accuracy\": results[\"frozen\"][\"accuracy\"],\n                            \"trigger_rate\": float(\n                                results[\"frozen\"][\"triggered\"].mean()\n                            ),\n                        },\n                        \"always\": {\n                            \"Shifted-Stream Accuracy\": results[\"always\"][\"accuracy\"],\n                            \"trigger_rate\": float(\n                                results[\"always\"][\"triggered\"].mean()\n                            ),\n                        },\n                        \"gated\": {\n                            \"Shifted-Stream Accuracy\": results[\"gated\"][\"accuracy\"],\n                            \"trigger_rate\": float(results[\"gated\"][\"triggered\"].mean()),\n                        },\n                    },\n                    \"test_metrics\": {\n                        \"frozen_acc\": results[\"frozen\"][\"accuracy\"],\n                        \"always_acc\": results[\"always\"][\"accuracy\"],\n                        \"gated_acc\": results[\"gated\"][\"accuracy\"],\n                        \"shift_normalized_accuracy_gain\": results[\"sna_gain\"],\n                    },\n                    \"arrays\": {\n                        \"frozen_preds\": results[\"frozen\"][\"preds\"],\n                        \"always_preds\": results[\"always\"][\"preds\"],\n                        \"gated_preds\": results[\"gated\"][\"preds\"],\n                        \"ground_truth\": results[\"gated\"][\"gt\"],\n                        \"gated_entropy\": results[\"gated\"][\"entropy\"],\n                        \"gated_margin\": results[\"gated\"][\"margin\"],\n                        \"gated_triggered\": results[\"gated\"][\"triggered\"],\n                        \"frozen_cumacc\": results[\"frozen\"][\"cumulative_acc\"],\n                        \"always_cumacc\": results[\"always\"][\"cumulative_acc\"],\n                        \"gated_cumacc\": results[\"gated\"][\"cumulative_acc\"],\n                    },\n                }\n\n            experiment_data[\"synthetic_reasoning_stream\"][\"trials\"][trial_key] = trial\n\n            if mean_gain > best_trial_score:\n                best_trial_score = mean_gain\n                best_trial_key = trial_key\n\nselected = experiment_data[\"synthetic_reasoning_stream\"][\"trials\"][best_trial_key]\nexperiment_data[\"synthetic_reasoning_stream\"][\"selected_epochs\"] = selected[\"epochs\"]\nexperiment_data[\"synthetic_reasoning_stream\"][\"selected_hparams\"] = {\n    \"epochs\": selected[\"epochs\"],\n    \"lr\": selected[\"lr\"],\n    \"batch_size\": selected[\"batch_size\"],\n}\nexperiment_data[\"synthetic_reasoning_stream\"][\"metrics\"][\"train\"] = selected[\"metrics\"][\n    \"train\"\n]\nexperiment_data[\"synthetic_reasoning_stream\"][\"metrics\"][\"val\"] = selected[\"metrics\"][\n    \"val\"\n]\nexperiment_data[\"synthetic_reasoning_stream\"][\"losses\"][\"train\"] = selected[\"losses\"][\n    \"train\"\n]\nexperiment_data[\"synthetic_reasoning_stream\"][\"losses\"][\"val\"] = selected[\"losses\"][\n    \"val\"\n]\nexperiment_data[\"synthetic_reasoning_stream\"][\"timestamps\"] = selected[\"timestamps\"]\n\nfor ds_name in [\n    \"synthetic_reasoning_stream\",\n    \"feature_permutation_stream\",\n    \"nonlinear_boundary_stream\",\n]:\n    ds_res = selected[\"per_dataset\"][ds_name]\n    experiment_data[ds_name][\"stream_results\"] = ds_res[\"stream_results\"]\n    experiment_data[ds_name][\"metrics\"][\"test\"].append((0, ds_res[\"test_metrics\"]))\n    experiment_data[ds_name][\"predictions\"] = ds_res[\"arrays\"][\"gated_preds\"].tolist()\n    experiment_data[ds_name][\"ground_truth\"] = ds_res[\"arrays\"][\"ground_truth\"].tolist()\n    experiment_data[ds_name][\"severity\"] = ds_res[\"severity\"]\n    experiment_data[ds_name][\"shift_normalized_accuracy_gain\"].append(\n        (0, ds_res[\"test_metrics\"][\"shift_normalized_accuracy_gain\"])\n    )\n    if ds_name == \"synthetic_reasoning_stream\":\n        experiment_data[ds_name][\"stream_arrays\"] = ds_res[\"arrays\"]\n\nprint(\n    f'Selected trial: {best_trial_key} | epochs={selected[\"epochs\"]} | lr={selected[\"lr\"]} | '\n    f'bs={selected[\"batch_size\"]} | mean Shift-Normalized Accuracy Gain={selected[\"mean_shift_normalized_accuracy_gain\"]:.6f}'\n)\n\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nfor trial_key, trial in experiment_data[\"synthetic_reasoning_stream\"][\"trials\"].items():\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_metrics.npy\"),\n        np.array(trial[\"metrics\"][\"train\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_metrics.npy\"),\n        np.array(trial[\"metrics\"][\"val\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_losses.npy\"),\n        np.array(trial[\"losses\"][\"train\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_losses.npy\"),\n        np.array(trial[\"losses\"][\"val\"], dtype=object),\n        allow_pickle=True,\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_timestamps.npy\"),\n        np.array(trial[\"timestamps\"]),\n        allow_pickle=True,\n    )\n\n    for ds_name, ds_trial in trial[\"per_dataset\"].items():\n        prefix = f\"{trial_key}_{ds_name}\"\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_frozen_preds.npy\"),\n            ds_trial[\"arrays\"][\"frozen_preds\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_always_preds.npy\"),\n            ds_trial[\"arrays\"][\"always_preds\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_gated_preds.npy\"),\n            ds_trial[\"arrays\"][\"gated_preds\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_ground_truth.npy\"),\n            ds_trial[\"arrays\"][\"ground_truth\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_gated_entropy.npy\"),\n            ds_trial[\"arrays\"][\"gated_entropy\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_gated_margin.npy\"),\n            ds_trial[\"arrays\"][\"gated_margin\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_gated_triggered.npy\"),\n            ds_trial[\"arrays\"][\"gated_triggered\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_frozen_cumacc.npy\"),\n            ds_trial[\"arrays\"][\"frozen_cumacc\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_always_cumacc.npy\"),\n            ds_trial[\"arrays\"][\"always_cumacc\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_gated_cumacc.npy\"),\n            ds_trial[\"arrays\"][\"gated_cumacc\"],\n        )\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_sna_gain.npy\"),\n            np.array(\n                [ds_trial[\"test_metrics\"][\"shift_normalized_accuracy_gain\"]],
