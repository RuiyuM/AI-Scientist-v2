tight_layout()\n        plt.savefig(\n            os.path.join(\n                working_dir, f\"{ds_name}_gated_predictions_vs_ground_truth_prefix.png\"\n            )\n        )\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating prediction trace plot: {e}\")\n    plt.close()\n\ntry:\n    if ground_truth is not None and gated_preds is not None:\n        cm = np.zeros((2, 2), dtype=int)\n        for g, p in zip(ground_truth.astype(int), gated_preds.astype(int)):\n            if g in [0, 1] and p in [0, 1]:\n                cm[g, p] += 1\n        plt.figure(figsize=(5, 4))\n        plt.imshow(cm, cmap=\"Blues\")\n        for i in range(cm.shape[0]):\n            for j in range(cm.shape[1]):\n                plt.text(j, i, str(cm[i, j]), ha=\"center\", va=\"center\")\n        plt.xticks([0, 1], [\"Pred 0\", \"Pred 1\"])\n        plt.yticks([0, 1], [\"True 0\", \"True 1\"])\n        plt.xlabel(\"Predicted Label\")\n        plt.ylabel(\"True Label\")\n        plt.title(\"Synthetic Shifted Dataset\\nGated Mode Confusion Matrix\")\n        plt.colorbar()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_gated_confusion_matrix.png\"))\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating confusion matrix plot: {e}\")\n    plt.close()\n\ntry:\n    if gated_entropy is not None and gated_triggered is not None:\n        plt.figure(figsize=(10, 4))\n        x = np.arange(len(gated_entropy))\n        plt.plot(x, gated_entropy, label=\"Entropy\")\n        idx = np.where(gated_triggered > 0)[0]\n        if len(idx) > 0:\n            plt.scatter(idx, gated_entropy[idx], s=10, label=\"Triggered Updates\")\n        plt.xlabel(\"Shifted Stream Step\")\n        plt.ylabel(\"Entropy\")\n        plt.title(\n            \"Synthetic Shifted Dataset\\nGated Adaptation Entropy and Trigger Events\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_gated_entropy_triggers.png\"))\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating entropy/trigger plot: {e}\")\n    plt.close()\n\ntest_metrics = metrics.get(\"test\", [])\nif test_metrics:\n    print(\"Test metrics:\", test_metrics[-1][1])\nif stream_results:\n    print(\"Stream results:\")\n    for k, v in stream_results.items():\n        print(k, v)\n", null, null, null, null, null, null, null], "plot_plan": ["I\u2019ll load the saved experiment dictionary and any auxiliary `.npy` arrays that actually exist in the working directory, then generate a compact set of standard plots for this synthetic reasoning stream experiment. The first two figures will show training/validation accuracy and loss across epochs, since those are explicitly stored in `experiment_data.npy`. I\u2019ll also create a bar chart comparing shifted-stream accuracy and trigger rate across the frozen, always-adapt, and gated modes from `stream_results`. If the saved cumulative-accuracy arrays are present, I\u2019ll plot them together to show streaming performance over time on the synthetic shifted dataset. If predictions and ground truth are available, I\u2019ll add a prediction-vs-ground-truth trace for a suitable prefix of the stream and a confusion matrix for the gated mode. If entropy and trigger arrays exist, I\u2019ll plot entropy over stream steps with trigger markers to visualize when adaptation was activated. Each figure will be wrapped in its own `try/except`, saved with descriptive dataset-specific filenames into `working_dir`, and always closed. Finally, I\u2019ll print a small summary of available evaluation metrics such as the test accuracies and stream results.", null, null, null, null, null, null, null], "ablation_name": [null, null, null, null, null, null, null, null], "hyperparam_name": [null, "epochs", "learning rate", null, null, null, "batch_size", "entropy_thresh"], "is_seed_node": [false, false, false, false, false, false, false, false], "is_seed_agg_node": [false, false, false, false, false, false, false, false], "parse_metrics_plan": ["I\u2019ll load the saved dictionary from `working/experiment_data.npy`, inspect each\ndataset entry, and extract the final or best values based on how the original\ntraining script stored metrics. For epoch-wise accuracy and loss lists, I\u2019ll\nreport the final train accuracy, final validation accuracy, best validation\nloss, and final training loss; for test metrics and stream results, I\u2019ll print\nthe stored shifted-stream accuracies and trigger rates with explicit labels. The\nscript will run immediately, use the required working directory path, avoid\nplots, and print the dataset name before its metrics.", "I\u2019ll load the saved `experiment_data.npy` from the required `working` directory,\ninspect the nested structure under `epoch_tuning`, and print a concise summary\nfor each dataset found there. For each dataset, the script will report the\nselected epoch setting, final/best training and validation metrics, and the\nfinal test/stream metrics using explicit metric names. It will also summarize\nper-trial results when available, again using clear labels and only the best or\nfinal values. No plots are created, and the script runs immediately at global\nscope.", "I\u2019ll load the saved dictionary from the working directory, inspect the nested\nexperiment structure, and extract the final or best values from the stored\ntraining, validation, and stream-evaluation results. The script will print the\ndataset name first, then clearly labeled metric names such as train accuracy,\nvalidation loss, best learning rate, and shifted-stream accuracy for each stream\nmode. I\u2019ll also compute a simple gated-stream accuracy from the saved\npredictions and ground truth so the printed metrics reflect the stored outputs\nwithout creating any plots.", "I\u2019ll load the saved dictionary from `working/experiment_data.npy`, inspect the\nstructure used in the original experiment, and extract the final or best\navailable metrics per dataset. For the source dataset, that includes final\ntraining/validation accuracy and loss from the selected trial, plus the selected\ntest metrics; for the shifted datasets, I\u2019ll print the final stored test metrics\nand stream evaluation summaries. I\u2019ll also include the selected hyperparameters\nwhen available and make sure every printed line clearly names both the dataset\nand the metric. No plots will be created, and the script will run immediately at\nglobal scope.", "I\u2019ll write a small analysis script that loads `experiment_data.npy` from\n`os.path.join(os.getcwd(), \"working\")`, inspects the saved dictionary structure,\nand prints the final or best metric values for each dataset. For the source-\ntraining dataset, I\u2019ll report final train/validation accuracy and loss along\nwith the selected hyperparameters when available; for each stream dataset, I\u2019ll\nreport severity, frozen/always/gated test accuracy, trigger rates, and shift-\nnormalized accuracy gain. The script will avoid plots, use clear metric labels,\nand execute immediately from global scope.", "I\u2019ll load the saved dictionary from `working/experiment_data.npy`, inspect its\nper-dataset structure, and print only the final or best available metric values\nfor each dataset. For training/validation histories, I\u2019ll report the last\nrecorded accuracy/loss values and also print selected hyperparameters when\npresent. For test-time results, I\u2019ll extract the saved stream accuracies,\ntrigger rates, severity, and shift-normalized accuracy gain, using clear metric\nnames for every printed value. No plots will be created, and the script will run\nimmediately at global scope.", "I\u2019ll load `experiment_data.npy` from the required `working` directory, inspect\nthe nested structure under `batch_size_tuning`, and extract the final or best\nvalues for the stored metrics and losses for each dataset key such as `bs_64`\nand `bs_3 ms():\n    print(f\"Dataset: {dataset_name}\")\n\n    metrics = dataset_data.get(\"metrics\", {})\n    losses = dataset_data.get(\"losses\", {})\n    stream_results = dataset_data.get(\"stream_results\", {})\n\n    train_accuracy_final = safe_last_scalar(metrics.get(\"train\", []))\n    validation_accuracy_final = safe_last_scalar(metrics.get(\"val\", []))\n    training_loss_final = safe_last_scalar(losses.get(\"train\", []))\n    validation_loss_final = safe_last_scalar(losses.get(\"val\", []))\n    validation_loss_best = safe_best_min(losses.get(\"val\", []))\n    validation_accuracy_best = safe_best_max(metrics.get(\"val\", []))\n\n    if train_accuracy_final is not None:\n        print(f\"  Train accuracy (final): {format_value(train_accuracy_final)}\")\n    if validation_accuracy_final is not None:\n        print(\n            f\"  Validation accuracy (final): {format_value(validation_accuracy_final)}\"\n        )\n    if validation_accuracy_best is not None:\n        print(f\"  Validation accuracy (best): {format_value(validation_accuracy_best)}\")\n    if training_loss_final is not None:\n        print(f\"  Training loss (final): {format_value(training_loss_final)}\")\n    if validation_loss_final is not None:\n        print(f\"  Validation loss (final): {format_value(validation_loss_final)}\")\n    if validation_loss_best is not None:\n        print(f\"  Validation loss (best): {format_value(validation_loss_best)}\")\n\n    test_metrics = metrics.get(\"test\", [])\n    if test_metrics:\n        _, test_value = test_metrics[-1]\n        if isinstance(test_value, dict):\n            if \"frozen_acc\" in test_value:\n                print(\n                    f\"  Test shifted-stream accuracy (frozen adaptation): {format_value(test_value['frozen_acc'])}\"\n                )\n            if \"always_acc\" in test_value:\n                print(\n                    f\"  Test shifted-stream accuracy (always adaptation): {format_value(test_value['always_acc'])}\"\n                )\n            if \"gated_acc\" in test_value:\n                print(\n                    f\"  Test shifted-stream accuracy (gated adaptation): {format_value(test_value['gated_acc'])}\"\n                )\n        else:\n            print(f\"  Test metric (final): {format_value(test_value)}\")\n\n    for mode_name, result_dict in stream_results.items():\n        accuracy_key = \"Shifted-Stream Accuracy\"\n        if accuracy_key in result_dict:\n            print(\n                f\"  Shifted-stream accuracy ({mode_name}): {format_value(result_dict[accuracy_key])}\"\n            )\n        if \"trigger_rate\" in result_dict:\n            print(\n                f\"  Adaptation trigger rate ({mode_name}): {format_value(result_dict['trigger_rate'])}\"\n            )\n\n    print()\n", "import os\nimport numpy as np\n\n\ndef safe_float(x):\n    try:\n        return float(x)\n    except Exception:\n        return x\n\n\ndef format_value(value):\n    if isinstance(value, float):\n        return f\"{value:.6f}\"\n    return str(value)\n\n\ndef get_final_pair(metric_list):\n    if not metric_list:\n        return None, None\n    epoch, value = metric_list[-1]\n    return epoch, safe_float(value)\n\n\ndef get_best_loss_pair(loss_list):\n    if not loss_list:\n        return None, None\n    best_epoch, best_value = min(loss_list, key=lambda t: t[1])\n    return best_epoch, safe_float(best_value)\n\n\ndef print_metric(label, value):\n    print(f\"{label}: {format_value(value)}\")\n\n\ndef summarize_selected_dataset(dataset_name, dataset_data):\n    print(f\"Dataset: {dataset_name}\")\n\n    selected_epochs = dataset_data.get(\"selected_epochs\", None)\n    if selected_epochs is not None:\n        print_metric(\"selected source training epochs\", selected_epochs)\n\n    epoch_candidates = dataset_data.get(\"epoch_candidates\", [])\n    if epoch_candidates:\n        print_metric(\"candidate source training epochs\", epoch_candidates)\n\n    metrics = dataset_data.get(\"metrics\", {})\n    losses = dataset_data.get(\"losses\", {})\n\n    train_acc_epoch, train_acc = get_final_pair(metrics.get(\"train\", []))\n    if train_acc is not None:\n        print_metric(\"final train accuracy\", train_acc)\n        print_metric(\"epoch of final train accuracy\", train_acc_epoch)\n\n    val_acc_epoch, val_acc = get_final_pair(metrics.get(\"val\", []))\n    if val_acc is not None:\n        print_metric(\"final validation accuracy\", val_acc)\n        print_metric(\"epoch of final validation accuracy\", val_acc_epoch)\n\n    train_loss_epoch, train_loss = get_final_pair(losses.get(\"train\", []))\n    if train_loss is not None:\n        print_metric(\"final train loss\", train_loss)\n        print_metric(\"epoch of final train loss\", train_loss_epoch)\n\n    val_loss_epoch, val_loss = get_final_pair(losses.get(\"val\", []))\n    if val_loss is not None:\n        print_metric(\"final validation loss\", val_loss)\n        print_metric(\"epoch of final validation loss\", val_loss_epoch)\n\n    best_val_loss_epoch, best_val_loss = get_best_loss_pair(losses.get(\"val\", []))\n    if best_val_loss is not None:\n        print_metric(\"best validation loss\", best_val_loss)\n        print_metric(\"epoch of best validation loss\", best_val_loss_epoch)\n\n    test_metrics_list = metrics.get(\"test\", [])\n    if test_metrics_list:\n        _, test_metric_dict = test_metrics_list[-1]\n        if isinstance(test_metric_dict, dict):\n            for key, value in test_metric_dict.items():\n                explicit_name = key.replace(\"_\", \" \")\n                print_metric(f\"final test metric - {explicit_name}\", safe_float(value))\n\n    stream_results = dataset_data.get(\"stream_results\", {})\n    for mode_name, mode_metrics in stream_results.items():\n        if isinstance(mode_metrics, dict):\n            for metric_name, metric_value in mode_metrics.items():\n                normalized_metric_name = (\n                    metric_name.replace(\"_\", \" \").replace(\"-\", \" \").lower()\n                )\n                print_metric(\n                    f\"final {mode_name} stream {normalized_metric_name}\",\n                    safe_float(metric_value),\n                )\n\n    predictions = dataset_data.get(\"predictions\", [])\n    ground_truth = dataset_data.get(\"ground_truth\", [])\n    if predictions and ground_truth and len(predictions) == len(ground_truth):\n        selected_gated_accuracy = float(\n            np.mean(np.array(predictions) == np.array(ground_truth))\n        )\n        print_metric(\n            \"final selected gated stream accuracy from predictions\",\n            selected_gated_accuracy,\n        )\n\n    trials = dataset_data.get(\"trials\", {})\n    if trials:\n        for trial_name, trial_data in trials.items():\n            print(f\"Dataset: {dataset_name} | Trial: {trial_name}\")\n\n            epochs_value = trial_data.get(\"epochs\", None)\n            if epochs_value is not None:\n                print_metric(\"source training epochs\", epochs_value)\n\n            best_epoch = trial_data.get(\"best_epoch\", None)\n            if best_epoch is not None:\n                print_metric(\"best checkpoint epoch\", best_epoch)\n\n            best_val_loss_trial = trial_data.get(\"best_val_loss\", None)\n            if best_val_loss_trial is not None:\n                print_metric(\"best validation loss\", safe_float(best_val_loss_trial))\n\n            trial_metrics = trial_data.get(\"metrics\", {})\n            trial_losses = trial_data.get(\"losses\", {})\n\n            trial_train_acc_epoch, trial_train_acc = get_final_pair(\n                trial_metrics.get(\"train\", [])\n            )\n            if trial_train_acc is not None:\n                print_metric(\"final train accuracy\", trial_train_acc)\n                print_metric(\"epoch of final train accuracy\", trial_train_acc_epoch)\n\n            trial_val_acc_epoch, trial_val_acc = get_final_pair(\n                trial_metrics.get(\"val\", [])\n            )\n            if trial_val_acc is not None:\n                print_metric(\"final validation accuracy\", trial_val_acc)\n                print_metric(\"epoch of final validation accuracy\", trial_val_acc_epoch)\n\n            trial_train_loss_epoch, trial_train_loss = get_final_pair(\n                trial_losses.get(\"train\", [])\n            )\n            if trial_train_loss is not None:\n                print_metric(\"final train loss\", trial_train_loss)\n                print_metric(\"epoch of final train loss\", trial_train_loss_epoch)\n\n            trial_val_loss_epoch, trial_val_loss = get_final_pair(\n                trial_losses.get(\"val\", [])\n            )\n            if trial_val_loss is not None:\n                print_metric(\"final validation loss\", trial_val_loss)\n                print_metric(\"epoch of final validation loss\", trial_val_loss_epoch)\n\n            test_metrics = trial_data.get(\"test_metrics\", {})\n            for key, value in test_metrics.items():\n                explicit_name = key.replace(\"_\", \" \")\n                print_metric(f\"final test metric - {explicit_name}\", safe_float(value))\n\n            trial_stream_results = trial_data.get(\"stream_results\", {})\n            for mode_name, mode_metrics in trial_stream_results.items():\n                if isinstance(mode_metrics, dict):\n                    for metric_name, metric_value in mode_metrics.items():\n                        normalized_metric_name = (\n                            metric_name.replace(\"_\", \" \").replace(\"-\", \" \").lower()\n                        )\n                        print_metric(\n                            f\"final {mode_name} stream {normalized_metric_name}\",\n                            safe_float(metric_value),\n                        )\n\n    print(\"-\" * 80)\n\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nexperiment_path = os.path.join(working_dir, \"experiment_data.npy\")\n\nexperiment_data = np.load(experiment_path, allow_pickle=True).item()\n\nfor experiment_group_name, experiment_group_data in experiment_data.items():\n    if isinstance(experiment_group_data, dict):\n        for dataset_name, dataset_data in experiment_group_data.items():\n            summarize_selected_dataset(dataset_name, dataset_data)\n", "import os\nimport numpy as np\n\n\ndef safe_float(value):\n    try:\n        return float(value)\n    except Exception:\n        return value\n\n\ndef format_metric_value(value):\n    if isinstance(value, float):\n        return f\"{value:.6f}\"\n    return str(value)\n\n\ndef print_metric(metric_name, value):\n    print(f\"{metric_name}: {format_metric_value(value)}\")\n\n\ndef get_final_metric(metric_list):\n    if not metric_list:\n        return None\n    return metric_list[-1][1]\n\n\ndef get_best_loss(loss_list):\n    if not loss_list:\n        return None\n    return min(v for _, v in loss_list)\n\n\ndef analyze_source_training(exp_dict):\n    train_metrics = exp_dict.get(\"metrics\", {}).get(\"train\", {})\n    val_metrics = exp_dict.get(\"metrics\", {}).get(\"val\", {})\n    train_losses = exp_dict.get(\"losses\", {}).get(\"train\", {})\n    val_losses = exp_dict.get(\"losses\", {}).get(\"val\", {})\n\n    lr_candidates = exp_dict.get(\"lr_candidates\", [])\n    best_lr = exp_dict.get(\"best_lr\", None)\n    best_val_loss = exp_dict.get(\"best_val_loss\", None)\n    lr_summary = exp_dict.get(\"lr_summary\", [])\n\n    print(\"Dataset: synthetic_reasoning_stream\")\n    print_metric(\n        \"best learning rate\", safe_float(best_lr) if best_lr is not None else \"N/A\"\n    )\n    print_metric(\n        \"best validation loss\",\n        safe_float(best_val_loss) if best_val_loss is not None else \"N/A\",\n    )\n\n    if lr_summary:\n        summary_map = {}\n        for row in lr_summary:\n            if len(row) >= 4:\n                lr, best_vloss, final_train_acc, final_val_acc = row[:4]\n                summary_map[f\"lr_{lr:.0e}\"] = {\n                    \"best_validation_loss\": safe_float(best_vloss),\n                    \"final_train_accuracy\": safe_float(final_train_acc),\n                    \"final_validation_accuracy\": safe_float(final_val_acc),\n                }\n    else:\n        summary_map = {}\n\n    for lr in lr_candidates:\n        lr_key = f\"lr_{lr:.0e}\"\n        print(f\"Dataset: synthetic_reasoning_stream ({lr_key})\")\n\n        final_train_acc = None\n        final_val_acc = None\n        final_train_loss = None\n        final_val_loss = None\n        best_validation_loss = None\n\n        if lr_key in train_metrics:\n            final_train_acc = get_final_metric(train_metrics[lr_key])\n        if lr_key in val_metrics:\n            final_val_acc = get_final_metric(val_metrics[lr_key])\n        if lr_key in train_losses:\n            final_train_loss = get_final_metric(train_losses[lr_key])\n        if lr_key in val_losses:\n            final_val_loss = get_final_metric(val_losses[lr_key])\n            best_validation_loss = get_best_loss(val_losses[lr_key])\n\n        if lr_key in summary_map:\n            final_train_acc = summary_map[lr_key].get(\n                \"final_train_accuracy\", final_train_acc\n            )\n            final_val_acc = summary_map[lr_key].get(\n                \"final_validation_accuracy\", final_val_acc\n            )\n            best_validation_loss = summary_map[lr_key].get(\n                \"best_validation_loss\", best_validation_loss\n            )\n\n        print_metric(\n            \"final train accuracy\",\n            safe_float(final_train_acc) if final_train_acc is not None else \"N/A\",\n        )\n        print_metric(\n            \"final validation accuracy\",\n            safe_float(final_val_acc) if final_val_acc is not None else \"N/A\",\n        )\n        print_metric(\n            \"final train loss\",\n            safe_float(final_train_loss) if final_train_loss is not None else \"N/A\",\n        )\n        print_metric(\n            \"final validation loss\",\n            safe_float(final_val_loss) if final_val_loss is not None else \"N/A\",\n        )\n        print_metric(\n            \"best validation loss\",\n            (\n                safe_float(best_validation_loss)\n                if best_validation_loss is not None\n                else \"N/A\"\n            ),\n        )\n\n\ndef analyze_stream_results(exp_dict):\n    stream_results = exp_dict.get(\"stream_results\", {})\n\n    for mode_name, mode_results in stream_results.items():\n        print(f\"Dataset: synthetic_reasoning_stream ({mode_name} stream evaluation)\")\n        if \"Shifted-Stream Accuracy\" in mode_results:\n            print_metric(\n                \"shifted-stream accuracy\",\n                safe_float(mode_results[\"Shifted-Stream Accuracy\"]),\n            )\n        if \"trigger_rate\" in mode_results:\n            print_metric(\n                \"adaptation trigger rate\", safe_float(mode_results[\"trigger_rate\"])\n            )\n\n\ndef analyze_test_summary(exp_dict):\n    test_metrics = exp_dict.get(\"metrics\", {}).get(\"test\", [])\n    if not test_metrics:\n        return\n\n    _, test_summary = test_metrics[-1]\n    print(\"Dataset: synthetic_reasoning_stream (test summary)\")\n\n    if isinstance(test_summary, dict):\n        if \"best_lr\" in test_summary:\n            print_metric(\"best learning rate\", safe_float(test_summary[\"best_lr\"]))\n        if \"best_val_loss\" in test_summary:\n            print_metric(\n                \"best validation loss\", safe_float(test_summary[\"best_val_loss\"])\n            )\n        if \"frozen_acc\" in test_summary:\n            print_metric(\n                \"frozen shifted-stream accuracy\", safe_float(test_summary[\"frozen_acc\"])\n            )\n        if \"always_acc\" in test_summary:\n            print_metric(\n                \"always-adapt shifted-stream accur
