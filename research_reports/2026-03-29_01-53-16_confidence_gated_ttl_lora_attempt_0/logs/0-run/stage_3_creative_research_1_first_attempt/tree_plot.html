tx = normalize_text(\" \".join(ex[\"context\"][\"contexts\"][:2]))\n        prompt = (\n            f\"Question: {q}\\nContext: {ctx}\\nOptions:\\nA. yes\\nB. no\\nC. maybe\\nAnswer:\"\n        )\n        label = mapping.get(str(ex[\"final_decision\"]).lower(), None)\n        if label is not None:\n            items.append(\n                {\"dataset\": \"qiaojin_PubMedQA\", \"prompt\": prompt, \"label\": label}\n            )\n    return items\n\n\ndef build_mmlu(limit=36):\n    ds = load_dataset(\"cais/mmlu\", \"abstract_algebra\", split=f\"test[:{limit}]\")\n    items = []\n    for ex in ds:\n        ch = ex[\"choices\"][:4]\n        if len(ch) < 4:\n            continue\n        opts = \"\\n\".join(\n            [f\"{choices_letters[i]}. {normalize_text(ch[i])}\" for i in range(4)]\n        )\n        label = choices_letters[int(ex[\"answer\"])]\n        prompt = f\"Question: {normalize_text(ex['question'])}\\n{opts}\\nAnswer:\"\n        items.append({\"dataset\": \"cais_mmlu\", \"prompt\": prompt, \"label\": label})\n    return items\n\n\narc = build_arc()\npub = build_pubmed()\nmmlu = build_mmlu()\n\n\ndef split_items(arr):\n    n = len(arr)\n    n_train = max(8, n // 3)\n    n_val = max(6, n // 5)\n    tr = arr[:n_train]\n    va = arr[n_train : n_train + n_val]\n    te = arr[n_train + n_val :]\n    return tr, va, te\n\n\narc_tr, arc_va, arc_te = split_items(arc)\npub_tr, pub_va, pub_te = split_items(pub)\nmmlu_tr, mmlu_va, mmlu_te = split_items(mmlu)\n\nfor name, tr, va, te in [\n    (\"allenai_ai2_arc\", arc_tr, arc_va, arc_te),\n    (\"qiaojin_PubMedQA\", pub_tr, pub_va, pub_te),\n    (\"cais_mmlu\", mmlu_tr, mmlu_va, mmlu_te),\n]:\n    experiment_data[name][\"split_sizes\"] = {\n        \"train\": len(tr),\n        \"val\": len(va),\n        \"test\": len(te),\n    }\n\ntrain_items = arc_tr + pub_tr + mmlu_tr\nval_items = arc_va + pub_va + mmlu_va\ntest_items = arc_te + pub_te + mmlu_te\n\n\nclass AdapterWrappedLM(nn.Module):\n    def __init__(self, model_name, device):\n        super().__init__()\n        self.base = AutoModelForCausalLM.from_pretrained(model_name).to(device)\n        hidden = self.base.config.hidden_size\n        vocab = self.base.config.vocab_size\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, hidden // 2),\n            nn.Tanh(),\n            nn.Linear(hidden // 2, vocab),\n        ).to(device)\n        for p in self.base.parameters():\n            p.requires_grad = False\n\n    def forward(self, input_ids, attention_mask=None, labels=None):\n        out = self.base(\n            input_ids=input_ids,\n            attention_mask=attention_mask,\n            output_hidden_states=True,\n        )\n        hidden = out.hidden_states[-1]\n        delta_logits = self.adapter(hidden)\n        logits = out.logits + delta_logits\n        loss = None\n        if labels is not None:\n            shift_logits = logits[:, :-1, :].contiguous()\n            shift_labels = labels[:, 1:].contiguous()\n            loss_fct = nn.CrossEntropyLoss(ignore_index=-100)\n            loss = loss_fct(\n                shift_logits.view(-1, shift_logits.size(-1)), shift_labels.view(-1)\n            )\n        return type(\"AdapterOutput\", (), {\"logits\": logits, \"loss\": loss})\n\n    def reset_adapter(self, state_dict):\n        self.adapter.load_state_dict(copy.deepcopy(state_dict))\n\n    def adapter_state(self):\n        return copy.deepcopy(self.adapter.state_dict())\n\n\nmodel = AdapterWrappedLM(model_name, device).to(device)\n\n\ndef collate_prompt_answer(prompt, label, max_length=192):\n    prompt = normalize_text(prompt.replace(\"\\t\", \" \"))\n    full = prompt + \" \" + str(label).strip()\n    enc = tokenizer(\n        full,\n        return_tensors=\"pt\",\n        truncation=True,\n        max_length=max_length,\n        padding=\"max_length\",\n    )\n    input_ids = enc[\"input_ids\"].to(device)\n    attn = enc[\"attention_mask\"].to(device)\n    labels = input_ids.clone()\n    p_ids = tokenizer(\n        prompt, return_tensors=\"pt\", truncation=True, max_length=max_length\n    )[\"input_ids\"]\n    plen = min(p_ids.shape[1], labels.shape[1] - 1)\n    labels[:, :plen] = -100\n    return {\"input_ids\": input_ids, \"attention_mask\": attn, \"labels\": labels}\n\n\ndef answer_scores(cur_model, prompt, valid_letters=None):\n    if valid_letters is None:\n        valid_letters = choices_letters\n    enc = tokenizer(\n        normalize_text(prompt), return_tensors=\"pt\", truncation=True, max_length=192\n    )\n    enc = {k: v.to(device) for k, v in enc.items() if isinstance(v, torch.Tensor)}\n    with torch.no_grad():\n        out = cur_model(**enc)\n        logits = out.logits[:, -1, :]\n        probs = F.softmax(logits, dim=-1)\n    ids = []\n    usable_letters = []\n    for c in valid_letters:\n        tok = tokenizer.encode(\" \" + c, add_special_tokens=False)\n        if len(tok) > 0:\n            ids.append(tok[0])\n            usable_letters.append(c)\n    scores = probs[0, ids]\n    if float(scores.sum().item()) <= 0:\n        scores = torch.ones_like(scores) / max(1, len(scores))\n    else:\n        scores = scores / scores.sum()\n    pred_idx = int(torch.argmax(scores).item())\n    sorted_scores = torch.sort(scores, descending=True).values\n    entropy = float((-(scores * torch.log(scores + 1e-8)).sum()).item())\n    margin = (\n        float((sorted_scores[0] - sorted_scores[1]).item())\n        if len(sorted_scores) > 1\n        else 0.0\n    )\n    return scores.detach(), usable_letters[pred_idx], entropy, margin\n\n\ndef valid_choices_for_item(ex):\n    if ex[\"dataset\"] == \"qiaojin_PubMedQA\":\n        return [\"A\", \"B\", \"C\"]\n    return [\"A\", \"B\", \"C\", \"D\"]\n\n\noptimizer = torch.optim.AdamW(model.adapter.parameters(), lr=1e-3)\n\nbest_state = model.adapter_state()\nbest_val = 1e9\nepochs = 2\n\nfor epoch in range(1, epochs + 1):\n    model.train()\n    losses = []\n    random.shuffle(train_items)\n    for ex in train_items:\n        batch = collate_prompt_answer(ex[\"prompt\"], ex[\"label\"])\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        optimizer.zero_grad()\n        out = model(**batch)\n        loss = out.loss\n        loss.backward()\n        optimizer.step()\n        losses.append(float(loss.item()))\n    train_loss = float(np.mean(losses)) if losses else 0.0\n\n    model.eval()\n    val_losses, val_correct = [], 0\n    for ex in val_items:\n        batch = collate_prompt_answer(ex[\"prompt\"], ex[\"label\"])\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        with torch.no_grad():\n            out = model(**batch)\n            val_losses.append(float(out.loss.item()))\n            _, pred, _, _ = answer_scores(\n                model, ex[\"prompt\"], valid_choices_for_item(ex)\n            )\n            val_correct += int(pred == ex[\"label\"])\n    val_loss = float(np.mean(val_losses)) if val_losses else 0.0\n    val_acc = val_correct / max(1, len(val_items))\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n    for name in experiment_data:\n        experiment_data[name][\"metrics\"][\"train\"].append((epoch, train_loss))\n        experiment_data[name][\"metrics\"][\"val\"].append((epoch, val_acc))\n        experiment_data[name][\"losses\"][\"train\"].append((epoch, train_loss))\n        experiment_data[name][\"losses\"][\"val\"].append((epoch, val_loss))\n    if val_loss < best_val:\n        best_val = val_loss\n        best_state = model.adapter_state()\n\nmodel.reset_adapter(best_state)\n\n\ndef make_stream(items, mode=\"clustered\"):\n    arr = items.copy()\n    if mode == \"iid\":\n        random.shuffle(arr)\n        return arr\n    if mode == \"clustered\":\n        return sorted(arr, key=lambda z: z[\"dataset\"])\n    if mode == \"hard_burst\":\n        scored = []\n        for ex in arr:\n            _, _, ent, margin = answer_scores(\n                model, ex[\"prompt\"], valid_choices_for_item(ex)\n            )\n            scored.append((ent - margin, ex))\n        scored.sort(key=lambda x: x[0], reverse=True)\n        return [x[1] for x in scored]\n    return arr\n\n\ndef ece_score(conf, corr, bins=10):\n    conf = np.asarray(conf)\n    corr = np.asarray(corr)\n    edges = np.linspace(0, 1, bins + 1)\n    ece = 0.0\n    for i in range(bins):\n        m = (conf >= edges[i]) & (\n            conf < edges[i + 1] if i < bins - 1 else conf <= edges[i + 1]\n        )\n        if m.any():\n            ece += abs(corr[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef shift_robust_utility(acc, frozen_acc, ece, frozen_ece, trigger_rate, avg_ms):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.1 * trigger_rate\n        - 0.001 * avg_ms\n    )\n\n\ndef clone_model_with_best_adapter():\n    cur = AdapterWrappedLM(model_name, device).to(device)\n    cur.reset_adapter(best_state)\n    return cur\n\n\ndef stream_eval(\n    stream,\n    policy=\"frozen\",\n    reset_every=16,\n    adapt_lr=8e-4,\n    entropy_th=1.05,\n    margin_th=0.22,\n):\n    cur = clone_model_with_best_adapter()\n    opt = torch.optim.AdamW(cur.adapter.parameters(), lr=adapt_lr)\n\n    preds, gts, confs, corrs, triggers, times_ms, entropies, margins = (\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n    )\n    dataset_wise = {}\n    buffer = []\n\n    cur.eval()\n    for i, ex in enumerate(stream):\n        t0 = time.time()\n        valid_letters = valid_choices_for_item(ex)\n        scores, pred, ent, margin = answer_scores(cur, ex[\"prompt\"], valid_letters)\n        conf = float(scores.max().item())\n        correct = int(pred == ex[\"label\"])\n\n        preds.append(pred)\n        gts.append(ex[\"label\"])\n        confs.append(conf)\n        corrs.append(correct)\n        entropies.append(ent)\n        margins.append(margin)\n\n        do_update = False\n        if policy == \"always\":\n            do_update = True\n        elif policy == \"entropy\":\n            do_update = ent > entropy_th\n        elif policy == \"margin\":\n            do_update = margin < margin_th\n        elif policy == \"hybrid\":\n            do_update = (ent > entropy_th) and (margin < margin_th)\n\n        triggers.append(int(do_update))\n\n        if do_update:\n            buffer.append({\"prompt\": ex[\"prompt\"], \"pseudo\": pred})\n            if len(buffer) >= 2:\n                cur.train()\n                opt.zero_grad()\n                loss_sum = 0.0\n                for b in buffer:\n                    batch = collate_prompt_answer(b[\"prompt\"], b[\"pseudo\"])\n                    batch = {\n                        k: v.to(device)\n                        for k, v in batch.items()\n                        if isinstance(v, torch.Tensor)\n                    }\n                    out = cur(**batch)\n                    loss_sum = loss_sum + out.loss\n                loss_sum = loss_sum / len(buffer)\n                loss_sum.backward()\n                opt.step()\n                buffer = []\n                cur.eval()\n\n        if policy != \"frozen\" and reset_every > 0 and (i + 1) % reset_every == 0:\n            cur.reset_adapter(best_state)\n\n        times_ms.append((time.time() - t0) * 1000.0)\n        dataset_wise.setdefault(\n            ex[\"dataset\"], {\"preds\": [], \"gts\": [], \"confs\": [], \"triggers\": []}\n        )\n        dataset_wise[ex[\"dataset\"]][\"preds\"].append(pred)\n        dataset_wise[ex[\"dataset\"]][\"gts\"].append(ex[\"label\"])\n        dataset_wise[ex[\"dataset\"]][\"confs\"].append(conf)\n        dataset_wise[ex[\"dataset\"]][\"triggers\"].append(int(do_update))\n\n    acc = float(np.mean([p == y for p, y in zip(preds, gts)])) if preds else 0.0\n    ece = ece_score(confs, corrs) if preds else 0.0\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(triggers)) if triggers else 0.0,\n        \"avg_ms\": float(np.mean(times_ms)) if times_ms else 0.0,\n        \"preds\": np.array(preds),\n        \"gts\": np.array(gts),\n        \"confs\": np.array(confs),\n        \"corrs\": np.array(corrs),\n        \"triggers\": np.array(triggers),\n        \"entropies\": np.array(entropies),\n        \"margins\": np.array(margins),\n        \"dataset_wise\": dataset_wise,\n    }\n\n\nstream_mode = \"clustered\"\nstream = make_stream(test_items, mode=stream_mode)\n\nfrozen = stream_eval(stream, policy=\"frozen\")\nalways = stream_eval(stream, policy=\"always\")\nhybrid = stream_eval(stream, policy=\"hybrid\")\n\nfor res in [frozen, always, hybrid]:\n    res[\"srus\"] = shift_robust_utility(\n        res[\"acc\"],\n        frozen[\"acc\"],\n        res[\"ece\"],\n        frozen[\"ece\"],\n        res[\"trigger_rate\"],\n        res[\"avg_ms\"],\n    )\n\nfor ds_name in experiment_data:\n    idxs = [i for i, ex in enumerate(stream) if ex[\"dataset\"] == ds_name]\n    ds_gt = [stream[i][\"label\"] for i in idxs]\n    metrics = {\n        \"frozen_acc\": (\n            float(np.mean([frozen[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n        \"always_acc\": (\n            float(np.mean([always[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n        \"hybrid_acc\": (\n            float(np.mean([hybrid[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n    }\n    for epoch in range(1, epochs + 1):\n        experiment_data[ds_name][\"metrics\"][\"test\"].append((epoch, metrics))\n    experiment_data[ds_name][\"predictions\"] = (\n        hybrid[\"preds\"][idxs].tolist() if idxs else []\n    )\n    experiment_data[ds_name][\"ground_truth\"] = np.array(ds_gt).tolist()\n    experiment_data[ds_name][\"confidences\"] = (\n        hybrid[\"confs\"][idxs].tolist() if idxs else []\n    )\n    experiment_data[ds_name][\"triggers\"] = (\n        hybrid[\"triggers\"][idxs].tolist() if idxs else []\n    )\n\n\ndef save_plot_predictions(ds_name, preds, gts):\n    if len(gts) == 0:\n        return\n    uniq = sorted(list(set(list(gts) + list(preds))))\n    mapping = {k: i for i, k in enumerate(uniq)}\n    x = np.arange(len(gts))\n    plt.figure(figsize=(8, 3))\n    plt.plot(x, [mapping[g] for g in gts], marker=\"o\", label=\"ground_truth\")\n    plt.plot(x, [mapping[p] for p in preds], marker=\"x\", label=\"prediction\")\n    plt.yticks(list(mapping.values()), list(mapping.keys()))\n    plt.xlabel(\"sample\")\n    plt.ylabel(\"label\")\n    plt.title(f\"Predictions vs Ground Truth: {ds_name}\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_pred_vs_gt.png\"))\n    plt.close()\n\n\nfor ds_name in experiment_data:\n    save_plot_predictions(\n        ds_name,\n        experiment_data[ds_name][\"predictions\"],\n        experiment_data[ds_name][\"ground_truth\"],\n    )\n\n\ndef save_stream_plot(name, values, ylabel, filename):\n    plt.figure(figsize=(8, 3))\n    plt.plot(np.arange(len(values)), values)\n    plt.xlabel(\"stream_index\")\n    plt.ylabel(ylabel)\n    plt.title(name)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, filename))\n    plt.close()\n\n\nsave_stream_plot(\n    \"Hybrid Entropy\", hybrid[\"entropies\"], \"entropy\", \"hybrid_entropy_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Margin\", hybrid[\"margins\"], \"margin\", \"hybrid_margin_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Trigger\", hybrid[\"triggers\"], \"trigger\", \"hybrid_trigger_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Confidence\", hybrid[\"confs\"], \"confidence\", \"hybrid_confidence_stream.png\"\n)\n\nsample_outputs = {}\ngen_model = clone_model_with_best_adapter()\ngen_model.eval()\nfor ds_name in [\"allenai_ai2_arc\", \"qiaojin_PubMedQA\", \"cais_mmlu\"]:\n    subset = [ex for ex in stream if ex[\"dataset\"] == ds_name][:3]\n    sample_outputs[ds_name] = []\n    for ex in subset:\n        enc = tokenizer(\n            normalize_text(ex[\"prompt\"]),\n            return_tensors=\"pt\",\n            truncation=True,\n            max_length=128,\n        )\n        enc = {k: v.to(device) for k, v in enc.items() if isinstance(v, torch.Tensor)}\n        with torch.no_grad():\n            out = gen_model.base.generate(\n                input_ids=enc[\"input_ids\"],\n                attention_mask=enc[\"attention_mask\"],\n                max_new_tokens=4,\n                do_sample=False,\n                pad_token_id=tokenizer.eos_token_id,\n            )\n        text = tokenizer.decode(out[0], skip_special_tokens=True)\n        sample_outputs[ds_name].append(\n            {\"prompt\": ex[\"prompt\"], \"generated\": text, \"label\": ex[\"label\"]}\n        )\n\nwith open(os.path.join(working_dir, \"sample_generations.json\"), \"w\") as f:\n    json.dump(sample_outputs, f, indent=2)\n\nnp.save(os.path.join(working_dir, \"stream_preds_frozen.npy\"), frozen[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_preds_always.npy\"), always[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_preds_hybrid.npy\"), hybrid[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_gt.npy\"), hybrid[\"gts\"])\nnp.save(os.path.join(working_dir, \"stream_conf_frozen.npy\"), frozen[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_conf_always.npy\"), always[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_conf_hybrid.npy\"), hybrid[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_entropy.npy\"), hybrid[\"entropies\"])\nnp.save(os.path.join(working_dir, \"stream_margin.npy\"), hybrid[\"margins\"])\nnp.save(os.path.join(working_dir, \"stream_triggers.npy\"), hybrid[\"triggers\"])\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nnp.save(\n    os.path.join(working_dir, \"summary_metrics.npy\"),\n    {\n        \"frozen\": {\n            k: frozen[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n        \"always\": {\n            k: always[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n        \"hybrid\": {\n            k: hybrid[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n    },\n    allow_pickle=True,\n)\n\nprint(\n    f\"Frozen | acc={frozen['acc']:.4f} ece={frozen['ece']:.4f} trigger={frozen['trigger_rate']:.4f} ms={frozen['avg_ms']:.2f} SRUS={frozen['srus']:.4f}\"\n)\nprint(\n    f\"Always | acc={always['acc']:.4f} ece={always['ece']:.4f} trigger={always['trigger_rate']:.4f} ms={always['avg_ms']:.2f} SRUS={always['srus']:.4f}\"\n)\nprint(\n    f\"Hybrid | acc={hybrid['acc']:.4f} ece={hybrid['ece']:.4f} trigger={hybrid['trigger_rate']:.4f} ms={hybrid['avg_ms']:.2f} SRUS={hybrid['srus']:.4f}\"\n)\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport sys\nimport time\nimport copy\nimport math\nimport random\nimport json\nimport types\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\n\n\n# stdout/stderr compatibility patch for environments where RedirectQueue lacks isatty()\ndef _patch_stream_isatty(stream_name):\n    stream = getattr(sys, stream_name, None)\n    if stream is not None and not hasattr(stream, \"isatty\"):\n        try:\n            setattr(stream, \"isatty\", lambda: False)\n        except Exception:\n\n            class _StreamWrapper:\n                def __init__(self, wrapped):\n                    self._wrapped = wrapped\n\n                def write(self, *args, **kwargs):\n                    return self._wrapped.write(*args, **kwargs)\n\n                def flush(self, *args, **kwargs):\n                    if hasattr(self._wrapped, \"flush\"):\n                        return self._wrapped.flush(*args, **kwargs)\n\n                def isatty(self):\n                    return False\n\n                def __getattr__(self, name):\n                    return getattr(self._wrapped, name)\n\n            setattr(sys, stream_name, _StreamWrapper(stream))\n\n\n_patch_stream_isatty(\"stdout\")\n_patch_stream_isatty(\"stderr\")\n\nfrom datasets import load_dataset\nfrom transformers import AutoTokenizer, AutoModelForCausalLM\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nseed = 42\nrandom.seed(seed)\nnp.random.seed(seed)\ntorch.manual_seed(seed)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed_all(seed)\n\nexperiment_data = {\n    \"allenai_ai2_arc\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"confidences\": [],\n        \"triggers\": [],\n    },\n    \"qiaojin_PubMedQA\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"confidences\": [],\n        \"triggers\": [],\n    },\n    \"cais_mmlu\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"confidences\": [],\n        \"triggers\": [],\n    },\n}\n\nmodel_name = \"sshleifer/tiny-gpt2\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\nif tokenizer.pad_token is None:\n    tokenizer.pad_token = tokenizer.eos_token\n\nchoices_letters = [\"A\", \"B\", \"C\", \"D\"]\n\n\ndef normalize_text(x):\n    return \" \".join(str(x).strip().split())\n\n\ndef build_arc(limit=30):\n    ds = load_dataset(\"allenai/ai2_arc\", \"ARC-Challenge\", split=f\"train[:{limit}]\")\n    items = []\n    for ex in ds:\n        labels = ex[\"choices\"][\"label\"]\n        texts = ex[\"choices\"][\"text\"]\n        pairs = [(l, t) for l, t in zip(labels, texts) if l in choices_letters]\n        if len(pairs) < 2:\n            continue\n        pairs = pairs[:4]\n        opts = \"\\n\".join([f\"{l}. {normalize_text(t)}\" for l, t in pairs])\n        ans = ex[\"answerKey\"]\n        if ans not in [p[0] for p in pairs]:\n            continue\n        prompt = f\"Question: {normalize_text(ex['question'])}\\n{opts}\\nAnswer:\"\n        items.append({\"dataset\": \"allenai_ai2_arc\", \"prompt\": prompt, \"label\": ans})\n    return items\n\n\ndef build_pubmed(limit=30):\n    ds = load_dataset(\"qiaojin/PubMedQA\", \"pqa_labeled\", split=f\"train[:{limit}]\")\n    items = []\n    mapping = {\"yes\": \"A\", \"no\": \"B\", \"maybe\": \"C\"}\n    for ex in ds:\n        q = normalize_text(ex[\"question\"])\n        ctx = normalize_text(\" \".join(ex[\"context\"][\"contexts\"][:2]))\n        prompt = (\n            f\"Question: {q}\\nContext: {ctx}\\nOptions:\\nA. yes\\nB. no\\nC. maybe\\nAnswer:\"\n        )\n        label = mapping.get(str(ex[\"final_decision\"]).lower(), None)\n        if label is not None:\n            items.append(\n                {\"dataset\": \"qiaojin_PubMedQA\", \"prompt\": prompt, \"label\": label}\n            )\n    return items\n\n\ndef build_mmlu(limit=30):\n    ds = load_dataset(\"cais/mmlu\", \"abstract_algebra\", split=f\"test[:{limit}]\")\n    items = []\n    for ex in ds:\n        ch = ex[\"choices\"][:4]\n        if len(ch) < 4:\n            continue\n        opts = \"\\n\".join(\n            [f\"{choices_letters[i]}. {normalize_text(ch[i])}\" for i in range(4)]\n        )\n        label = choices_letters[int(ex[\"answer\"])]\n        prompt = f\"Question: {normalize_text(ex['question'])}\\n{opts}\\nAnswer:\"\n        items.append({\"dataset\": \"cais_mmlu\", \"prompt\": prompt, \"label\": label})\n    return items\n\n\narc = build_arc()\npub = build_pubmed()\nmmlu = build_mmlu()\n\n\ndef split_items(arr):\n    n = len(arr)\n    n_train = max(6, n // 3)\n    n_val = max(5, n // 5)\n    tr = arr[:n_train]\n    va = arr[n_train : n_train + n_val]\n    te = arr[n_train + n_val :]\n    return tr, va, te\n\n\narc_tr, arc_va, arc_te = split_items(arc)\npub_tr, pub_va, pub_te = split_items(pub)\nmmlu_tr, mmlu_va, mmlu_te = split_items(mmlu)\n\nfor name, tr, va, te in [\n    (\"allenai_ai2_arc\", arc_tr, arc_va, arc_te),\n    (\"qiaojin_PubMedQA\", pub_tr, pub_va, pub_te),\n    (\"cais_mmlu\", mmlu_tr, mmlu_va, mmlu_te),\n]:\n    experiment_data[name][\"split_sizes\"] = {\n        \"train\": len(tr),\n        \"val\": len(va),\n        \"test\": len(te),\n    }\n\ntrain_items = arc_tr + pub_tr + mmlu_tr\nval_items = arc_va + pub_va + mmlu_va\ntest_items = arc_te + pub_te + mmlu_te\n\n\nclass AdapterWrappedLM(nn.Module):\n    def __init__(self, model_name, device):\n        super().__init__()\n        self.base = AutoModelForCausalLM.from_pretrained(model_name)\n        self.base = self.base.to(device)\n        hidden = self.base.config.hidden_size\n        vocab = self.base.config.vocab_size\n        bottleneck = max(16, hidden // 2)\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, bottleneck),\n            nn.Tanh(),\n            nn.Linear(bottleneck, vocab),\n        ).to(device)\n        for p in self.base.parameters():\n            p.requires_grad = False\n\n    def forward(self, input_ids, attention_mask=None, labels=None):\n        out = self.base(\n            input_ids=input_ids,\n            attention_mask=attention_mask,\n            output_hidden_states=True,\n        )\n        hidden = out.hidden_states[-1]\n        delta_logits = self.adapter(hidden)\n        logits = out.logits + delta_logits\n        loss = None\n        if labels is not None:\n            shift_logits = logits[:, :-1, :].contiguous()\n            shift_labels = labels[:, 1:].contiguous()\n            loss_fct = nn.CrossEntropyLoss(ignore_index=-100)\n            loss = loss_fct(\n                shift_logits.view(-1, shift_logits.size(-1)), shift_labels.view(-1)\n            )\n        return types.SimpleNamespace(logits=logits, loss=loss)\n\n    def reset_adapter(self, state_dict):\n        self.adapter.load_state_dict(copy.deepcopy(state_dict))\n\n    def adapter_state(self):\n        return copy.deepcopy(self.adapter.state_dict())\n\n\nmodel = AdapterWrappedLM(model_name, device).to(device)\noptimizer = torch.optim.AdamW(model.adapter.parameters(), lr=1e-3)\n\n\ndef collate_prompt_answer(prompt, label, max_length=192):\n    prompt = normalize_text(prompt.replace(\"\\t\", \" \"))\n    full = prompt + \" \" + str(label).strip()\n    enc = tokenizer(\n        full,\n        return_tensors=\"pt\",\n        truncation=True,\n        max_length=max_length,\n        padding=\"max_length\",\n    )\n    input_ids = enc[\"input_ids\"].to(device)\n    attn = enc[\"attention_mask\"].to(device)\n    labels = input_ids.clone()\n    p_ids = tokenizer(\n        prompt, return_tensors=\"pt\", truncation=True, max_length=max_length\n    )[\"input_ids\"]\n    plen = min(p_ids.shape[1], labels.shape[1] - 1)\n    labels[:, :plen] = -100\n    return {\"input_ids\": input_ids, \"attention_mask\": attn, \"labels\": labels}\n\n\ndef valid_choices_for_item(ex):\n    return (\n        [\"A\", \"B\", \"C\"] if ex[\"dataset\"] == \"qiaojin_PubMedQA\" else [\"A\", \"B\", \"C\", \"D\"]\n    )\n\n\ndef answer_scores(cur_model, prompt, valid_letters=None):\n    if valid_letters is None:\n        valid_letters = choices_letters\n    enc = tokenizer(\n        normalize_text(prompt), return_tensors=\"pt\", truncation=True, max_length=192\n    )\n    enc = {k: v.to(device) for k, v in enc.items() if isinstance(v, torch.Tensor)}\n    with torch.no_grad():\n        out = cur_model(**enc)\n        logits = out.logits[:, -1, :]\n        probs = F.softmax(logits, dim=-1)\n    ids, usable_letters = [], []\n    for c in valid_letters:\n        tok = tokenizer.encode(\" \" + c, add_special_tokens=False)\n        if len(tok) > 0:\n            ids.append(tok[0])\n            usable_letters.append(c)\n    if not ids:\n        scores = torch.ones(len(valid_letters), device=device) / len(valid_letters)\n        pred = valid_letters[0]\n        entropy = float((-(scores * torch.log(scores + 1e-8)).sum()).item())\n        return scores.detach(), pred, entropy, 0.0\n    scores = probs[0, ids]\n    scores = scores / scores.sum().clamp_min(1e-8)\n    pred_idx = int(torch.argmax(scores).item())\n    sorted_scores = torch.sort(scores, descending=True).values\n    entropy = float((-(scores * torch.log(scores + 1e-8)).sum()).item())\n    margin = (\n        float((sorted_scores[0] - sorted_scores[1]).item())\n        if len(sorted_scores) > 1\n        else 0.0\n    )\n    return scores.detach(), usable_letters[pred_idx], entropy, margin\n\n\nepochs = 2\nbest_state = model.adapter_state()\nbest_val = 1e9\n\nfor epoch in range(1, epochs + 1):\n    model.train()\n    losses = []\n    random.shuffle(train_items)\n    for ex in train_items:\n        batch = collate_prompt_answer(ex[\"prompt\"], ex[\"label\"])\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        optimizer.zero_grad()\n        out = model(**batch)\n        loss = out.loss\n        loss.backward()\n        optimizer.step()\n        losses.append(float(loss.item()))\n    train_loss = float(np.mean(losses)) if losses else 0.0\n\n    model.eval()\n    val_losses, val_correct = [], 0\n    per_ds_val = {k: {\"correct\": 0, \"n\": 0} for k in experiment_data}\n    for ex in val_items:\n        batch = collate_prompt_answer(ex[\"prompt\"], ex[\"label\"])\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        with torch.no_grad():\n            out = model(**batch)\n            val_losses.append(float(out.loss.item()))\n            _, pred, _, _ = answer_scores(\n                model, ex[\"prompt\"], valid_choices_for_item(ex)\n            )\n            ok = int(pred == ex[\"label\"])\n            val_correct += ok\n            per_ds_val[ex[\"dataset\"]][\"correct\"] += ok\n            per_ds_val[ex[\"dataset\"]][\"n\"] += 1\n    val_loss = float(np.mean(val_losses)) if val_losses else 0.0\n    val_acc = val_correct / max(1, len(val_items))\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n    for name in experiment_data:\n        ds_val_acc = per_ds_val[name][\"correct\"] / max(1, per_ds_val[name][\"n\"])\n        experiment_data[name][\"metrics\"][\"train\"].append((epoch, train_loss))\n        experiment_data[name][\"metrics\"][\"val\"].append((epoch, ds_val_acc))\n        experiment_data[name][\"losses\"][\"train\"].append((epoch, train_loss))\n        experiment_data[name][\"losses\"][\"val\"].append((epoch, val_loss))\n    if val_loss < best_val:\n        best_val = val_loss\n        best_state = model.adapter_state()\n\nmodel.reset_adapter(best_state)\n\n\ndef make_stream(items, mode=\"clustered\"):\n    arr = items.copy()\n    if mode == \"iid\":\n        random.shuffle(arr)\n        return arr\n    if mode == \"clustered\":\n        return sorted(arr, key=lambda z: z[\"dataset\"])\n    if mode == \"hard_burst\":\n        scored = []\n        for ex in arr:\n            _, _, ent, margin = answer_scores(\n                model, ex[\"prompt\"], valid_choices_for_item(ex)\n            )\n            scored.append((ent - margin, ex))\n        scored.sort(key=lambda x: x[0], reverse=True)\n        return [x[1] for x in scored]\n    return arr\n\n\ndef ece_score(conf, corr, bins=10):\n    conf = np.asarray(conf)\n    corr = np.asarray(corr)\n    edges = np.linspace(0, 1, bins + 1)\n    ece = 0.0\n    for i in range(bins):\n        m = (conf >= edges[i]) & (\n            conf < edges[i + 1] if i < bins - 1 else conf <= edges[i + 1]\n        )\n        if m.any():\n            ece += abs(corr[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef shift_robust_utility(acc, frozen_acc, ece, frozen_ece, trigger_rate, avg_ms):\n    return float(\n        (acc - frozen_acc)\n        - 0.5 * max(0.0, ece - frozen_ece)\n        - 0.1 * trigger_rate\n        - 0.001 * avg_ms\n    )\n\n\ndef clone_model_with_best_adapter():\n    cur = AdapterWrappedLM(model_name, device).to(device)\n    cur.reset_adapter(best_state)\n    return cur\n\n\ndef stream_eval(\n    stream,\n    policy=\"frozen\",\n    reset_every=12,\n    adapt_lr=8e-4,\n    entropy_th=1.05,\n    margin_th=0.22,\n):\n    cur = clone_model_with_best_adapter()\n    opt = torch.optim.AdamW(cur.adapter.parameters(), lr=adapt_lr)\n\n    preds, gts, confs, corrs, triggers, times_ms, entropies, margins = (\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n        [],\n    )\n    dataset_wise = {}\n    buffer = []\n\n    cur.eval()\n    for i, ex in enumerate(stream):\n        t0 = time.time()\n        valid_letters = valid_choices_for_item(ex)\n        scores, pred, ent, margin = answer_scores(cur, ex[\"prompt\"], valid_letters)\n        conf = float(scores.max().item())\n        correct = int(pred == ex[\"label\"])\n\n        preds.append(pred)\n        gts.append(ex[\"label\"])\n        confs.append(conf)\n        corrs.append(correct)\n        entropies.append(ent)\n        margins.append(margin)\n\n        do_update = False\n        if policy == \"always\":\n            do_update = True\n        elif policy == \"entropy\":\n            do_update = ent > entropy_th\n        elif policy == \"margin\":\n            do_update = margin < margin_th\n        elif policy == \"hybrid\":\n            do_update = (ent > entropy_th) and (margin < margin_th)\n\n        triggers.append(int(do_update))\n\n        if do_update:\n            buffer.append({\"prompt\": ex[\"prompt\"], \"pseudo\": pred})\n            if len(buffer) >= 2:\n                cur.train()\n                opt.zero_grad()\n                loss_sum = 0.0\n                for b in buffer:\n                    batch = collate_prompt_answer(b[\"prompt\"], b[\"pseudo\"])\n                    batch = {\n                        k: v.to(device)\n                        for k, v in batch.items()\n                        if isinstance(v, torch.Tensor)\n                    }\n                    out = cur(**batch)\n                    loss_sum = loss_sum + out.loss\n                loss_sum = loss_sum / len(buffer)\n                loss_sum.backward()\n                opt.step()\n                buffer = []\n                cur.eval()\n\n        if policy != \"frozen\" and reset_every > 0 and (i + 1) % reset_every == 0:\n            cur.reset_adapter(best_state)\n\n        times_ms.append((time.time() - t0) * 1000.0)\n        dataset_wise.setdefault(\n            ex[\"dataset\"], {\"preds\": [], \"gts\": [], \"confs\": [], \"triggers\": []}\n        )\n        dataset_wise[ex[\"dataset\"]][\"preds\"].append(pred)\n        dataset_wise[ex[\"dataset\"]][\"gts\"].append(ex[\"label\"])\n        dataset_wise[ex[\"dataset\"]][\"confs\"].append(conf)\n        dataset_wise[ex[\"dataset\"]][\"triggers\"].append(int(do_update))\n\n    acc = float(np.mean([p == y for p, y in zip(preds, gts)])) if preds else 0.0\n    ece = ece_score(confs, corrs) if preds else 0.0\n    return {\n        \"acc\": acc,\n        \"ece\": ece,\n        \"trigger_rate\": float(np.mean(triggers)) if triggers else 0.0,\n        \"avg_ms\": float(np.mean(times_ms)) if times_ms else 0.0,\n        \"preds\": np.array(preds),\n        \"gts\": np.array(gts),\n        \"confs\": np.array(confs),\n        \"corrs\": np.array(corrs),\n        \"triggers\": np.array(triggers),\n        \"entropies\": np.array(entropies),\n        \"margins\": np.array(margins),\n        \"dataset_wise\": dataset_wise,\n    }\n\n\nstream_mode = \"clustered\"\nstream = make_stream(test_items, mode=stream_mode)\n\nfrozen = stream_eval(stream, policy=\"frozen\")\nalways = stream_eval(stream, policy=\"always\")\nhybrid = stream_eval(stream, policy=\"hybrid\")\n\nfor res in [frozen, always, hybrid]:\n    res[\"srus\"] = shift_robust_utility(\n        res[\"acc\"],\n        frozen[\"acc\"],\n        res[\"ece\"],\n        frozen[\"ece\"],\n        res[\"trigger_rate\"],\n        res[\"avg_ms\"],\n    )\n\nfor ds_name in experiment_data:\n    idxs = [i for i, ex in enumerate(stream) if ex[\"dataset\"] == ds_name]\n    ds_gt = [stream[i][\"label\"] for i in idxs]\n    metrics = {\n        \"frozen_acc\": (\n            float(np.mean([frozen[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n        \"always_acc\": (\n            float(np.mean([always[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n        \"hybrid_acc\": (\n            float(np.mean([hybrid[\"preds\"][j] == ds_gt[k] for k, j in enumerate(idxs)]))\n            if idxs\n            else 0.0\n        ),\n        \"frozen_ece\": (\n            ece_score(\n                [float(frozen[\"confs\"][j]) for j in idxs],\n                [int(frozen[\"preds\"][j] == ds_gt[k]) for k, j in enumerate(idxs)],\n            )\n            if idxs\n            else 0.0\n        ),\n        \"always_ece\": (\n            ece_score(\n                [float(always[\"confs\"][j]) for j in idxs],\n                [int(always[\"preds\"][j] == ds_gt[k]) for k, j in enumerate(idxs)],\n            )\n            if idxs\n            else 0.0\n        ),\n        \"hybrid_ece\": (\n            ece_score(\n                [float(hybrid[\"confs\"][j]) for j in idxs],\n                [int(hybrid[\"preds\"][j] == ds_gt[k]) for k, j in enumerate(idxs)],\n            )\n            if idxs\n            else 0.0\n        ),\n    }\n    for epoch in range(1, epochs + 1):\n        experiment_data[ds_name][\"metrics\"][\"test\"].append((epoch, metrics))\n    experiment_data[ds_name][\"predictions\"] = (\n        hybrid[\"preds\"][idxs].tolist() if idxs else []\n    )\n    experiment_data[ds_name][\"ground_truth\"] = np.array(ds_gt).tolist()\n    experiment_data[ds_name][\"confidences\"] = (\n        hybrid[\"confs\"][idxs].tolist() if idxs else []\n    )\n    experiment_data[ds_name][\"triggers\"] = (\n        hybrid[\"triggers\"][idxs].tolist() if idxs else []\n    )\n\n\ndef save_plot_predictions(ds_name, preds, gts):\n    if len(gts) == 0:\n        return\n    uniq = sorted(list(set(list(gts) + list(preds))))\n    mapping = {k: i for i, k in enumerate(uniq)}\n    x = np.arange(len(gts))\n    plt.figure(figsize=(8, 3))\n    plt.plot(x, [mapping[g] for g in gts], marker=\"o\", label=\"ground_truth\")\n    plt.plot(x, [mapping[p] for p in preds], marker=\"x\", label=\"prediction\")\n    plt.yticks(list(mapping.values()), list(mapping.keys()))\n    plt.xlabel(\"sample\")\n    plt.ylabel(\"label\")\n    plt.title(f\"Predictions vs Ground Truth: {ds_name}\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, f\"{ds_name}_pred_vs_gt.png\"))\n    plt.close()\n\n\nfor ds_name in experiment_data:\n    save_plot_predictions(\n        ds_name,\n        experiment_data[ds_name][\"predictions\"],\n        experiment_data[ds_name][\"ground_truth\"],\n    )\n\n\ndef save_stream_plot(name, values, ylabel, filename):\n    plt.figure(figsize=(8, 3))\n    plt.plot(np.arange(len(values)), values)\n    plt.xlabel(\"stream_index\")\n    plt.ylabel(ylabel)\n    plt.title(name)\n    plt.tight_layout()\n    plt.savefig(os.path.join(working_dir, filename))\n    plt.close()\n\n\nsave_stream_plot(\n    \"Hybrid Entropy\", hybrid[\"entropies\"], \"entropy\", \"hybrid_entropy_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Margin\", hybrid[\"margins\"], \"margin\", \"hybrid_margin_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Trigger\", hybrid[\"triggers\"], \"trigger\", \"hybrid_trigger_stream.png\"\n)\nsave_stream_plot(\n    \"Hybrid Confidence\", hybrid[\"confs\"], \"confidence\", \"hybrid_confidence_stream.png\"\n)\n\nsample_outputs = {}\ngen_model = clone_model_with_best_adapter()\ngen_model.eval()\nfor ds_name in [\"allenai_ai2_arc\", \"qiaojin_PubMedQA\", \"cais_mmlu\"]:\n    subset = [ex for ex in stream if ex[\"dataset\"] == ds_name][:3]\n    sample_outputs[ds_name] = []\n    for ex in subset:\n        enc = tokenizer(\n            normalize_text(ex[\"prompt\"]),\n            return_tensors=\"pt\",\n            truncation=True,\n            max_length=128,\n        )\n        enc = {k: v.to(device) for k, v in enc.items() if isinstance(v, torch.Tensor)}\n        with torch.no_grad():\n            out = gen_model.base.generate(\n                input_ids=enc[\"input_ids\"],\n                attention_mask=enc[\"attention_mask\"],\n                max_new_tokens=4,\n                do_sample=False,\n                pad_token_id=tokenizer.eos_token_id,\n            )\n        text = tokenizer.decode(out[0], skip_special_tokens=True)\n        sample_outputs[ds_name].append(\n            {\"prompt\": ex[\"prompt\"], \"generated\": text, \"label\": ex[\"label\"]}\n        )\n\nwith open(os.path.join(working_dir, \"sample_generations.json\"), \"w\") as f:\n    json.dump(sample_outputs, f, indent=2)\n\nnp.save(os.path.join(working_dir, \"stream_preds_frozen.npy\"), frozen[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_preds_always.npy\"), always[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_preds_hybrid.npy\"), hybrid[\"preds\"])\nnp.save(os.path.join(working_dir, \"stream_gt.npy\"), hybrid[\"gts\"])\nnp.save(os.path.join(working_dir, \"stream_conf_frozen.npy\"), frozen[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_conf_always.npy\"), always[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_conf_hybrid.npy\"), hybrid[\"confs\"])\nnp.save(os.path.join(working_dir, \"stream_entropy.npy\"), hybrid[\"entropies\"])\nnp.save(os.path.join(working_dir, \"stream_margin.npy\"), hybrid[\"margins\"])\nnp.save(os.path.join(working_dir, \"stream_triggers.npy\"), hybrid[\"triggers\"])\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\nnp.save(\n    os.path.join(working_dir, \"summary_metrics.npy\"),\n    {\n        \"frozen\": {\n            k: frozen[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n        \"always\": {\n            k: always[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n        \"hybrid\": {\n            k: hybrid[k] for k in [\"acc\", \"ece\", \"trigger_rate\", \"avg_ms\", \"srus\"]\n        },\n    },\n    allow_pickle=True,\n)\n\nprint(\n    f\"Frozen | acc={frozen['acc']:.4f} ece={frozen['ece']:.4f} trigger={frozen['trigger_rate']:.4f} ms={frozen['avg_ms']:.2f} SRUS={frozen['srus']:.4f}\"\n)\nprint(\n    f\"Always | acc={always['acc']:.4f} ece={always['ece']:.4f} trigger={always['trigger_rate']:.4f} ms={always['avg_ms']:.2f} SRUS={always['srus']:.4f}\"\n)\nprint(\n    f\"Hybrid | acc={hybrid['acc']:.4f} ece={hybrid['ece']:.4f} trigger={hybrid['trigger_rate']:.4f} ms={hybrid['avg_ms']:.2f} SRUS={hybrid['srus']:.4f}\"\n)\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy, time, math\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\nexperiment_data = {\n    \"arc_easy_shift\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"extra\": {},\n    },\n    \"pubmedqa_burst\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"extra\": {},\n    },\n    \"mmlu_clustered\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"extra\": {},\n    },\n}\n\n\n# ---------- data ----------\ndef make_block(n, d, kind=\"source\"):\n    X = np.random.randn(n, d).astype(np.float32)\n    if kind == \"source\":\n        z0 = X[:, :6].sum(1) + 0.3 * X[:, 12:15].sum(1)\n        z1 = X[:, 6:12].sum(1) + 0.2 * X[:, 15:18].sum(1)\n    elif kind == \"easy_shift\":\n        X = (1.15 * X + 0.2).astype(np.float32)\n        z0 = 0.8 * X[:, :6].sum(1) + 0.5 * X[:, 12:15].sum(1)\n        z1 = 0.9 * X[:, 6:12].sum(1) + 0.4 * X[:, 15:18].sum(1)\n    elif kind == \"burst_hard\":\n        X = (1.35 * X - 0.1).astype(np.float32)\n        z0 = 0.6 * X[:, :6].sum(1) + 0.8 * X[:, 9:15].sum(1)\n        z1 = 0.7 * X[:, 6:12].sum(1) + 0.9 * X[:, 3:9].sum(1)\n    else:  # clustered_alt\n        X = (0.9 * X + 0.45).astype(np.float32)\n        z0 = 0.5 * X[:, :6].sum(1) + X[:, 10:16].sum(1)\n        z1 = 0.5 * X[:, 6:12].sum(1) + X[:, 14:20].sum(1)\n    y = (z1 > z0).astype(np.int64)\n    return X, y\n\n\nclass SourceDataset(Dataset):\n    def __init__(self, n=2400, d=20, split=\"train\"):\n        X, y = make_block(n, d, \"source\")\n        mu = X.mean(0, keepdims=True)\n        sd = X.std(0, keepdims=True) + 1e-6\n        X = ((X - mu) / sd).astype(np.float32)\n        cut = int(0.8 * n)\n        if split == \"train\":\n            self.X, self.y = X[:cut], y[:cut]\n        else:\n            self.X, self.y = X[cut:], y[cut:]\n\n    def __len__(self):\n        return len(self.y)\n\n    def __getitem__(self, i):\n        return {\"x\": torch.tensor(self.X[i]), \"y\": torch.tensor(self.y[i])}\n\n\ndef make_stream(name, n=420, d=20):\n    if name == \"arc_easy_shift\":\n        kinds = [\"source\"] * 120 + [\"easy_shift\"] * 180 + [\"source\"] * 120\n    elif name == \"pubmedqa_burst\":\n        kinds = (\n            [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 80\n            + [\"burst_hard\"] * 80\n            + [\"source\"] * 100\n        )\n    else:  # mmlu_clustered\n        kinds = (\n            [\"source\"] * 70\n            + [\"clustered_alt\"] * 140\n            + [\"easy_shift\"] * 140\n            + [\"source\"] * 70\n        )\n    Xs, Ys = [], []\n    for k in kinds:\n        X, y = make_block(1, d, k)\n        Xs.append(X[0])\n        Ys.append(y[0])\n    X = np.stack(Xs).astype(np.float32)\n    mu = X.mean(0, keepdims=True)\n    sd = X.std(0, keepdims=True) + 1e-6\n    X = ((X - mu) / sd).astype(np.float32)\n    return [{\"x\": torch.tensor(X[i]), \"y\": torch.tensor(Ys[i])} for i in range(len(Ys))]\n\n\ntrain_ds, val_ds = SourceDataset(split=\"train\"), SourceDataset(split=\"val\")\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstreams = {k: make_stream(k) for k in experiment_data.keys()}\n\n\n# ---------- model ----------\nclass LoRALinear(nn.Module):\n    def __init__(self, inp, out, r=4, alpha=1.0):\n        super().__init__()\n        self.weight = nn.Parameter(torch.randn(out, inp) * 0.02)\n        self.bias = nn.Parameter(torch.zeros(out))\n        self.A = nn.Parameter(torch.randn(r, inp) * 0.02)\n        self.B = nn.Parameter(torch.zeros(out, r))\n        self.r, self.alpha = r, alpha\n\n    def forward(self, x):\n        delta = (self.B @ self.A) * (self.alpha / self.r)\n        return F.linear(x, self.weight + delta, self.bias)\n\n    def lora_parameters(self):\n        return [self.A, self.B]\n\n    def reset_lora(self):\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n\nclass Net(nn.Module):\n    def __init__(self, d=20, h=48):\n        super().__init__()\n        self.fc1 = LoRALinear(d, h, r=4, alpha=1.0)\n        self.fc2 = nn.Linear(h, 2)\n\n    def forward(self, x):\n        x = torch.tanh(self.fc1(x))\n        return self.fc2(x)\n\n    def freeze_backbone(self):\n        for p in self.parameters():\n            p.requires_grad = False\n        for p in self.fc1.lora_parameters():\n            p.requires_grad = True\n\n    def unfreeze_all(self):\n        for p in self.parameters():\n            p.requires_grad = True\n\n\nmodel = Net().to(device)\ncriterion = nn.CrossEntropyLoss()\nmodel.unfreeze_all()\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n# ---------- train ----------\nbest_state, best_val = None, 1e9\nfor epoch in range(1, 9):\n    model.train()\n    tr_loss = tr_ok = tr_n = 0\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        x, y = batch[\"x\"], batch[\"y\"]\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = criterion(logits, y)\n        loss.backward()\n        optimizer.step()\n        tr_loss += loss.item() * y.size(0)\n        tr_ok += (logits.argmax(1) == y).sum().item()\n        tr_n += y.size(0)\n    tr_loss /= tr_n\n    tr_acc = tr_ok / tr_n\n\n    model.eval()\n    va_loss = va_ok = va_n = 0\n    confs, corr = [], []\n    with torch.no_grad():\n        for batch in val_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            logits = model(x)\n            loss = criterion(logits, y)\n            p = F.softmax(logits, dim=-1)\n            c, pred = p.max(1)\n            confs.extend(c.detach().cpu().numpy().tolist())\n            corr.extend((pred == y).float().detach().cpu().numpy().tolist())\n            va_loss += loss.item() * y.size(0)\n            va_ok += (pred == y).sum().item()\n            va_n += y.size(0)\n    va_loss /= va_n\n    va_acc = va_ok / va_n\n    ece = 0.0\n    confs, corr = np.array(confs), np.array(corr)\n    bins = np.linspace(0, 1, 11)\n    for i in range(10):\n        m = (confs >= bins[i]) & (\n            confs < bins[i + 1] if i < 9 else confs <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(corr[m].mean() - confs[m].mean()) * m.mean()\n    srus = va_acc - 0.2 * ece  # epoch-level proxy before stream tests\n    for ds in experiment_data:\n        experiment_data[ds][\"metrics\"][\"train\"].append((epoch, tr_acc, srus))\n        experiment_data[ds][\"metrics\"][\"val\"].append((epoch, va_acc, srus))\n        experiment_data[ds][\"losses\"][\"train\"].append((epoch, tr_loss))\n        experiment_data[ds][\"losses\"][\"val\"].append((epoch, va_loss))\n        experiment_data[ds][\"timestamps\"].append(time.time())\n    print(f\"Epoch {epoch}: validation_loss = {va_loss:.4f}\")\n    if va_loss < best_val:\n        best_val = va_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\n\n# ---------- eval helpers ----------\ndef probs_entropy_margin(logits):\n    p = F.softmax(logits, dim=-1)\n    top2 = torch.topk(p, k=2, dim=-1).values\n    ent = -(p * torch.log(p + 1e-8)).sum(-1)\n    margin = top2[:, 0] - top2[:, 1]\n    return p, ent, margin\n\n\ndef compute_ece(conf, correct, n_bins=10):\n    conf, correct = np.array(conf), np.array(correct)\n    bins = np.linspace(0, 1, n_bins + 1)\n    ece = 0.0\n    for i in range(n_bins):\n        m = (conf >= bins[i]) & (\n            conf < bins[i + 1] if i < n_bins - 1 else conf <= bins[i + 1]\n        )\n        if m.any():\n            ece += abs(correct[m].mean() - conf[m].mean()) * m.mean()\n    return float(ece)\n\n\ndef stream_eval(\n    base_model,\n    data,\n    mode,\n    ent_thr=0.60,\n    margin_thr=0.18,\n    lr=0.08,\n    reset_every=90,\n    buffer_k=6,\n    prox=0.05,\n):\n    m = copy.deepcopy(base_model).to(device)\n    m.freeze_backbone()\n    initA = m.fc1.A.detach().clone()\n    initB = m.fc1.B.detach().clone()\n    opt = torch.optim.SGD(m.fc1.lora_parameters(), lr=lr)\n    preds, gt, confs, ents, triggers, cumacc = [], [], [], [], [], []\n    update_times = []\n    buf_x = []\n    ok = 0\n    burst_hist = []\n    for i, item in enumerate(data):\n        x = item[\"x\"].unsqueeze(0).to(device)\n        y = item[\"y\"].unsqueeze(0).to(device)\n        m.eval()\n        with torch.no_grad():\n            logits = m(x)\n            p, ent, margin = probs_entropy_margin(logits)\n            conf, pred = p.max(1)\n        pred_i, y_i = int(pred.item()), int(y.item())\n        preds.append(pred_i)\n        gt.append(y_i)\n        confs.append(float(conf.item()))\n        ents.append(float(ent.item()))\n        ok += int(pred_i == y_i)\n        cumacc.append(ok / (i + 1))\n        uncertain = (float(ent.item()) > ent_thr) and (\n            float(margin.item()) < margin_thr\n        )\n        burst_hist.append(int(uncertain))\n        local_burst = np.mean(burst_hist[-8:]) > 0.35\n        do_update = (mode == \"always\") or (\n            mode == \"gated\" and uncertain and local_burst\n        )\n        triggers.append(int(do_update))\n        if do_update:\n            buf_x.append(x.detach())\n        if len(buf_x) >= buffer_k:\n            start = time.time()\n            xb = torch.cat(buf_x, 0).to(device)\n            m.train()\n            logits_b = m(xb)\n            with torch.no_grad():\n                pseudo = logits_b.detach().argmax(1)\n            loss = criterion(logits_b, pseudo)\n 0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/cais_mmlu_hybrid_confidence_histogram.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/cais_mmlu_hybrid_trigger_trace.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/cais_mmlu_test_accuracy_by_policy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/cais_mmlu_test_ece_by_policy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/all_datasets_final_validation_metric_comparison.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/all_datasets_final_train_loss_comparison.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/all_datasets_test_accuracy_policy_comparison.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/all_datasets_test_ece_policy_comparison.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/mixed_stream_ground_truth_vs_generated_samples_prefix.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/mixed_stream_confidence_trace_by_policy.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/mixed_stream_hybrid_entropy_and_triggers.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/mixed_stream_hybrid_margin_trace.png", "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/mixed_stream_summary_metrics_by_policy.png"], []], "plot_analyses": [[{"analysis": "The cumulative shifted-stream accuracy plot shows a consistent ranking of Gated-LoRA > Frozen > Always-LoRA over most of the stream. Final cumulative accuracies in the legend are approximately 0.844 for gated, 0.839 for frozen, and 0.834 for always-on adaptation, so the gated policy yields a small absolute gain of about 0.5 points over frozen and about 1 point over always-on. The early part of the stream is noisy, but after the initial transient the green curve remains slightly above the others with relatively stable separation. This is qualitatively aligned with the hypothesis: selective adaptation appears to capture some benefit under shift without the degradation seen when adapting on every example. At the same time, the effect size is modest, so this should be framed as a preliminary proof-of-functionality result rather than strong evidence of broad robustness gains.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_shifted_stream_accuracy.png"}, {"analysis": "The training and validation accuracy curves on the synthetic reasoning dataset indicate that the base setup is learning successfully and generalizing well on the in-distribution task. Training accuracy rises rapidly from about 0.82 to around 0.99, while validation accuracy starts high near 0.94 and plateaus around 0.98. The train-validation gap remains very small throughout, suggesting little obvious overfitting. This is useful because it means downstream shifted-stream behavior is unlikely to be explained by a poorly trained base model. For the current stage, these curves support that the implementation is basically correct and the synthetic task is easy enough to debug adaptation behavior.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_accuracy.png"}, {"analysis": "The training and validation loss curves decrease smoothly and monotonically from roughly 0.60/0.48 to about 0.06 on both splits. The close alignment between train and validation loss further supports stable optimization and good generalization in the base model. There are no visible instabilities, divergence events, or late-epoch increases that would indicate optimization problems. This is a positive sign for the initial implementation stage because it suggests that any differences among adaptation modes are likely due to the test-time adaptation logic rather than training pathologies.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_train_val_loss.png"}, {"analysis": "The bar-chart summary compresses the shifted-stream results and makes the main takeaway clear: gated adaptation attains the highest accuracy, frozen is slightly lower, and always-on adaptation is the worst of the three. The adjacent trigger-rate panel is especially informative for the paper\u2019s central claim. Frozen naturally has zero updates, always-on has a trigger rate of 1.0, and gated appears to trigger only around 0.08 of the time. This means the best-performing method also updates on only a small fraction of examples, which is encouraging from both stability and efficiency perspectives. If this pattern holds on real benchmarks, it would be a strong practical argument for confidence-gated adaptation.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_stream_results_bar.png"}, {"analysis": "The second cumulative stream-accuracy plot is consistent with the earlier stream plot and reinforces the same ranking and temporal behavior. The trajectories suggest that always-on adaptation suffers a persistent penalty rather than just a short-lived warm-up issue, while gated adaptation preserves a small but durable advantage. Because the separations are narrow, repeated runs with error bars would be important before making strong claims. Still, for a preliminary implementation milestone, the consistency across duplicated summary views is reassuring.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_cumulative_stream_accuracy.png"}, {"analysis": "The predicted-label trace against ground truth provides a qualitative sanity check that the model is not collapsing to a single class and that predictions broadly track the binary target sequence. There are visible mismatches, but the predicted sequence follows the switching structure of the labels reasonably often. As a diagnostic figure, this is useful for confirming that the gated system is producing nontrivial outputs under shift. However, the trace is visually dense and not very quantitative; for a paper, segment-level error annotations or correctness bands would likely communicate adaptation behavior more clearly than overlapping binary line traces.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_predictions_vs_ground_truth_prefix.png"}, {"analysis": "The gated-mode confusion matrix shows balanced performance across both classes: true negatives are 334 and true positives are 341, with false positives 68 and false negatives 57. This corresponds to total accuracy of 675/800, about 0.844, matching the stream summary. The errors are fairly symmetric, with slightly fewer false negatives than false positives, so there is no strong indication of severe class bias in gated mode. This is a good sign because it suggests the observed gain is not coming from exploiting class imbalance or collapsing toward one label. For a more complete analysis, comparable confusion matrices for frozen and always-on modes would help reveal whether gating improves one class disproportionately.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_confusion_matrix.png"}, {"analysis": "The entropy-and-trigger plot supports the intended mechanism of the gated policy. Triggered updates occur at high-entropy points, and the entropy series exhibits many low values punctuated by spikes, implying that uncertainty is intermittent rather than constant. This matches the idea of selective adaptation on difficult or shifted examples. The trigger frequency also appears sparse relative to the full 800-step stream, consistent with the bar chart\u2019s low trigger rate. One caveat is that the plot does not directly show whether triggers are concentrated around actual distribution-shift boundaries or whether they correlate with subsequent accuracy recovery. That causal link would be valuable in future diagnostics.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_d3d17ca0404b4ea197b4013e7702d469_proc_20434/synthetic_reasoning_stream_gated_entropy_triggers.png"}], [], [], [{"analysis": "Aggregate test accuracy across allenai/ai2_arc, cais/mmlu, and qiaojin/PubMedQA is effectively identical for Frozen, Always, and Hybrid. This provides no evidence from these runs that test-time LoRA adaptation improves accuracy over a frozen model. For the paper hypothesis, this is an important negative result: selective adaptation is not helping on these three Hugging Face text benchmarks under the current setup. Since all three policies overlap visually, either the adaptation updates are too weak/infrequent to matter, the tasks are not shifted enough, or the evaluation pipeline is not exposing the conditions where online adaptation should help.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/allenai_ai2_arc_pred_vs_gt.png"}, {"analysis": "Aggregate calibration error (ECE) is also almost unchanged across policies on all three datasets. There is a tiny visual reduction for adaptation on cais/mmlu and a tiny increase on qiaojin/PubMedQA, but the differences are extremely small. This suggests the adaptation policies are not meaningfully changing confidence quality, which weakens the claim that confidence-gated updates improve robustness via better calibration. If calibration is a target contribution, you likely need stronger shift conditions, more sensitive confidence metrics, or per-window calibration analysis rather than only end-of-stream averages.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/qiaojin_PubMedQA_pred_vs_gt.png"}, {"analysis": "The final validation metric plot is inconsistent with the rest of the figures. Only qiaojin/PubMedQA has a nonzero value, while allenai/ai2_arc and cais/mmlu appear at zero, despite earlier plots showing nonzero accuracies for all datasets. This likely indicates a bug in metric aggregation, missing values, or an indexing/logging issue. This figure should not be used for scientific claims until the pipeline is audited. In a top-conference setting, this kind of inconsistency would immediately raise concerns about experimental reliability.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/cais_mmlu_pred_vs_gt.png"}, {"analysis": "For the mixed-stream summary, accuracy is again essentially identical across frozen, always, and hybrid policies, and calibration error is also flat. The notable difference is SRUS: Frozen is near zero, while Always is substantially negative and Hybrid is also negative but less so. This is the strongest qualitative signal in the current results. It suggests that adaptation may impose a robustness cost under stream shift even when headline accuracy does not move. Hybrid appears less harmful than Always, which is directionally consistent with the hypothesis that selective gating is safer than always adapting, but it still does not outperform the frozen baseline.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/hybrid_entropy_stream.png"}, {"analysis": "The hybrid entropy/trigger plot shows a clear structural break around stream step 29. Entropy is high and fairly stable before that point, then drops sharply and remains in a lower band afterward. Trigger markers appear throughout, indicating the gate is active, but the post-shift lower entropy does not correspond to visible gains in the aggregate metrics. This could mean the gate is detecting a regime change without producing beneficial parameter updates, or that the later segment is simply easier and the entropy drop is not caused by successful adaptation. To disambiguate, you need pre/post-shift accuracy and calibration sliced by window, plus ablations comparing entropy trajectories with and without updates.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/hybrid_margin_stream.png"}, {"analysis": "On allenai/ai2_arc, test accuracy is identical across Frozen, Always, and Hybrid at roughly 0.27. This indicates no measurable benefit from adaptation on this dataset. Since ARC is a reasoning benchmark with multiple-choice structure, one possibility is that the LoRA update objective is poorly aligned with the evaluation target, so online updates are not improving answer selection. Another possibility is that the model\u2019s uncertainty estimates are not informative enough to trigger useful adaptation windows.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/hybrid_trigger_stream.png"}, {"analysis": "On allenai/ai2_arc, calibration error is also nearly unchanged across policies, with Frozen marginally lower than the adaptation variants. This is mildly unfavorable to test-time adaptation: not only is accuracy flat, but confidence quality may be slightly worse when updates are enabled. Even though the difference is tiny, the direction matters because it suggests adaptation may inject noise without improving correctness.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/hybrid_confidence_stream.png"}, {"analysis": "On qiaojin/PubMedQA, test accuracy is again identical across policies at roughly 0.29. This is especially informative because PubMedQA is domain-specific and should be one of the more plausible places for selective adaptation to help. The absence of gains suggests either the domain shift is still too weak in the current stream construction, or the adaptation signal from test examples is not rich enough to improve biomedical reasoning in this setup.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/allenai_ai2_arc_train_val_metric_curves.png"}, {"analysis": "On qiaojin/PubMedQA, calibration error is essentially unchanged, with adaptation very slightly worse than Frozen. Combined with flat accuracy, this argues against the current adaptation recipe for domain-specialized QA. For a stronger paper, consider constructing harder biomedical bursts, using retrieval-conditioned uncertainty, or updating only on self-consistent disagreement cases rather than raw entropy alone.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/allenai_ai2_arc_train_val_loss_curves.png"}, {"analysis": "On cais/mmlu, test accuracy is again flat across all three policies at roughly 0.36. Since MMLU covers heterogeneous subjects, this result suggests that the current online LoRA mechanism is not extracting useful cross-example transfer even when the stream could contain local topical structure. This weakens the central claim unless you can show gains under a more adversarial clustered-subject ordering or on specific subject subsets rather than the aggregate.", "plot_path": "experiments/2026-03-29_01-53-16_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_dc9469dcb25b4a44b7f8eacef1d063b1_proc_31429/allenai_ai2_arc_ground_truth_vs_generated_samples.png"}], []], "vlm_feedback_summary": ["The uploaded figures show a preliminary synthetic experiment with a base\nreasoning model that trains cleanly, then is evaluated under a shifted stream\nwith three modes: frozen, always-on LoRA, and confidence-gated LoRA. Across the\nstream-level plots and summary bars, gated adaptation is consistently best but\nonly by a small margin over frozen, while always-on adaptation is slightly worse\nthan frozen. Trigger-rate plots indicate the gated policy updates rarely\nrelative to always-on, supporting the intended selectivity/efficiency story.\nAdditional diagnostics suggest the synthetic setup is functioning:\ntrain/validation curves are stable, the gated confusion matrix is balanced, and\nentropy spikes align with trigger events. Overall, the results support\nfeasibility of the implementation and weakly support the hypothesis that\nselective adaptation is safer than always adapting, but the gains are modest and\nthe evidence is still preliminary due to the synthetic binary setting and\nlimited diagnostics on compute/calibration.", "[]", "[]", "Plots were received for three Hugging Face text datasets (allenai/ai2_arc,\nqiaojin/PubMedQA, cais/mmlu) plus mixed-stream summaries. Across nearly all\nbars, Frozen, Always, and Hybrid policies are visually identical or differ only\nnegligibly. Accuracy remains unchanged across policies on each dataset and in\naggregate. Calibration error also remains nearly unchanged, with only tiny\ndifferences that are not clearly meaningful from the plots. Mixed-stream SRUS\nshows Frozen near zero while Always and Hybrid are negative, suggesting\nadaptation may reduce shift-robust utility despite unchanged accuracy. The\nentropy/trigger plot for Hybrid shows a clear regime change around stream step\n~29, with entropy dropping sharply and remaining lower afterward, indicating the\ngate is responding to a stream shift or burst structure, but this did not\ntranslate into visible accuracy gains in the summary plots. One final validation\nmetric plot appears incomplete or suspicious, showing only PubMedQA with a\nnonzero bar while ARC and MMLU are zero, which is inconsistent with the other\nplots and likely reflects logging/aggregation issues rather than a real result.", "[]"], "exec_         font-weight: bold;
      }

      .tab.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: #282c34;
      }

      .tab-content {
        display: none;
        padding-top: 40px; /* Space for tabs */
      }

      .tab-content.active {
        display: block;
      }

      .stage-info {
        padding: 10px;
        background-color: #282c34;
        color: #f2f0e7;
        margin-bottom: 10px;

      .stage-status {
        display: inline-block;
        padding: 3px 6px;
        border-radius: 3px;
        margin-left: 8px;
        font-size: 0.8em;
      }

      .stage-status.completed {
        background-color: #4caf50;
      }

      .stage-status.in-progress {

      }

      .stage-status.not-started {

      }

  </head>
