      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

const treeStructData = {"edges": [], "layout": [[0.0, 0.0], [1.0, 0.0]], "plan": ["I will implement a lightweight synthetic multimodal streaming benchmark that\nmimics VQA-style adaptation while remaining fully self-contained and fast. The\nmodel has an image branch, a text-question branch, and a small adapter head so\nwe can compare frozen inference, entropy-minimization test-time adaptation, and\nconsistency-gated adaptation. Each streamed example includes an image, a\nquestion, a class label, plus auxiliary \u201ccaption\u201d and \u201crationale\u201d labels that\nact as cross-modal consistency signals. I will first train the base model on a\nsource distribution, then evaluate online on a shifted target stream where\nspurious shortcuts and noise make naive adaptation unstable. During streaming,\nthe entropy baseline updates the adapter on every uncertain sample, while the\nproposed baseline updates only when answer prediction agrees with caption and\nrationale predictions and confidence is sufficient. For evaluation, I will\ncompute accuracy, adaptation frequency, latency proxy, and a simple Stream\nStability-Adjusted Accuracy that penalizes variance across windows and post-\nupdate drops. I will also save all metrics, predictions, and losses as numpy\nfiles, and generate a plot comparing cumulative stream accuracy for the three\nmethods. This gives a clean first-pass baseline aligned with the research idea\nbefore moving to real open VLMs and Hugging Face multimodal datasets.", "I will implement a compact synthetic multimodal benchmark that is deliberately\nnontrivial at test time: labels depend on a latent concept, images are\ninformative but noisy, and the question text contains a shortcut that flips\nunder target shift. A small fusion network with a lightweight adapter will be\ntrained on the source distribution, then evaluated on a streamed target\ndistribution under three modes: frozen, entropy-minimization adaptation, and\nconsistency-gated adaptation. To make the consistency signal concrete and cheap,\nI will create auxiliary caption and rationale classifiers from the same latent\nconcept and only adapt when answer, caption, and rationale predictions agree\nwhile entropy is high enough to justify updating. This directly operationalizes\nthe cross-modal consistency hypothesis without needing a large generative VLM in\nthe first baseline. I will track online accuracy, adaptation frequency, windowed\naccuracy variance, and a simple Stream Stability-Adjusted Accuracy that\npenalizes instability and harmful post-update drops. To avoid the previous\nfailure mode, the target stream will include stronger image corruption and a\nshortcut correlation flip so frozen performance degrades and updates actually\noccur. The script will save metrics and plots for stream accuracy and adaptation\nevents, and it will print validation loss each epoch plus final stream metrics\nfor all methods. This gives a simple but functional end-to-end baseline that can\nlater be swapped for a real open VLM and richer consistency signals."], "code": ["import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport time\nimport copy\nimport math\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"synthetic_multimodal_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"stream\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_details\": {},\n    }\n}\n\nNUM_CLASSES = 3\nIMG_SHAPE = (3, 8, 8)\nQ_DIM = 6\n\n\nclass SyntheticMultiModalDataset(Dataset):\n    def __init__(self, n=1200, split=\"train\", shift=False):\n        self.samples = []\n        for i in range(n):\n            y = np.random.randint(NUM_CLASSES)\n            qid = np.random.randint(0, 2)  # question type\n            q = np.zeros(Q_DIM, dtype=np.float32)\n            q[qid] = 1.0\n\n            img = np.random.randn(*IMG_SHAPE).astype(np.float32) * 0.25\n\n            # source rule: each class corresponds to one bright channel block\n            img[y, 2:6, 2:6] += 1.5\n\n            # spurious feature\n            spur = np.zeros(NUM_CLASSES, dtype=np.float32)\n            if not shift:\n                spur[y] = 1.0\n            else:\n                # shifted stream: shortcut conflicts often\n                wrong = (y + np.random.randint(1, NUM_CLASSES)) % NUM_CLASSES\n                if np.random.rand() < 0.7:\n                    spur[wrong] = 1.0\n                else:\n                    spur[y] = 1.0\n                # make image noisier under shift\n                img += np.random.randn(*IMG_SHAPE).astype(np.float32) * 0.20\n\n            q[2:5] = spur\n\n            # auxiliary labels with some noise: caption and rationale should mostly match y\n            cap = (\n                y\n                if np.random.rand() > (0.1 if not shift else 0.2)\n                else np.random.randint(NUM_CLASSES)\n            )\n            rat = (\n                y\n                if np.random.rand() > (0.15 if not shift else 0.25)\n                else np.random.randint(NUM_CLASSES)\n            )\n\n            self.samples.append((img, q, y, cap, rat))\n\n    def __len__(self):\n        return len(self.samples)\n\n    def __getitem__(self, idx):\n        img, q, y, cap, rat = self.samples[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"question\": torch.tensor(q, dtype=torch.float32),\n            \"label\": torch.tensor(y, dtype=torch.long),\n            \"caption_label\": torch.tensor(cap, dtype=torch.long),\n            \"rationale_label\": torch.tensor(rat, dtype=torch.long),\n        }\n\n\ntrain_ds = SyntheticMultiModalDataset(n=1200, split=\"train\", shift=False)\nval_ds = SyntheticMultiModalDataset(n=300, split=\"val\", shift=False)\nstream_ds = SyntheticMultiModalDataset(n=400, split=\"stream\", shift=True)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\nclass MultiModalNet(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.img_net = nn.Sequential(\n            nn.Flatten(),\n            nn.Linear(np.prod(IMG_SHAPE), 64),\n            nn.ReLU(),\n            nn.Linear(64, 32),\n            nn.ReLU(),\n        )\n        self.q_net = nn.Sequential(\n            nn.Linear(Q_DIM, 16), nn.ReLU(), nn.Linear(16, 16), nn.ReLU()\n        )\n        self.fuse = nn.Sequential(nn.Linear(48, 32), nn.ReLU())\n        self.main_head = nn.Linear(32, NUM_CLASSES)\n        self.caption_head = nn.Linear(32, NUM_CLASSES)\n        self.rationale_head = nn.Linear(32, NUM_CLASSES)\n        self.adapter = nn.Linear(32, NUM_CLASSES, bias=False)\n\n    def forward(self, image, question):\n        # normalize inputs\n        image = (image - image.mean(dim=(1, 2, 3), keepdim=True)) / (\n            image.std(dim=(1, 2, 3), keepdim=True) + 1e-6\n        )\n        question = question / (question.norm(dim=1, keepdim=True) + 1e-6)\n        x1 = self.img_net(image)\n        x2 = self.q_net(question)\n        z = self.fuse(torch.cat([x1, x2], dim=1))\n        main_logits = self.main_head(z) + self.adapter(z)\n        cap_logits = self.caption_head(z)\n        rat_logits = self.rationale_head(z)\n        return main_logits, cap_logits, rat_logits\n\n\nmodel = MultiModalNet().to(device)\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\ndef evaluate_loader(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            logits, cap_logits, rat_logits = model(batch[\"image\"], batch[\"question\"])\n            loss = (\n                F.cross_entropy(logits, batch[\"label\"])\n                + 0.3 * F.cross_entropy(cap_logits, batch[\"caption_label\"])\n                + 0.3 * F.cross_entropy(rat_logits, batch[\"rationale_label\"])\n            )\n            total_loss += loss.item() * batch[\"label\"].size(0)\n            total_correct += (logits.argmax(1) == batch[\"label\"]).sum().item()\n            total += batch[\"label\"].size(0)\n    return total_loss / total, total_correct / total\n\n\nepochs = 8\nfor epoch in range(1, epochs + 1):\n    model.train()\n    running_loss, running_correct, total = 0.0, 0, 0\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        optimizer.zero_grad()\n        logits, cap_logits, rat_logits = model(batch[\"image\"], batch[\"question\"])\n        loss = (\n            F.cross_entropy(logits, batch[\"label\"])\n            + 0.3 * F.cross_entropy(cap_logits, batch[\"caption_label\"])\n            + 0.3 * F.cross_entropy(rat_logits, batch[\"rationale_label\"])\n        )\n        loss.backward()\n        optimizer.step()\n        running_loss += loss.item() * batch[\"label\"].size(0)\n        running_correct += (logits.argmax(1) == batch[\"label\"]).sum().item()\n        total += batch[\"label\"].size(0)\n\n    train_loss = running_loss / total\n    train_acc = running_correct / total\n    val_loss, val_acc = evaluate_loader(model, val_loader)\n\n    experiment_data[\"synthetic_multimodal_stream\"][\"metrics\"][\"train\"].append(\n        {\"epoch\": epoch, \"accuracy\": train_acc}\n    )\n    experiment_data[\"synthetic_multimodal_stream\"][\"metrics\"][\"val\"].append(\n        {\"epoch\": epoch, \"accuracy\": val_acc}\n    )\n    experiment_data[\"synthetic_multimodal_stream\"][\"losses\"][\"train\"].append(\n        {\"epoch\": epoch, \"loss\": train_loss}\n    )\n    experiment_data[\"synthetic_multimodal_stream\"][\"losses\"][\"val\"].append(\n        {\"epoch\": epoch, \"loss\": val_loss}\n    )\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\nbase_state = copy.deepcopy(model.state_dict())\n\n\ndef stream_stability_adjusted_accuracy(accs, update_steps, window=25):\n    accs = np.array(accs, dtype=np.float32)\n    mean_acc = accs.mean() if len(accs) else 0.0\n    if len(accs) < window:\n        var_penalty = float(accs.std()) if len(accs) else 0.0\n    else:\n        wins = [\n            accs[i : i + window].mean()\n            for i in range(0, len(accs) - window + 1, window)\n        ]\n        var_penalty = float(np.std(wins))\n    drop_penalty = 0.0\n    for s in update_steps:\n        if s + 5 < len(accs):\n            pre = accs[max(0, s - 5) : s].mean() if s > 0 else accs[:1].mean()\n            post = accs[s : min(len(accs), s + 5)].mean()\n            drop_penalty += max(0.0, pre - post)\n    drop_penalty = drop_penalty / max(1, len(update_steps))\n    return float(mean_acc - 0.5 * var_penalty - 0.5 * drop_penalty)\n\n\ndef run_stream(method=\"frozen\"):\n    m = MultiModalNet().to(device)\n    m.load_state_dict(base_state)\n\n    # freeze all except adapter for adaptation\n    for p in m.parameters():\n        p.requires_grad = False\n    for p in m.adapter.parameters():\n        p.requires_grad = True\n    adapt_optim = torch.optim.SGD(m.adapter.parameters(), lr=0.05)\n\n    preds, gts, accs, update_steps = [], [], [], []\n    entropies, confidences = [], []\n    start = time.time()\n\n    m.eval()\n    for idx in range(len(stream_ds)):\n        batch = stream_ds[idx]\n        batch = {\n            k: v.unsqueeze(0).to(device) if isinstance(v, torch.Tensor) else v\n            for k, v in batch.items()\n        }\n\n        with torch.no_grad():\n            logits, cap_logits, rat_logits = m(batch[\"image\"], batch[\"question\"])\n            probs = F.softmax(logits, dim=1)\n            pred = logits.argmax(1)\n            conf = probs.max(1).values.item()\n            ent = -(probs * (probs.clamp_min(1e-8).log())).sum(1).item()\n            cap_pred = cap_logits.argmax(1)\n            rat_pred = rat_logits.argmax(1)\n\n        gt = batch[\"label\"].item()\n        correct = int(pred.item() == gt)\n        preds.append(pred.item())\n        gts.append(gt)\n        accs.append(correct)\n        entropies.append(ent)\n        confidences.append(conf)\n\n        do_update = False\n        if method == \"entropy\":\n            do_update = ent > 0.7\n        elif method == \"consistency\":\n            agree = pred.item() == cap_pred.item() == rat_pred.item()\n            do_update = (ent > 0.5) and (conf > 0.45) and agree\n\n        if do_update:\n            m.train()\n            logits, cap_logits, rat_logits = m(batch[\"image\"], batch[\"question\"])\n            probs = F.softmax(logits, dim=1)\n            pseudo = probs.detach().argmax(1)\n            loss = 0.0\n            if method == \"entropy\":\n                loss = -(probs * (probs.clamp_min(1e-8).log())).sum(1).mean()\n            else:\n                # consistency-gated pseudo-labeling with auxiliary agreement\n                loss = (\n                    F.cross_entropy(logits, pseudo)\n                    + 0.5 * F.cross_entropy(cap_logits, pseudo)\n                    + 0.5 * F.cross_entropy(rat_logits, pseudo)\n                )\n            adapt_optim.zero_grad()\n            loss.backward()\n            adapt_optim.step()\n            update_steps.append(idx)\n            m.eval()\n\n    elapsed = time.time() - start\n    mean_acc = float(np.mean(accs))\n    ssaa = stream_stability_adjusted_accuracy(accs, update_steps)\n    result = {\n        \"accuracy\": mean_acc,\n        \"stream_stability_adjusted_accuracy\": ssaa,\n        \"adaptation_frequency\": len(update_steps) / len(stream_ds),\n        \"latency_seconds\": elapsed,\n        \"predictions\": np.array(preds),\n        \"ground_truth\": np.array(gts),\n        \"acc_curve\": np.array(accs),\n        \"update_steps\": np.array(update_steps),\n        \"entropies\": np.array(entropies),\n        \"confidences\": np.array(confidences),\n    }\n    return result\n\n\nresults = {\n    \"frozen\": run_stream(\"frozen\"),\n    \"entropy\": run_stream(\"entropy\"),\n    \"consistency\": run_stream(\"consistency\"),\n}\n\nfor name, res in results.items():\n    print(\n        f\"{name} | accuracy={res['accuracy']:.4f} | SSAA={res['stream_stability_adjusted_accuracy']:.4f} | adapt_freq={res['adaptation_frequency']:.4f} | latency={res['latency_seconds']:.2f}s\"\n    )\n\nexperiment_data[\"synthetic_multimodal_stream\"][\"stream_details\"] = {\n    k: {\n        \"accuracy\": v[\"accuracy\"],\n        \"stream_stability_adjusted_accuracy\": v[\"stream_stability_adjusted_accuracy\"],\n        \"adaptation_frequency\": v[\"adaptation_frequency\"],\n        \"latency_seconds\": v[\"latency_seconds\"],\n    }\n    for k, v in results.items()\n}\nexperiment_data[\"synthetic_multimodal_stream\"][\"predictions\"] = results[\"consistency\"][\n    \"predictions\"\n].tolist()\nexperiment_data[\"synthetic_multimodal_stream\"][\"ground_truth\"] = results[\"consistency\"][\n    \"ground_truth\"\n].tolist()\nexperiment_data[\"synthetic_multimodal_stream\"][\"timestamps\"] = [\n    {\"time\": time.time(), \"epoch\": e + 1} for e in range(epochs)\n]\nexperiment_data[\"synthetic_multimodal_stream\"][\"metrics\"][\"stream\"].append(\n    {\n        \"frozen_ssaa\": results[\"frozen\"][\"stream_stability_adjusted_accuracy\"],\n        \"entropy_ssaa\": results[\"entropy\"][\"stream_stability_adjusted_accuracy\"],\n        \"consistency_ssaa\": results[\"consistency\"][\n            \"stream_stability_adjusted_accuracy\"\n        ],\n    }\n)\n\nnp.save(\n    os.path.join(working_dir, \"frozen_acc_curve.npy\"), results[\"frozen\"][\"acc_curve\"]\n)\nnp.save(\n    os.path.join(working_dir, \"entropy_acc_curve.npy\"), results[\"entropy\"][\"acc_curve\"]\n)\nnp.save(\n    os.path.join(working_dir, \"consistency_acc_curve.npy\"),\n    results[\"consistency\"][\"acc_curve\"],\n)\nnp.save(\n    os.path.join(working_dir, \"frozen_updates.npy\"), results[\"frozen\"][\"update_steps\"]\n)\nnp.save(\n    os.path.join(working_dir, \"entropy_updates.npy\"), results[\"entropy\"][\"update_steps\"]\n)\nnp.save(\n    os.path.join(working_dir, \"consistency_updates.npy\"),\n    results[\"consistency\"][\"update_steps\"],\n)\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\nx = np.arange(len(stream_ds))\nplt.figure(figsize=(10, 5))\nfor name, color in [\n    (\"frozen\", \"tab:blue\"),\n    (\"entropy\", \"tab:orange\"),\n    (\"consistency\", \"tab:green\"),\n]:\n    curve = results[name][\"acc_curve\"]\n    cum = np.cumsum(curve) / (np.arange(len(curve)) + 1)\n    plt.plot(x, cum, label=name, color=color)\nplt.xlabel(\"Stream step\")\nplt.ylabel(\"Cumulative accuracy\")\nplt.title(\"Synthetic multimodal stream: online performance\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"synthetic_stream_cumulative_accuracy.png\"))\nplt.close()\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy\nimport math\nimport time\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(0)\nnp.random.seed(0)\n\nexperiment_data = {\n    \"synthetic_multimodal\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"stream\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream_details\": {},\n    }\n}\n\n\n# ---------- Synthetic data ----------\ndef render_image(label, noise=0.15, strength=1.0):\n    img = np.random.randn(1, 8, 8).astype(np.float32) * noise\n    if label == 0:  # vertical bar\n        img[0, :, 3:5] += strength\n    else:  # horizontal bar\n        img[0, 3:5, :] += strength\n    img = np.clip(img, -2, 2)\n    img = (img - img.mean()) / (img.std() + 1e-6)  # normalize input\n    return img.astype(np.float32)\n\n\nclass SyntheticMMDataset(Dataset):\n    def __init__(self, n, split=\"source\"):\n        self.samples = []\n        for _ in range(n):\n            y = np.random.randint(0, 2)\n            if split == \"source\":\n                q_corr = 0.9\n                img_noise, img_strength = 0.18, 0.9\n            elif split == \"val\":\n                q_corr = 0.9\n                img_noise, img_strength = 0.20, 0.85\n            else:  # target shift\n                q_corr = 0.1  # shortcut flips\n                img_noise, img_strength = 0.45, 0.45  # image degraded\n            q_token = y if np.random.rand() < q_corr else 1 - y\n            img = render_image(y, noise=img_noise, strength=img_strength)\n            caption = y\n            rationale = y\n            self.samples.append((img, q_token, y, caption, rationale))\n\n    def __len__(self):\n        return len(self.samples)\n\n    def __getitem__(self, idx):\n        img, q, y, c, r = self.samples[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"question\": torch.tensor(q, dtype=torch.long),\n            \"label\": torch.tensor(y, dtype=torch.long),\n            \"caption\": torch.tensor(c, dtype=torch.long),\n            \"rationale\": torch.tensor(r, dtype=torch.long),\n        }\n\n\ntrain_ds = SyntheticMMDataset(3000, \"source\")\nval_ds = SyntheticMMDataset(600, \"val\")\ntarget_ds = SyntheticMMDataset(1200, \"target\")\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n\n\n# ---------- Model ----------\nclass Adapter(nn.Module):\n    def __init__(self, d):\n        super().__init__()\n        self.net = nn.Sequential(nn.Linear(d, d), nn.ReLU(), nn.Linear(d, d))\n\n    def forward(self, x):\n        return x + 0.3 * self.net(x)\n\n\nclass MMNet(nn.Module):\n    def __init__(self, d=32):\n        super().__init__()\n        self.img_enc = nn.Sequential(\n            nn.Conv2d(1, 8, 3, padding=1),\n            nn.ReLU(),\n            nn.Conv2d(8, 8, 3, padding=1),\n            nn.ReLU(),\n            nn.Flatten(),\n            nn.Linear(8 * 8 * 8, d),\n            nn.ReLU(),\n        )\n        self.q_emb = nn.Embedding(2, d)\n        self.fuse = nn.Sequential(nn.Linear(2 * d, d), nn.ReLU())\n        self.adapter = Adapter(d)\n        self.ans_head = nn.Linear(d, 2)\n        self.cap_head = nn.Linear(d, 2)\n        self.rat_head = nn.Linear(d, 2)\n\n    def forward(self, image, question):\n        z_img = self.img_enc(image)\n        z_q = self.q_emb(question)\n        z = self.fuse(torch.cat([z_img, z_q], dim=1))\n        z = self.adapter(z)\n        return {\n            \"answer\": self.ans_head(z),\n            \"caption\": self.cap_head(z),\n            \"rationale\": self.rat_head(z),\n        }\n\n\nmodel = MMNet().to(device)\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\n# ---------- Train ----------\ndef evaluate(loader, model):\n    model.eval()\n    total_loss, total_acc, n = 0.0, 0.0, 0\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            out = model(batch[\"image\"], batch[\"question\"])\n            loss = (\n                F.cross_entropy(out[\"answer\"], batch[\"label\"])\n                + 0.5 * F.cross_entropy(out[\"caption\"], batch[\"caption\"])\n                + 0.5 * F.cross_entropy(out[\"rationale\"], batch[\"rationale\"])\n            )\n            pred = out[\"answer\"].argmax(1)\n            total_loss += loss.item() * batch[\"label\"].size(0)\n            total_acc += (pred == batch[\"label\"]).float().sum().item()\n            n += batch[\"label\"].size(0)\n    return total_loss / n, total_acc / n\n\n\nepochs = 8\nfor epoch in range(1, epochs + 1):\n    model.train()\n    total_loss, total_acc, n = 0.0, 0.0, 0\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        optimizer.zero_grad()\n        out = model(batch[\"image\"], batch[\"question\"])\n        loss = (\n            F.cross_entropy(out[\"answer\"], batch[\"label\"])\n            + 0.5 * F.cross_entropy(out[\"caption\"], batch[\"caption\"])\n            + 0.5 * F.cross_entropy(out[\"rationale\"], batch[\"rationale\"])\n        )\n        loss.backward()\n        optimizer.step()\n        pred = out[\"answer\"].argmax(1)\n        total_loss += loss.item() * batch[\"label\"].size(0)\n        total_acc += (pred == batch[\"label\"]).float().sum().item()\n        n += batch[\"label\"].size(0)\n    train_loss, train_acc = total_loss / n, total_acc / n\n    val_loss, val_acc = evaluate(val_loader, model)\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n    experiment_data[\"synthetic_multimodal\"][\"losses\"][\"train\"].append(\n        (epoch, train_loss)\n    )\n    experiment_data[\"synthetic_multimodal\"][\"losses\"][\"val\"].append((epoch, val_loss))\n    experiment_data[\"synthetic_multimodal\"][\"metrics\"][\"train\"].append(\n        (epoch, train_acc)\n    )\n    experiment_data[\"synthetic_multimodal\"][\"metrics\"][\"val\"].append((epoch, val_acc))\n    experiment_data[\"synthetic_multimodal\"][\"timestamps\"].append( _curves.png", "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_stream_metric_summary.png", "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_stream_accuracy.png", "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_adaptation_updates.png", "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_entropy_stream.png", "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_confusion_matrix_consistency.png"]], "plot_analyses": [[], [{"analysis": "Cumulative online performance is flat at 1.00 for all methods across the entire stream, with all curves overlapping exactly. This indicates no observable difference between frozen inference, entropy-based adaptation, and consistency-gated adaptation in cumulative accuracy on this run. For an initial implementation, this is consistent with basic functional correctness, but scientifically it is uninformative because the stream appears too easy, the metric too coarse, or the adaptation effects too small to register. If this is intended as a sanity check, it passes; if intended to test the hypothesis, it does not yet stress the methods enough.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_stream_cumulative_accuracy.png"}, {"analysis": "Moving accuracy over the stream stays mostly between about 0.92 and 1.00, with occasional dips to roughly 0.84\u20130.88. The three methods visually overlap almost everywhere, suggesting adaptation has minimal effect on local accuracy fluctuations. This implies either the target stream shift is weak, the model is already robust, or the adaptation objective/trigger is not changing predictions enough to matter. The brief dips identify useful regions for debugging: inspect whether these correspond to ambiguous examples, modality conflicts, or update events that fail to recover performance.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_stream_accuracy.png"}, {"analysis": "Update-event traces show both entropy and consistency modes adapting sparsely over the stream, with consistency appearing slightly less frequent overall. This is directionally aligned with the hypothesis that consistency gating should be more selective. However, because downstream accuracy is nearly unchanged, the current evidence supports only the claim that the trigger changes update frequency, not that it improves stability or accuracy. A useful next step is to quantify update precision: what fraction of updates are followed by improved local accuracy versus degradation.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_adaptation_events.png"}, {"analysis": "Training and validation loss collapse to essentially zero by the second epoch, after starting from moderate training loss in the first epoch. This suggests the synthetic source task is extremely easy or highly separable. While this confirms the pipeline can fit the training distribution, it also raises concern that the representation is overprepared for the target stream, leaving little room for test-time learning to help. For the paper\u2019s goal, a harder source-target mismatch or noisier multimodal supervision is needed.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_loss_curves.png"}, {"analysis": "Training accuracy starts near 0.95 and reaches 1.00 by the second epoch, while validation accuracy is already at 1.00 from the start and remains there. This near-perfect source generalization strongly suggests the benchmark is saturated. As a result, any adaptation comparison on the target stream is likely to show ceiling effects. For preliminary implementation this is acceptable, but for meaningful insight the dataset should include stronger multimodal ambiguity, OCR/chart noise, distractors, or controlled distribution shift.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_accuracy_curves.png"}, {"analysis": "The final summary bars indicate very similar target-stream accuracy for frozen, entropy/Tent-like adaptation, and consistency adaptation, all around the mid-to-high 0.96 range. SSAA is slightly highest for frozen and slightly lower for the adaptive methods, suggesting adaptation may introduce a small stability cost rather than a benefit in this setup. Adaptation frequency is low for both adaptive methods, and consistency is lower than entropy, which supports the intended conservative behavior. The main takeaway is that selectivity changes as designed, but there is no clear performance gain yet.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_stream_metric_summary.png"}, {"analysis": "Stream accuracy over time remains high throughout, with occasional short-lived drops. Consistency adaptation tracks frozen and entropy closely, without obvious recovery advantages after difficult segments. This weakens the current hypothesis in this particular synthetic setting: consistency gating is not yet yielding visibly safer or more effective online learning. Still, the absence of major collapses is encouraging for implementation stability; the challenge now is to create conditions where harmful updates are possible so the gating mechanism can demonstrate value.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_stream_accuracy.png"}, {"analysis": "The adaptation update plot repeats the same qualitative pattern: sparse updates for both methods, with consistency somewhat more selective. This redundancy reinforces that the implementation likely triggers updates as expected. What is missing is a causal link between these events and metric changes. Consider plotting local pre/post-update accuracy, entropy reduction, or agreement score trajectories around update times to show whether consistency-triggered updates are better targeted.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_adaptation_updates.png"}, {"analysis": "Prediction entropy across the stream is usually near zero with intermittent spikes up to about 0.7 for both entropy and consistency modes. The heavy overlap suggests both modes see similar uncertainty structure in the stream. This is useful because it indicates the consistency gate is not simply operating on a completely different subset of examples due to gross implementation mismatch. However, low average entropy again indicates an easy task; to evaluate entropy minimization versus consistency gating fairly, more sustained uncertainty or adversarially ambiguous multimodal samples are needed.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_entropy_stream.png"}, {"analysis": "The consistency-mode confusion matrix shows strong performance with 556 true negatives and 606 true positives, against 23 false positives and 15 false negatives. This corresponds to high balanced accuracy and suggests the model is not obviously biased toward one class. The slightly lower false-negative count than false-positive count indicates a mild tendency toward predicting the positive class, but the difference is small. As a diagnostic this is reassuring, though the binary synthetic task is likely too simple to probe the proposed multimodal consistency mechanism in a way that would support a top-tier paper.", "plot_path": "experiments/2026-03-29_01-53-16_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_d0f3ce9ce14b40f48ea3074b87a2e7b0_proc_20440/synthetic_multimodal_confusion_matrix_consistency.png"}]], "vlm_feedback_summary": ["[]", "Plots show a synthetic multimodal test-time adaptation setup with near-ceiling\nsource performance and very small differences among frozen, entropy, and\nconsistency methods on the target stream. Consistency appears slightly more\nconservative in adaptation frequency while maintaining accuracy close to entropy\nand frozen baselines. However, several plots indicate the task is too easy or\nthe implementation may be degenerate, limiting scientific conclusions."], "exec_time": [1.4529616832733154, 2.7624166011810303], "exec_time_feedback": ["", ""], "datasets_successfully_tested": [[], ["synthetic_multimodal"]], "plot_code": [null, "import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nexp_path = os.path.join(working_dir, \"experimen ain vs validation epochs\"\n        )\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Accuracy\")\n        plt.ylim(0, 1.05)\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_accuracy_curves.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating accuracy plot: {e}\")\n    plt.close()\n\ntry:\n    stream = metrics.get(\"stream\", [])\n    if stream:\n        last = stream[-1]\n        labels = [\n            \"Frozen Acc\",\n            \"Tent Acc\",\n            \"Cons Acc\",\n            \"Frozen SSAA\",\n            \"Tent SSAA\",\n            \"Cons SSAA\",\n            \"Tent Adapt Freq\",\n            \"Cons Adapt Freq\",\n        ]\n        values = [\n            last.get(\"frozen_accuracy\", np.nan),\n            last.get(\"tent_accuracy\", np.nan),\n            last.get(\"cons_accuracy\", np.nan),\n            last.get(\"frozen_ssaa\", np.nan),\n            last.get(\"tent_ssaa\", np.nan),\n            last.get(\"cons_ssaa\", np.nan),\n            last.get(\"tent_adapt_freq\", np.nan),\n            last.get(\"cons_adapt_freq\", np.nan),\n        ]\n        plt.figure(figsize=(10, 4))\n        plt.bar(np.arange(len(labels)), values)\n        plt.xticks(np.arange(len(labels)), labels, rotation=30, ha=\"right\")\n        plt.title(\n            \"Synthetic Multimodal Dataset \u2014 Final Stream Metrics Summary\\nSubtitle: Accuracy, SSAA, and adaptation frequency by method\"\n        )\n        plt.ylabel(\"Value\")\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_stream_metric_summary.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating stream summary plot: {e}\")\n    plt.close()\n\ntry:\n    fa = np.asarray(stream_details.get(\"frozen_acc_stream\", []))\n    ta = np.asarray(stream_details.get(\"tent_acc_stream\", []))\n    ca = np.asarray(stream_details.get(\"cons_acc_stream\", []))\n    if fa.size or (te, label=\"Entropy Mode\")\n        if ce.size:\n            plt.plot(ce, label=\"Consistency Mode\")\n        plt.title(\n            \"Synthetic Multimodal Dataset \u2014 Prediction Entropy Across Stream\\nSubtitle: Per-sample answer entropy on target stream\"\n        )\n        plt.xlabel(\"Stream Step\")\n        plt.ylabel(\"Entropy\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_entropy_stream.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating entropy plot: {e}\")\n    plt.close()\n\ntry:\n    if preds.size and gts.size and preds.shape == gts.shape:\n        acc = float(np.mean(preds == gts))\n        cm = np.zeros((2, 2), dtype=int)\n        for gt, pr in zip(gts, preds):\n            if gt in [0, 1] and pr in [0, 1]:\n                cm[int(gt), int(pr)] += 1\n        plt.figure(figsize=(4.5, 4))\n        plt.imshow(cm, cmap=\"Blues\")\n        for i in range(2):\n            for j in range(2):\n                plt.text(j, i, str(cm[i, j]), ha=\"center\", va=\"center\")\n        plt.xticks([0, 1], [\"Pred 0\", \"Pred 1\"])\n        plt.yticks([0, 1], [\"True 0\", \"True 1\"])\n        plt.title(\n            \"Synthetic Multimodal Dataset \u2014 Consistency-Mode Confusion Matrix\\nSubtitle: Left axis ground truth, bottom axis predictions\"\n        )\n        plt.colorbar()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{ds_name}_confusion_matrix_consistency.png\")\n        )\n        plt.close()\n        print(f\"consistency_prediction_accuracy={acc:.4f}\")\nexcept Exception as e:\n    print(f\"Error creating confusion matrix plot: {e}\")\n    plt.close()\n\nstream = metrics.get(\"stream\", [])\nif stream:\n    last = stream[-1]\n    print(\n        f\"frozen_accuracy={last.get('frozen_accuracy', np.nan):.4f}, \"\n        f\"frozen_ssaa={last.get('frozen_ssaa', np.nan):.4f}, \"\n        f\"tent_accuracy={last.get('tent_accuracy', np.nan):.4f}, \"\n        f\"tent_ssaa={last.get('tent_ssaa', np.nan):.4f}, \"\n        f\"tent_adapt_freq={last.get('tent_adapt_freq', np.nan):.4f}, \"\n        f\"cons_accuracy={last.get('cons_accuracy', np.nan):.4f}, \"\n        f\"cons_ssaa={last.get('cons_ssaa', np.nan):.4f}, \"\n        f\"cons_adapt_freq={last.get('cons_adapt_freq', np.nan):.4f}\"\n    )\n"], "plot_plan": [null, "I\u2019ll load the saved experiment dictionary, inspect the `synthetic_multimodal` entries, and generate only plots supported by the stored arrays. I\u2019ll create a training/validation loss curve and a training/validation accuracy curve from the epoch-wise history. I\u2019ll also summarize the final stream metrics (`accuracy`, `SSAA`, `adapt_freq`) in a bar chart using the single metrics record saved under `metrics[\"stream\"]`. For the sequential adaptation behavior, I\u2019ll plot stream accuracy traces for frozen, entropy-based, and consistency-based modes from `stream_details`. I\u2019ll add separate plots for adaptation update events and predictive entropy when those streams are present. To avoid inventing unavailable data, I won\u2019t attempt sample-image or generated-output plots because the saved file only contains labels, predictions, and stream arrays. Each figure will have a clear title mentioning the synthetic multimodal dataset and an explanatory subtitle inline. All plots will be saved to `working_dir`, and I\u2019ll print a compact summary of the final recorded metrics."], "ablation_name": [null, null], "hyperparam_name": [null, null], "is_seed_node": [false, false], "is_seed_agg_node": [false, false], "parse_metrics_plan": ["I\u2019ll load `experiment_data.npy` from the required `working` directory, inspect\nthe stored dictionary structure, and extract the final or best values for the\nrecorded metrics and losses. For each dataset entry, the script will print the\ndataset name first, then clearly labeled metric names such as final train\naccuracy, best validation accuracy, final train loss, and stream SSAA values.\nBecause the saved structure includes stream summary metrics in both\n`stream_details` and `metrics[\"stream\"]`, the code will report the useful final\nsummaries without creating any plots.", "I\u2019ll load `experiment_data.npy` from `os.path.join(os.getcwd(), \"working\")`,\nunpack the nested dictionary, and parse the stored training, validation, and\nstream metrics based on the original experiment structure. For each dataset,\nI\u2019ll print the dataset name first, then clearly labeled final or best values\nsuch as final train accuracy, best validation accuracy, final train loss, best\nvalidation loss, and the stream adaptation summary metrics. The code will also\nhandle missing fields safely and avoid any plotting, while executing immediately\nat global scope."], "parse_metrics_code": ["import os\nimport numpy as np\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nexperiment_data_path = os.path.join(working_dir, \"experiment_data.npy\")\n\nexperiment_data = np.load(experiment_data_path, allow_pickle=True).item()\n\n\ndef safe_float(value):\n    try:\n        return float(value)\n    except Exception:\n        return value\n\n\ndef print_metric(label, value):\n    if isinstance(value, float):\n        print(f\"{label}: {value:.6f}\")\n    else:\n        print(f\"{label}: {value}\")\n\n\ndef get_final_metric(metric_list, key):\n    if not metric_list:\n        return None\n    return metric_list[-1].get(key, None)\n\n\ndef get_best_metric(metric_list, key, mode=\"max\"):\n    if not metric_list:\n        return None\n    values = [entry.get(key) for entry in metric_list if key in entry]\n    values = [v for v in values if v is not None]\n    if not values:\n        return None\n    return max(values) if mode == \"max\" else min(values)\n\n\ndef analyze_dataset(dataset_name, dataset_data):\n    print(f\"Dataset: {dataset_name}\")\n\n    metrics = dataset_data.get(\"metrics\", {})\n    losses = dataset_data.get(\"losses\", {})\n    stream_details = dataset_data.get(\"stream_details\", {})\n\n    train_metrics = metrics.get(\"train\", [])\n    val_metrics = metrics.get(\"val\", [])\n    stream_metrics = metrics.get(\"stream\", [])\n\n    train_losses = losses.get(\"train\", [])\n    val_losses = losses.get(\"val\", [])\n\n    final_train_accuracy = get_final_metric(train_metrics, \"accuracy\")\n    best_train_accuracy = get_best_metric(train_metrics, \"accuracy\", mode=\"max\")\n    final_validation_accuracy = get_final_metric(val_metrics, \"accuracy\")\n    best_validation_accuracy = get_best_metric(val_metrics, \"accuracy\", mode=\"max\")\n\n    final_train_loss = get_final_metric(train_losses, \"loss\")\n    best_train_loss = get_best_metric(train_losses, \"loss\", mode=\"min\")\n    final_validation_loss = get_final_metric(val_losses, \"loss\")\n    best_validation_loss = get_best_metric(val_losses, \"loss\", mode=\"min\")\n\n    if final_train_accuracy is not None:\n        print_metric(\"final train accuracy\", safe_float(final_train_accuracy))\n    if best_train_accuracy is not None:\n        print_metric(\"best train accuracy\", safe_float(best_train_accuracy))\n    if final_validation_accuracy is not None:\n        print_metric(\"final validation accuracy\", safe_float(final_validation_accuracy))\n    if best_validation_accuracy is not None:\n        print_metric(\"best validation accuracy\", safe_float(best_validation_accuracy))\n\n    if final_train_loss is not None:\n        print_metric(\"final train loss\", safe_float(final_train_loss))\n    if best_train_loss is not None:\n        print_metric(\"best train loss\", safe_float(best_train_loss))\n    if final_validation_loss is not None:\n        print_metric(\"final validation loss\", safe_float(final_validation_loss))\n    if best_validation_loss is not None:\n        print_metric(\"best validation loss\", safe_float(best_validation_loss))\n\n    if stream_details:\n        for method_name, method_metrics in stream_details.items():\n            if \"accuracy\" in method_metrics:\n                print_metric(\n                    f\"final stream accuracy ({method_name})\",\n                    safe_float(method_metrics[\"accuracy\"]),\n                )\n            if \"stream_stability_adjusted_accuracy\" in method_metrics:\n                print_metric(\n                    f\"final stream stability adjusted accuracy ({method_name})\",\n                    safe_float(method_metrics[\"stream_stability_adjusted_accuracy\"]),\n                )\n            if \"adaptation_frequency\" in method_metrics:\n                print_metric(\n                    f\"final adaptation frequency ({method_name})\",\n                    safe_float(method_metrics[\"adaptation_frequency\"]),\n                )\n            if \"latency_seconds\" in method_metrics:\n                print_metric(\n                    f\"final latency seconds ({method_name})\",\n                    safe_float(method_metrics[\"latency_seconds\"]),\n                )\n\n    if stream_metrics:\n        latest_stream_summary = stream_metrics[-1]\n        for key, value in latest_stream_summary.items():\n            label = key.replace(\"_\", \" \")\n            print_metric(f\"final {label}\", safe_float(value))\n\n    predictions = dataset_data.get(\"predictions\", [])\n    ground_truth = dataset_data.get(\"ground_truth\", [])\n    if predictions and ground_truth and len(predictions) == len(ground_truth):\n        predictions_arr = np.array(predictions)\n        ground_truth_arr = np.array(ground_truth)\n        stream_prediction_accuracy = float((predictions_arr == ground_truth_arr).mean())\n        print_metric(\"final stored prediction accuracy\", stream_prediction_accuracy)\n\n    print()\n\n\nfor dataset_name, dataset_data in experiment_data.items():\n    analyze_dataset(dataset_name, dataset_data)\n", "import os\nimport numpy as np\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nfile_path = os.path.join(working_dir, \"experiment_data.npy\")\n\nexperiment_data = np.load(file_path, allow_pickle=True).item()\n\n\ndef get_final_epoch_value(metric_list):\n    if not metric_list:\n        return None\n    return metric_list[-1][1]\n\n\ndef get_best_epoch_value(metric_list, mode=\"max\"):\n    if not metric_list:\n        return None\n    values = [x[1] for x in metric_list]\n    return max(values) if mode == \"max\" else min(values)\n\n\ndef format_value(value):\n    if value is None:\n        return \"N/A\"\n    if isinstance(value, (float, np.floating)):\n        return f\"{value:.6f}\"\n    return str(value)\n\n\nfor dataset_name, dataset_data in experiment_data.items():\n    print(f\"Dataset: {dataset_name}\")\n\n    metrics = dataset_data.get(\"metrics\", {})\n    losses = dataset_data.get(\"losses\", {})\n\n    train_accuracy_series = metrics.get(\"train\", [])\n    validation_accuracy_series = metrics.get(\"val\", [])\n    stream_metrics_list = metrics.get(\"stream\", [])\n\n    train_loss_series = losses.get(\"train\", [])\n    validation_loss_series = losses.get(\"val\", [])\n\n    final_train_accuracy = get_final_epoch_value(train_accuracy_series)\n    best_train_accuracy = get_best_epoch_value(train_accuracy_series, mode=\"max\")\n    final_validation_accuracy = get_final_epoch_value(validation_accuracy_series)\n    best_validation_accuracy = get_best_epoch_value(\n        validation_accuracy_series, mode=\"max\"\n    )\n\n    final_train_loss = get_final_epoch_value(train_loss_series)\n    best_train_loss = get_best_epoch_value(train_loss_series, mode=\"min\")\n    final_validation_loss = get_final_epoch_value(validation_loss_series)\n    best_validation_loss = get_best_epoch_value(validation_loss_series, mode=\"min\")\n\n    print(f\"  Final train accuracy: {format_value(final_train_accuracy)}\")\n    print(f\"  Best train accuracy: {format_value(best_train_accuracy)}\")\n    print(f\"  Final validation accuracy: {format_value(final_validation_accuracy)}\")\n    print(f\"  Best validation accuracy: {format_value(best_validation_accuracy)}\")\n    print(f\"  Final train loss: {format_value(final_train_loss)}\")\n    print(f\"  Best train loss: {format_value(best_train_loss)}\")\n    print(f\"  Final validation loss: {format_value(final_validation_loss)}\")\n    print(f\"  Best validation loss: {format_value(best_validation_loss)}\")\n\n    if stream_metrics_list:\n        latest_stream = stream_metrics_list[-1]\n        print(\n            f\"  Frozen stream accuracy: {format_value(latest_stream.get('frozen_accuracy'))}\"\n        )\n        print(f\"  Frozen stream SSAA: {format_value(latest_stream.get('frozen_ssaa'))}\")\n        print(\n            f\"  Frozen stream adaptation frequency: {format_value(latest_stream.get('frozen_adapt_freq'))}\"\n        )\n        print(\n            f\"  Tent stream accuracy: {format_value(latest_stream.get('tent_accuracy'))}\"\n        )\n        print(f\"  Tent stream SSAA: {format_value(latest_stream.get('tent_ssaa'))}\")\n        print(\n            f\"  Tent stream adaptation frequency: {format_value(latest_stream.get('tent_adapt_freq'))}\"\n        )\n        print(\n            f\"  Consistency stream accuracy: {format_value(latest_stream.get('cons_accuracy'))}\"\n        )\n        print(\n            f\"  Consistency stream SSAA: {format_value(latest_stream.get('cons_ssaa'))}\"\n        )\n        print(\n            f\"  Consistency stream adaptation frequency: {format_value(latest_stream.get('cons_adapt_freq'))}\"\n        )\n\n    print()\n"], "parse_term_out": ["['Dataset: synthetic_multimodal_stream', '\\n', 'final train accuracy: 1.000000',\n'\\n', 'best train accuracy: 1.000000', '\\n', 'final validation accuracy:\n1.000000', '\\n', 'best validation accuracy: 1.000000', '\\n', 'final train loss:\n0.200346', '\\n', 'best train loss: 0.200346', '\\n', 'final validation loss:\n0.203693', '\\n', 'best validation loss: 0.203139', '\\n', 'final stream accuracy\n(frozen): 1.000000', '\\n', 'final stream stability adjusted accuracy (frozen):\n1.000000', '\\n', 'final adaptation frequency (frozen): 0.000000', '\\n', 'final\nlatency seconds (frozen): 0.110805', '\\n', 'final stream accuracy (entropy):\n1.000000', '\\n', 'final stream stability adjusted accuracy (entropy): 1.000000',\n'\\n', 'final adaptation frequency (entropy): 0.000000', '\\n', 'final latency\nseconds (entropy): 0.095190', '\\n', 'final stream accuracy (consistency):\n1.000000', '\\n', 'final stream stability adjusted accuracy (consistency):\n1.000000', '\\n', 'final adaptation frequency (consistency): 0.000000', '\\n',\n'final latency seconds (consistency): 0.101000', '\\n', 'final frozen ssaa:\n1.000000', '\\n', 'final entropy ssaa: 1.000000', '\\n', 'final consistency ssaa:\n1.000000', '\\n', 'final stored prediction accuracy: 1.000000', '\\n', '\\n',\n'Execution time: a moment seconds (time limit is 2 hours).']", "['Dataset: synthetic_multimodal', '\\n', '  Final train accuracy: 1.000000',\n'\\n', '  Best train accuracy: 1.000000', '\\n', '  Final validation accuracy:\n1.000000', '\\n', '  Best validation accuracy: 1.000000', '\\n', '  Final train\nloss: 0.000022', '\\n', '  Best train loss: 0.000022', '\\n', '  Final validation\nloss: 0.000026', '\\n', '  Best validation loss: 0.000026', '\\n', '  Frozen\nstream accuracy: 0.970833', '\\n', '  Frozen stream SSAA: 0.948488', '\\n', '\nFrozen stream adaptation frequency: 0.000000', '\\n', '  Tent stream accuracy:\n0.969167', '\\n', '  Tent stream SSAA: 0.938710', '\\n', '  Tent stream adaptation\nfrequency: 0.043333', '\\n', '  Consistency stream accuracy: 0.968333', '\\n', '\nConsistency stream SSAA: 0.935484', '\\n', '  Consistency stream adaptation\nfrequency: 0.034167', '\\n', '\\n', 'Execution time: a moment seconds (time limit\nis 2 hours).']"], "parse_exc_type": [null, null], "parse_exc_info": [null, null], "parse_exc_stack": [null, null], "completed_stages": ["Stage_1"]};
