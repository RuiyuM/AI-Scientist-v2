      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }

d_in, 1.0, True)\nx_val = np.concatenate([x0_val, x1_val, x2_val], 0)\ny_val = np.concatenate([y0_val, y1_val, y2_val], 0)\n\ntask_specs = [(\"task_a\", 0.0, False), (\"task_b\", 0.7, True), (\"task_c\", 1.3, True)]\nstream_batches = []\nbatch_size_stream = 32\nfor name, shift, rot in task_specs:\n    x_t, y_t = make_task_data(n_test // 3, d_in, shift, rot)\n    for i in range(0, len(x_t), batch_size_stream):\n        xb = torch.tensor(x_t[i : i + batch_size_stream], dtype=torch.float32)\n        yb = torch.tensor(y_t[i : i + batch_size_stream], dtype=torch.long)\n        stream_batches.append((name, xb, yb))\n\ntrain_dataset = TensorDataset(\n    torch.tensor(x_train, dtype=torch.float32), torch.tensor(y_train, dtype=torch.long)\n)\nval_dataset = TensorDataset(\n    torch.tensor(x_val, dtype=torch.float32), torch.tensor(y_val, dtype=torch.long)\n)\n\n\n# -----------------------------\n# Model: frozen backbone + low-rank adapter\n# -----------------------------\nclass Backbone(nn.Module):\n    def __init__(self, d_in=16, d_hidden=32, n_classes=2):\n        super().__init__()\n        self.fc1 = nn.Linear(d_in, d_hidden)\n        self.fc2 = nn.Linear(d_hidden, n_classes)\n\n    def hidden(self, x):\n        return torch.tanh(self.fc1(x))\n\n    def logits_from_hidden(self, h):\n        return self.fc2(h)\n\n    def forward(self, x):\n        h = self.hidden(x)\n        return self.logits_from_hidden(h)\n\n\nclass LowRankAdapter(nn.Module):\n    def __init__(self, d_hidden=32, rank=4, scale=0.1):\n        super().__init__()\n        self.A = nn.Parameter(scale * torch.randn(d_hidden, rank))\n        self.B = nn.Parameter(scale * torch.randn(rank, d_hidden))\n\n    def forward(self, h):\n        return h + h @ self.A @ self.B\n\n\nclass AdaptedModel(nn.Module):\n    def __init__(self, backbone, adapter):\n        super().__init__()\n        self.backbone = backbone\n        self.adapter = adapter\n\n    def forward(self, x):\n        h = self.backbone.hidden(x)\n        h = self.adapter(h)\n        return self.backbone.logits_from_hidden(h)\n\n\ncriterion = nn.CrossEntropyLoss()\nmethods = [\"reset\", \"carry\", \"anchored\"]\nepoch_candidates = [10, 20, 40, 80]\nexperiment_data[\"pretraining_epochs_tuning\"][\"synthetic_stream\"][\n    \"epoch_candidates\"\n] = epoch_candidates\n\n\ndef make_train_loader(seed, batch_size=64):\n    g = torch.Generator()\n    g.manual_seed(seed)\n    return DataLoader(train_dataset, batch_size=batch_size, shuffle=True, generator=g)\n\n\nval_loader = DataLoader(val_dataset, batch_size=128, shuffle=False)\n\n\ndef entropy_loss(logits):\n    p = F.softmax(logits, dim=-1).clamp_min(1e-8)\n    return -(p * p.log()).sum(dim=-1).mean()\n\n\ndef clone_adapter(adapter):\n    new_adapter = LowRankAdapter(d_hidden=32, rank=4).to(device)\n    new_adapter.load_state_dict(copy.deepcopy(adapter.state_dict()))\n    return new_adapter\n\n\ndef pretrain_backbone(num_epochs, init_seed=42, loader_seed=999, lr=1e-3):\n    torch.manual_seed(init_seed)\n    np.random.seed(BASE_SEED)\n    random.seed(BASE_SEED)\n\n    backbone = Backbone(d_in=d_in).to(device)\n    opt = torch.optim.Adam(backbone.parameters(), lr=lr)\n    train_loader = make_train_loader(loader_seed)\n\n    hist = {\n        \"metrics\": {\"train\": [], \"val\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n    }\n\n    best_val_acc = -1.0\n    best_val_loss = float(\"inf\")\n    best_state = copy.deepcopy(backbone.state_dict())\n\n    for epoch in range(1, num_epochs + 1):\n        backbone.train()\n        tr_loss, tr_correct, tr_total = 0.0, 0, 0\n        for xb, yb in train_loader:\n            xb, yb = xb.to(device), yb.to(device)\n            opt.zero_grad()\n            logits = backbone(xb)\n            loss = criterion(logits, yb)\n            loss.backward()\n            opt.step()\n            tr_loss += loss.item() * xb.size(0)\n            tr_correct += (logits.argmax(1) == yb).sum().item()\n            tr_total += xb.size(0)\n\n        backbone.eval()\n        val_loss, val_correct, val_total = 0.0, 0, 0\n        with torch.no_grad():\n            for xb, yb in val_loader:\n                xb, yb = xb.to(device), yb.to(device)\n                logits = backbone(xb)\n                loss = criterion(logits, yb)\n                val_loss += loss.item() * xb.size(0)\n                val_correct += (logits.argmax(1) == yb).sum().item()\n                val_total += xb.size(0)\n\n        tr_loss /= tr_total\n        val_loss /= val_total\n        tr_acc = tr_correct / tr_total\n        val_acc = val_correct / val_total\n\n        hist[\"metrics\"][\"train\"].append((epoch, tr_acc))\n        hist[\"metrics\"][\"val\"].append((epoch, val_acc))\n        hist[\"losses\"][\"train\"].append((epoch, tr_loss))\n        hist[\"losses\"][\"val\"].append((epoch, val_loss))\n\n        if (val_acc > best_val_acc) or (\n            math.isclose(val_acc, best_val_acc) and val_loss < best_val_loss\n        ):\n            best_val_acc = val_acc\n            best_val_loss = val_loss\n            best_state = copy.deepcopy(backbone.state_dict())\n\n        print(\n            f\"[pretrain epochs={num_epochs}] epoch {epoch:03d} | \"\n            f\"train_loss={tr_loss:.4f} train_acc={tr_acc:.4f} | \"\n            f\"val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n\n    backbone.load_state_dict(best_state)\n    for p in backbone.parameters():\n        p.requires_grad = False\n    backbone.eval()\n    return backbone, hist, best_val_acc, best_val_loss\n\n\ndef init_method_store():\n    out = {}\n    for m in methods:\n        out[m] = {\n            \"metrics\": {\"train\": [], \"val\": [], \"stream\": []},\n            \"losses\": {\"train\": [], \"val\": [], \"stream\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"stream_position\": [],\n            \"task_name\": [],\n            \"adapter_drift\": [],\n        }\n    return out\n\n\ndef run_stream(backbone):\n    trial_methods_data = init_method_store()\n    results = {}\n\n    torch.manual_seed(BASE_SEED)\n    base_adapter = LowRankAdapter(d_hidden=32, rank=4).to(device)\n    base_state = copy.deepcopy(base_adapter.state_dict())\n\n    for method in methods:\n        adapter = clone_adapter(base_adapter)\n        model = AdaptedModel(backbone, adapter).to(device)\n        init_params = [p.detach().clone() for p in model.adapter.parameters()]\n        optimizer = torch.optim.SGD(model.adapter.parameters(), lr=0.2)\n\n        online_accs, online_losses = [], []\n        for step, (task_name, xb, yb) in enumerate(stream_batches):\n            if method == \"reset\":\n                model.adapter.load_state_dict(copy.deepcopy(base_state))\n                optimizer = torch.optim.SGD(model.adapter.parameters(), lr=0.2)\n\n            xb, yb = xb.to(device), yb.to(device)\n\n            model.eval()\n            with torch.no_grad():\n                logits = model(xb)\n                loss_sup = criterion(logits, yb).item()\n                preds = logits.argmax(1)\n                acc = (preds == yb).float().mean().item()\n\n            online_accs.append(acc)\n            online_losses.append(loss_sup)\n            trial_methods_data[method][\"metrics\"][\"stream\"].append((step, acc))\n            trial_methods_data[method][\"losses\"][\"stream\"].append((step, loss_sup))\n            trial_methods_data[method][\"predictions\"].append(\n                preds.detach().cpu().numpy()\n            )\n            trial_methods_data[method][\"ground_truth\"].append(yb.detach().cpu().numpy())\n            trial_methods_data[method][\"stream_position\"].append(step)\n            trial_methods_data[method][\"task_name\"].append(task_name)\n\n            model.train()\n            optimizer.zero_grad()\n            logits_adapt = model(xb)\n            ent = entropy_loss(logits_adapt)\n\n            if method == \"anchored\":\n                reg = 0.0\n                for p, p0 in zip(model.adapter.parameters(), init_params):\n                    reg = reg + ((p - p0) ** 2).mean()\n                total_loss = ent + 0.05 * reg\n                if loss_sup < 1.2:\n                    total_loss.backward()\n                    optimizer.step()\n            else:\n                total_loss = ent\n                total_loss.backward()\n                optimizer.step()\n\n            drift = 0.0\n            with torch.no_grad():\n                for p, p0 in zip(model.adapter.parameters(), init_params):\n                    drift += ((p - p0) ** 2).mean().item()\n            trial_methods_data[method][\"adapter_drift\"].append(drift)\n\n        results[method] = {\n            \"mean_acc\": float(np.mean(online_accs)),\n            \"acc_curve\": np.array(online_accs, dtype=np.float32),\n            \"loss_curve\": np.array(online_losses, dtype=np.float32),\n        }\n        print(\n            f\"[stream][method={method}] mean_online_acc={results[method]['mean_acc']:.4f}\"\n        )\n\n    return results, trial_methods_data\n\n\n# -----------------------------\n# Hyperparameter tuning loop\n# -----------------------------\nsummary_rows = []\nall_val_curves = {}\nall_loss_curves = {}\n\nfor num_epochs in epoch_candidates:\n    print(f\"\\n=== Tuning trial: pretraining epochs = {num_epochs} ===\")\n    backbone, pretrain_hist, best_val_acc, best_val_loss = pretrain_backbone(\n        num_epochs=num_epochs, init_seed=BASE_SEED, loader_seed=BASE_SEED + 100\n    )\n    stream_results, method_data = run_stream(backbone)\n\n    trial_key = f\"epochs_{num_epochs}\"\n    experiment_data[\"pretraining_epochs_tuning\"][\"synthetic_stream\"][\"trials\"][\n        trial_key\n    ] = {\n        \"metrics\": {\n            \"train\": pretrain_hist[\"metrics\"][\"train\"],\n            \"val\": pretrain_hist[\"metrics\"][\"val\"],\n            \"stream\": [(m, stream_results[m][\"mean_acc\"]) for m in methods],\n        },\n        \"losses\": {\n            \"train\": pretrain_hist[\"losses\"][\"train\"],\n            \"val\": pretrain_hist[\"losses\"][\"val\"],\n            \"stream\": [\n                (m, float(stream_results[m][\"loss_curve\"].mean())) for m in methods\n            ],\n        },\n        \"methods\": method_data,\n        \"best_val_acc\": float(best_val_acc),\n        \"best_val_loss\": float(best_val_loss),\n    }\n\n    val_acc_curve = np.array(\n        [v for _, v in pretrain_hist[\"metrics\"][\"val\"]], dtype=np.float32\n    )\n    val_loss_curve = np.array(\n        [v for _, v in pretrain_hist[\"losses\"][\"val\"]], dtype=np.float32\n    )\n    all_val_curves[num_epochs] = val_acc_curve\n    all_loss_curves[num_epochs] = val_loss_curve\n\n    for method in methods:\n        preds = np.concatenate(method_data[method][\"predictions\"])\n        gts = np.concatenate(method_data[method][\"ground_truth\"])\n        drifts = np.array(method_data[method][\"adapter_drift\"], dtype=np.float32)\n        acc_curve = stream_results[method][\"acc_curve\"]\n        loss_curve = stream_results[method][\"loss_curve\"]\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_{method}_predictions.npy\"), preds\n        )\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_{method}_ground_truth.npy\"), gts\n        )\n        np.save(os.path.join(working_dir, f\"{trial_key}_{method}_drift.npy\"), drifts)\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_{method}_acc_curve.npy\"), acc_curve\n        )\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_{method}_loss_curve.npy\"),\n            loss_curve,\n        )\n\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_acc.npy\"),\n        np.array(pretrain_hist[\"metrics\"][\"train\"], dtype=np.float32),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_acc.npy\"),\n        np.array(pretrain_hist[\"metrics\"][\"val\"], dtype=np.float32),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_loss.npy\"),\n        np.array(pretrain_hist[\"losses\"][\"train\"], dtype=np.float32),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_loss.npy\"),\n        np.array(pretrain_hist[\"losses\"][\"val\"], dtype=np.float32),\n    )\n\n    row = {\n        \"epochs\": num_epochs,\n        \"best_val_acc\": float(best_val_acc),\n        \"best_val_loss\": float(best_val_loss),\n    }\n    for method in methods:\n        row[f\"{method}_mean_acc\"] = float(stream_results[method][\"mean_acc\"])\n    summary_rows.append(row)\n\n# -----------------------------\n# Select best epoch count\n# -----------------------------\nsummary_rows = sorted(\n    summary_rows, key=lambda r: (-r[\"best_val_acc\"], r[\"best_val_loss\"], r[\"epochs\"])\n)\nbest_row = summary_rows[0]\nbest_epochs = best_row[\"epochs\"]\nexperiment_data[\"pretraining_epochs_tuning\"][\"synthetic_stream\"][\"selection\"] = {\n    \"criterion\": \"highest best validation accuracy, tie-broken by lower validation loss\",\n    \"best_epochs\": int(best_epochs),\n    \"best_val_acc\": float(best_row[\"best_val_acc\"]),\n    \"best_val_loss\": float(best_row[\"best_val_loss\"]),\n}\n\n# -----------------------------\n# Save summary arrays\n# -----------------------------\nepochs_arr = np.array([r[\"epochs\"] for r in summary_rows], dtype=np.int32)\nbest_val_acc_arr = np.array([r[\"best_val_acc\"] for r in summary_rows], dtype=np.float32)\nbest_val_loss_arr = np.array(\n    [r[\"best_val_loss\"] for r in summary_rows], dtype=np.float32\n)\nnp.save(os.path.join(working_dir, \"tuned_epochs.npy\"), epochs_arr)\nnp.save(os.path.join(working_dir, \"tuned_best_val_acc.npy\"), best_val_acc_arr)\nnp.save(os.path.join(working_dir, \"tuned_best_val_loss.npy\"), best_val_loss_arr)\n\nfor method in methods:\n    arr = np.array([r[f\"{method}_mean_acc\"] for r in summary_rows], dtype=np.float32)\n    np.save(os.path.join(working_dir, f\"tuned_{method}_mean_stream_acc.npy\"), arr)\n\n# -----------------------------\n# Plots\n# -----------------------------\nplt.figure(figsize=(8, 4))\nfor num_epochs in epoch_candidates:\n    x = np.arange(1, len(all_val_curves[num_epochs]) + 1)\n    plt.plot(x, all_val_curves[num_epochs], label=f\"{num_epochs} ep\")\nplt.xlabel(\"Pretraining epoch\")\nplt.ylabel(\"Validation accuracy\")\nplt.title(\"Backbone pretraining validation accuracy\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"pretraining_val_accuracy_curves.png\"), dpi=150)\nplt.close()\n\nplt.figure(figsize=(8, 4))\nfor num_epochs in epoch_candidates:\n    x = np.arange(1, len(all_loss_curves[num_epochs]) + 1)\n    plt.plot(x, all_loss_curves[num_epochs], label=f\"{num_epochs} ep\")\nplt.xlabel(\"Pretraining epoch\")\nplt.ylabel(\"Validation loss\")\nplt.title(\"Backbone pretraining validation loss\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"pretraining_val_loss_curves.png\"), dpi=150)\nplt.close()\n\nplt.figure(figsize=(7, 4))\nplt.plot(epochs_arr, best_val_acc_arr, marker=\"o\")\nplt.xlabel(\"Pretraining epochs\")\nplt.ylabel(\"Best validation accuracy\")\nplt.title(\"Validation accuracy vs pretraining epochs\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"best_val_acc_vs_epochs.png\"), dpi=150)\nplt.close()\n\nplt.figure(figsize=(7, 4))\nfor method in methods:\n    arr = np.array([r[f\"{method}_mean_acc\"] for r in summary_rows], dtype=np.float32)\n    plt.plot(epochs_arr, arr, marker=\"o\", label=method)\nplt.xlabel(\"Pretraining epochs\")\nplt.ylabel(\"Stream-averaged online accuracy\")\nplt.title(\"Downstream stream accuracy vs pretraining epochs\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"stream_accuracy_vs_pretraining_epochs.png\"), dpi=150\n)\nplt.close()\n\nexperiment_data[\"pretraining_epochs_tuning\"][\"synthetic_stream\"][\"plots\"] = {\n    \"val_accuracy_curves\": \"pretraining_val_accuracy_curves.png\",\n    \"val_loss_curves\": \"pretraining_val_loss_curves.png\",\n    \"best_val_acc_vs_epochs\": \"best_val_acc_vs_epochs.png\",\n    \"stream_accuracy_vs_pretraining_epochs\": \"stream_accuracy_vs_pretraining_epochs.png\",\n}\n\n# Save full experiment data with required filename\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\n# -----------------------------\n# Final summary\n# -----------------------------\nprint(\"\\nFinal tuning summary:\")\nfor r in summary_rows:\n    msg = (\n        f\"epochs={r['epochs']:>3d} | best_val_acc={r['best_val_acc']:.4f} \"\n        f\"| best_val_loss={r['best_val_loss']:.4f}\"\n    )\n    for method in methods:\n        msg += f\" | {method}={r[f'{method}_mean_acc']:.4f}\"\n    print(msg)\n\nprint(\n    f\"\\nSelected best pretraining epochs: {best_epochs} \"\n    f\"(val_acc={best_row['best_val_acc']:.4f}, val_loss={best_row['best_val_loss']:.4f})\"\n)\nfor method in methods:\n    print(\n        f\"Best-trial {method} stream-avg online acc: {best_row[f'{method}_mean_acc']:.4f}\"\n    )\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport copy\nimport math\nimport random\nimport time\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\nfrom torch.utils.data import TensorDataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nBASE_SEED = 42\ntorch.manual_seed(BASE_SEED)\nnp.random.seed(BASE_SEED)\nrandom.seed(BASE_SEED)\n\nexperiment_data = {\n    \"synthetic_stream_main\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"stream\": [], \"retained\": []},\n        \"losses\": {\"train\": [], \"val\": [], \"stream\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"selection\": {},\n        \"plots\": {},\n        \"config\": {},\n    }\n}\n\n\n# -----------------------------\n# Synthetic related-task data\n# -----------------------------\ndef make_task_data(n, d, shift_scale=0.0, rotate=False, warp=0.0):\n    x = np.random.randn(n, d).astype(np.float32)\n    if rotate:\n        theta = shift_scale\n        R = np.eye(d, dtype=np.float32)\n        c, s = np.cos(theta), np.sin(theta)\n        for i in range(0, min(d - 1, 8), 2):\n            R[i : i + 2, i : i + 2] = np.array([[c, -s], [s, c]], dtype=np.float32)\n        x = x @ R.T\n    x[:, :4] += shift_scale\n    x[:, 4:8] += warp * np.tanh(x[:, 4:8])\n    score = (\n        1.2 * x[:, 0]\n        - 0.9 * x[:, 1]\n        + 0.7 * x[:, 2] * x[:, 3]\n        + 0.5 * np.sin(x[:, 4] + 0.2 * warp)\n        - 0.3 * x[:, 5] ** 2\n        + 0.25 * x[:, 6] * x[:, 7]\n    )\n    y = (score > 0.15 * shift_scale + 0.05 * warp).astype(np.int64)\n    return x, y\n\n\nd_in = 16\nn_train, n_val = 2400, 800\nbatch_size_train = 96\nbatch_size_stream = 32\n\n# Added two new synthetic tasks to emulate longer task sequences\ntask_specs = [\n    (\"task_a\", 0.0, False, 0.0),  # proxy for easier source task\n    (\"task_b\", 0.6, True, 0.1),  # proxy for ARC-like shift\n    (\"task_c\", 1.0, True, 0.2),  # proxy for PubMedQA-like shift\n    (\"task_d\", 1.3, True, 0.35),  # NEW\n    (\"task_e\", 1.6, True, 0.5),  # NEW\n]\n\n# train/val built from mixture of related tasks\ntrain_parts_x, train_parts_y = [], []\nval_parts_x, val_parts_y = [], []\nfor i, (_, shift, rot, warp) in enumerate(task_specs[:4]):\n    frac_tr = [0.35, 0.25, 0.2, 0.2][i]\n    frac_val = [0.25, 0.25, 0.25, 0.25][i]\n    xt, yt = make_task_data(int(n_train * frac_tr), d_in, shift, rot, warp)\n    xv, yv = make_task_data(int(n_val * frac_val), d_in, shift, rot, warp)\n    train_parts_x.append(xt)\n    train_parts_y.append(yt)\n    val_parts_x.append(xv)\n    val_parts_y.append(yv)\n\nx_train = np.concatenate(train_parts_x, axis=0)\ny_train = np.concatenate(train_parts_y, axis=0)\nx_val = np.concatenate(val_parts_x, axis=0)\ny_val = np.concatenate(val_parts_y, axis=0)\n\n# input normalization from train stats only\nx_mean = x_train.mean(axis=0, keepdims=True)\nx_std = x_train.std(axis=0, keepdims=True) + 1e-6\nx_train = (x_train - x_mean) / x_std\nx_val = (x_val - x_mean) / x_std\n\nstream_task_data = {}\nstream_batches = []\nn_test_per_task = 224\nfor name, shift, rot, warp in task_specs:\n    xt, yt = make_task_data(n_test_per_task, d_in, shift, rot, warp)\n    xt = (xt - x_mean) / x_std\n    stream_task_data[name] = (\n        torch.tensor(xt, dtype=torch.float32),\n        torch.tensor(yt, dtype=torch.long),\n    )\n    for i in range(0, len(xt), batch_size_stream):\n        xb = torch.tensor(xt[i : i + batch_size_stream], dtype=torch.float32)\n        yb = torch.tensor(yt[i : i + batch_size_stream], dtype=torch.long)\n        stream_batches.append((name, xb, yb))\n\ntrain_dataset = TensorDataset(\n    torch.tensor(x_train, dtype=torch.float32), torch.tensor(y_train, dtype=torch.long)\n)\nval_dataset = TensorDataset(\n    torch.tensor(x_val, dtype=torch.float32), torch.tensor(y_val, dtype=torch.long)\n)\n\n\ndef make_train_loader(seed, batch_size=batch_size_train):\n    g = torch.Generator()\n    g.manual_seed(seed)\n    return DataLoader(train_dataset, batch_size=batch_size, shuffle=True, generator=g)\n\n\nval_loader = DataLoader(val_dataset, batch_size=256, shuffle=False)\n\n\n# -----------------------------\n# Model: unchanged architecture\n# -----------------------------\nclass Backbone(nn.Module):\n    def __init__(self, d_in=16, d_hidden=32, n_classes=2):\n        super().__init__()\n        self.fc1 = nn.Linear(d_in, d_hidden)\n        self.fc2 = nn.Linear(d_hidden, n_classes)\n\n    def hidden(self, x):\n        return torch.tanh(self.fc1(x))\n\n    def logits_from_hidden(self, h):\n        return self.fc2(h)\n\n    def forward(self, x):\n        return self.logits_from_hidden(self.hidden(x))\n\n\nclass LowRankAdapter(nn.Module):\n    def __init__(self, d_hidden=32, rank=4, scale=0.05):\n        super().__init__()\n        self.A = nn.Parameter(scale * torch.randn(d_hidden, rank))\n        self.B = nn.Parameter(scale * torch.randn(rank, d_hidden))\n\n    def forward(self, h):\n        return h + h @ self.A @ self.B\n\n\nclass AdaptedModel(nn.Module):\n    def __init__(self, backbone, adapter):\n        super().__init__()\n        self.backbone = backbone\n        self.adapter = adapter\n\n    def forward(self, x):\n        h = self.backbone.hidden(x)\n        h = self.adapter(h)\n        return self.backbone.logits_from_hidden(h)\n\n\ncriterion = nn.CrossEntropyLoss()\nmethods = [\"reset\", \"carry\", \"anchored\"]\n\n# hyperparameter tuning: only tune training/adaptation knobs\nepoch_candidates = [20, 40, 80]\npretrain_lrs = [1e-3, 3e-4]\nadapt_cfg = {\n    \"reset\": {\"lr\": 0.08, \"steps\": 1, \"reg\": 0.0},\n    \"carry\": {\"lr\": 0.04, \"steps\": 2, \"reg\": 0.0},\n    \"anchored\": {\"lr\": 0.02, \"steps\": 2, \"reg\": 0.15},\n}\nexperiment_data[\"synthetic_stream_main\"][\"config\"] = {\n    \"epoch_candidates\": epoch_candidates,\n    \"pretrain_lrs\": pretrain_lrs,\n    \"batch_size_train\": batch_size_train,\n    \"batch_size_stream\": batch_size_stream,\n    \"task_names\": [t[0] for t in task_specs],\n    \"new_datasets_added\": [\"task_d\", \"task_e\"],\n    \"hf_targets_for_real_followup\": [\n        \"allenai/ai2_arc\",\n        \"qiaojin/PubMedQA\",\n        \"cais/mmlu\",\n        \"lmms-lab/ScienceQA\",\n        \"HuggingFaceM4/ChartQA\",\n    ],\n}\n\n\ndef entropy_loss(logits):\n    p = F.softmax(logits, dim=-1).clamp_min(1e-8)\n    return -(p * p.log()).sum(dim=-1).mean()\n\n\ndef confidence_margin(logits):\n    probs = F.softmax(logits, dim=-1)\n    top2 = torch.topk(probs, k=2, dim=-1).values\n    return (top2[:, 0] - top2[:, 1]).mean()\n\n\ndef clone_adapter(adapter):\n    new_adapter = LowRankAdapter(d_hidden=32, rank=4).to(device)\n    new_adapter.load_state_dict(copy.deepcopy(adapter.state_dict()))\n    return new_adapter\n\n\ndef eval_model_on_loader(model, loader):\n    model.eval()\n    tot_loss, tot_correct, tot_n = 0.0, 0, 0\n    with torch.no_grad():\n        for xb, yb in loader:\n            batch = {\"x\": xb.to(device), \"y\": yb.to(device)}\n            logits = model(batch[\"x\"])\n            loss = criterion(logits, batch[\"y\"])\n            tot_loss += loss.item() * batch[\"x\"].size(0)\n            tot_correct += (logits.argmax(1) == batch[\"y\"]).sum().item()\n            tot_n += batch[\"x\"].size(0)\n    return tot_loss / max(tot_n, 1), tot_correct / max(tot_n, 1)\n\n\ndef pretrain_backbone(num_epochs, lr, init_seed=42, loader_seed=999):\n    torch.manual_seed(init_seed)\n    np.random.seed(BASE_SEED)\n    random.seed(BASE_SEED)\n\n    backbone = Backbone(d_in=d_in).to(device)\n    opt = torch.optim.Adam(backbone.parameters(), lr=lr)\n    train_loader = make_train_loader(loader_seed, batch_size=batch_size_train)\n\n    hist = {\"metrics\": {\"train\": [], \"val\": []}, \"losses\": {\"train\": [], \"val\": []}}\n    best_val_acc = -1.0\n    best_val_loss = float(\"inf\")\n    best_state = copy.deepcopy(backbone.state_dict())\n\n    for epoch in range(1, num_epochs + 1):\n        backbone.train()\n        tr_loss, tr_correct, tr_total = 0.0, 0, 0\n        for xb, yb in train_loader:\n            batch = {\"x\": xb.to(device), \"y\": yb.to(device)}\n            opt.zero_grad()\n            logits = backbone(batch[\"x\"])\n            loss = criterion(logits, batch[\"y\"])\n            loss.backward()\n            opt.step()\n            tr_loss += loss.item() * batch[\"x\"].size(0)\n            tr_correct += (logits.argmax(1) == batch[\"y\"]).sum().item()\n            tr_total += batch[\"x\"].size(0)\n\n        val_loss, val_acc = eval_model_on_loader(backbone, val_loader)\n        tr_loss /= tr_total\n        tr_acc = tr_correct / tr_total\n\n        hist[\"metrics\"][\"train\"].append((epoch, tr_acc))\n        hist[\"metrics\"][\"val\"].append((epoch, val_acc))\n        hist[\"losses\"][\"train\"].append((epoch, tr_loss))\n        hist[\"losses\"][\"val\"].append((epoch, val_loss))\n\n        if (val_acc > best_val_acc) or (\n            math.isclose(val_acc, best_val_acc) and val_loss < best_val_loss\n        ):\n            best_val_acc, best_val_loss = val_acc, val_loss\n            best_state = copy.deepcopy(backbone.state_dict())\n\n        print(\n            f\"[pretrain epochs={num_epochs} lr={lr}] epoch {epoch:03d} | train_loss={tr_loss:.4f} train_acc={tr_acc:.4f} | val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n        print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n    backbone.load_state_dict(best_state)\n    for p in backbone.parameters():\n        p.requires_grad = False\n    backbone.eval()\n    return backbone, hist, best_val_acc, best_val_loss\n\n\ndef init_method_store():\n    out = {}\n    for m in methods:\n        out[m] = {\n            \"metrics\": {\"train\": [], \"val\": [], \"stream\": [], \"retained\": []},\n            \"losses\": {\"train\": [], \"val\": [], \"stream\": []},\n            \"predictions\": [],\n            \"ground_truth\": [],\n            \"stream_position\": [],\n            \"task_name\": [],\n            \"adapter_drift\": [],\n            \"seen_task_acc_matrix\": [],\n            \"gate_signal\": [],\n        }\n    return out\n\n\ndef eval_tasks(model, task_cache):\n    task_acc = {}\n    model.eval()\n    with torch.no_grad():\n        for task_name, (x_all, y_all) in task_cache.items():\n            x_all = x_all.to(device)\n            y_all = y_all.to(device)\n            logits = model(x_all)\n            acc = (logits.argmax(1) == y_all).float().mean().item()\n            task_acc[task_name] = acc\n    return task_acc\n\n\ndef run_stream(backbone):\n    trial_methods_data = init_method_store()\n    results = {}\n\n    torch.manual_seed(BASE_SEED)\n    base_adapter = LowRankAdapter(d_hidden=32, rank=4).to(device)\n    base_state = copy.deepcopy(base_adapter.state_dict())\n\n    for method in methods:\n        adapter = clone_adapter(base_adapter)\n        model = AdaptedModel(backbone, adapter).to(device)\n        init_params = [p.detach().clone() for p in model.adapter.parameters()]\n        optimizer = torch.optim.SGD(\n            model.adapter.parameters(), lr=adapt_cfg[method][\"lr\"]\n        )\n\n        online_accs, online_losses = [], []\n        retained_curve = []\n        first_seen_acc = {}\n        seen_tasks = []\n\n        for step, (task_name, xb, yb) in enumerate(stream_batches):\n            if method == \"reset\":\n                model.adapter.load_state_dict(copy.deepcopy(base_state))\n                optimizer = torch.optim.SGD(\n                    model.adapter.parameters(), lr=adapt_cfg[method][\"lr\"]\n                )\n\n            batch = {\"x\": xb.to(device), \"y\": yb.to(device)}\n\n            model.eval()\n            with torch.no_grad():\n                logits = model(batch[\"x\"])\n                loss_sup = criterion(logits, batch[\"y\"]).item()\n                preds = logits.argmax(1)\n                acc = (preds == batch[\"y\"]).float().mean().item()\n                ent_before = entropy_loss(logits).item()\n                margin_before = confidence_margin(logits).item()\n\n            online_accs.append(acc)\n            online_losses.append(loss_sup)\n            trial_methods_data[method][\"metrics\"][\"stream\"].append((step, acc))\n            trial_methods_data[method][\"losses\"][\"stream\"].append((step, loss_sup))\n            trial_methods_data[method][\"predictions\"].append(\n                preds.detach().cpu().numpy()\n            )\n            trial_methods_data[method][\"ground_truth\"].append(\n                batch[\"y\"].detach().cpu().numpy()\n            )\n            trial_methods_data[method][\"stream_position\"].append(step)\n            trial_methods_data[method][\"task_name\"].append(task_name)\n\n            if task_name not in first_seen_acc:\n                first_seen_acc[task_name] = acc\n                seen_tasks.append(task_name)\n\n            do_update = True\n            # Bugfix: unsupervised outlier rejection only, no label leakage\n            if method == \"anchored\":\n                # reject high-entropy / low-margin batches as likely outliers\n                if ent_before > 0.66 or margin_before < 0.08:\n                    do_update = False\n            trial_methods_data[method][\"gate_signal\"].append(\n                (step, float(ent_before), float(margin_before), int(do_update))\n            )\n\n            if do_update:\n                model.train()\n                for _ in range(adapt_cfg[method][\"steps\"]):\n                    optimizer.zero_grad()\n                    logits_adapt = model(batch[\"x\"])\n                    ent = entropy_loss(logits_adapt)\n                    total_loss = ent\n                    if method == \"anchored\":\n                        reg = 0.0\n                        for p, p0 in zip(model.adapter.parameters(), init_params):\n                            reg = reg + ((p - p0) ** 2).mean()\n                        total_loss = total_loss + adapt_cfg[method][\"reg\"] * reg\n                    total_loss.backward()\n                    torch.nn.utils.clip_grad_norm_(\n                        model.adapter.parameters(), max_norm=2.0\n                    )\n                    optimizer.step()\n\n            drift = 0.0\n            with torch.no_grad():\n                for p, p0 in zip(model.adapter.parameters(), init_params):\n                    drift += ((p - p0) ** 2).mean().item()\n            trial_methods_data[method][\"adapter_drift\"].append(drift)\n\n            # retained accuracy on all seen tasks after current update\n            seen_cache = {k: stream_task_data[k] for k in seen_tasks}\n            seen_accs = eval_tasks(model, seen_cache)\n            retained = (\n                float(np.mean([seen_accs[k] for k in seen_tasks]))\n                if seen_tasks\n                else 0.0\n            )\n            trial_methods_data[method][\"metrics\"][\"retained\"].append((step, retained))\n            trial_methods_data[method][\"seen_task_acc_matrix\"].append((step, seen_accs))\n            retained_curve.append(retained)\n\n        # stream-averaged retained accuracy with forgetting penalty\n        forgetting = []\n        last_seen_accs = trial_methods_data[method][\"seen_task_acc_matrix\"][-1][1]\n        for t in seen_tasks:\n            forgetting.append(max(0.0, first_seen_acc[t] - last_seen_accs[t]))\n        mean_forgetting = float(np.mean(forgetting)) if forgetting else 0.0\n        sara = float(np.mean(retained_curve) - mean_forgetting)\n\n        results[method] = {\n            \"mean_acc\": float(np.mean(online_accs)),\n            \"mean_loss\": float(np.mean(online_losses)),\n            \"acc_curve\": np.array(online_accs, dtype=np.float32),\n            \"loss_curve\": np.array(online_losses, dtype=np.float32),\n            \"retained_curve\": np.array(retained_curve, dtype=np.float32),\n            \"mean_retained_acc\": float(np.mean(retained_curve)),\n            \"mean_forgetting\": mean_forgetting,\n            \"stream_averaged_retained_accuracy\": sara,\n        }\n        print(\n            f\"[stream][method={method}] mean_online_acc={results[method]['mean_acc']:.4f} \"\n            f\"mean_retained={results[method]['mean_retained_acc']:.4f} \"\n            f\"SARA={results[method]['stream_averaged_retained_accuracy']:.4f}\"\n        )\n\n    return results, trial_methods_data\n\n\n# -----------------------------\n# Tuning loop\n# -----------------------------\nstart_time = time.time()\nsummary_rows = []\nall_val_curves = {}\nall_loss_curves = {}\n\ntrial_counter = 0\nfor num_epochs in epoch_candidates:\n    for pre_lr in pretrain_lrs:\n        print(\n            f\"\\n=== Tuning trial: pretraining epochs = {num_epochs}, lr = {pre_lr} ===\"\n        )\n        backbone, pretrain_hist, best_val_acc, best_val_loss = pretrain_backbone(\n            num_epochs=num_epochs,\n            lr=pre_lr,\n            init_seed=BASE_SEED,\n            loader_seed=BASE_SEED + 100,\n        )\n        stream_results, method_data = run_stream(backbone)\n\n        trial_key = f'epochs_{num_epochs}_lr_{str(pre_lr).replace(\".\", \"p\")}'\n        experiment_data[\"synthetic_stream_main\"][trial_key] = {\n            \"metrics\": {\n                \"train\": pretrain_hist[\"metrics\"][\"train\"],\n                \"val\": pretrain_hist[\"metrics\"][\"val\"],\n                \"stream\": {m: stream_results[m][\"mean_acc\"] for m in methods},\n                \"retained\": {\n                    m: stream_results[m][\"stream_averaged_retained_accuracy\"]\n                    for m in methods\n                },\n            },\n            \"losses\": {\n                \"train\": pretrain_hist[\"losses\"][\"train\"],\n                \"val\": pretrain_hist[\"losses\"][\"val\"],\n                \"stream\": {m: stream_results[m][\"mean_loss\"] for m in methods},\n            },\n            \"methods\": method_data,\n            \"best_val_acc\": float(best_val_acc),\n            \"best_val_loss\": float(best_val_loss),\n        }\n\n        val_acc_curve = np.array(\n            [v for _, v in pretrain_hist[\"metrics\"][\"val\"]], dtype=np.float32\n        )\n        val_loss_curve = np.array(\n            [v for _, v in pretrain_hist[\"losses\"][\"val\"]], dtype=np.float32\n        )\n        all_val_curves[trial_key] = val_acc_curve\n        all_loss_curves[trial_key] = val_loss_curve\n\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_train_acc.npy\"),\n            np.array(pretrain_hist[\"metrics\"][\"train\"], dtype=np.float32),\n        )\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_val_acc.npy\"),\n            np.array(pretrain_hist[\"metrics\"][\"val\"], dtype=np.float32),\n        )\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_train_loss.npy\"),\n            np.array(pretrain_hist[\"losses\"][\"train\"], dtype=np.float32),\n        )\n        np.save(\n            os.path.join(working_dir, f\"{trial_key}_val_loss.npy\"),\n            np.array(pretrain_hist[\"losses\"][\"val\"], dtype=np.float32),\n        )\n\n        for method in methods:\n            preds = np.concatenate(method_data[method][\"predictions\"])\n            gts = np.concatenate(method_data[method][\"ground_truth\"])\n            drifts = np.array(method_data[method][\"adapter_drift\"], dtype=np.float32)\n            acc_curve = stream_results[method][\"acc_curve\"]\n            loss_curve = stream_results[method][\"loss_curve\"]\n            retained_curve = stream_results[method][\"retained_curve\"]\n            gate = np.array(method_data[method][\"gate_signal\"], dtype=np.float32)\n\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_predictions.npy\"),\n                preds,\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_ground_truth.npy\"), gts\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_drift.npy\"), drifts\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_acc_curve.npy\"),\n                acc_curve,\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_loss_curve.npy\"),\n                loss_curve,\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_retained_curve.npy\"),\n                retained_curve,\n            )\n            np.save(\n                os.path.join(working_dir, f\"{trial_key}_{method}_gate_signal.npy\"), gate\n            )\n\n        row = {\n            \"trial_key\": trial_key,\n            \"epochs\": num_epochs,\n            \"pretrain_lr\": pre_lr,\n            \"best_val_acc\": float(best_val_acc),\n            \"best_val_loss\": float(best_val_loss),\n        }\n        for method in methods:\n            row[f\"{method}_mean_acc\"] = float(stream_results[method][\"mean_acc\"])\n            row[f\"{method}_SARA\"] = float(\n                stream_results[method][\"stream_averaged_retained_accuracy\"]\n            )\n            row[f\"{method}_mean_retained\"] = float(\n                stream_results[method][\"mean_retained_acc\"]\n            )\n        summary_rows.append(row)\n        trial_counter += 1\n\n# selection: prioritize validation, then anchored retained metric\nsummary_rows = sorted(\n    summary_rows,\n    key=lambda r: (\n        -r[\"best_val_acc\"],\n        r[\"best_val_loss\"],\n        -r[\"anchored_SARA\"],\n        r[\"epochs\"],\n    ),\n)\nbest_row = summary_rows[0]\nbest_trial_key = best_row[\"trial_key\"]\nexperiment_data[\"synthetic_stream_main\"][\"selection\"] = {\n    \"criterion\": \"highest best validation accuracy, tie-broken by lower validation loss, then higher anchored SARA\",\n    \"best_trial_key\": best_trial_key,\n    \"best_epochs\": int(best_row[\"epochs\"]),\n    \"best_pretrain_lr\": float(best_row[\"pretrain_lr\"]),\n    \"best_val_acc\": float(best_row[\"best_val_acc\"]),\n    \"best_val_loss\": float(best_row[\"best_val_loss\"]),\n}\n\n# aggregate saves\nepochs_arr = np.array([r[\"epochs\"] for r in summary_rows], dtype=np.int32)\nlr_arr = np.array([r[\"pretrain_lr\"] for r in summary_rows], dtype=np.float32)\nbest_val_acc_arr = np.array([r[\"best_val_acc\"] for r in summary_rows], dtype=np.float32)\nbest_val_loss_arr = np.array(\n    [r[\"best_val_loss\"] for r in summary_rows], dtype=np.float32\n)\nnp.save(os.path.join(working_dir, \"tuned_epochs.npy\"), epochs_arr)\nnp.save(os.path.join(working_dir, \"tuned_pretrain_lrs.npy\"), s based only\non backbone validation accuracy, not downstream stream performance, so the\nchosen best epoch count may be misaligned with the actual continual test-time\nobjective. Fix: report both selection rules or choose based on a held-out stream\nvalidation metric. (4) Because seeds are reset identically each trial, the\n10/20/40/80-epoch runs are nested continuations from the same\ninitialization/data order, which is okay for controlled tuning but not a robust\nhyperparameter search; no variance estimates are provided. Fix: run multiple\nseeds and report mean/std. No runtime crash occurred, but these are substantive\nexperimental bugs/design flaws.", "Execution completed and produced results, but there are notable\nexperimental/reporting bugs. (1) The code claims to introduce two new Hugging\nFace datasets, yet it only adds two new synthetic tasks ('task_d', 'task_e'); no\nactual new HF datasets are loaded or evaluated. Fix by integrating at least two\nreal HF datasets in the data pipeline and reporting their results separately.\n(2) The final log prints execution time twice, with one malformed line:\n'Execution time: 7 seconds seconds'; this indicates duplicate\nreporting/formatting in the surrounding runner or script output handling. Fix by\nkeeping a single formatted timing print. (3) The output appears truncated mid-\nepoch ('E ... [39097 characters truncated] ...'), so full logs are unavailable\nfor inspection; while likely a logging truncation rather than a training\nfailure, it prevents full verification. (4) Method differences are extremely\nsmall, suggesting the adaptation setup may be effectively inert or too weak to\ntest the hypothesis meaningfully; inspect gate activation rates, adapter drift,\nand whether entropy-minimization updates materially change predictions. Overall:\nno crash, but the implementation does not fully satisfy the stage goal and has\nminor reporting issues."], "exc_type": [null, null, null], "exc_info": [null, null, null], "exc_ aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_adapter_drift_over_stream.png", "../../logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_method_stream_loss_bar.png"], [], []], "plot_paths": [["experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_accuracy.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_pretraining_accuracy_curves.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_pretraining_loss_curves.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_method_stream_accuracy_bar.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_accuracy_over_stream.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_loss_over_stream.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_adapter_drift_over_stream.png", "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_method_stream_loss_bar.png"], [], []], "plot_analyses": [[{"analysis": "The synthetic continual test-time adaptation accuracy plot shows that all methods track each other closely across the stream, with mean online accuracy reported as about 0.857 for reset and 0.861 for both carry and anchored. The small gap indicates only a marginal benefit from retaining adaptation over resetting. Most positions show overlapping trajectories, and the main deviations are localized dips and recoveries rather than sustained separation. This supports basic functional correctness of the continual adaptation pipeline, but it does not yet provide strong evidence that shared low-rank memory materially improves performance. For a paper-quality claim, you would want larger and more consistent gains, especially near task transitions or after gradual drift.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_accuracy.png"}, {"analysis": "The pretraining accuracy curves are smooth and well-behaved. Training accuracy rises from roughly 0.45 to around 0.86, while validation accuracy rises from about 0.60 to around 0.87 and then plateaus. Validation staying slightly above training throughout is unusual but not inherently wrong; it can happen with stronger train-time noise, augmentation, dropout, label smoothing, or an easier validation split. The key takeaway is that the backbone plus adapter setup appears trainable and converges quickly without obvious instability. Since both curves flatten by around epochs 5 to 7, additional pretraining epochs likely offer limited benefit in this synthetic setup.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_pretraining_accuracy_curves.png"}, {"analysis": "The pretraining loss curves decrease monotonically for both train and validation, ending near 0.33 for train and 0.31 for validation. This is consistent with the accuracy plot and indicates optimization is stable. The absence of divergence or widening train-validation gap suggests no obvious overfitting in the synthetic pretraining stage. As with the accuracy plot, validation loss being slightly lower than training loss is acceptable if regularization is active during training only. These curves support that the initial model state used for streaming experiments is reasonable and not confounded by failed optimization.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_pretraining_loss_curves.png"}, {"analysis": "The stream-averaged online accuracy bar chart confirms that the three methods are nearly tied, with carry and anchored only slightly above reset. The effect size is very small, so the practical significance is currently limited. For the stated hypothesis, this means the preliminary result is directionally consistent with shared adaptation helping, but only weakly. Because the bars are so close, uncertainty estimates such as multiple random seeds, confidence intervals, or bootstrap intervals are essential before drawing any conclusion. At this stage, the main value of this plot is that the implementation produces sensible aggregate metrics.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_method_stream_accuracy_bar.png"}, {"analysis": "The online accuracy over stream with task boundaries marked by vertical lines is useful for checking whether adaptation helps specifically at segment transitions. The curves remain highly overlapping before and after the boundaries, with no strong evidence that carry or anchored consistently reduce transition-related drops. There are a few positions late in the stream where anchored appears slightly better than reset, but the pattern is not systematic. This suggests either the task shifts are too mild, the adapter capacity/update rule is not yet impactful, or the synthetic stream generation does not create enough temporal structure for continual memory to matter. This is an important insight because the core hypothesis depends on gradual shift and reusable structure across segments.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_accuracy_over_stream.png"}, {"analysis": "The online loss over stream also shows near-complete overlap among methods, matching the accuracy results. Loss spikes and dips occur at similar positions for all strategies, implying that the stream difficulty pattern dominates any adaptation effect. There are small local improvements for carry or anchored at some positions, but they are not persistent. This reinforces the interpretation that the current benchmark is not stressing the difference between reset and persistent adaptation strongly enough. For future experiments, sharper distribution shifts, longer streams, or explicit outlier batches would better test the anchored method\u2019s intended advantages.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_online_loss_over_stream.png"}, {"analysis": "The adapter drift plot is one of the most informative figures for the proposed method. Reset remains at zero drift as expected, while carry and anchored accumulate steadily increasing drift over the stream, reaching roughly 0.0045 by the end. Importantly, this nonzero memory is being formed, so the mechanism is active; however, the accumulated drift does not correspond to a clear downstream performance gain in the other plots. That mismatch suggests the current updates may be too small to matter, may be tracking noise rather than reusable task structure, or the synthetic tasks do not reward retained adaptation. This is a valuable negative result at the implementation stage because it separates \u2018memory exists\u2019 from \u2018memory helps.\u2019", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_adapter_drift_over_stream.png"}, {"analysis": "The stream-averaged online loss bar chart shows almost indistinguishable mean loss across reset, carry, and anchored, around 0.345. This agrees with the accuracy summary and indicates that any advantage from persistent adaptation is currently negligible at the aggregate level. Since both accuracy and loss tell the same story, the conclusion is unlikely to be an artifact of thresholding or class imbalance. The main implication is that the current experimental setup is suitable for debugging and sanity checks, but not yet sufficient to validate the central research claim. The next step should be designing streams where forgetting, transfer, and outlier robustness can be observed more clearly.", "plot_path": "experiments/2026-03-29_01-19-15_shared_low_rank_stream_adaptation_attempt_0/logs/0-run/experiment_results/experiment_828aae502fc44246b8e7cec8e8b942a0_proc_7863/synthetic_stream_method_stream_loss_bar.png"}], [], []], "vlm_feedback_summary": ["The uploaded figures show a preliminary synthetic continual test-time adaptation\nexperiment with pretraining curves and multiple online evaluation summaries.\nOverall, pretraining appears stable and convergent. In the online stream, reset\nis slightly worse on mean accuracy than carry and anchored, while carry and\nanchored are effectively tied. Online loss is also nearly identical across\nmethods. Adapter drift accumulates for carry and anchored while reset st
