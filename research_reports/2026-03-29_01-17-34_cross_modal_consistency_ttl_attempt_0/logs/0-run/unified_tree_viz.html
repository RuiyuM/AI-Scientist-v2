ain accuracy,\nvalidation loss, best validation accuracy, and test accuracy for each test mode.\nSince the saved test metrics are stored as a list of dictionaries, I\u2019ll handle\nthose separately and print the final reported values for each method. The script\nwill run immediately at global scope and will not generate any plots.", "I\u2019ll load the saved `experiment_data.npy` from the `working` directory, inspect\nthe nested structure, and extract the final or best values from the stored\nmetric collections. For this experiment, the main dataset is\n`synthetic_vlm_stream` under `hyperparam_tuning_epochs`, and the most useful\nfinal summaries come from the stored `summary`, `metrics[\"comparison\"]`, and the\nlast/best entries in train/validation histories. The script will print the\ndataset name first, then clearly labeled metric names such as training accuracy,\nvalidation loss, frozen stream accuracy, and consistency stability-adjusted\naccuracy. It will not create any plots and will run immediately at global scope."], "parse_metrics_code": ["import os\nimport numpy as np\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nexperiment_data_path = os.path.join(working_dir, \"experiment_data.npy\")\n\nexperiment_data = np.load(experiment_data_path, allow_pickle=True).item()\n\n\ndef safe_float(x):\n    try:\n        return float(x)\n    except Exception:\n        return x\n\n\ndef get_final_tuple_value(records):\n    if not records:\n        return None\n    last = records[-1]\n    if isinstance(last, (list, tuple)) and len(last) >= 2:\n        return safe_float(last[1])\n    return None\n\n\ndef get_best_tuple_value(records, mode=\"max\"):\n    if not records:\n        return None\n    values = []\n    for item in records:\n        if isinstance(item, (list, tuple)) and len(item) >= 2:\n            values.append(safe_float(item[1]))\n    if not values:\n        return None\n    return max(values) if mode == \"max\" else min(values)\n\n\ndef print_metric(label, value):\n    if value is None:\n        print(f\"{label}: N/A\")\n    elif isinstance(value, float):\n        print(f\"{label}: {value:.6f}\")\n    else:\n        print(f\"{label}: {value}\")\n\n\nfor dataset_name, dataset_payload in experiment_data.items():\n    print(f\"Dataset: {dataset_name}\")\n\n    metrics = dataset_payload.get(\"metrics\", {})\n    losses = dataset_payload.get(\"losses\", {})\n\n    train_accuracy_final = get_final_tuple_value(metrics.get(\"train\", []))\n    train_accuracy_best = get_best_tuple_value(metrics.get(\"train\", []), mode=\"max\")\n\n    validation_accuracy_final = get_final_tuple_value(metrics.get(\"val\", []))\n    validation_accuracy_best = get_best_tuple_value(metrics.get(\"val\", []), mode=\"max\")\n\n    train_loss_final = get_final_tuple_value(losses.get(\"train\", []))\n    train_loss_best = get_best_tuple_value(losses.get(\"train\", []), mode=\"min\")\n\n    validation_loss_final = get_final_tuple_value(losses.get(\"val\", []))\n    validation_loss_best = get_best_tuple_value(losses.get(\"val\", []), mode=\"min\")\n\n    print_metric(\"Final train accuracy\", train_accuracy_final)\n    print_metric(\"Best train accuracy\", train_accuracy_best)\n    print_metric(\"Final validation accuracy\", validation_accuracy_final)\n    print_metric(\"Best validation accuracy\", validation_accuracy_best)\n    print_metric(\"Final train loss\", train_loss_final)\n    print_metric(\"Best train loss\", train_loss_best)\n    print_metric(\"Final validation loss\", validation_loss_final)\n    print_metric(\"Best validation loss\", validation_loss_best)\n\n    test_metrics = metrics.get(\"test\", [])\n    if test_metrics:\n        for test_entry in test_metrics:\n            if isinstance(test_entry, dict):\n                method_name = test_entry.get(\"name\", \"unknown\")\n                print_metric(f\"Test accuracy ({method_name})\", test_entry.get(\"acc\"))\n                print_metric(\n                    f\"Test stability-adjusted accuracy ({method_name})\",\n                    test_entry.get(\"stability_adjusted_acc\"),\n                )\n                print_metric(\n                    f\"Test adaptation frequency ({method_name})\",\n                    test_entry.get(\"adapt_freq\"),\n                )\n                print_metric(\n                    f\"Test adaptation loss mean ({method_name})\",\n                    test_entry.get(\"adapt_loss_mean\"),\n                )\n    else:\n        print(\"Test metrics: N/A\")\n\n    print()\n", "import os\nimport numpy as np\n\n\ndef safe_float(x):\n    try:\n        return float(x)\n    except Exception:\n        return x\n\n\ndef load_experiment_data():\n    working_dir = os.path.join(os.getcwd(), \"working\")\n    file_path = os.path.join(working_dir, \"experiment_data.npy\")\n    if not os.path.exists(file_path):\n        raise FileNotFoundError(f\"Could not find experiment data file: {file_path}\")\n    return np.load(file_path, allow_pickle=True).item()\n\n\ndef group_history_by_config(records):\n    grouped = {}\n    for item in records:\n        # Expected structure from original code:\n        # (config_key, epoch, value, timestamp)\n        if len(item) < 3:\n            continue\n        config_key = item[0]\n        epoch = item[1]\n        value = item[2]\n        grouped.setdefault(config_key, []).append((epoch, value))\n    for config_key in grouped:\n        grouped[config_key] = sorted(grouped[config_key], key=lambda x: x[0])\n    return grouped\n\n\ndef print_history_summaries(dataset_name, dataset_blob):\n    metrics = dataset_blob.get(\"metrics\", {})\n    losses = dataset_blob.get(\"losses\", {})\n\n    train_acc_grouped = group_history_by_config(metrics.get(\"train\", []))\n    val_acc_grouped = group_history_by_config(metrics.get(\"val\", []))\n    train_loss_grouped = group_history_by_config(losses.get(\"train\", []))\n    val_loss_grouped = group_history_by_config(losses.get(\"val\", []))\n\n    all_configs = sorted(\n        set(train_acc_grouped.keys())\n        | set(val_acc_grouped.keys())\n        | set(train_loss_grouped.keys())\n        | set(val_loss_grouped.keys())\n    )\n\n    for config_key in all_configs:\n        print(f\"Dataset: {dataset_name}\")\n        print(f\"Configuration name: {config_key}\")\n\n        if config_key in train_acc_grouped and train_acc_grouped[config_key]:\n            final_train_acc = train_acc_grouped[config_key][-1][1]\n            best_train_acc = max(v for _, v in train_acc_grouped[config_key])\n            print(f\"Final training accuracy: {safe_float(final_train_acc):.6f}\")\n            print(f\"Best training accuracy: {safe_float(best_train_acc):.6f}\")\n\n        if config_key in val_acc_grouped and val_acc_grouped[config_key]:\n            final_val_acc = val_acc_grouped[config_key][-1][1]\n            best_val_acc = max(v for _, v in val_acc_grouped[config_key])\n            print(f\"Final validation accuracy: {safe_float(final_val_acc):.6f}\")\n            print(f\"Best validation accuracy: {safe_float(best_val_acc):.6f}\")\n\n        if config_key in train_loss_grouped and train_loss_grouped[config_key]:\n            final_train_loss = train_loss_grouped[config_key][-1][1]\n            best_train_loss = min(v for _, v in train_loss_grouped[config_key])\n            print(f\"Final training loss: {safe_float(final_train_loss):.6f}\")\n            print(f\"Best training loss: {safe_float(best_train_loss):.6f}\")\n\n        if config_key in val_loss_grouped and val_loss_grouped[config_key]:\n            final_val_loss = val_loss_grouped[config_key][-1][1]\n            best_val_loss = min(v for _, v in val_loss_grouped[config_key])\n            print(f\"Final validation loss: {safe_float(final_val_loss):.6f}\")\n            print(f\"Best validation loss: {safe_float(best_val_loss):.6f}\")\n\n        print(\"-\" * 60)\n\n\ndef print_test_metric_summaries(dataset_name, dataset_blob):\n    test_metrics = dataset_blob.get(
