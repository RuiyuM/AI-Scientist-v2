      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }
};

const treeStructData = {"edges": [[0, 1]], "layout": [[0.5, 0.0], [0.5, 1.0]], "plan": ["The main bug is that each dataset split was generated with different latent\nclass prototypes, so train/val/test came from incompatible label semantics; this\nexplains the exploding validation loss. I fix this by creating one shared\nsynthetic world (shared modality prototypes and class structure) and only\napplying a controlled stream shift to the test stream, while also standardizing\nfeatures using train-set statistics instead of per-sample normalization. I also\nmake the consistency update objective actually use cross-modal agreement via KL\nmatching to caption/rationale predictions, which better reflects the research\nidea than entropy-only updates under the consistency gate. The rest of the\nscript keeps the same lightweight setup, logs all required metrics, saves\narrays, and produces visualizations.", "Hyperparam tuning name: epochs. I would turn the baseline into a small\nhyperparameter-tuning script focused only on training length, comparing\n`epochs=15` vs `epochs=30` while keeping everything else fixed. The script will\nfactor training/evaluation into reusable functions, run both experiments end-to-\nend, record validation curves and stream metrics, and then select/report which\nepoch budget performs better. To satisfy the saving requirement, all losses,\nmetrics, predictions, stream outputs, and comparison summaries will be stored\ninside `experiment_data['hyperparam_tuning_epochs']['synthetic_vlm_stream']` and\nsaved to `experiment_data.npy`, along with additional `np.save()` dumps for\nplottable arrays. The code remains single-file and fully executable, including\nplots for per-setting training curves and stream rolling accuracy."], "code": ["import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport time\nimport copy\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\nexperiment_data = {\n    \"synthetic_vlm_stream\": {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream\": {},\n    }\n}\n\n\nclass SyntheticWorld:\n    def __init__(self, dim=16, num_classes=4, seed=7):\n        rng = np.random.RandomState(seed)\n        self.dim = dim\n        self.num_classes = num_classes\n        self.W_img = rng.randn(num_classes, dim).astype(np.float32) * 1.2\n        self.W_cap = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n        self.W_rat = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n\n\nclass SyntheticVLMDataset(Dataset):\n    def __init__(self, world, n=2000, shift=False, seed=0):\n        self.world = world\n        self.n = n\n        self.shift = shift\n        self.rng = np.random.RandomState(seed)\n        self.data = []\n        dim = world.dim\n        K = world.num_classes\n\n        for i in range(n):\n            y = self.rng.randint(0, K)\n            z = self.rng.randn(dim).astype(np.float32)\n\n            img = z + world.W_img[y] + 0.35 * self.rng.randn(dim).astype(np.float32)\n            cap = (\n                0.7 * z + world.W_cap[y] + 0.45 * self.rng.randn(dim).astype(np.float32)\n            )\n            rat = (\n                0.5 * z + world.W_rat[y] + 0.50 * self.rng.randn(dim).astype(np.float32)\n            )\n\n            if shift:\n                img = (\n                    0.60 * img\n                    + 0.85 * np.roll(img, 1)\n                    + 0.40 * self.rng.randn(dim).astype(np.float32)\n                )\n                if i % 7 == 0:\n                    img = img + 1.0 * self.rng.randn(dim).astype(np.float32)\n\n            self.data.append(\n                (\n                    img.astype(np.float32),\n                    cap.astype(np.float32),\n                    rat.astype(np.float32),\n                    int(y),\n                )\n            )\n\n    def __len__(self):\n        return self.n\n\n    def __getitem__(self, idx):\n        img, cap, rat, y = self.data[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"caption\": torch.tensor(cap, dtype=torch.float32),\n            \"rationale\": torch.tensor(rat, dtype=torch.float32),\n            \"label\": torch.tensor(y, dtype=torch.long),\n        }\n\n\nclass FeatureNormalizer:\n    def __init__(self, mean_dict, std_dict):\n        self.mean = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in mean_dict.items()\n        }\n        self.std = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in std_dict.items()\n        }\n\n    @classmethod\n    def from_dataset(cls, dataset):\n        stats = {}\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            arr = np.stack([sample[key].numpy() for sample in dataset], axis=0)\n            stats[key] = (arr.mean(axis=0), arr.std(axis=0) + 1e-6)\n        mean_dict = {k: v[0] for k, v in stats.items()}\n        std_dict = {k: v[1] for k, v in stats.items()}\n        return cls(mean_dict, std_dict)\n\n    def normalize(self, batch):\n        out = {}\n        for k, v in batch.items():\n            out[k] = v.to(device) if isinstance(v, torch.Tensor) else v\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            out[key] = (out[key] - self.mean[key]) / self.std[key]\n        return out\n\n\nclass SmallVLM(nn.Module):\n    def __init__(self, dim=16, hidden=64, num_classes=4):\n        super().__init__()\n        self.img_backbone = nn.Sequential(\n            nn.Linear(dim, hidden), nn.ReLU(), nn.Linear(hidden, hidden), nn.ReLU()\n        )\n        self.caption_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.rationale_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, hidden), nn.ReLU(), nn.Linear(hidden, num_classes)\n        )\n\n    def forward(self, image, caption, rationale):\n        h = self.img_backbone(image)\n        logits_main = self.adapter(h)\n        logits_cap = self.caption_head(caption)\n        logits_rat = self.rationale_head(rationale)\n        return logits_main, logits_cap, logits_rat\n\n\ndef supervised_loss(logits_main, logits_cap, logits_rat, y):\n    return (\n        F.cross_entropy(logits_main, y)\n        + 0.35 * F.cross_entropy(logits_cap, y)\n        + 0.35 * F.cross_entropy(logits_rat, y)\n    )\n\n\ndef evaluate_loader(model, loader, normalizer):\n    model.eval()\n    total_loss, total, correct = 0.0, 0, 0\n    preds_all, gt_all = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            lm, lc, lr = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lr, batch[\"label\"])\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n            preds_all.extend(pred.detach().cpu().numpy().tolist())\n            gt_all.extend(batch[\"label\"].detach().cpu().numpy().tolist())\n    return total_loss / total, correct / total, np.array(preds_all), np.array(gt_all)\n\n\ndef entropy_min_loss(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef consistency_alignment_loss(logits_main, logits_cap, logits_rat, temperature=1.0):\n    log_p_main = F.log_softmax(logits_main / temperature, dim=-1)\n    p_cap = F.softmax(logits_cap.detach() / temperature, dim=-1)\n    p_rat = F.softmax(logits_rat.detach() / temperature, dim=-1)\n    target = 0.5 * (p_cap + p_rat)\n    return F.kl_div(log_p_main, target, reduction=\"batchmean\")\n\n\ndef stream_eval_with_tta(\n    model_init, stream_loader, normalizer, mode=\"frozen\", lr=2e-3, conf_thresh=0.70\n):\n    model = copy.deepcopy(model_init).to(device)\n    for p in model.img_backbone.parameters():\n        p.requires_grad = False\n    for p in model.caption_head.parameters():\n        p.requires_grad = False\n    for p in model.rationale_head.parameters():\n        p.requires_grad = False\n    for p in model.adapter.parameters():\n        p.requires_grad = True\n    optimizer = torch.optim.Adam(model.adapter.parameters(), lr=lr)\n\n    preds, gts, update_flags, confidences, losses = [], [], [], [], []\n    model.eval()\n\n    for _, batch in enumerate(stream_loader):\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        with torch.no_grad():\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            p_main = F.softmax(lm, dim=-1)\n            p_cap = F.softmax(lc, dim=-1)\n            p_rat = F.softmax(lrh, dim=-1)\n            conf, pred = p_main.max(dim=-1)\n            pred_cap = p_cap.argmax(dim=-1)\n            pred_rat = p_rat.argmax(dim=-1)\n\n            js_like = 0.5 * (\n                F.kl_div(torch.log(p_main + 1e-8), p_cap, reduction=\"batchmean\")\n                + F.kl_div(torch.log(p_main + 1e-8), p_rat, reduction=\"batchmean\")\n            )\n            agree = (pred == pred_cap) & (pred == pred_rat)\n            consistency_score = float(torch.exp(-js_like).item())\n\n            preds.append(int(pred.item()))\n            gts.append(int(batch[\"label\"].item()))\n            confidences.append(float(conf.item()))\n\n        do_update = False\n        if mode == \"entropy\":\n            do_update = True\n        elif mode == \"consistency\":\n            do_update = bool(\n                (conf > conf_thresh).item()\n                and agree.item()\n                and consistency_score > 0.65\n            )\n\n        if do_update:\n            model.train()\n            optimizer.zero_grad()\n            lm2, lc2, lr2 = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            if mode == \"entropy\":\n                loss = entropy_min_loss(lm2)\n            else:\n                loss = consistency_alignment_loss(\n                    lm2, lc2, lr2\n                ) + 0.1 * entropy_min_loss(lm2)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.adapter.parameters(), 1.0)\n            optimizer.step()\n            losses.append(float(loss.item()))\n            update_flags.append(1)\n            model.eval()\n        else:\n            losses.append(0.0)\n            update_flags.append(0)\n\n    preds = np.array(preds)\n    gts = np.array(gts)\n    update_flags = np.array(update_flags)\n    confidences = np.array(confidences)\n    acc = float((preds == gts).mean())\n\n    correctness = (preds == gts).astype(np.float32)\n    w = 25\n    rolling = np.array(\n        [correctness[max(0, i - w + 1) : i + 1].mean() for i in range(len(correctness))]\n    )\n    penalties = []\n    for i in np.where(update_flags == 1)[0]:\n        pre = rolling[max(0, i - 1)]\n        post = rolling[min(len(rolling) - 1, i + 5)]\n        penalties.append(max(0.0, pre - post))\n    volatility_penalty = float(np.mean(penalties)) if penalties else 0.0\n    stability_adjusted_acc = acc - 0.5 * volatility_penalty\n\n    return {\n        \"acc\": acc,\n        \"stability_adjusted_acc\": stability_adjusted_acc,\n        \"preds\": preds,\n        \"gts\": gts,\n        \"updates\": update_flags,\n        \"confidences\": confidences,\n        \"rolling_acc\": rolling,\n        \"adapt_loss_mean\": float(np.mean(losses)),\n        \"adapt_freq\": float(update_flags.mean()),\n    }\n\n\n# Data\nworld = SyntheticWorld(dim=16, num_classes=4, seed=7)\ntrain_ds = SyntheticVLMDataset(world, n=2500, shift=False, seed=11)\nval_ds = SyntheticVLMDataset(world, n=500, shift=False, seed=13)\ntest_stream_ds = SyntheticVLMDataset(world, n=700, shift=True, seed=17)\n\nnormalizer = FeatureNormalizer.from_dataset(train_ds)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstream_loader = DataLoader(test_stream_ds, batch_size=1, shuffle=False)\n\n# Model\nmodel = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3, weight_decay=1e-4)\n\n# Train\nepochs = 15\nbest_state = None\nbest_val = float(\"inf\")\n\nfor epoch in range(1, epochs + 1):\n    model.train()\n    total_loss, total, correct = 0.0, 0, 0\n\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        optimizer.zero_grad()\n        lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n        loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n        loss.backward()\n        torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n        optimizer.step()\n\n        pred = lm.argmax(dim=-1)\n        bs = batch[\"label\"].size(0)\n        total_loss += loss.item() * bs\n        total += bs\n        correct += (pred == batch[\"label\"]).sum().item()\n\n    train_loss = total_loss / total\n    train_acc = correct / total\n    val_loss, val_acc, _, _ = evaluate_loader(model, val_loader, normalizer)\n\n    print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n    ts = time.time()\n    experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"train\"].append(\n        (epoch, train_loss, ts)\n    )\n    experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"val\"].append(\n        (epoch, val_loss, ts)\n    )\n    experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"train\"].append(\n        (epoch, train_acc, ts)\n    )\n    experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"val\"].append(\n        (epoch, val_acc, ts)\n    )\n    experiment_data[\"synthetic_vlm_stream\"][\"timestamps\"].append(ts)\n\n    if val_loss < best_val:\n        best_val = val_loss\n        best_state = copy.deepcopy(model.state_dict())\n\nmodel.load_state_dict(best_state)\n\n# Stream evaluation baselines\nfrozen_res = stream_eval_with_tta(model, stream_loader, normalizer, mode=\"frozen\")\nentropy_res = stream_eval_with_tta(model, stream_loader, normalizer, mode=\"entropy\")\nconsistency_res = stream_eval_with_tta(\n    model, stream_loader, normalizer, mode=\"consistency\"\n)\n\nresults = {\"frozen\": frozen_res, \"entropy\": entropy_res, \"consistency\": consistency_res}\n\nfor name, res in results.items():\n    print(\n        f\"{name}: \"\n        f\"acc={res['acc']:.4f}, \"\n        f\"Stream Stability-Adjusted Accuracy={res['stability_adjusted_acc']:.4f}, \"\n        f\"adapt_freq={res['adapt_freq']:.4f}, \"\n        f\"adapt_loss_mean={res['adapt_loss_mean']:.4f}\"\n    )\n\n# Save metrics/predictions\nfor name, res in results.items():\n    experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"test\"].append(\n        {\n            \"name\": name,\n            \"acc\": res[\"acc\"],\n            \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n            \"adapt_freq\": res[\"adapt_freq\"],\n            \"adapt_loss_mean\": res[\"adapt_loss_mean\"],\n            \"timestamp\": time.time(),\n        }\n    )\n\nexperiment_data[\"synthetic_vlm_stream\"][\"predictions\"] = {\n    \"frozen\": frozen_res[\"preds\"],\n    \"entropy\": entropy_res[\"preds\"],\n    \"consistency\": consistency_res[\"preds\"],\n}\nexperiment_data[\"synthetic_vlm_stream\"][\"ground_truth\"] = frozen_res[\"gts\"]\nexperiment_data[\"synthetic_vlm_stream\"][\"stream\"] = {\n    \"frozen_updates\": frozen_res[\"updates\"],\n    \"entropy_updates\": entropy_res[\"updates\"],\n    \"consistency_updates\": consistency_res[\"updates\"],\n    \"frozen_rolling_acc\": frozen_res[\"rolling_acc\"],\n    \"entropy_rolling_acc\": entropy_res[\"rolling_acc\"],\n    \"consistency_rolling_acc\": consistency_res[\"rolling_acc\"],\n    \"frozen_confidences\": frozen_res[\"confidences\"],\n    \"entropy_confidences\": entropy_res[\"confidences\"],\n    \"consistency_confidences\": consistency_res[\"confidences\"],\n}\n\nnp.save(os.path.join(working_dir, \"synthetic_preds_frozen.npy\"), frozen_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"synthetic_preds_entropy.npy\"), entropy_res[\"preds\"])\nnp.save(\n    os.path.join(working_dir, \"synthetic_preds_consistency.npy\"),\n    consistency_res[\"preds\"],\n)\nnp.save(os.path.join(working_dir, \"synthetic_ground_truth.npy\"), frozen_res[\"gts\"])\nnp.save(\n    os.path.join(working_dir, \"synthetic_entropy_updates.npy\"), entropy_res[\"updates\"]\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_consistency_updates.npy\"),\n    consistency_res[\"updates\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_frozen_rolling_acc.npy\"),\n    frozen_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_entropy_rolling_acc.npy\"),\n    entropy_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_consistency_rolling_acc.npy\"),\n    consistency_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_train_losses.npy\"),\n    np.array(experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"train\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_val_losses.npy\"),\n    np.array(experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"val\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_train_metrics.npy\"),\n    np.array(experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"train\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_val_metrics.npy\"),\n    np.array(experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"val\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_test_metrics.npy\"),\n    np.array(experiment_data[\"synthetic_vlm_stream\"][\"metrics\"][\"test\"], dtype=object),\n)\n\n# Visualization 1: rolling accuracy and updates\nplt.figure(figsize=(10, 5))\nx = np.arange(len(frozen_res[\"rolling_acc\"]))\nplt.plot(x, frozen_res[\"rolling_acc\"], label=\"Frozen\", linewidth=2)\nplt.plot(x, entropy_res[\"rolling_acc\"], label=\"Entropy TTA\", linewidth=2)\nplt.plot(x, consistency_res[\"rolling_acc\"], label=\"Consistency-Gated TTA\", linewidth=2)\nent_u = np.where(entropy_res[\"updates\"] == 1)[0]\ncon_u = np.where(consistency_res[\"updates\"] == 1)[0]\nif len(ent_u) > 0:\n    plt.scatter(\n        ent_u,\n        entropy_res[\"rolling_acc\"][ent_u],\n        s=10,\n        alpha=0.35,\n        label=\"Entropy updates\",\n    )\nif len(con_u) > 0:\n    plt.scatter(\n        con_u,\n        consistency_res[\"rolling_acc\"][con_u],\n        s=14,\n        alpha=0.5,\n        label=\"Consistency updates\",\n    )\nplt.xlabel(\"Stream step\")\nplt.ylabel(\"Rolling accuracy\")\nplt.title(\"Synthetic multimodal stream: rolling accuracy and adaptation events\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_stream_rolling_accuracy_fixed.png\"),\n    dpi=160,\n)\nplt.close()\n\n# Visualization 2: predictions vs GT on stream prefix\nplt.figure(figsize=(10, 4))\nn_show = 60\nplt.plot(frozen_res[\"gts\"][:n_show], label=\"Ground Truth\", marker=\"o\")\nplt.plot(entropy_res[\"preds\"][:n_show], label=\"Entropy Pred\", marker=\"x\")\nplt.plot(consistency_res[\"preds\"][:n_show], label=\"Consistency Pred\", marker=\"s\")\nplt.yticks(sorted(np.unique(frozen_res[\"gts\"])))\nplt.xlabel(\"Sample index\")\nplt.ylabel(\"Class\")\nplt.title(\"Sample predictions vs ground truth on stream prefix\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_stream_prediction_samples_fixed.png\"),\n    dpi=160,\n)\nplt.close()\n\n# Visualization 3: training curves\ntrain_curve = np.array(\n    [[x[0], x[1]] for x in experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"train\"]],\n    dtype=float,\n)\nval_curve = np.array(\n    [[x[0], x[1]] for x in experiment_data[\"synthetic_vlm_stream\"][\"losses\"][\"val\"]],\n    dtype=float,\n)\nplt.figure(figsize=(9, 4))\nplt.plot(train_curve[:, 0], train_curve[:, 1], label=\"Train loss\")\nplt.plot(val_curve[:, 0], val_curve[:, 1], label=\"Val loss\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Loss\")\nplt.title(\"Synthetic VLM training/validation loss\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_training_curves_fixed.png\"), dpi=160\n)\nplt.close()\n\n# Visualization 4: generative-style sample comparison (predicted label sequences)\nplt.figure(figsize=(10, 4))\nplt.step(\n    np.arange(n_show), frozen_res[\"gts\"][:n_show], where=\"mid\", label=\"Ground Truth\"\n)\nplt.step(\n    np.arange(n_show), frozen_res[\"preds\"][:n_show], where=\"mid\", label=\"Frozen Pred\"\n)\nplt.step(\n    np.arange(n_show),\n    consistency_res[\"preds\"][:n_show],\n    where=\"mid\",\n    label=\"Consistency Pred\",\n)\nplt.xlabel(\"Sample index\")\nplt.ylabel(\"Class\")\nplt.title(\"Generated sample-label sequence comparison on stream prefix\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_generated_sequence_comparison_fixed.png\"),\n    dpi=160,\n)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n", "import os\nimport time\nimport copy\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\nexperiment_data = {\n    \"hyperparam_tuning_epochs\": {\n        \"synthetic_vlm_stream\": {\n            \"metrics\": {\"train\": [], \"val\": [], \"test\": [], \"comparison\": []},\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": {},\n            \"ground_truth\": [],\n            \"timestamps\": [],\n            \"stream\": {},\n            \"configs\": [],\n            \"summary\": {},\n        }\n    }\n}\n\n\nclass SyntheticWorld:\n    def __init__(self, dim=16, num_classes=4, seed=7):\n        rng = np.random.RandomState(seed)\n        self.dim = dim\n        self.num_classes = num_classes\n        self.W_img = rng.randn(num_classes, dim).astype(np.float32) * 1.2\n        self.W_cap = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n        self.W_rat = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n\n\nclass SyntheticVLMDataset(Dataset):\n    def __init__(self, world, n=2000, shift=False, seed=0):\n        self.world = world\n        self.n = n\n        self.shift = shift\n        self.rng = np.random.RandomState(seed)\n        self.data = []\n        dim = world.dim\n        K = world.num_classes\n\n        for i in range(n):\n            y = self.rng.randint(0, K)\n            z = self.rng.randn(dim).astype(np.float32)\n\n            img = z + world.W_img[y] + 0.35 * self.rng.randn(dim).astype(np.float32)\n            cap = (\n                0.7 * z + world.W_cap[y] + 0.45 * self.rng.randn(dim).astype(np.float32)\n            )\n            rat = (\n                0.5 * z + world.W_rat[y] + 0.50 * self.rng.randn(dim).astype(np.float32)\n            )\n\n            if shift:\n                img = (\n                    0.60 * img\n                    + 0.85 * np.roll(img, 1)\n                    + 0.40 * self.rng.randn(dim).astype(np.float32)\n                )\n                if i % 7 == 0:\n                    img = img + 1.0 * self.rng.randn(dim).astype(np.float32)\n\n            self.data.append(\n                (\n                    img.astype(np.float32),\n                    cap.astype(np.float32),\n                    rat.astype(np.float32),\n                    int(y),\n                )\n            )\n\n    def __len__(self):\n        return self.n\n\n    def __getitem__(self, idx):\n        img, cap, rat, y = self.data[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"caption\": torch.tensor(cap, dtype=torch.float32),\n            \"rationale\": torch.tensor(rat, dtype=torch.float32),\n            \"label\": torch.tensor(y, dtype=torch.long),\n        }\n\n\nclass FeatureNormalizer:\n    def __init__(self, mean_dict, std_dict):\n        self.mean = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in mean_dict.items()\n        }\n        self.std = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in std_dict.items()\n        }\n\n    @classmethod\n    def from_dataset(cls, dataset):\n        stats = {}\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            arr = np.stack([sample[key].numpy() for sample in dataset], axis=0)\n            stats[key] = (arr.mean(axis=0), arr.std(axis=0) + 1e-6)\n        mean_dict = {k: v[0] for k, v in stats.items()}\n        std_dict = {k: v[1] for k, v in stats.items()}\n        return cls(mean_dict, std_dict)\n\n    def normalize(self, batch):\n        out = {}\n        for k, v in batch.items():\n            out[k] = v.to(device) if isinstance(v, torch.Tensor) else v\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            out[key] = (out[key] - self.mean[key]) / self.std[key]\n        return out\n\n\nclass SmallVLM(nn.Module):\n    def __init__(self, dim=16, hidden=64, num_classes=4):\n        super().__init__()\n        self.img_backbone = nn.Sequential(\n            nn.Linear(dim, hidden), nn.ReLU(), nn.Linear(hidden, hidden), nn.ReLU()\n        )\n        self.caption_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.rationale_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, hidden), nn.ReLU(), nn.Linear(hidden, num_classes)\n        )\n\n    def forward(self, image, caption, rationale):\n        h = self.img_backbone(image)\n        logits_main = self.adapter(h)\n        logits_cap = self.caption_head(caption)\n        logits_rat = self.rationale_head(rationale)\n        return logits_main, logits_cap, logits_rat\n\n\ndef supervised_loss(logits_main, logits_cap, logits_rat, y):\n    return (\n        F.cross_entropy(logits_main, y)\n        + 0.35 * F.cross_entropy(logits_cap, y)\n        + 0.35 * F.cross_entropy(logits_rat, y)\n    )\n\n\ndef evaluate_loader(model, loader, normalizer):\n    model.eval()\n    total_loss, total, correct = 0.0, 0, 0\n    preds_all, gt_all = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            lm, lc, lr = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lr, batch[\"label\"])\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n            preds_all.extend(pred.detach().cpu().numpy().tolist())\n            gt_all.extend(batch[\"label\"].detach().cpu().numpy().tolist())\n    return total_loss / total, correct / total, np.array(preds_all), np.array(gt_all)\n\n\ndef entropy_min_loss(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef consistency_alignment_loss(logits_main, logits_cap, logits_rat, temperature=1.0):\n    log_p_main = F.log_softmax(logits_main / temperature, dim=-1)\n    p_cap = F.softmax(logits_cap.detach() / temperature, dim=-1)\n    p_rat = F.softmax(logits_rat.detach() / temperature, dim=-1)\n    target = 0.5 * (p_cap + p_rat)\n    return F.kl_div(log_p_main, target, reduction=\"batchmean\")\n\n\ndef stream_eval_with_tta(\n    model_init, stream_loader, normalizer, mode=\"frozen\", lr=2e-3, conf_thresh=0.70\n):\n    model = copy.deepcopy(model_init).to(device)\n    for p in model.img_backbone.parameters():\n        p.requires_grad = False\n    for p in model.caption_head.parameters():\n        p.requires_grad = False\n    for p in model.rationale_head.parameters():\n        p.requires_grad = False\n    for p in model.adapter.parameters():\n        p.requires_grad = True\n    optimizer = torch.optim.Adam(model.adapter.parameters(), lr=lr)\n\n    preds, gts, update_flags, confidences, losses = [], [], [], [], []\n    model.eval()\n\n    for _, batch in enumerate(stream_loader):\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        with torch.no_grad():\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            p_main = F.softmax(lm, dim=-1)\n            p_cap = F.softmax(lc, dim=-1)\n            p_rat = F.softmax(lrh, dim=-1)\n            conf, pred = p_main.max(dim=-1)\n            pred_cap = p_cap.argmax(dim=-1)\n            pred_rat = p_rat.argmax(dim=-1)\n            js_like = 0.5 * (\n                F.kl_div(torch.log(p_main + 1e-8), p_cap, reduction=\"batchmean\")\n                + F.kl_div(torch.log(p_main + 1e-8), p_rat, reduction=\"batchmean\")\n            )\n            agree = (pred == pred_cap) & (pred == pred_rat)\n            consistency_score = float(torch.exp(-js_like).item())\n\n            preds.append(int(pred.item()))\n            gts.append(int(batch[\"label\"].item()))\n            confidences.append(float(conf.item()))\n\n        do_update = False\n        if mode == \"entropy\":\n            do_update = True\n        elif mode == \"consistency\":\n            do_update = bool(\n                (conf > conf_thresh).item()\n                and agree.item()\n                and consistency_score > 0.65\n            )\n\n        if do_update:\n            model.train()\n            optimizer.zero_grad()\n            lm2, lc2, lr2 = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            if mode == \"entropy\":\n                loss = entropy_min_loss(lm2)\n            else:\n                loss = consistency_alignment_loss(\n                    lm2, lc2, lr2\n                ) + 0.1 * entropy_min_loss(lm2)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.adapter.parameters(), 1.0)\n            optimizer.step()\n            losses.append(float(loss.item()))\n            update_flags.append(1)\n            model.eval()\n        else:\n            losses.append(0.0)\n            update_flags.append(0)\n\n    preds = np.array(preds)\n    gts = np.array(gts)\n    update_flags = np.array(update_flags)\n    confidences = np.array(confidences)\n    acc = float((preds == gts).mean())\n\n    correctness = (preds == gts).astype(np.float32)\n    w = 25\n    rolling = np.array(\n        [correctness[max(0, i - w + 1) : i + 1].mean() for i in range(len(correctness))]\n    )\n    penalties = []\n    for i in np.where(update_flags == 1)[0]:\n        pre = rolling[max(0, i - 1)]\n        post = rolling[min(len(rolling) - 1, i + 5)]\n        penalties.append(max(0.0, pre - post))\n    volatility_penalty = float(np.mean(penalties)) if penalties else 0.0\n    stability_adjusted_acc = acc - 0.5 * volatility_penalty\n\n    return {\n        \"acc\": acc,\n        \"stability_adjusted_acc\": stability_adjusted_acc,\n        \"preds\": preds,\n        \"gts\": gts,\n        \"updates\": update_flags,\n        \"confidences\": confidences,\n        \"rolling_acc\": rolling,\n        \"adapt_loss_mean\": float(np.mean(losses)),\n        \"adapt_freq\": float(update_flags.mean()),\n    }\n\n\ndef train_and_select_model(\n    epochs, train_loader, val_loader, normalizer, dim=16, hidden=64, num_classes=4\n):\n    torch.manual_seed(7)\n    np.random.seed(7)\n\n    model = SmallVLM(dim=dim, hidden=hidden, num_classes=num_classes).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3, weight_decay=1e-4)\n\n    best_state = None\n    best_val = float(\"inf\")\n    history = {\n        \"train_loss\": [],\n        \"val_loss\": [],\n        \"train_acc\": [],\n        \"val_acc\": [],\n        \"best_epoch\": None,\n        \"best_val_loss\": None,\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        total_loss, total, correct = 0.0, 0, 0\n\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n\n            optimizer.zero_grad()\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n\n        train_loss = total_loss / total\n        train_acc = correct / total\n        val_loss, val_acc, _, _ = evaluate_loader(model, val_loader, normalizer)\n        print(\n            f\"epochs={epochs} | epoch {epoch}: train_loss={train_loss:.4f}, val_loss={val_loss:.4f}, val_acc={val_acc:.4f}\"\n        )\n\n        history[\"train_loss\"].append((epoch, train_loss, time.time()))\n        history[\"val_loss\"].append((epoch, val_loss, time.time()))\n        history[\"train_acc\"].append((epoch, train_acc, time.time()))\n        history[\"val_acc\"].append((epoch, val_acc, time.time()))\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_state = copy.deepcopy(model.state_dict())\n            history[\"best_epoch\"] = epoch\n            history[\"best_val_loss\"] = val_loss\n\n    model.load_state_dict(best_state)\n    return model, history\n\n\n# Data\nworld = SyntheticWorld(dim=16, num_classes=4, seed=7)\ntrain_ds = SyntheticVLMDataset(world, n=2500, shift=False, seed=11)\nval_ds = SyntheticVLMDataset(world, n=500, shift=False, seed=13)\ntest_stream_ds = SyntheticVLMDataset(world, n=700, shift=True, seed=17)\n\nnormalizer = FeatureNormalizer.from_dataset(train_ds)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstream_loader = DataLoader(test_stream_ds, batch_size=1, shuffle=False)\n\nepoch_candidates = [15, 30]\nall_runs = {}\n\nfor epochs in epoch_candidates:\n    model, history = train_and_select_model(\n        e l mean adaptation loss across stream evaluation modes.", "data": [{"dataset_name": "synthetic_vlm_stream", "final_value": 0.041855, "best_value": 0.0}]}]}], "is_best_node": [true, false], "plots": [["../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_training_curves_fixed.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_loss.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_confidence_curves.png", "../../logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_final_test_metrics_bar.png"], []], "plot_paths": [["experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_training_curves_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_loss.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_confidence_curves.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_final_test_metrics_bar.png"], []], "plot_analyses": [[{"analysis": "Loss decreases smoothly and monotonically for both training and validation, from roughly 1.9/1.1 to about 0.06 by the end. The gap between training and validation is small throughout and nearly vanishes after mid training, which indicates optimization is stable and there is no visible overfitting on this synthetic task. Convergence is very fast, with most gains achieved in the first 5\u20137 epochs, implying the dataset or objective is simple. For an initial implementation this is good evidence that the basic training pipeline works, but it also suggests the task may be too easy to stress-test adaptation methods.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy.png"}, {"analysis": "This reproduces the same train-versus-validation loss pattern: rapid early drop, then a long flat tail near very low loss. The near overlap of curves after a few epochs supports that the model generalizes well on the synthetic split. Because the curve shape is almost identical to the previous loss plot, it likely serves as a duplicate sanity-check figure rather than adding new evidence. The key takeaway remains that the base model/adapter can be trained reliably, but this alone does not validate test-time learning behavior.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples.png"}, {"analysis": "Training and validation accuracy rise to essentially 100% within about 3\u20135 epochs and then saturate. Validation is even slightly above training at the start, which is plausible on a small or easy synthetic split but also hints that regularization/noise in training may exceed validation difficulty. The complete saturation means the offline task is solved almost perfectly, so downstream stream experiments are probably probing distribution shift or online instability rather than standard generalization. For paper-quality evidence, later experiments should use harder datasets where accuracy does not ceiling this quickly.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png"}, {"analysis": "Rolling stream accuracy shows a strong separation among methods. Consistency-gated TTA stays mostly in the 0.7\u20131.0 range and trends upward over the stream, often reaching very high accuracy. Frozen inference is middling, oscillating around roughly 0.5\u20130.8. Entropy TTA is clearly unstable: it frequently drops far below frozen, with severe collapses around several regions of the stream. The adaptation event markers indicate both adaptive methods update often, but only the consistency-gated updates appear beneficial. This is the clearest plot supporting the central hypothesis: naive entropy minimization can reinforce errors, while gating with a stronger consistency signal stabilizes online adaptation.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png"}, {"analysis": "This is effectively the same stream-performance result and reinforces the same conclusion. Consistency-gated adaptation remains consistently above frozen and substantially above entropy-based adaptation across most stream steps. Entropy adaptation again shows repeated degradation episodes rather than recovery, suggesting harmful updates accumulate or are triggered on ambiguous samples. The duplication is not harmful, but future result sets would be stronger if this slot were used for complementary diagnostics such as update frequency, latency, or cumulative regret.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_training_curves_fixed.png"}, {"analysis": "Prediction confidence is near 1.0 for almost all stream steps for all three methods, with only intermittent dips. Despite this uniformly high confidence, the rolling-accuracy plots show large performance differences, especially the poor behavior of entropy TTA. That mismatch is important: confidence is badly calibrated in this synthetic setup and cannot by itself serve as a safe adaptation trigger. This directly motivates the paper idea, because cross-modal consistency appears more informative than raw confidence or low entropy when deciding whether to update.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png"}, {"analysis": "The aggregate metric bars summarize the stream results cleanly. Consistency has the best final accuracy and best stability-adjusted accuracy, both around the low 0.8s. Frozen is second, around the high 0.6s. Entropy is much worse, around the mid 0.4s, and its stability-adjusted score is slightly lower than its raw accuracy, reflecting volatility. The small gap between raw and stability-adjusted accuracy for consistency suggests not only better average performance but also smoother behavior. This is strong preliminary evidence in favor of the proposed gating mechanism on the synthetic benchmark.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_loss.png"}, {"analysis": "The sample-level sequence comparison on a stream prefix shows consistency-based predictions visually track the ground-truth class sequence more often than the frozen predictions. Frozen predictions appear to spend longer stretches on incorrect classes or abrupt mismatches, while consistency predictions align more frequently with the target transitions. Because this is a qualitative prefix view, it is useful for illustrating behavior but should not be over-interpreted quantitatively. It does, however, match the aggregate trend that consistency gating improves local prediction fidelity.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png"}, {"analysis": "This prediction comparison plot shows ground truth alongside frozen, entropy, and consistency predictions over a stream prefix. Consistency predictions overlap the ground truth more often than entropy predictions, while entropy appears to make more persistent mismatches. Frozen is intermediate. The figure qualitatively supports the stream-accuracy results by showing that consistency gating reduces error bursts. Since the lines are visually dense and class labels are discrete, a confusion matrix or per-class accuracy table would communicate failure modes more clearly in later experiments.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png"}, {"analysis": "This prefix comparison between entropy and consistency predictions against ground truth again suggests consistency is closer to the true label sequence, while entropy exhibits more deviations and abrupt incorrect jumps. The qualitative contrast is useful because it makes the instability of entropy adaptation visible at the sample level. Still, the plot is crowded and limited to a short prefix, so it should be treated as illustrative rather than decisive. For the next stage, it would be valuable to annotate actual adaptation points and whether each update helped or hurt on subsequent samples.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png"}], []], "vlm_feedback_summary": ["The uploaded figures show a synthetic preliminary implementation with duplicated\ntraining/stream plots. Supervised training converges extremely quickly to near-\nzero loss and near-perfect accuracy, suggesting the toy task is easy or\npotentially too clean. In stream evaluation, consistency-gated adaptation\nclearly outperforms both frozen inference and entropy-based test-time\nadaptation, while entropy adaptation is unstable and often worse than frozen.\nConfidence traces remain near-saturated for all methods, indicating confidence\nalone is not a reliable stability signal. Final aggregate bars and sample-level\nprediction plots are consistent with the claim that consistency gating is safer\nthan entropy minimization in this synthetic setup, but the setup appears too\nsimple for strong scientific conclusions.", "[]"], "exec_time": [4.049548625946045, 7.860889196395874], "exec_time_feedback": ["", ""], "datasets_successfully_tested": [["[]"], []], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True
