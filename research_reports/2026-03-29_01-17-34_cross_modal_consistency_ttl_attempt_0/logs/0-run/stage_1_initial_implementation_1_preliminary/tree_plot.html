istency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_confidence_curves.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_final_test_metrics_bar.png"], ["experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_training_curves_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_training_validation_loss.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_stream_confidence_curves.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_final_test_metrics_bar.png"]], "plot_analyses": [[], [{"analysis": "Loss decreases smoothly and monotonically for both training and validation, from roughly 1.9/1.1 to about 0.06 by the end. The gap between training and validation is small throughout and nearly vanishes after mid training, which indicates optimization is stable and there is no visible overfitting on this synthetic task. Convergence is very fast, with most gains achieved in the first 5\u20137 epochs, implying the dataset or objective is simple. For an initial implementation this is good evidence that the basic training pipeline works, but it also suggests the task may be too easy to stress-test adaptation methods.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy.png"}, {"analysis": "This reproduces the same train-versus-validation loss pattern: rapid early drop, then a long flat tail near very low loss. The near overlap of curves after a few epochs supports that the model generalizes well on the synthetic split. Because the curve shape is almost identical to the previous loss plot, it likely serves as a duplicate sanity-check figure rather than adding new evidence. The key takeaway remains that the base model/adapter can be trained reliably, but this alone does not validate test-time learning behavior.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples.png"}, {"analysis": "Training and validation accuracy rise to essentially 100% within about 3\u20135 epochs and then saturate. Validation is even slightly above training at the start, which is plausible on a small or easy synthetic split but also hints that regularization/noise in training may exceed validation difficulty. The complete saturation means the offline task is solved almost perfectly, so downstream stream experiments are probably probing distribution shift or online instability rather than standard generalization. For paper-quality evidence, later experiments should use harder datasets where accuracy does not ceiling this quickly.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png"}, {"analysis": "Rolling stream accuracy shows a strong separation among methods. Consistency-gated TTA stays mostly in the 0.7\u20131.0 range and trends upward over the stream, often reaching very high accuracy. Frozen inference is middling, oscillating around roughly 0.5\u20130.8. Entropy TTA is clearly unstable: it frequently drops far below frozen, with severe collapses around several regions of the stream. The adaptation event markers indicate both adaptive methods update often, but only the consistency-gated updates appear beneficial. This is the clearest plot supporting the central hypothesis: naive entropy minimization can reinforce errors, while gating with a stronger consistency signal stabilizes online adaptation.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png"}, {"analysis": "This is effectively the same stream-performance result and reinforces the same conclusion. Consistency-gated adaptation remains consistently above frozen and substantially above entropy-based adaptation across most stream steps. Entropy adaptation again shows repeated degradation episodes rather than recovery, suggesting harmful updates accumulate or are triggered on ambiguous samples. The duplication is not harmful, but future result sets would be stronger if this slot were used for complementary diagnostics such as update frequency, latency, or cumulative regret.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_training_curves_fixed.png"}, {"analysis": "Prediction confidence is near 1.0 for almost all stream steps for all three methods, with only intermittent dips. Despite this uniformly high confidence, the rolling-accuracy plots show large performance differences, especially the poor behavior of entropy TTA. That mismatch is important: confidence is badly calibrated in this synthetic setup and cannot by itself serve as a safe adaptation trigger. This directly motivates the paper idea, because cross-modal consistency appears more informative than raw confidence or low entropy when deciding whether to update.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png"}, {"analysis": "The aggregate metric bars summarize the stream results cleanly. Consistency has the best final accuracy and best stability-adjusted accuracy, both around the low 0.8s. Frozen is second, around the high 0.6s. Entropy is much worse, around the mid 0.4s, and its stability-adjusted score is slightly lower than its raw accuracy, reflecting volatility. The small gap between raw and stability-adjusted accuracy for consistency suggests not only better average performance but also smoother behavior. This is strong preliminary evidence in favor of the proposed gating mechanism on the synthetic benchmark.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_loss.png"}, {"analysis": "The sample-level sequence comparison on a stream prefix shows consistency-based predictions visually track the ground-truth class sequence more often than the frozen predictions. Frozen predictions appear to spend longer stretches on incorrect classes or abrupt mismatches, while consistency predictions align more frequently with the target transitions. Because this is a qualitative prefix view, it is useful for illustrating behavior but should not be over-interpreted quantitatively. It does, however, match the aggregate trend that consistency gating improves local prediction fidelity.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png"}, {"analysis": "This prediction comparison plot shows ground truth alongside frozen, entropy, and consistency predictions over a stream prefix. Consistency predictions overlap the ground truth more often than entropy predictions, while entropy appears to make more persistent mismatches. Frozen is intermediate. The figure qualitatively supports the stream-accuracy results by showing that consistency gating reduces error bursts. Since the lines are visually dense and class labels are discrete, a confusion matrix or per-class accuracy table would communicate failure modes more clearly in later experiments.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png"}, {"analysis": "This prefix comparison between entropy and consistency predictions against ground truth again suggests consistency is closer to the true label sequence, while entropy exhibits more deviations and abrupt incorrect jumps. The qualitative contrast is useful because it makes the instability of entropy adaptation visible at the sample level. Still, the plot is crowded and limited to a short prefix, so it should be treated as illustrative rather than decisive. For the next stage, it would be valuable to annotate actual adaptation points and whether each update helped or hurt on subsequent samples.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png"}], [{"analysis": "The rolling-accuracy stream plot provides the clearest evidence for the main hypothesis in this preliminary synthetic setup. Consistency-gated TTA stays well above both frozen inference and entropy-only TTA for most of the stream, often operating around roughly 0.75\u20130.95 and occasionally reaching 1.0. Frozen inference is middling and oscillatory, mostly around 0.5\u20130.8. Entropy-only TTA is the weakest method after the early stream, with several severe collapses, including dips near 0.1\u20130.2 around the first third of the stream and repeated low-accuracy regions later. This is strong qualitative support for the claim that naive entropy minimization can destabilize online adaptation. The adaptation markers also suggest updates are frequent, but the plot does not cleanly quantify whether consistency gating reduces update frequency or merely makes updates safer. For the paper direction, the key takeaway is that the synthetic implementation already reproduces the intended failure mode: entropy adaptation can become harmful, while cross-modal consistency gating appears to stabilize learning.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png"}, {"analysis": "The sample-prediction comparison on a stream prefix is useful as a qualitative sanity check, but it is visually noisy. Entropy predictions often disagree with ground truth and appear to jump between classes in a way that matches the poor rolling-accuracy behavior seen elsewhere. Consistency predictions also fluctuate substantially, but they align with the ground-truth sequence more often than entropy predictions over the shown prefix. Because all classes are plotted as connected lines, the figure emphasizes transitions rather than correctness and can exaggerate apparent volatility. The main scientific value here is limited but supportive: the consistency-gated method appears less prone to persistent wrong-class runs than entropy-only adaptation. For future iterations, replacing connected line plots with per-sample correctness indicators or confusion summaries would make the failure modes much easier to interpret.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png"}, {"analysis": "The train/validation loss curves show smooth, monotonic optimization with both losses rapidly decreasing and nearly converging by the end. Validation loss is even slightly below training loss throughout much of training, which is plausible under regularization or an easy validation split, but in this context mainly indicates the synthetic supervised task is very easy. There is no sign of overfitting, optimization instability, or train/validation divergence. This is good for implementation sanity, but it also means these curves do not strongly support the central test-time-learning claim. Instead, they suggest the base model or lightweight classifier can fit the synthetic dataset almost perfectly offline, so the interesting part of the study must come from the online stream dynamics rather than standard generalization difficulty.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_training_curves_fixed.png"}, {"analysis": "The generated sample-label sequence comparison between ground truth, frozen predictions, and consistency predictions again suggests the consistency-gated method often tracks the target sequence better than the frozen baseline on the shown prefix, but the figure remains difficult to read because of dense class switching and connected step lines. There are visible stretches where consistency matches the ground truth while frozen deviates, which is directionally aligned with the stream-level gains. However, the qualitative nature of the plot makes it hard to assess how often this happens or whether gains are concentrated in specific classes. The result is best interpreted as a debugging visualization confirming that the consistency method is not trivially broken and can improve individual predictions, rather than as strong evidence on its own.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png"}, {"analysis": "This train-vs-validation loss plot is effectively a duplicate of the earlier loss figure, with the same pattern: rapid early loss reduction and near-convergence to a very low value by later epochs. The duplication does not add new scientific information. The substantive interpretation remains that the synthetic dataset is easy and the offline model trains cleanly. For a conference-quality story, these plots should probably be condensed to one panel or moved to an appendix, since they mainly establish implementation correctness rather than the novelty claim about stable test-time adaptation.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_training_validation_loss.png"}, {"analysis": "The train-vs-validation accuracy plot shows both curves reaching essentially 100% by around epochs 3\u20134 and then staying saturated. This is a strong indication that the offline task is too easy to reveal meaningful differences in representation quality or generalization. As an implementation milestone, this is reassuring: the training pipeline works and the model can learn the synthetic mapping. But for the research hypothesis, saturation is a warning sign. If the pretraining or source-task accuracy is perfect, then the stream experiment may be dominated by synthetic drift or adaptation mechanics rather than realistic multimodal ambiguity. The next stage should increase difficulty, introduce controlled distribution shift, and report whether consistency gating still helps when the base model is imperfect in a more realistic way.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png"}, {"analysis": "This rolling-accuracy plot appears to repeat the earlier stream-performance figure and reinforces the same conclusion. Consistency-gated adaptation is consistently strongest, frozen is moderate, and entropy-only adaptation is unstable and often substantially worse than doing nothing. The repeated severe underperformance of entropy-only adaptation is important because it directly validates the paper motivation that confidence-seeking updates can reinforce spurious shortcuts. The consistency-gated curve not only improves average accuracy but also appears smoother and less collapse-prone, which is exactly the kind of stability argument the paper wants. To strengthen this result, future versions should add explicit summary statistics such as mean rolling accuracy, variance over time, number of collapses, and adaptation count per method.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png"}, {"analysis": "The multi-method prediction comparison over a stream prefix is one of the more directly relevant qualitative plots because it places frozen, entropy, and consistency predictions against ground truth in a single panel. Frozen predictions often coincide with ground truth but still show noticeable errors. Entropy predictions appear especially erratic, with many mismatches and abrupt switches, consistent with the poor stream-level performance. Consistency predictions visually overlap ground truth more often than the other adaptive method and in many places seem comparable to or better than frozen. This supports the claim that the consistency signal is acting as a useful filter on self-training updates. Still, the plot would be much stronger if accompanied by per-class accuracy or a correctness raster, since line crossings make exact comparison difficult.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png"}, {"analysis": "The confidence-over-stream plot is highly informative for the instability narrative. All methods are often very confident, but entropy-only TTA appears to spend much of the stream at or near confidence 1.0 despite its poor rolling accuracy elsewhere. That pattern is exactly what one would expect from an overconfidence-inducing self-training objective such as entropy minimization. Frozen confidence is also high but shows more dips. Consistency-gated confidence remains high as well, yet unlike entropy-only adaptation it coincides with strong accuracy in the stream plots, suggesting its confidence is better calibrated or at least less harmful. This figure is one of the strongest pieces of evidence that the method is addressing the right failure mode: not low confidence, but confidently wrong adaptation. A next step would be to quantify calibration with ECE/Brier score and to plot confidence conditioned on correctness.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_2da32678172c4e059a9d55149d66a304_proc_7608/synthetic_vlm_stream_stream_confidence_curves.png"}, {"analysis": "The final test-metrics bar chart summarizes the main result cleanly. Consistency-gated adaptation is best on both raw accuracy and stability-adjusted accuracy, slightly above frozen inference and far above entropy-only adaptation. Frozen remains reasonably strong, which is important because it means the adaptive method must beat a competent no-update baseline rather than only a weak comparator. Entropy-only adaptation is dramatically worse, confirming that naive adaptation can be harmful. The small gap between accuracy and stability-adjusted accuracy for consistency suggests its gains are not coming from a few spikes but are sustained over the stream. This is the most concise evidence in favor of the hypothesis, though because the experiment is synthetic, the result should be framed as a proof of concept rather than a definitive validation of cross-modal consistency in real open VLMs.", "plot_path": "experiments/2026-03-29_01-17-3
