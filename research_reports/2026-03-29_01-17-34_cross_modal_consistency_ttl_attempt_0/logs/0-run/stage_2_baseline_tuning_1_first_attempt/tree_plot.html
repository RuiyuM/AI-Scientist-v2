istency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/batch_size_consistency_stream_summary.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/batch_size_consistency_rolling_accuracy.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/best_batch_size_prediction_prefix.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_train_loss_curves.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_validation_accuracy_curves.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_best_validation_loss_summary.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_stream_stability_adjusted_accuracy_summary.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_best_stream_batchsize_rolling_accuracy.png", "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_best_val_batchsize_prediction_prefix.png"]], "plot_analyses": [[{"analysis": "Loss decreases smoothly and monotonically for both training and validation, from roughly 1.9/1.1 to about 0.06 by the end. The gap between training and validation is small throughout and nearly vanishes after mid training, which indicates optimization is stable and there is no visible overfitting on this synthetic task. Convergence is very fast, with most gains achieved in the first 5\u20137 epochs, implying the dataset or objective is simple. For an initial implementation this is good evidence that the basic training pipeline works, but it also suggests the task may be too easy to stress-test adaptation methods.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy.png"}, {"analysis": "This reproduces the same train-versus-validation loss pattern: rapid early drop, then a long flat tail near very low loss. The near overlap of curves after a few epochs supports that the model generalizes well on the synthetic split. Because the curve shape is almost identical to the previous loss plot, it likely serves as a duplicate sanity-check figure rather than adding new evidence. The key takeaway remains that the base model/adapter can be trained reliably, but this alone does not validate test-time learning behavior.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples.png"}, {"analysis": "Training and validation accuracy rise to essentially 100% within about 3\u20135 epochs and then saturate. Validation is even slightly above training at the start, which is plausible on a small or easy synthetic split but also hints that regularization/noise in training may exceed validation difficulty. The complete saturation means the offline task is solved almost perfectly, so downstream stream experiments are probably probing distribution shift or online instability rather than standard generalization. For paper-quality evidence, later experiments should use harder datasets where accuracy does not ceiling this quickly.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_rolling_accuracy_fixed.png"}, {"analysis": "Rolling stream accuracy shows a strong separation among methods. Consistency-gated TTA stays mostly in the 0.7\u20131.0 range and trends upward over the stream, often reaching very high accuracy. Frozen inference is middling, oscillating around roughly 0.5\u20130.8. Entropy TTA is clearly unstable: it frequently drops far below frozen, with severe collapses around several regions of the stream. The adaptation event markers indicate both adaptive methods update often, but only the consistency-gated updates appear beneficial. This is the clearest plot supporting the central hypothesis: naive entropy minimization can reinforce errors, while gating with a stronger consistency signal stabilizes online adaptation.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_samples_fixed.png"}, {"analysis": "This is effectively the same stream-performance result and reinforces the same conclusion. Consistency-gated adaptation remains consistently above frozen and substantially above entropy-based adaptation across most stream steps. Entropy adaptation again shows repeated degradation episodes rather than recovery, suggesting harmful updates accumulate or are triggered on ambiguous samples. The duplication is not harmful, but future result sets would be stronger if this slot were used for complementary diagnostics such as update frequency, latency, or cumulative regret.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_training_curves_fixed.png"}, {"analysis": "Prediction confidence is near 1.0 for almost all stream steps for all three methods, with only intermittent dips. Despite this uniformly high confidence, the rolling-accuracy plots show large performance differences, especially the poor behavior of entropy TTA. That mismatch is important: confidence is badly calibrated in this synthetic setup and cannot by itself serve as a safe adaptation trigger. This directly motivates the paper idea, because cross-modal consistency appears more informative than raw confidence or low entropy when deciding whether to update.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_generated_sequence_comparison_fixed.png"}, {"analysis": "The aggregate metric bars summarize the stream results cleanly. Consistency has the best final accuracy and best stability-adjusted accuracy, both around the low 0.8s. Frozen is second, around the high 0.6s. Entropy is much worse, around the mid 0.4s, and its stability-adjusted score is slightly lower than its raw accuracy, reflecting volatility. The small gap between raw and stability-adjusted accuracy for consistency suggests not only better average performance but also smoother behavior. This is strong preliminary evidence in favor of the proposed gating mechanism on the synthetic benchmark.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_loss.png"}, {"analysis": "The sample-level sequence comparison on a stream prefix shows consistency-based predictions visually track the ground-truth class sequence more often than the frozen predictions. Frozen predictions appear to spend longer stretches on incorrect classes or abrupt mismatches, while consistency predictions align more frequently with the target transitions. Because this is a qualitative prefix view, it is useful for illustrating behavior but should not be over-interpreted quantitatively. It does, however, match the aggregate trend that consistency gating improves local prediction fidelity.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_training_validation_accuracy.png"}, {"analysis": "This prediction comparison plot shows ground truth alongside frozen, entropy, and consistency predictions over a stream prefix. Consistency predictions overlap the ground truth more often than entropy predictions, while entropy appears to make more persistent mismatches. Frozen is intermediate. The figure qualitatively supports the stream-accuracy results by showing that consistency gating reduces error bursts. Since the lines are visually dense and class labels are discrete, a confusion matrix or per-class accuracy table would communicate failure modes more clearly in later experiments.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_stream_rolling_accuracy_updates.png"}, {"analysis": "This prefix comparison between entropy and consistency predictions against ground truth again suggests consistency is closer to the true label sequence, while entropy exhibits more deviations and abrupt incorrect jumps. The qualitative contrast is useful because it makes the instability of entropy adaptation visible at the sample level. Still, the plot is crowded and limited to a short prefix, so it should be treated as illustrative rather than decisive. For the next stage, it would be valuable to annotate actual adaptation points and whether each update helped or hurt on subsequent samples.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_edb7bd42f4b14679a8cd4a5e69fb1544_proc_7608/synthetic_vlm_stream_prediction_vs_ground_truth_prefix.png"}], [], [], [], [{"analysis": "Training and validation loss decrease smoothly for both epoch budgets, with rapid improvement in the first 5\u20138 epochs and a clear plateau afterward near ~0.05\u20130.06. The 30-epoch run starts from a higher training loss scale but converges to nearly the same terminal region as the 15-epoch run, and the validation curves are extremely close after roughly epoch 8\u201310. This suggests diminishing returns from extending training to 30 epochs: optimization remains stable, but extra epochs are unlikely to materially improve downstream adaptation quality. For baseline tuning, early stopping around 10\u201315 epochs looks justified unless stream metrics show a distinct benefit from the longer budget.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/epochs_tuning_val_loss.png"}, {"analysis": "Rolling accuracy for consistency-gated TTA with 15 versus 30 training epochs shows both settings improving over the stream and ending in a similar high-accuracy band. The 30-epoch model appears slightly noisier early but competitive later, while the 15-epoch model reaches several strong peaks and is not consistently worse. The main takeaway is that longer pretraining does not fundamentally change online behavior; gains from 30 epochs, if any, are small relative to temporal variance. This reinforces the loss-curve evidence that epoch budget is not the main bottleneck.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/epochs_tuning_train_val_loss.png"}, {"analysis": "The learning-rate sweep shows a clear monotonic improvement in best validation loss as learning rate increases across the tested range, with 3e-3 performing best and 1e-3 substantially better than the smallest rate. The gap between the smallest rate and the other two is large, implying under-updating at low learning rate. Since improvement from 1e-3 to 3e-3 is modest rather than dramatic, 3e-3 is a reasonable selected default, but the curve suggests the optimum may lie slightly above 3e-3 or on a plateau around this region. A finer sweep around 2e-3 to 5e-3 would be worthwhile.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/epochs_tuning_consistency_rolling_acc.png"}, {"analysis": "For the selected learning rate of 3e-3, train and validation losses converge very quickly and remain tightly coupled, with only a small transient bump in validation loss around epoch 5. There is no visible overfitting gap; if anything, the model reaches its effective optimum by about epochs 4\u20136 and then trains redundantly. This supports using fewer epochs to save compute and reallocate budget toward more stream evaluations, ablations, or dataset coverage.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/epochs_tuning_stream_metrics.png"}, {"analysis": "On the synthetic multimodal stream, entropy-based TTA is clearly unstable: rolling accuracy degrades sharply after the initial segment and spends much of the stream in a low-accuracy regime around ~0.1\u20130.4. Frozen inference is substantially better and relatively steady around the mid-to-high 0.6 to 0.8 range. Consistency-gated TTA is the strongest curve overall, generally tracking in the ~0.75\u20130.95 band and often improving over frozen later in the stream. This is the cleanest evidence in the plots for the paper\u2019s core claim that cross-modal consistency can prevent harmful updates that entropy minimization would otherwise reinforce.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/lr_sweep_val_curves.png"}, {"analysis": "On the AI2D-like stream, all methods are much closer, and absolute rolling accuracy is low compared with the synthetic stream. Consistency-gated TTA is usually slightly above frozen and entropy TTA, especially around the local peak near the middle of the stream, but the margin is modest. Entropy TTA does not catastrophically fail here, yet it also does not provide a clear benefit. This suggests diagram reasoning may permit some safe adaptation, but the current method yields only incremental gains and may need stronger task-specific consistency signals for charts/diagrams.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/lr_sweep_summary.png"}, {"analysis": "On the TextVQA-like stream, entropy TTA is often the top or tied-top method, especially in the second half where it reaches and maintains higher rolling accuracy than frozen. Consistency-gated TTA is competitive early and mid-stream but falls behind later, ending noticeably below entropy and also below frozen. This is an important failure mode for the hypothesis: text-heavy/OCR-centric tasks may break the usefulness of the current consistency gate, perhaps because generated captions/rationales are less faithful to fine-grained text content than answer confidence is. This dataset should be highlighted as a negative result and analyzed qualitatively.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_rolling_accuracy_tuned.png"}, {"analysis": "The cross-dataset stability bar chart summarizes a mixed picture. Consistency is best on the synthetic stream and slightly best on the AI2D-like stream, but worst on the TextVQA-like stream. Entropy is worst on the synthetic stream, slightly worst on AI2D-like, and best on TextVQA-like. This pattern strongly argues that the effectiveness of test-time objectives is modality- and task-dependent: consistency gating helps where semantic/image grounding dominates, while text extraction tasks may favor different adaptation signals or stricter update filters.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_stream_prediction_samples_tuned.png"}, {"analysis": "Batch-size tuning indicates 64 is the best tested value, slightly above 32 and clearly above 128 on the downstream consistency stability-adjusted metric. The differences are not huge between 32 and 64, but 128 appears to hurt. This is consistent with a trade-off where too-large batches reduce gradient responsiveness or effective online regularization. For the next run, batch size 64 is the most defensible default.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_training_curves_tuned.png"}, {"analysis": "The sample-level sequence comparison is difficult to interpret quantitatively, but visually the consistency predictions fluctuate much more than the sparse frozen predictions shown, and they do not obviously track the ground-truth sequence closely. Because only a short prefix is shown and no accuracy summary is attached, this plot is best used qualitatively as an illustration of prediction dynamics rather than as evidence of superiority. If retained, it would benefit from marking correct/incorrect predictions or showing aligned per-sample confidence/gating decisions; otherwise it risks weakening the presentation.", "plot_path": "experiments/2026-03-29_01-17-34_cross_modal_consistency_ttl_attempt_0/logs/0-run/experiment_results/experiment_602a5c6737a84c1c869704579dfaa4d2_proc_8391/synthetic_vlm_generated_sequence_comparison_tuned.png"}]], "vlm_feedback_summary": ["The uploaded figures show a synthetic preliminary implementation with duplicated\ntraining/stream plots. Supervised training converges extremely quickly to near-\nzero loss and near-perfect accuracy, suggesting the toy task is easy or\npotentially too clean. In stream evaluation, consistency-gated adaptation\nclearly outperforms both frozen inference and entropy-based test-time\nadaptation, while entropy adaptation is unstable and often worse than frozen.\nConfidence traces remain near-saturated for all methods, indicating confidence\nalone is not a reliable stability signal. Final aggregate bars and sample-level\nprediction plots are consistent with the claim that consistency gating is safer\nthan entropy minimization in this synthetic setup, but the setup appears too\nsimple for strong scientific conclusions.", "[]", "[]", "[]", "Plots show a coherent baseline-tuning story for consistency-gated test-time\nadaptation. Longer offline training reduces loss but yields only modest stream\ngains over 15 epochs. Learning-rate sweep favors 3e-3 among tested values. On\nthe synthetic stream, entropy-only adaptation is clearly unstable and collapses,\nwhile consistency-gated adaptation strongly outperforms both frozen and entropy\nbaselines. On the AI2D-like stream, gains are small but consistency is slightly\nbest. On the TextVQA-like stream, entropy adaptation is strongest late in the\nstream, while consistency underperforms, indicating OCR/text-heavy settings may\nweaken the proposed gating signal. Batch size 64 is best among tested values.\nOverall, results partially support the hypothesis: consistency gating improves\nstability and average stream performance in synthetic and diagram-like settings,\nbut not uniformly on text-centric data."], "exec_time": [4.049548625946045, 7.860889196395874, 6.33455491065979, 39.406089544296265, 9.770922422409058], "exec_time_feedback": ["", "", "", "", ""], "datasets_successfully_tested": [["[]"], [], [], [], ["synthetic_vlm_stream", "ai2d_like_stream", "textvqa_like_stream"]], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = {}\n\ndataset_name = next(iter(experiment_data.keys()), None)\nds = experiment_data.get(dataset_name, {}) if dataset_name else {}\nlosses = ds.get(\"losses\", {})\nmetrics = ds.get(\"metrics\", {})\nstream = ds.get(\"stream\", {})\npreds = ds.get(\"predictions\", {})\ngts = np.array(ds.get(\"ground_truth\", []))\n\n\ndef to_epoch_value(arr):\n    out = []\n    for x in arr:\n        try:\n            out.append((float(x[0]), float(x[1])))\n        except Exception:\n            pass\n    return np.array(out) if out else np.empty((0, 2))\n\n\ntrain_loss = to_epoch_value(losses.get(\"train\", []))\nval_loss = to_epoch_value(losses.get(\"val\", []))\ntrain_acc = to_epoch_value(metrics.get(\"train\", []))\nval_acc = to_epoch_value(metrics.get(\"val\", []))\ntest_metrics = metrics.get(\"test\", [])\n\nprint(f\"dataset={dataset_name}\")\nif len(train_loss):\n    print(f\"final_train_loss={train_loss[-1,1]:.4f}\")\nif len(val_loss):\n    print(f\"final_val_loss={val_loss[-1,1]:.4f}\")\nif len(train_acc):\n    print(f\"final_train_acc={train_acc[-1,1]:.4f}\")\nif len(val_acc):\n    print(f\"final_val_acc={val_acc[-1,1]:.4f}\")\nfor m in test_metrics:\n    if isinstance(m, dict):\n        print(\n            f\"{m.get('name','unknown')}: \"\n            f\"acc={m.get('acc', np.nan):.4f}, \"\n            f\"stability_adjusted_acc={m.get('stability_adjusted_acc', np.nan):.4f}, \"\n            f\"adapt_freq={m.get('adapt_freq', np.nan):.4f}, \"\n            f\"adapt_loss_mean={m.get('adapt_loss_mean', np.nan):.4f}\"\n        )\n\ntry:\n    if len(train_loss) and len(val_loss):\n        plt.figure(figsize=(8, 4))\n        plt.plot(train_loss[:, 0], train_loss[:, 1], label=\"Train loss\")\n        plt.plot(val_loss[:, 0], val_loss[:, 1], label=\"Validation loss\")\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Loss\")\n        plt.title(f\"{dataset_name} dataset: Training curves\\nTrain vs Validation Loss\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{dataset_name}_training_validation_loss.png\"),\n            dpi=160,\n        )\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating plot1: {e}\")\n    plt.close()\n\ntry:\n    if len(train_acc) and len(val_acc):\n        plt.figure(figsize=(8, 4))\n        plt.plot(train_acc[:, 0], train_acc[:, 1], label=\"Train accuracy\")\n        plt.plot(val_acc[:, 0], val_acc[:, 1], label=\"Validation accuracy\")\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Accuracy\")\n        plt.title(\n            f\"{dataset_name} dataset: Training curves\\nTrain vs Validation Accuracy\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(\n                working_dir, f\"{dataset_name}_training_validation_accuracy.png\"\n            ),\n            dpi=160,\n        )\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating plot2: {e}\")\n    plt.close()\n\ntry:\n    fr = np.array(stream.get(\"frozen_rolling_acc\", []))\n    en = np.array(stream.get(\"entropy_rolling_acc\", []))\n    co = np.array(stream.get(\"consistency_rolling_acc\", []))\n    eu = np.array(stream.get(\"entropy_updates\", []))\n    cu = np.array(stream.get(\"consistency_updates\", []))\n    if len(fr) or len(en) or len(co):\n        plt.figure(figsize=(10, 5))\n        if len(fr):\n            plt.plot(np.arange(len(fr)), fr, label=\"Frozen\", linewidth=2)\n        if len(en):\n            plt.plot(np.arange(len(en)), en, label=\"Entropy TTA\", linewidth=2)\n        if len(co):\n            plt.plot(np.arange(len(co)), co, label=\"Consistency-Gated TTA\", linewidth=2)\n        if len(en) and len(eu):\n            idx = np.where(eu == 1)[0]\n            if len(idx):\n                plt.scatter(idx, en[idx], s=10, alpha=0.4, label=\"Entropy updates\")\n        if len(co) and len(cu):\n            idx = np.where(cu == 1)[0]\n            if len(idx):\n                plt.scatter(idx, co[idx], s=12, alpha=0.5, label=\"Consistency updates\")\n        plt.xlabel(\"Stream step\")\n        plt.ylabel(\"Rolling accuracy\")\n        plt.title(\n            f\"{dataset_name} dataset: Stream performance\\nRolling Accuracy with Adaptation Events\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(\n                working_dir, f\"{dataset_name}_stream_rolling_accuracy_updates.png\"\n            ),\n            dpi=160,\n        )\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating plot3: {e}\")\n    plt.close()\n\ntry:\n    n_show = (\n        min(60, len(gts), *(len(np.array(v)) for v in preds.values()))\n        if len(preds)\n        else min(60, len(gts))\n    )\n    if n_show > 0:\n        plt.figure(figsize=(10, 4))\n        plt.plot(np.arange(n_show), gts[:n_show], label=\"Ground Truth\", marker=\"o\")\n        for name in [\"frozen\", \"entropy\", \"consistency\"]:\n            arr = np.array(preds.get(name, []))\n            if len(arr) >= n_show:\n                plt.plot(\n                    np.arange(n_show),\n                    arr[:n_show],\n                    label=f r m in test_metrics]\n        x = np.arange(len(names))\n        plt.figure(figsize=(8, 4))\n        w = 0.35\n        plt.bar(x - w / 2, accs, width=w, label=\"Accuracy\")\n        plt.bar(x + w / 2, stabs, width=w, label=\"Stability-adjusted accuracy\")\n        plt.xticks(x, names)\n        plt.ylabel(\"Metric value\")\n        plt.title(\n            f\"{dataset_name} dataset: Final test metrics\\nComparison of Stream Evaluation Modes\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{dataset_name}_final_test_metrics_bar.png\"),\n            dpi=160,\n        )\n    plt.close()\nexcept Exception as e:\n    print(f\"Error creating plot6: {e}\")\n    plt.close()\n", null, null, null, "import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = {}\n\ndataset_name = \"synthetic_vlm_stream\"\nroot = experiment_data.get(\"batch_size_tuning\", {}).get(dataset_name, {})\ntrials = root.get(\"trials\", {})\nsummary = root.get(\"summary\", {})\nranking = summary.get(\"ranking\", [])\nbest_by_val = summary.get(\"best_batch_size_by_val\", None)\nbest_by_stream = summary.get(\"best_batch_size_by_stream_consistency\", None)\n\n\ndef curve_xy(seq):\n    arr = np.array(seq, dtype=object)\n    xs, ys = [], []\n    for row in arr:\n        if isinstance(row, (list, tuple, np.ndarray)) and len(row) >= 2:\n            xs.append(float(row[0]))\n            ys.append(float(row[1]))\n    return np.array(xs), np.array(ys)\n\n\ndef get_test_metric(trial, name, field):\n    for m in trial.get(\"metrics\", {}).get(\"test\", []):\n        if isinstance(m, dict) and m.get(\"name\") == name ue is None:\n        print(f\"{label}: N/A\")\n    elif isinstance(value, float):\n        print(f\"{label}: {value:.6f}\")\n    else:\n        print(f\"{label}: {value}\")\n\n\nfor dataset_name, dataset_payload in experiment_data.items():\n    print(f\"Dataset: {dataset_name}\")\n\n    metrics = dataset_payload.get(\"metrics\", {})\n    losses = dataset_payload.get(\"losses\", {})\n\n    train_accuracy_final = get_final_tuple_value(metrics.get(\"train\", []))\n    train_accuracy_best = get_best_tuple_value(metrics.get(\"train\", []), mode=\"max\")\n\n    validation_accuracy_final = get_final_tuple_value(metrics.get(\"val\", []))\n    validation_accuracy_best = get_best_tuple_value(metrics.get(\"val\", []), mode=\"max\")\n\n    train_loss_final = get_final_tuple_value(losses.get(\"train\", []))\n    train_loss_best = get_best_tuple_value(losses.get(\"train\", []), mode=\"min\")\n\n    validation_loss_final = get_final_tuple_value(losses.get(\"val\", []))\n    validation_loss_best = get_best_tuple_value(losses.get(\"val\", []), mode=\"min\")\n\n    print_metric(\"Final train accuracy\", train_accuracy_final)\n    print_metric(\"Best train accuracy\", train_accuracy_best)\n    print_metric(\"Final validation accuracy\", validation_accuracy_final)\n    print_metric(\"Best validation accuracy\", validation_accuracy_best)\n    print_metric(\"Final train loss\", train_loss_final)\n    print_metric(\"Best train loss\", train_loss_best)\n    print_metric(\"Final validation loss\", validation_loss_final)\n    print_metric(\"Best validation loss\", validation_loss_best)\n\n    test_metrics = metrics.get(\"test\", [])\n    if test_metrics:\n        for test_entry in test_metrics:\n            if isinstance(test_entry, dict):\n                method_name = test_entry.get(\"name\", \"unknown\")\n                print_metric(f\"Test accuracy ({method_name})\", test_entry.get(\"acc\"))\n                print_metric(\n                    f\"Test stability-adjusted accuracy ({method_name})\",\n                    test_entry.get(\"stability_adjusted_acc\"),\n                )\n                print_metric(\n                    f\"Test adaptation frequency ({method_name})\",\n                    test_entry.get(\"adapt_freq\"),\n                )\n                print_metric(\n                    f\"Test adaptation loss mean ({method_name})\",\n                    test_entry.get(\"adapt_loss_mean\"),\n                )\n    else:\n        print(\"Test metrics: N/A\")\n\n    print()\n", "import os\nimport numpy as np\n\n\ndef safe_float(x):\n    try:\n        return float(x)\n    except Exception:\n        return x\n\n\ndef load_experiment_data():\n    working_dir = os.path.join(os.getcwd(), \"working\")\n    file_path = os.path.join(working_dir, \"experiment_data.npy\")\n    if not os.path.exists(file_path):\n        raise FileNotFoundError(f\"Could not find experiment data file: {file_path}\")\n    return np.load(file_path, allow_pickle=True).item()\n\n\ndef group_history_by_config(records):\n    grouped = {}\n    for item in records:\n        # Expected structure from original code:\n        # (config_key, epoch, value, timestamp)\n        if len(item) < 3:\n            continue\n        config_key = item[0]\n        epoch = item[1]\n        value = item[2]\n        grouped.setdefault(config_key, []).append((epoch, value))\n    for config_key in grouped:\n        grouped[config_key] = sorted(grouped[config_key], key=lambda x: x[0])\n    return grouped\n\n\ndef print_history_summaries(dataset_name, dataset_blob):\n    metrics = dataset_blob.get(\"metrics\", {})\n    losses = dataset_blob.get(\"losses\", {})\n\n    train_acc_grouped = group_history_by_config(metrics.get(\"train\", []))\n    val_acc_grouped = group_history_by_config(metrics.get(\"val\", []))\n    train_loss_grouped = group_history_by_config(losses.get(\"train\", []))\n    val_loss_grouped = group_history_by_config(losses.get(\"val\", []))\n\n    all_configs = sorted(\n        set
