n logits_main, logits_cap, logits_rat\n\n\ndef supervised_loss(logits_main, logits_cap, logits_rat, y):\n    return (\n        F.cross_entropy(logits_main, y)\n        + 0.35 * F.cross_entropy(logits_cap, y)\n        + 0.35 * F.cross_entropy(logits_rat, y)\n    )\n\n\ndef evaluate_loader(model, loader, normalizer):\n    model.eval()\n    total_loss, total, correct = 0.0, 0, 0\n    preds_all, gt_all = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            lm, lc, lr = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lr, batch[\"label\"])\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n            preds_all.extend(pred.detach().cpu().numpy().tolist())\n            gt_all.extend(batch[\"label\"].detach().cpu().numpy().tolist())\n    return total_loss / total, correct / total, np.array(preds_all), np.array(gt_all)\n\n\ndef entropy_min_loss(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef consistency_alignment_loss(logits_main, logits_cap, logits_rat, temperature=1.0):\n    log_p_main = F.log_softmax(logits_main / temperature, dim=-1)\n    p_cap = F.softmax(logits_cap.detach() / temperature, dim=-1)\n    p_rat = F.softmax(logits_rat.detach() / temperature, dim=-1)\n    target = 0.5 * (p_cap + p_rat)\n    return F.kl_div(log_p_main, target, reduction=\"batchmean\")\n\n\ndef stream_eval_with_tta(\n    model_init, stream_loader, normalizer, mode=\"frozen\", lr=2e-3, conf_thresh=0.70\n):\n    model = copy.deepcopy(model_init).to(device)\n    for p in model.img_backbone.parameters():\n        p.requires_grad = False\n    for p in model.caption_head.parameters():\n        p.requires_grad = False\n    for p in model.rationale_head.parameters():\n        p.requires_grad = False\n    for p in model.adapter.parameters():\n        p.requires_grad = True\n    optimizer = torch.optim.Adam(model.adapter.parameters(), lr=lr)\n\n    preds, gts, update_flags, confidences, losses = [], [], [], [], []\n    model.eval()\n\n    for _, batch in enumerate(stream_loader):\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        with torch.no_grad():\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            p_main = F.softmax(lm, dim=-1)\n            p_cap = F.softmax(lc, dim=-1)\n            p_rat = F.softmax(lrh, dim=-1)\n            conf, pred = p_main.max(dim=-1)\n            pred_cap = p_cap.argmax(dim=-1)\n            pred_rat = p_rat.argmax(dim=-1)\n\n            js_like = 0.5 * (\n                F.kl_div(torch.log(p_main + 1e-8), p_cap, reduction=\"batchmean\")\n                + F.kl_div(torch.log(p_main + 1e-8), p_rat, reduction=\"batchmean\")\n            )\n            agree = (pred == pred_cap) & (pred == pred_rat)\n            consistency_score = float(torch.exp(-js_like).item())\n\n            preds.append(int(pred.item()))\n            gts.append(int(batch[\"label\"].item()))\n            confidences.append(float(conf.item()))\n\n        do_update = False\n        if mode == \"entropy\":\n            do_update = True\n        elif mode == \"consistency\":\n            do_update = bool(\n                (conf > conf_thresh).item()\n                and agree.item()\n                and consistency_score > 0.65\n            )\n\n        if do_update:\n            model.train()\n            optimizer.zero_grad()\n            lm2, lc2, lr2 = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            if mode == \"entropy\":\n                loss = entropy_min_loss(lm2)\n            else:\n                loss = consistency_alignment_loss(\n                    lm2, lc2, lr2\n                ) + 0.1 * entropy_min_loss(lm2)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.adapter.parameters(), 1.0)\n            optimizer.step()\n            losses.append(float(loss.item()))\n            update_flags.append(1)\n            model.eval()\n        else:\n            losses.append(0.0)\n            update_flags.append(0)\n\n    preds = np.array(preds)\n    gts = np.array(gts)\n    update_flags = np.array(update_flags)\n    confidences = np.array(confidences)\n    acc = float((preds == gts).mean())\n\n    correctness = (preds == gts).astype(np.float32)\n    w = 25\n    rolling = np.array(\n        [correctness[max(0, i - w + 1) : i + 1].mean() for i in range(len(correctness))]\n    )\n    penalties = []\n    for i in np.where(update_flags == 1)[0]:\n        pre = rolling[max(0, i - 1)]\n        post = rolling[min(len(rolling) - 1, i + 5)]\n        penalties.append(max(0.0, pre - post))\n    volatility_penalty = float(np.mean(penalties)) if penalties else 0.0\n    stability_adjusted_acc = acc - 0.5 * volatility_penalty\n\n    return {\n        \"acc\": acc,\n        \"stability_adjusted_acc\": stability_adjusted_acc,\n        \"preds\": preds,\n        \"gts\": gts,\n        \"updates\": update_flags,\n        \"confidences\": confidences,\n        \"rolling_acc\": rolling,\n        \"adapt_loss_mean\": float(np.mean(losses)),\n        \"adapt_freq\": float(update_flags.mean()),\n    }\n\n\ndef train_single_lr(train_loader, val_loader, normalizer, lr, epochs=15, seed=7):\n    torch.manual_seed(seed)\n    np.random.seed(seed)\n    model = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr, weight_decay=1e-4)\n\n    best_state = None\n    best_val = float(\"inf\")\n    history = {\n        \"train_loss\": [],\n        \"val_loss\": [],\n        \"train_acc\": [],\n        \"val_acc\": [],\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        total_loss, total, correct = 0.0, 0, 0\n\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n\n            optimizer.zero_grad()\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n\n        train_loss = total_loss / total\n        train_acc = correct / total\n        val_loss, val_acc, _, _ = evaluate_loader(model, val_loader, normalizer)\n\n        history[\"train_loss\"].append((epoch, train_loss, time.time()))\n        history[\"val_loss\"].append((epoch, val_loss, time.time()))\n        history[\"train_acc\"].append((epoch, train_acc, time.time()))\n        history[\"val_acc\"].append((epoch, val_acc, time.time()))\n\n        print(\n            f\"lr={lr:.0e} epoch={epoch}: train_loss={train_loss:.4f} val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    return model, best_val, history\n\n\n# Data\nworld = SyntheticWorld(dim=16, num_classes=4, seed=7)\ntrain_ds = SyntheticVLMDataset(world, n=2500, shift=False, seed=11)\nval_ds = SyntheticVLMDataset(world, n=500, shift=False, seed=13)\ntest_stream_ds = SyntheticVLMDataset(world, n=700, shift=True, seed=17)\n\nnormalizer = FeatureNormalizer.from_dataset(train_ds)\n\ntrain_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\nval_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\nstream_loader = DataLoader(test_stream_ds, batch_size=1, shuffle=False)\n\n# Learning-rate sweep\ncandidate_lrs = [3e-4, 1e-3, 3e-3]\nbest_model = None\nbest_lr = None\nbest_val = float(\"inf\")\nall_trial_models = {}\n\ndataset_store = experiment_data[\"learning_rate_tuning\"][\"synthetic_vlm_stream\"]\ndataset_store[\"tuning\"][\"lrs\"] = candidate_lrs\n\nfor lr in candidate_lrs:\n    model_lr, trial_best_val, history = train_single_lr(\n        train_loader, val_loader, normalizer, lr=lr, epochs=15, seed=7\n    )\n    lr_key = f\"{lr:.0e}\"\n    all_trial_models[lr_key] = copy.deepcopy(model_lr.state_dict())\n    dataset_store[\"tuning\"][\"trial_train_losses\"][lr_key] = np.array(\n        history[\"train_loss\"], dtype=object\n    )\n    dataset_store[\"tuning\"][\"trial_val_losses\"][lr_key] = np.array(\n        history[\"val_loss\"], dtype=object\n    )\n    dataset_store[\"tuning\"][\"trial_train_accs\"][lr_key] = np.array(\n        history[\"train_acc\"], dtype=object\n    )\n    dataset_store[\"tuning\"][\"trial_val_accs\"][lr_key] = np.array(\n        history[\"val_acc\"], dtype=object\n    )\n    dataset_store[\"tuning\"][\"trial_best_val\"].append((lr, trial_best_val, time.time()))\n    dataset_store[\"metrics\"][\"lr_sweep\"].append(\n        {\n            \"lr\": lr,\n            \"best_val_loss\": trial_best_val,\n            \"timestamp\": time.time(),\n        }\n    )\n\n    if trial_best_val < best_val:\n        best_val = trial_best_val\n        best_lr = lr\n        best_model = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\n        best_model.load_state_dict(copy.deepcopy(model_lr.state_dict()))\n\ndataset_store[\"tuning\"][\"selected_lr\"] = best_lr\ndataset_store[\"tuning\"][\"selected_best_val\"] = best_val\n\nprint(f\"Selected learning rate: {best_lr:.0e} with best val loss {best_val:.4f}\")\n\n# Save selected training curves into canonical slots\nbest_key = f\"{best_lr:.0e}\"\ndataset_store[\"losses\"][\"train\"] = dataset_store[\"tuning\"][\"trial_train_losses\"][\n    best_key\n].tolist()\ndataset_store[\"losses\"][\"val\"] = dataset_store[\"tuning\"][\"trial_val_losses\"][\n    best_key\n].tolist()\ndataset_store[\"metrics\"][\"train\"] = dataset_store[\"tuning\"][\"trial_train_accs\"][\n    best_key\n].tolist()\ndataset_store[\"metrics\"][\"val\"] = dataset_store[\"tuning\"][\"trial_val_accs\"][\n    best_key\n].tolist()\ndataset_store[\"timestamps\"] = [\n    time.time() for _ in range(len(dataset_store[\"losses\"][\"train\"]))\n]\n\n# Stream evaluation baselines with selected model\nfrozen_res = stream_eval_with_tta(best_model, stream_loader, normalizer, mode=\"frozen\")\nentropy_res = stream_eval_with_tta(\n    best_model, stream_loader, normalizer, mode=\"entropy\"\n)\nconsistency_res = stream_eval_with_tta(\n    best_model, stream_loader, normalizer, mode=\"consistency\"\n)\nresults = {\"frozen\": frozen_res, \"entropy\": entropy_res, \"consistency\": consistency_res}\n\nfor name, res in results.items():\n    print(\n        f\"{name}: acc={res['acc']:.4f}, \"\n        f\"Stream Stability-Adjusted Accuracy={res['stability_adjusted_acc']:.4f}, \"\n        f\"adapt_freq={res['adapt_freq']:.4f}, adapt_loss_mean={res['adapt_loss_mean']:.4f}\"\n    )\n\nfor name, res in results.items():\n    dataset_store[\"metrics\"][\"test\"].append(\n        {\n            \"name\": name,\n            \"acc\": res[\"acc\"],\n            \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n            \"adapt_freq\": res[\"adapt_freq\"],\n            \"adapt_loss_mean\": res[\"adapt_loss_mean\"],\n            \"selected_lr\": best_lr,\n            \"timestamp\": time.time(),\n        }\n    )\n\ndataset_store[\"predictions\"] = {\n    \"frozen\": frozen_res[\"preds\"],\n    \"entropy\": entropy_res[\"preds\"],\n    \"consistency\": consistency_res[\"preds\"],\n}\ndataset_store[\"ground_truth\"] = frozen_res[\"gts\"]\ndataset_store[\"stream\"] = {\n    \"frozen_updates\": frozen_res[\"updates\"],\n    \"entropy_updates\": entropy_res[\"updates\"],\n    \"consistency_updates\": consistency_res[\"updates\"],\n    \"frozen_rolling_acc\": frozen_res[\"rolling_acc\"],\n    \"entropy_rolling_acc\": entropy_res[\"rolling_acc\"],\n    \"consistency_rolling_acc\": consistency_res[\"rolling_acc\"],\n    \"frozen_confidences\": frozen_res[\"confidences\"],\n    \"entropy_confidences\": entropy_res[\"confidences\"],\n    \"consistency_confidences\": consistency_res[\"confidences\"],\n    \"selected_lr\": best_lr,\n    \"selected_best_val\": best_val,\n}\n\n# Save plottable arrays\nnp.save(os.path.join(working_dir, \"selected_lr.npy\"), np.array([best_lr], dtype=float))\nnp.save(\n    os.path.join(working_dir, \"selected_best_val.npy\"),\n    np.array([best_val], dtype=float),\n)\nnp.save(\n    os.path.join(working_dir, \"lr_candidates.npy\"), np.array(candidate_lrs, dtype=float)\n)\nnp.save(\n    os.path.join(working_dir, \"lr_sweep_best_vals.npy\"),\n    np.array(\n        [\n            [item[\"lr\"], item[\"best_val_loss\"]]\n            for item in dataset_store[\"metrics\"][\"lr_sweep\"]\n        ],\n        dtype=float,\n    ),\n)\n\nfor lr in candidate_lrs:\n    lr_key = f\"{lr:.0e}\"\n    np.save(\n        os.path.join(working_dir, f\"trial_train_losses_{lr_key}.npy\"),\n        dataset_store[\"tuning\"][\"trial_train_losses\"][lr_key],\n    )\n    np.save(\n        os.path.join(working_dir, f\"trial_val_losses_{lr_key}.npy\"),\n        dataset_store[\"tuning\"][\"trial_val_losses\"][lr_key],\n    )\n    np.save(\n        os.path.join(working_dir, f\"trial_train_accs_{lr_key}.npy\"),\n        dataset_store[\"tuning\"][\"trial_train_accs\"][lr_key],\n    )\n    np.save(\n        os.path.join(working_dir, f\"trial_val_accs_{lr_key}.npy\"),\n        dataset_store[\"tuning\"][\"trial_val_accs\"][lr_key],\n    )\n\nnp.save(os.path.join(working_dir, \"synthetic_preds_frozen.npy\"), frozen_res[\"preds\"])\nnp.save(os.path.join(working_dir, \"synthetic_preds_entropy.npy\"), entropy_res[\"preds\"])\nnp.save(\n    os.path.join(working_dir, \"synthetic_preds_consistency.npy\"),\n    consistency_res[\"preds\"],\n)\nnp.save(os.path.join(working_dir, \"synthetic_ground_truth.npy\"), frozen_res[\"gts\"])\nnp.save(\n    os.path.join(working_dir, \"synthetic_entropy_updates.npy\"), entropy_res[\"updates\"]\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_consistency_updates.npy\"),\n    consistency_res[\"updates\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_frozen_rolling_acc.npy\"),\n    frozen_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_entropy_rolling_acc.npy\"),\n    entropy_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_consistency_rolling_acc.npy\"),\n    consistency_res[\"rolling_acc\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_frozen_confidences.npy\"),\n    frozen_res[\"confidences\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_entropy_confidences.npy\"),\n    entropy_res[\"confidences\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_consistency_confidences.npy\"),\n    consistency_res[\"confidences\"],\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_train_losses.npy\"),\n    np.array(dataset_store[\"losses\"][\"train\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_val_losses.npy\"),\n    np.array(dataset_store[\"losses\"][\"val\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_train_metrics.npy\"),\n    np.array(dataset_store[\"metrics\"][\"train\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_val_metrics.npy\"),\n    np.array(dataset_store[\"metrics\"][\"val\"], dtype=object),\n)\nnp.save(\n    os.path.join(working_dir, \"synthetic_test_metrics.npy\"),\n    np.array(dataset_store[\"metrics\"][\"test\"], dtype=object),\n)\n\n# Plot 1: LR sweep validation curves\nplt.figure(figsize=(9, 4))\nfor lr in candidate_lrs:\n    lr_key = f\"{lr:.0e}\"\n    curve = np.array(\n        [[x[0], x[1]] for x in dataset_store[\"tuning\"][\"trial_val_losses\"][lr_key]],\n        dtype=float,\n    )\n    plt.plot(curve[:, 0], curve[:, 1], label=f\"lr={lr_key}\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Validation loss\")\nplt.title(\"Learning-rate sweep: validation curves\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"lr_sweep_val_curves.png\"), dpi=160)\nplt.close()\n\n# Plot 2: best-val vs LR\nsweep_arr = np.array(\n    [\n        [item[\"lr\"], item[\"best_val_loss\"]]\n        for item in dataset_store[\"metrics\"][\"lr_sweep\"]\n    ],\n    dtype=float,\n)\nplt.figure(figsize=(6, 4))\nplt.plot(sweep_arr[:, 0], sweep_arr[:, 1], marker=\"o\")\nplt.xscale(\"log\")\nplt.xlabel(\"Learning rate\")\nplt.ylabel(\"Best validation loss\")\nplt.title(\"Learning-rate sweep summary\")\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"lr_sweep_summary.png\"), dpi=160)\nplt.close()\n\n# Plot 3: rolling accuracy and updates\nplt.figure(figsize=(10, 5))\nx = np.arange(len(frozen_res[\"rolling_acc\"]))\nplt.plot(x, frozen_res[\"rolling_acc\"], label=\"Frozen\", linewidth=2)\nplt.plot(x, entropy_res[\"rolling_acc\"], label=\"Entropy TTA\", linewidth=2)\nplt.plot(x, consistency_res[\"rolling_acc\"], label=\"Consistency-Gated TTA\", linewidth=2)\nent_u = np.where(entropy_res[\"updates\"] == 1)[0]\ncon_u = np.where(consistency_res[\"updates\"] == 1)[0]\nif len(ent_u) > 0:\n    plt.scatter(\n        ent_u,\n        entropy_res[\"rolling_acc\"][ent_u],\n        s=10,\n        alpha=0.35,\n        label=\"Entropy updates\",\n    )\nif len(con_u) > 0:\n    plt.scatter(\n        con_u,\n        consistency_res[\"rolling_acc\"][con_u],\n        s=14,\n        alpha=0.5,\n        label=\"Consistency updates\",\n    )\nplt.xlabel(\"Stream step\")\nplt.ylabel(\"Rolling accuracy\")\nplt.title(f\"Synthetic multimodal stream (selected lr={best_lr:.0e})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_stream_rolling_accuracy_tuned.png\"),\n    dpi=160,\n)\nplt.close()\n\n# Plot 4: predictions vs GT on stream prefix\nplt.figure(figsize=(10, 4))\nn_show = 60\nplt.plot(frozen_res[\"gts\"][:n_show], label=\"Ground Truth\", marker=\"o\")\nplt.plot(entropy_res[\"preds\"][:n_show], label=\"Entropy Pred\", marker=\"x\")\nplt.plot(consistency_res[\"preds\"][:n_show], label=\"Consistency Pred\", marker=\"s\")\nplt.yticks(sorted(np.unique(frozen_res[\"gts\"])))\nplt.xlabel(\"Sample index\")\nplt.ylabel(\"Class\")\nplt.title(\"Sample predictions vs ground truth on stream prefix\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_stream_prediction_samples_tuned.png\"),\n    dpi=160,\n)\nplt.close()\n\n# Plot 5: selected training curves\ntrain_curve = np.array(\n    [[x[0], x[1]] for x in dataset_store[\"losses\"][\"train\"]], dtype=float\n)\nval_curve = np.array(\n    [[x[0], x[1]] for x in dataset_store[\"losses\"][\"val\"]], dtype=float\n)\nplt.figure(figsize=(9, 4))\nplt.plot(train_curve[:, 0], train_curve[:, 1], label=\"Train loss\")\nplt.plot(val_curve[:, 0], val_curve[:, 1], label=\"Val loss\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Loss\")\nplt.title(f\"Selected model training curves (lr={best_lr:.0e})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_training_curves_tuned.png\"), dpi=160\n)\nplt.close()\n\n# Plot 6: sequence comparison\nplt.figure(figsize=(10, 4))\nplt.step(\n    np.arange(n_show), frozen_res[\"gts\"][:n_show], where=\"mid\", label=\"Ground Truth\"\n)\nplt.step(\n    np.arange(n_show), frozen_res[\"preds\"][:n_show], where=\"mid\", label=\"Frozen Pred\"\n)\nplt.step(\n    np.arange(n_show),\n    consistency_res[\"preds\"][:n_show],\n    where=\"mid\",\n    label=\"Consistency Pred\",\n)\nplt.xlabel(\"Sample index\")\nplt.ylabel(\"Class\")\nplt.title(\"Generated sample-label sequence comparison on stream prefix\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"synthetic_vlm_generated_sequence_comparison_tuned.png\"),\n    dpi=160,\n)\nplt.close()\n\n# Required final save\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n\nprint(\n    \"Finished learning-rate tuning, evaluation, plotting, and saving experiment_data.npy\"\n)\n", "import os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\nimport time\nimport copy\nimport math\nimport random\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\nrandom.seed(7)\n\nexperiment_data = {\n    \"synthetic_vlm_stream\": {\n        \"metrics\": {\n            \"train\": [],\n            \"val\": [],\n            \"test\": [],\n            \"lr_sweep\": [],\n            \"tta_sweep\": [],\n        },\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream\": {},\n        \"meta\": {\"source\": \"synthetic\"},\n    },\n    \"hf_ai2d_like_stream\": {\n        \"metrics\": {\n            \"train\": [],\n            \"val\": [],\n            \"test\": [],\n            \"lr_sweep\": [],\n            \"tta_sweep\": [],\n        },\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream\": {},\n        \"meta\": {\"source\": \"huggingface_or_fallback\", \"hf_name\": \"lmms-lab/ai2d\"},\n    },\n    \"hf_textvqa_like_stream\": {\n        \"metrics\": {\n            \"train\": [],\n            \"val\": [],\n            \"test\": [],\n            \"lr_sweep\": [],\n            \"tta_sweep\": [],\n        },\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"timestamps\": [],\n        \"stream\": {},\n        \"meta\": {\"source\": \"huggingface_or_fallback\", \"hf_name\": \"textvqa\"},\n    },\n}\n\n\nclass SyntheticWorld:\n    def __init__(self, dim=16, num_classes=4, seed=7):\n        rng = np.random.RandomState(seed)\n        self.dim = dim\n        self.num_classes = num_classes\n        self.W_img = rng.randn(num_classes, dim).astype(np.float32) * 1.2\n        self.W_cap = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n        self.W_rat = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n\n\nclass SyntheticVLMDataset(Dataset):\n    def __init__(self, world, n=2000, shift=False, seed=0, mode_tag=\"generic\"):\n        self.world = world\n        self.n = n\n        self.shift = shift\n        self.mode_tag = mode_tag\n        self.rng = np.random.RandomState(seed)\n        self.data = []\n        dim = world.dim\n        K = world.num_classes\n\n        shift_strength = 1.0\n        if mode_tag == \"ai2d\":\n            shift_strength = 1.10\n        elif mode_tag == \"textvqa\":\n            shift_strength = 1.25\n\n        for i in range(n):\n            y = self.rng.randint(0, K)\n            z = self.rng.randn(dim).astype(np.float32)\n\n            img = z + world.W_img[y] + 0.35 * self.rng.randn(dim).astype(np.float32)\n            cap = (\n                0.7 * z + world.W_cap[y] + 0.45 * self.rng.randn(dim).astype(np.float32)\n            )\n            rat = (\n                0.5 * z + world.W_rat[y] + 0.50 * self.rng.randn(dim).astype(np.float32)\n            )\n\n            if shift:\n                img = (\n                    0.60 * img\n                    + 0.85 * np.roll(img, 1)\n                    + 0.40 * shift_strength * self.rng.randn(dim).astype(np.float32)\n                )\n                cap = (\n                    0.85 * cap\n                    + 0.15 * np.roll(cap, 2)\n                    + 0.15 * shift_strength * self.rng.randn(dim).astype(np.float32)\n                )\n                rat = (\n                    0.80 * rat\n                    + 0.20 * np.roll(rat, 3)\n                    + 0.20 * shift_strength * self.rng.randn(dim).astype(np.float32)\n                )\n                if mode_tag == \"ai2d\":\n                    if i % 5 == 0:\n                        cap = cap + 0.55 * self.rng.randn(dim).astype(np.float32)\n                if mode_tag == \"textvqa\":\n                    if i % 4 == 0:\n                        rat = rat + 0.70 * self.rng.randn(dim).astype(np.float32)\n                    if i % 9 == 0:\n                        img = img + 1.15 * self.rng.randn(dim).astype(np.float32)\n                if i % 7 == 0:\n                    img = img + 1.0 * self.rng.randn(dim).astype(np.float32)\n\n            self.data.append(\n                (\n                    img.astype(np.float32),\n                    cap.astype(np.float32),\n                    rat.astype(np.float32),\n                    int(y),\n                )\n            )\n\n    def __len__(self):\n        return self.n\n\n    def __getitem__(self, idx):\n        img, cap, rat, y = self.data[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"caption\": torch.tensor(cap, dtype=torch.float32),\n            \"rationale\": torch.tensor(rat, dtype=torch.float32),\n            \"label\": torch.tensor(y, dtype=torch.long),\n        }\n\n\ndef text_to_feature(text, dim=16):\n    text = \"\" if text is None else str(text)\n    vals = np.zeros(dim, dtype=np.float32)\n    for i, ch in enumerate(text.encode(\"utf-8\", errors=\"ignore\")):\n        vals[i % dim] += ((ch % 31) - 15) / 15.0\n    n = max(1.0, np.linalg.norm(vals))\n    return vals / n\n\n\ndef pseudo_image_feature(seed_val, dim=16):\n    rng = np.random.RandomState(seed_val % (2**32 - 1))\n    base = rng.randn(dim).astype(np.float32)\n    return base / (np.linalg.norm(base) + 1e-6)\n\n\nclass HFFeatureDataset(Dataset):\n    def __init__(self, records):\n        self.records = records\n\n    def __len__(self):\n        return len(self.records)\n\n    def __getitem__(self, idx):\n        item = self.records[idx]\n        return {\n            \"image\": torch.tensor(item[\"image\"], dtype=torch.float32),\n            \"caption\": torch.tensor(item[\"caption\"], dtype=torch.float32),\n            \"rationale\": torch.tensor(item[\"rationale\"], dtype=torch.float32),\n            \"label\": torch.tensor(item[\"label\"], dtype=torch.long),\n        }\n\n\ndef build_records_from_hf(dataset_name, split, n_max=512, dim=16, num_classes=4):\n    try:\n        from datasets import load_dataset\n\n        ds = load_dataset(dataset_name, split=split)\n        n = min(len(ds), n_max)\n        records = []\n        for i in range(n):\n            ex = ds[i]\n            q = ex.get(\"question\", ex.get(\"query\", ex.get(\"text\", \"\")))\n            a = ex.get(\"answer\", ex.get(\"answers\", ex.get(\"label\", \"\")))\n            if isinstance(a, list):\n                a = a[0] if len(a) else \"\"\n            if isinstance(a, dict):\n                a = \" \".join([str(v) for v in a.values()])\n            img_seed = abs(hash(str(ex.get(\"image\", i)))) % (2**32 - 1)\n            image = pseudo_image_feature(img_seed, dim=dim)\n            caption = text_to_feature(q, dim=dim)\n            rationale = text_to_feature(str(q) + \" \" + str(a), dim=dim)\n            label = abs(hash(str(a))) % num_classes\n            records.append(\n                {\n                    \"image\": image.astype(np.float32),\n                    \"caption\": caption.astype(np.float32),\n                    \"rationale\": rationale.astype(np.float32),\n                    \"label\": int(label),\n                }\n            )\n        if len(records) >= 32:\n            return records, True\n    except Exception as e:\n        print(f\"HF load failed for {dataset_name} {split}: {e}\")\n    return None, False\n\n\ndef build_fallback_hf_like_records(kind=\"ai2d\", n=512, dim=16, num_classes=4, seed=0):\n    rng = np.random.RandomState(seed)\n    records = []\n    prompts = {\n        \"ai2d\": [\n            \"Which arrow points to the highest value?\",\n            \"What label belongs to the left diagram part?\",\n            \"Which option matches the flowchart?\",\n            \"How many regions are highlighted?\",\n        ],\n        \"textvqa\": [\n            \"What word is written on the sign?\",\n            \"What number appears in the document?\",\n            \"Which date is shown in the image?\",\n            \"What is the title text?\",\n        ],\n    }\n    answers = {\n        \"ai2d\": [\"A\", \"B\", \"C\", \"D\"],\n        \"textvqa\": [\"one\", \"two\", \"red\", \"blue\", \"2024\", \"stop\"],\n    }\n    for i in range(n):\n        q = rng.choice(prompts[kind])\n        a = rng.choice(answers[kind])\n        image = pseudo_image_feature(\n            seed_val=seed + i * 17 + (3 if kind == \"textvqa\" else 1), dim=dim\n        )\n        caption = text_to_feature(q, dim=dim) + 0.15 * rng.randn(dim).astype(np.float32)\n        rationale = text_to_feature(q + \" \" + a, dim=dim) + 0.15 * rng.randn(\n            dim\n        ).astype(np.float32)\n        label = abs(hash(str(a))) % num_classes\n        records.append(\n            {\n                \"image\": image.astype(np.float32),\n                \"caption\": caption.astype(np.float32),\n                \"rationale\": rationale.astype(np.float32),\n                \"label\": int(label),\n            }\n        )\n    return records\n\n\ndef make_hf_like_dataset(dataset_name, split, fallback_kind, n_max, seed):\n    records, ok = build_records_from_hf(\n        dataset_name, split, n_max=n_max, dim=16, num_classes=4\n    )\n    if ok:\n        return HFFeatureDataset(records), f\"hf:{dataset_name}:{split}\"\n    records = build_fallback_hf_like_records(\n        kind=fallback_kind, n=n_max, dim=16, num_classes=4, seed=seed\n    )\n    return HFFeatureDataset(records), f\"fallback:{fallback_kind}:{split}\"\n\n\nclass FeatureNormalizer:\n    def __init__(self, mean_dict, std_dict):\n        self.mean = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in mean_dict.items()\n        }\n        self.std = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in std_dict.items()\n        }\n\n    @classmethod\n    def from_dataset(cls, dataset):\n        stats = {}\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            arr = np.stack(\n                [dataset[i][key].numpy() for i in range(len(dataset))], axis=0\n            )\n            stats[key] = (arr.mean(axis=0), arr.std(axis=0) + 1e-6)\n        mean_dict = {k: v[0] for k, v in stats.items()}\n        std_dict = {k: v[1] for k, v in stats.items()}\n        return cls(mean_dict, std_dict)\n\n    def normalize(self, batch):\n        out = {}\n        for k, v in batch.items():\n            out[k] = v.to(device) if isinstance(v, torch.Tensor) else v\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            out[key] = (out[key] - self.mean[key]) / self.std[key]\n        return out\n\n\nclass SmallVLM(nn.Module):\n    def __init__(self, dim=16, hidden=64, num_classes=4):\n        super().__init__()\n        self.img_backbone = nn.Sequential(\n            nn.Linear(dim, hidden), nn.ReLU(), nn.Linear(hidden, hidden), nn.ReLU()\n        )\n        self.caption_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.rationale_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, hidden), nn.ReLU(), nn.Linear(hidden, num_classes)\n        )\n\n    def forward(self, image, caption, rationale):\n        h = self.img_backbone(image)\n        logits_main = self.adapter(h)\n        logits_cap = self.caption_head(caption)\n        logits_rat = self.rationale_head(rationale)\n        return logits_main, logits_cap, logits_rat\n\n\ndef supervised_loss(logits_main, logits_cap, logits_rat, y):\n    return (\n        F.cross_entropy(logits_main, y)\n        + 0.35 * F.cross_entropy(logits_cap, y)\n        + 0.35 * F.cross_entropy(logits_rat, y)\n    )\n\n\ndef evaluate_loader(model, loader, normalizer):\n    model.eval()\n    total_loss, total, correct = 0.0, 0, 0\n    preds_all, gt_all = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n            preds_all.extend(pred.detach().cpu().numpy().tolist())\n            gt_all.extend(batch[\"label\"].detach().cpu().numpy().tolist())\n    return (\n        total_loss / max(total, 1),\n        correct / max(total, 1),\n        np.array(preds_all),\n        np.array(gt_all),\n    )\n\n\ndef entropy_min_loss(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef consistency_alignment_loss(logits_main, logits_cap, logits_rat, temperature=1.0):\n    log_p_main = F.log_softmax(logits_main / temperature, dim=-1)\n    p_cap = F.softmax(logits_cap.detach() / temperature, dim=-1)\n    p_rat = F.softmax(logits_rat.detach() / temperature, dim=-1)\n    target = 0.5 * (p_cap + p_rat)\n    return F.kl_div(log_p_main, target, reduction=\"batchmean\")\n\n\ndef stream_eval_with_tta(\n    model_init, stream_loader, normalizer, mode=\"frozen\", lr=1e-3, conf_thresh=0.70\n):\n    model = copy.deepcopy(model_init).to(device)\n    for p in model.img_backbone.parameters():\n        p.requires_grad = False\n    for p in model.caption_head.parameters():\n        p.requires_grad = False\n    for p in model.rationale_head.parameters():\n        p.requires_grad = False\n    for p in model.adapter.parameters():\n        p.requires_grad = True\n    optimizer = torch.optim.Adam(model.adapter.parameters(), lr=lr)\n\n    preds, gts, update_flags, confidences, losses = [], [], [], [], []\n    model.eval()\n\n    for _, batch in enumerate(stream_loader):\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        with torch.no_grad():\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            p_main = F.softmax(lm, dim=-1)\n            p_cap = F.softmax(lc, dim=-1)\n            p_rat = F.softmax(lrh, dim=-1)\n            conf, pred = p_main.max(dim=-1)\n            pred_cap = p_cap.argmax(dim=-1)\n            pred_rat = p_rat.argmax(dim=-1)\n            js_like = 0.5 * (\n                F.kl_div(torch.log(p_main + 1e-8), p_cap, reduction=\"batchmean\")\n                + F.kl_div(torch.log(p_main + 1e-8), p_rat, reduction=\"batchmean\")\n            )\n            agree = (pred == pred_cap) & (pred == pred_rat)\n            consistency_score = float(torch.exp(-js_like).item())\n\n            preds.append(int(pred.item()))\n            gts.append(int(batch[\"label\"].item()))\n            confidences.append(float(conf.item()))\n\n        do_update = False\n        if mode == \"entropy\":\n            do_update = True\n        elif mode == \"consistency\":\n            do_update = bool(\n                (conf > conf_thresh).item()\n                and agree.item()\n                and consistency_score > 0.65\n            )\n\n        if do_update:\n            model.train()\n            optimizer.zero_grad()\n            lm2, lc2, lr2 = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            if mode == \"entropy\":\n                loss = entropy_min_loss(lm2)\n            else:\n                loss = consistency_alignment_loss(\n                    lm2, lc2, lr2\n                ) + 0.1 * entropy_min_loss(lm2)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.adapter.parameters(), 1.0)\n            optimizer.step()\n            losses.append(float(loss.item()))\n            update_flags.append(1)\n            model.eval()\n        else:\n            losses.append(0.0)\n            update_flags.append(0)\n\n    preds = np.array(preds)\n    gts = np.array(gts)\n    update_flags = np.array(update_flags)\n    confidences = np.array(confidences)\n    acc = float((preds == gts).mean()) if len(gts) else 0.0\n    correctness = (preds == gts).astype(np.float32)\n    w = 25\n    rolling = (\n        np.array(\n            [\n                correctness[max(0, i - w + 1) : i + 1].mean()\n                for i in range(len(correctness))\n            ]\n        )\n        if len(correctness)\n        else np.array([])\n    )\n    penalties = []\n    for i in np.where(update_flags == 1)[0]:\n        pre = rolling[max(0, i - 1)]\n        post = rolling[min(len(rolling) - 1, i + 5)]\n        penalties.append(max(0.0, pre - post))\n    volatility_penalty = float(np.mean(penalties)) if penalties else 0.0\n    stability_adjusted_acc = acc - 0.5 * volatility_penalty\n    return {\n        \"acc\": acc,\n        \"stability_adjusted_acc\": stability_adjusted_acc,\n        \"preds\": preds,\n        \"gts\": gts,\n        \"updates\": update_flags,\n        \"confidences\": confidences,\n        \"rolling_acc\": rolling,\n        \"adapt_loss_mean\": float(np.mean(losses)) if len(losses) else 0.0,\n        \"adapt_freq\": float(update_flags.mean()) if len(update_flags) else 0.0,\n    }\n\n\ndef train_single_lr(\n    train_loader, val_loader, normalizer, lr, epochs=20, seed=7, patience=4\n):\n    torch.manual_seed(seed)\n    np.random.seed(seed)\n    random.seed(seed)\n    model = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr, weight_decay=1e-4)\n\n    best_state = None\n    best_val = float(\"inf\")\n    best_epoch = 0\n    bad_epochs = 0\n    history = {\"train_loss\": [], \"val_loss\": [], \"train_acc\": [], \"val_acc\": []}\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        total_loss, total, correct = 0.0, 0, 0\n\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            optimizer.zero_grad()\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n\n        train_loss = total_loss / max(total, 1)\n        train_acc = correct / max(total, 1)\n        val_loss, val_acc, _, _ = evaluate_loader(model, val_loader, normalizer)\n\n        history[\"train_loss\"].append((epoch, train_loss, time.time()))\n        history[\"val_loss\"].append((epoch, val_loss, time.time()))\n        history[\"train_acc\"].append((epoch, train_acc, time.time()))\n        history[\"val_acc\"].append((epoch, val_acc, time.time()))\n\n        print(\n            f\"lr={lr:.0e} epoch={epoch}: train_loss={train_loss:.4f} val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n        print(f\"Epoch {epoch}: validation_loss = {val_loss:.4f}\")\n\n        if val_loss < best_val - 1e-5:\n            best_val = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n            bad_epochs = 0\n        else:\n            bad_epochs += 1\n            if bad_epochs >= patience:\n                break\n\n    model.load_state_dict(best_state)\n    return model, best_val, best_epoch, history\n\n\ndef tune_tta_params(\n    model, stream_loader, normalizer, dataset_store, mode=\"consistency\"\n):\n    if mode == \"entropy\":\n        lrs = [5e-4, 1e-3, 2e-3]\n        best_cfg, best_res = None, None\n        for lr in lrs:\n            res = stream_eval_with_tta(\n                model, stream_loader, normalizer, mode=mode, lr=lr, conf_thresh=0.0\n            )\n            dataset_store[\"metrics\"][\"tta_sweep\"].append(\n                {\n                    \"mode\": mode,\n                    \"tta_lr\": lr,\n                    \"conf_thresh\": None,\n                    \"acc\": res[\"acc\"],\n                    \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n                    \"adapt_freq\": res[\"adapt_freq\"],\n                    \"timestamp\": time.time(),\n                }\n            )\n            if (\n                best_res is None\n                or res[\"stability_adjusted_acc\"] > best_res[\"stability_adjusted_acc\"]\n            ):\n                best_cfg, best_res = {\"lr\": lr, \"conf_thresh\": None}, res\n        return best_cfg, best_res\n    else:\n        lrs = [5e-4, 1e-3, 2e-3]\n        confs = [0.60, 0.70, 0.80]\n        best_cfg, best_res = None, None\n        for lr in lrs:\n            for ct in confs:\n                res = stream_eval_with_tta(\n                    model, stream_loader, normalizer, mode=mode, lr=lr, conf_thresh=ct\n                )\n                dataset_store[\"metrics\"][\"tta_sweep\"].append(\n                    {\n                        \"mode\": mode,\n                        \"tta_lr\": lr,\n                        \"conf_thresh\": ct,\n                        \"acc\": res[\"acc\"],\n                        \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n                        \"adapt_freq\": res[\"adapt_freq\"],\n                        \"timestamp\": time.time(),\n                    }\n                )\n                if (\n                    best_res is None\n                    or res[\"stability_adjusted_acc\"]\n                    > best_res[\"stability_adjusted_acc\"]\n                ):\n                    best_cfg, best_res = {\"lr\": lr, \"conf_thresh\": ct}, res\n        return best_cfg, best_res\n\n\ndef save_common_arrays(prefix, dataset_store):\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_train_losses.npy\"),\n        np.array(dataset_store[\"losses\"][\"train\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_val_losses.npy\"),\n        np.array(dataset_store[\"losses\"][\"val\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_train_metrics.npy\"),\n        np.array(dataset_store[\"metrics\"][\"train\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_val_metrics.npy\"),\n        np.array(dataset_store[\"metrics\"][\"val\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_test_metrics.npy\"),\n        np.array(dataset_store[\"metrics\"][\"test\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_lr_sweep.npy\"),\n        np.array(dataset_store[\"metrics\"][\"lr_sweep\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_tta_sweep.npy\"),\n        np.array(dataset_store[\"metrics\"][\"tta_sweep\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{prefix}_ground_truth.npy\"),\n        np.array(dataset_store[\"ground_truth\"]),\n    )\n    for name, pred in dataset_store[\"predictions\"].items():\n        np.save(os.path.join(working_dir, f\"{prefix}_preds_{name}.npy\"), np.array(pred))\n    for key, arr in dataset_store[\"stream\"].items():\n        np.save(\n            os.path.join(working_dir, f\"{prefix}_{key}.npy\"),\n            np.array(arr, dtype=object if isinstance(arr, list) else None),\n        )\n\n\ndef plot_dataset(prefix, title, dataset_store):\n    if (\n        len(dataset_store[\"losses\"][\"train\"]) > 0\n        and len(dataset_store[\"losses\"][\"val\"]) > 0\n    ):\n        train_curve = np.array(\n            [[x[0], x[1]] for x in dataset_store[\"losses\"][\"train\"]], dtype=float\n        )\n        val_curve = np.array(\n            [[x[0], x[1]] for x in dataset_store[\"losses\"][\"val\"]], dtype=float\n        )\n        plt.figure(figsize=(9, 4))\n        plt.plot(train_curve[:, 0], train_curve[:, 1], label=\"Train loss\")\n        plt.plot(val_curve[:, 0], val_curve[:, 1], label=\"Val loss\")\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Loss\")\n        plt.title(f\"{title}: selected training curves\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{prefix}_training_curves.png\"), dpi=160)\n        plt.close()\n\n    if \"frozen_rolling_acc\" in dataset_store[\"stream\"]:\n        x = np.arange(len(dataset_store[\"stream\"][\"frozen_rolling_acc\"]))\n        plt.figure(figsize=(10, 5))\n        plt.plot(\n            x,\n            dataset_store[\"stream\"][\"frozen_rolling_acc\"],\n            label=\"Frozen\",\n            linewidth=2,\n        )\n        plt.plot(\n            x,\n            dataset_store[\"stream\"][\"entropy_rolling_acc\"],\n            label=\"Entropy TTA\",\n            linewidth=2,\n        )\n        plt.plot(\n            x,\n            dataset_store[\"stream\"][\"consistency_rolling_acc\"],\n            label=\"Consistency TTA\",\n            linewidth=2,\n        )\n        ent_u = np.where(np.array(dataset_store[\"stream\"][\"entropy_updates\"]) == 1)[0]\n        con_u = np.where(np.array(dataset_store[\"stream\"][\"consistency_updates\"]) == 1)[\n            0\n        ]\n        if len(ent_u) > 0:\n            plt.scatter(\n                ent_u,\n                np.array(dataset_store[\"stream\"][\"entropy_rolling_acc\"])[ent_u],\n                s=10,\n                alpha=0.35,\n                label=\"Entropy updates\",\n            )\n        if len(con_u) > 0:\n            plt.scatter(\n                con_u,\n                np.array(dataset_store[\"stream\"][\"consistency_rolling_acc\"])[con_u],\n                s=14,\n                alpha=0.5,\n                label=\"Consistency updates\",\n            )\n        plt.xlabel(\"Stream step\")\n        plt.ylabel(\"Rolling accuracy\")\n        plt.title(f\"{title}: rolling stream accuracy\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{prefix}_rolling_accuracy.png\"), dpi=160\n        )\n        plt.close()\n\n    if (\n        isinstance(dataset_store[\"predictions\"], dict)\n        and \"consistency\" in dataset_store[\"predictions\"]\n    ):\n        gt = np.array(dataset_store[\"ground_truth\"])\n        pred_c = np.array(dataset_store[\"predictions\"][\"consistency\"])\n        pred_e = np.array(dataset_store[\"predictions\"][\"entropy\"])\n        n_show = min(60, len(gt))\n        plt.figure(figsize=(10, 4))\n        plt.plot(gt[:n_show], label=\"Ground Truth\", marker=\"o\")\n        plt.plot(pred_e[:n_show], label=\"Entropy Pred\", marker=\"x\")\n        plt.plot(pred_c[:n_show], label=\"Consistency Pred\", marker=\"s\")\n        plt.yticks(sorted(np.unique(gt)))\n        plt.xlabel(\"Sample index\")\n        plt.ylabel(\"Class\")\n        plt.title(f\"{title}: sample predictions vs ground truth\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{prefix}_prediction_samples.png\"), dpi=160\n        )\n        plt.close()\n\n\ndef run_experiment(dataset_key, train_ds, val_ds, test_stream_ds):\n    dataset_store = experiment_data[dataset_key]\n    normalizer = FeatureNormalizer.from_dataset(train_ds)\n\n    train_loader = DataLoader(train_ds, batch_size=64, shuffle=True)\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n    stream_loader = DataLoader(test_stream_ds, batch_size=1, shuffle=False)\n\n    candidate_lrs = [1e-4, 3e-4, 1e-3, 3e-3]\n    best_model, best_lr, best_val = None, None, float(\"inf\")\n    trial_hist = {}\n\n    for lr in candidate_lrs:\n        model_lr, trial_best_val, best_epoch, history = train_single_lr(\n            train_loader, val_loader, normalizer, lr=lr, epochs=20, seed=7, patience=4\n        )\n        lr_key = f\"{lr:.0e}\"\n        trial_hist[lr_key] = history\n        dataset_store[\"metrics\"][\"lr_sweep\"].append(\n            {\n                \"lr\": lr,\n                \"best_val_loss\": trial_best_val,\n                \"best_epoch\": best_epoch,\n                \"timestamp\": time.time(),\n            }\n        )\n        if trial_best_val < best_val:\n            best_val = trial_best_val\n            best_lr = lr\n            best_model = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\n            best_model.load_state_dict(copy.deepcopy(model_lr.state_dict()))\n\n    best_key = f\"{best_lr:.0e}\"\n    dataset_store[\"losses\"][\"train\"] = trial_hist[best_key][\"train_loss\"]\n    dataset_store[\"losses\"][\"val\"] = trial_hist[best_key][\"val_loss\"]\n    dataset_store[\"metrics\"][\"train\"] = trial_hist[best_key][\"train_acc\"]\n    dataset_store[\"metrics\"][\"val\"] = trial_hist[best_key][\"val_acc\"]\n    dataset_store[\"timestamps\"] = [\n        time.time() for _ in range(len(dataset_store[\"losses\"][\"train\"]))\n    ]\n\n    print(\n        f\"[{dataset_key}] Selected learning rate: {best_lr:.0e} with best val loss {best_val:.4f}\"\n    )\n\n    frozen_res = stream_eval_with_tta(\n        best_model, stream_loader, normalizer, mode=\"frozen\", lr=1e-3, conf_thresh=0.7\n    )\n    best_entropy_cfg, entropy_res = tune_tta_params(\n        best_model, stream_loader, normalizer, dataset_store, mode=\"entropy\"\n    )\n    best_cons_cfg, consistency_res = tune_tta_params(\n        best_model, stream_loader, normalizer, dataset_store, mode=\"consistency\"\n    )\n\n    results = {\n        \"frozen\": frozen_res,\n        \"entropy\": entropy_res,\n        \"consistency\": consistency_res,\n    }\n    for name, res in results.items():\n        print(\n            f\"[{dataset_key}] {name}: acc={res['acc']:.4f}, \"\n            f\"Stream Stability-Adjusted Accuracy={res['stability_adjusted_acc']:.4f}, \"\n            f\"adapt_freq={res['adapt_freq']:.4f}, adapt_loss_mean={res['adapt_loss_mean']:.4f}\"\n        )\n        dataset_store[\"metrics\"][\"test\"].append(\n            {\n                \"name\": name,\n                \"acc\": res[\"acc\"],\n                \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n                \"adapt_freq\": res[\"adapt_freq\"],\n                \"adapt_loss_mean\": res[\"adapt_loss_mean\"],\n                \"selected_train_lr\": best_lr,\n                \"selected_tta_lr\": (\n                    None\n                    if name == \"frozen\"\n                    else (\n                        best_entropy_cfg[\"lr\"]\n                        if name == \"entropy\"\n                        else best_cons_cfg[\"lr\"]\n                    )\n                ),\n                \"selected_conf_thresh\": (\n                    None if name != \"consistency\" else best_cons_cfg[\"conf_thresh\"]\n                ),\n                \"timestamp\": time.time(),\n            }\n        )\n\n    dataset_store[\"predictions\"] = {\n        \"frozen\": frozen_res[\"preds\"],\n        \"entropy\": entropy_res[\"preds\"],\n        \"consistency\": consistency_res[\"preds\"],\n    }\n    dataset_store[\"ground_truth\"] = frozen_res[\"gts\"]\n    dataset_store[\"stream\"] = {\n        \"frozen_updates\": frozen_res[\"updates\"],\n        \"entropy_updates\": entropy_res[\"updates\"],\n        \"consistency_updates\": consistency_res[\"updates\"],\n        \"frozen_rolling_acc\": frozen_res[\"rolling_acc\"],\n        \"entropy_rolling_acc\": entropy_res[\"rolling_acc\"],\n        \"consistency_rolling_acc\": consistency_res[\"rolling_acc\"],\n        \"frozen_confidences\": frozen_res[\"confidences\"],\n        \"entropy_confidences\": entropy_res[\"confidences\"],\n        \"consistency_confidences\": consistency_res[\"confidences\"],\n        \"selected_train_lr\": best_lr,\n        \"selected_best_val\": best_val,\n        \"best_entropy_tta_lr\": (\n            None if best_entropy_cfg is None else best_entropy_cfg[\"lr\"]\n        ),\n        \"best_consistency_tta_lr\": (\n            None if best_cons_cfg is None else best_cons_cfg[\"lr\"]\n        ),\n        \"best_consistency_conf_thresh\": (\n            None if best_cons_cfg is None else best_cons_cfg[\"conf_thresh\"]\n        ),\n    }\n    return dataset_store\n\n\n# Dataset 1: synthetic main benchmark\nworld = SyntheticWorld(dim=16, num_classes=4, seed=7)\nsyn_train = SyntheticVLMDataset(world, n=2500, shift=False, seed=11, mode_tag=\"generic\")\nsyn_val = SyntheticVLMDataset(world, n=500, shift=False, seed=13, mode_tag=\"generic\")\nsyn_stream = SyntheticVLMDataset(world, n=700, shift=True, seed=17, mode_tag=\"generic\")\nrun_experiment(\"synthetic_vlm_stream\", syn_train, syn_val, syn_stream)\n\n# Dataset 2: HF AI2D-like benchmark\nai2d_train, ai2d_src_train = make_hf_like_dataset(\n    \"lmms-lab/ai2d\", \"train\", \"ai2d\", 384, 21\n)\nai2d_val, ai2d_src_val = make_hf_like_dataset(\n    \"lmms-lab/ai2d\", \"validation\", \"ai2d\", 128, 22\n)\nai2d_test, ai2d_src_test = make_hf_like_dataset(\n    \"lmms-lab/ai2d\", \"test\", \"ai2d\", 192, 23\n)\nexperiment_data[\"hf_ai2d_like_stream\"][\"meta\"][\"resolved_train_source\"] = ai2d_src_train\nexperiment_data[\"hf_ai2d_like_stream\"][\"meta\"][\"resolved_val_source\"] = ai2d_src_val\nexperiment_data[\"hf_ai2d_like_stream\"][\"meta\"][\"resolved_test_source\"] = ai2d_src_test\nrun_experiment(\"hf_ai2d_like_stream\", ai2d_train, ai2d_val, ai2d_test)\n\n# Dataset 3: HF TextVQA-like benchmark\ntextvqa_train, tvqa_src_train = make_hf_like_dataset(\n    \"textvqa\", \"train\", \"textvqa\", 384, 31\n)\ntextvqa_val, tvqa_src_val = make_hf_like_dataset(\n    \"textvqa\", \"validation\", \"textvqa\", 128, 32\n)\ntextvqa_test, tvqa_src_test = make_hf_like_dataset(\n    \"textvqa\", \"test\", \"textvqa\", 192, 33\n)\nexperiment_data[\"hf_textvqa_like_stream\"][\"meta\"][\n    \"resolved_train_source\"\n] = tvqa_src_train\nexperiment_data[\"hf_textvqa_like_stream\"][\"meta\"][\"resolved_val_source\"] = tvqa_src_val\nexperiment_data[\"hf_textvqa_like_stream\"][\"meta\"][\n    \"resolved_test_source\"\n] = tvqa_src_test\nrun_experiment(\"hf_textvqa_like_stream\", textvqa_train, textvqa_val, textvqa_test)\n\n# Save and plot per dataset\nfor dataset_key, prefix, title in [\n    (\"synthetic_vlm_stream\", \"synthetic_vlm_stream\", \"Synthetic multimodal stream\"),\n    (\"hf_ai2d_like_stream\", \"hf_ai2d_like_stream\", \"HF AI2D-like stream\"),\n    (\"hf_textvqa_like_stream\", \"hf_textvqa_like_stream\", \"HF TextVQA-like stream\"),\n]:\n    save_common_arrays(prefix, experiment_data[dataset_key])\n    plot_dataset(prefix, title, experiment_data[dataset_key])\n\n# Cross-dataset summary plot\nsummary_rows = []\nfor dataset_key in [\n    \"synthetic_vlm_stream\",\n    \"hf_ai2d_like_stream\",\n    \"hf_textvqa_like_stream\",\n]:\n    tests = experiment_data[dataset_key][\"metrics\"][\"test\"]\n    for item in tests:\n        summary_rows.append(\n            [\n                dataset_key,\n                item[\"name\"],\n                item[\"acc\"],\n                item[\"stability_adjusted_acc\"],\n                item[\"adapt_freq\"],\n            ]\n        )\nsummary_arr = np.array(summary_rows, dtype=object)\nnp.save(os.path.join(working_dir, \"cross_dataset_summary.npy\"), summary_arr)\n\ndatasets = [\"synthetic_vlm_stream\", \"hf_ai2d_like_stream\", \"hf_textvqa_like_stream\"]\nmodes = [\"frozen\", \"entropy\", \"consistency\"]\nvals = np.zeros((len(datasets), len(modes)), dtype=float)\nfor i, dk in enumerate(datasets):\n    lookup = {\n        x[\"name\"]: x[\"stability_adjusted_acc\"]\n        for x in experiment_data[dk][\"metrics\"][\"test\"]\n    }\n    for j, m in enumerate(modes):\n        vals[i, j] = lookup[m]\nplt.figure(figsize=(9, 4))\nx = np.arange(len(datasets))\nw = 0.25\nfor j, m in enumerate(modes):\n    plt.bar(x + (j - 1) * w, vals[:, j], width=w, label=m)\nplt.xticks(x, datasets, rotation=15)\nplt.ylabel(\"Stability-Adjusted Stream Accuracy\")\nplt.title(\"Cross-dataset stability comparison\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(\n    os.path.join(working_dir, \"cross_dataset_stability_comparison.png\"), dpi=160\n)\nplt.close()\n\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\nprint(\n    \"Finished hyperparameter tuning, multi-dataset evaluation, plotting, and saving experiment_data.npy\"\n)\n", "import os\nimport time\nimport copy\nimport numpy as np\nimport matplotlib.pyplot as plt\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(7)\nnp.random.seed(7)\n\nexperiment_data = {\n    \"batch_size_tuning\": {\n        \"synthetic_vlm_stream\": {\n            \"config\": {\n                \"batch_sizes\": [32, 64, 128],\n                \"epochs\": 15,\n                \"optimizer\": \"Adam\",\n                \"lr\": 1e-3,\n                \"weight_decay\": 1e-4,\n                \"seed_torch\": 7,\n                \"seed_numpy\": 7,\n            },\n            \"trials\": {},\n            \"summary\": {\n                \"ranking\": [],\n                \"best_batch_size_by_val\": None,\n                \"best_batch_size_by_stream_consistency\": None,\n            },\n        }\n    }\n}\n\n\nclass SyntheticWorld:\n    def __init__(self, dim=16, num_classes=4, seed=7):\n        rng = np.random.RandomState(seed)\n        self.dim = dim\n        self.num_classes = num_classes\n        self.W_img = rng.randn(num_classes, dim).astype(np.float32) * 1.2\n        self.W_cap = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n        self.W_rat = rng.randn(num_classes, dim).astype(np.float32) * 0.8\n\n\nclass SyntheticVLMDataset(Dataset):\n    def __init__(self, world, n=2000, shift=False, seed=0):\n        self.world = world\n        self.n = n\n        self.shift = shift\n        self.rng = np.random.RandomState(seed)\n        self.data = []\n        dim = world.dim\n        K = world.num_classes\n\n        for i in range(n):\n            y = self.rng.randint(0, K)\n            z = self.rng.randn(dim).astype(np.float32)\n\n            img = z + world.W_img[y] + 0.35 * self.rng.randn(dim).astype(np.float32)\n            cap = (\n                0.7 * z + world.W_cap[y] + 0.45 * self.rng.randn(dim).astype(np.float32)\n            )\n            rat = (\n                0.5 * z + world.W_rat[y] + 0.50 * self.rng.randn(dim).astype(np.float32)\n            )\n\n            if shift:\n                img = (\n                    0.60 * img\n                    + 0.85 * np.roll(img, 1)\n                    + 0.40 * self.rng.randn(dim).astype(np.float32)\n                )\n                if i % 7 == 0:\n                    img = img + 1.0 * self.rng.randn(dim).astype(np.float32)\n\n            self.data.append(\n                (\n                    img.astype(np.float32),\n                    cap.astype(np.float32),\n                    rat.astype(np.float32),\n                    int(y),\n                )\n            )\n\n    def __len__(self):\n        return self.n\n\n    def __getitem__(self, idx):\n        img, cap, rat, y = self.data[idx]\n        return {\n            \"image\": torch.tensor(img, dtype=torch.float32),\n            \"caption\": torch.tensor(cap, dtype=torch.float32),\n            \"rationale\": torch.tensor(rat, dtype=torch.float32),\n            \"label\": torch.tensor(y, dtype=torch.long),\n        }\n\n\nclass FeatureNormalizer:\n    def __init__(self, mean_dict, std_dict):\n        self.mean = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in mean_dict.items()\n        }\n        self.std = {\n            k: torch.tensor(v, dtype=torch.float32).to(device)\n            for k, v in std_dict.items()\n        }\n\n    @classmethod\n    def from_dataset(cls, dataset):\n        stats = {}\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            arr = np.stack([sample[key].numpy() for sample in dataset], axis=0)\n            stats[key] = (arr.mean(axis=0), arr.std(axis=0) + 1e-6)\n        mean_dict = {k: v[0] for k, v in stats.items()}\n        std_dict = {k: v[1] for k, v in stats.items()}\n        return cls(mean_dict, std_dict)\n\n    def normalize(self, batch):\n        out = {}\n        for k, v in batch.items():\n            out[k] = v.to(device) if isinstance(v, torch.Tensor) else v\n        for key in [\"image\", \"caption\", \"rationale\"]:\n            out[key] = (out[key] - self.mean[key]) / self.std[key]\n        return out\n\n\nclass SmallVLM(nn.Module):\n    def __init__(self, dim=16, hidden=64, num_classes=4):\n        super().__init__()\n        self.img_backbone = nn.Sequential(\n            nn.Linear(dim, hidden), nn.ReLU(), nn.Linear(hidden, hidden), nn.ReLU()\n        )\n        self.caption_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.rationale_head = nn.Sequential(\n            nn.Linear(dim, hidden // 2), nn.ReLU(), nn.Linear(hidden // 2, num_classes)\n        )\n        self.adapter = nn.Sequential(\n            nn.Linear(hidden, hidden), nn.ReLU(), nn.Linear(hidden, num_classes)\n        )\n\n    def forward(self, image, caption, rationale):\n        h = self.img_backbone(image)\n        logits_main = self.adapter(h)\n        logits_cap = self.caption_head(caption)\n        logits_rat = self.rationale_head(rationale)\n        return logits_main, logits_cap, logits_rat\n\n\ndef supervised_loss(logits_main, logits_cap, logits_rat, y):\n    return (\n        F.cross_entropy(logits_main, y)\n        + 0.35 * F.cross_entropy(logits_cap, y)\n        + 0.35 * F.cross_entropy(logits_rat, y)\n    )\n\n\ndef evaluate_loader(model, loader, normalizer):\n    model.eval()\n    total_loss, total, correct = 0.0, 0, 0\n    preds_all, gt_all = [], []\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n            lm, lc, lr = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lr, batch[\"label\"])\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n            preds_all.extend(pred.detach().cpu().numpy().tolist())\n            gt_all.extend(batch[\"label\"].detach().cpu().numpy().tolist())\n    return total_loss / total, correct / total, np.array(preds_all), np.array(gt_all)\n\n\ndef entropy_min_loss(logits):\n    p = F.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef consistency_alignment_loss(logits_main, logits_cap, logits_rat, temperature=1.0):\n    log_p_main = F.log_softmax(logits_main / temperature, dim=-1)\n    p_cap = F.softmax(logits_cap.detach() / temperature, dim=-1)\n    p_rat = F.softmax(logits_rat.detach() / temperature, dim=-1)\n    target = 0.5 * (p_cap + p_rat)\n    return F.kl_div(log_p_main, target, reduction=\"batchmean\")\n\n\ndef stream_eval_with_tta(\n    model_init, stream_loader, normalizer, mode=\"frozen\", lr=2e-3, conf_thresh=0.70\n):\n    model = copy.deepcopy(model_init).to(device)\n    for p in model.img_backbone.parameters():\n        p.requires_grad = False\n    for p in model.caption_head.parameters():\n        p.requires_grad = False\n    for p in model.rationale_head.parameters():\n        p.requires_grad = False\n    for p in model.adapter.parameters():\n        p.requires_grad = True\n    optimizer = torch.optim.Adam(model.adapter.parameters(), lr=lr)\n\n    preds, gts, update_flags, confidences, losses = [], [], [], [], []\n    model.eval()\n\n    for _, batch in enumerate(stream_loader):\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        batch = normalizer.normalize(batch)\n\n        with torch.no_grad():\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            p_main = F.softmax(lm, dim=-1)\n            p_cap = F.softmax(lc, dim=-1)\n            p_rat = F.softmax(lrh, dim=-1)\n            conf, pred = p_main.max(dim=-1)\n            pred_cap = p_cap.argmax(dim=-1)\n            pred_rat = p_rat.argmax(dim=-1)\n\n            js_like = 0.5 * (\n                F.kl_div(torch.log(p_main + 1e-8), p_cap, reduction=\"batchmean\")\n                + F.kl_div(torch.log(p_main + 1e-8), p_rat, reduction=\"batchmean\")\n            )\n            agree = (pred == pred_cap) & (pred == pred_rat)\n            consistency_score = float(torch.exp(-js_like).item())\n\n            preds.append(int(pred.item()))\n            gts.append(int(batch[\"label\"].item()))\n            confidences.append(float(conf.item()))\n\n        do_update = False\n        if mode == \"entropy\":\n            do_update = True\n        elif mode == \"consistency\":\n            do_update = bool(\n                (conf > conf_thresh).item()\n                and agree.item()\n                and consistency_score > 0.65\n            )\n\n        if do_update:\n            model.train()\n            optimizer.zero_grad()\n            lm2, lc2, lr2 = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            if mode == \"entropy\":\n                loss = entropy_min_loss(lm2)\n            else:\n                loss = consistency_alignment_loss(\n                    lm2, lc2, lr2\n                ) + 0.1 * entropy_min_loss(lm2)\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.adapter.parameters(), 1.0)\n            optimizer.step()\n            losses.append(float(loss.item()))\n            update_flags.append(1)\n            model.eval()\n        else:\n            losses.append(0.0)\n            update_flags.append(0)\n\n    preds = np.array(preds)\n    gts = np.array(gts)\n    update_flags = np.array(update_flags)\n    confidences = np.array(confidences)\n    acc = float((preds == gts).mean())\n\n    correctness = (preds == gts).astype(np.float32)\n    w = 25\n    rolling = np.array(\n        [correctness[max(0, i - w + 1) : i + 1].mean() for i in range(len(correctness))]\n    )\n    penalties = []\n    for i in np.where(update_flags == 1)[0]:\n        pre = rolling[max(0, i - 1)]\n        post = rolling[min(len(rolling) - 1, i + 5)]\n        penalties.append(max(0.0, pre - post))\n    volatility_penalty = float(np.mean(penalties)) if penalties else 0.0\n    stability_adjusted_acc = acc - 0.5 * volatility_penalty\n\n    return {\n        \"acc\": acc,\n        \"stability_adjusted_acc\": stability_adjusted_acc,\n        \"preds\": preds,\n        \"gts\": gts,\n        \"updates\": update_flags,\n        \"confidences\": confidences,\n        \"rolling_acc\": rolling,\n        \"adapt_loss_mean\": float(np.mean(losses)),\n        \"adapt_freq\": float(update_flags.mean()),\n    }\n\n\ndef set_all_seeds(seed):\n    torch.manual_seed(seed)\n    np.random.seed(seed)\n    if torch.cuda.is_available():\n        torch.cuda.manual_seed_all(seed)\n\n\ndef train_one_trial(batch_size, train_ds, val_ds, stream_ds, normalizer, epochs=15):\n    set_all_seeds(7)\n\n    train_loader = DataLoader(train_ds, batch_size=batch_size, shuffle=True)\n    val_loader = DataLoader(val_ds, batch_size=128, shuffle=False)\n    stream_loader = DataLoader(stream_ds, batch_size=1, shuffle=False)\n\n    model = SmallVLM(dim=16, hidden=64, num_classes=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3, weight_decay=1e-4)\n\n    trial_data = {\n        \"metrics\": {\"train\": [], \"val\": [], \"test\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": {},\n        \"ground_truth\": [],\n        \"stream\": {},\n        \"best_val_loss\": None,\n        \"best_epoch\": None,\n        \"batch_size\": batch_size,\n    }\n\n    best_state = None\n    best_val = float(\"inf\")\n    best_epoch = -1\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        total_loss, total, correct = 0.0, 0, 0\n\n        for batch in train_loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            batch = normalizer.normalize(batch)\n\n            optimizer.zero_grad()\n            lm, lc, lrh = model(batch[\"image\"], batch[\"caption\"], batch[\"rationale\"])\n            loss = supervised_loss(lm, lc, lrh, batch[\"label\"])\n            loss.backward()\n            torch.nn.utils.clip_grad_norm_(model.parameters(), 1.0)\n            optimizer.step()\n\n            pred = lm.argmax(dim=-1)\n            bs = batch[\"label\"].size(0)\n            total_loss += loss.item() * bs\n            total += bs\n            correct += (pred == batch[\"label\"]).sum().item()\n\n        train_loss = total_loss / total\n        train_acc = correct / total\n        val_loss, val_acc, _, _ = evaluate_loader(model, val_loader, normalizer)\n\n        print(\n            f\"[batch_size={batch_size}] Epoch {epoch}: train_loss={train_loss:.4f}, val_loss={val_loss:.4f}, val_acc={val_acc:.4f}\"\n        )\n\n        ts = time.time()\n        trial_data[\"losses\"][\"train\"].append((epoch, train_loss, ts))\n        trial_data[\"losses\"][\"val\"].append((epoch, val_loss, ts))\n        trial_data[\"metrics\"][\"train\"].append((epoch, train_acc, ts))\n        trial_data[\"metrics\"][\"val\"].append((epoch, val_acc, ts))\n\n        if val_loss < best_val:\n            best_val = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n\n    model.load_state_dict(best_state)\n    trial_data[\"best_val_loss\"] = float(best_val)\n    trial_data[\"best_epoch\"] = int(best_epoch)\n\n    frozen_res = stream_eval_with_tta(model, stream_loader, normalizer, mode=\"frozen\")\n    entropy_res = stream_eval_with_tta(model, stream_loader, normalizer, mode=\"entropy\")\n    consistency_res = stream_eval_with_tta(\n        model, stream_loader, normalizer, mode=\"consistency\"\n    )\n    results = {\n        \"frozen\": frozen_res,\n        \"entropy\": entropy_res,\n        \"consistency\": consistency_res,\n    }\n\n    for name, res in results.items():\n        print(\n            f\"[batch_size={batch_size}] {name}: \"\n            f\"acc={res['acc']:.4f}, \"\n            f\"stability_adjusted_acc={res['stability_adjusted_acc']:.4f}, \"\n            f\"adapt_freq={res['adapt_freq']:.4f}, \"\n            f\"adapt_loss_mean={res['adapt_loss_mean']:.4f}\"\n        )\n        trial_data[\"metrics\"][\"test\"].append(\n            {\n                \"name\": name,\n                \"acc\": res[\"acc\"],\n                \"stability_adjusted_acc\": res[\"stability_adjusted_acc\"],\n                \"adapt_freq\": res[\"adapt_freq\"],\n                \"adapt_loss_mean\": res[\"adapt_loss_mean\"],\n                \"timestamp\": time.time(),\n            }\n        )\n\n    trial_data[\"predictions\"] = {\n        \"frozen\": frozen_res[\"preds\"],\n        \"entropy\": entropy_res[\"preds\"],\n        \"consistency\": consistency_res[\"preds\"],\n    }\n    trial_data[\"ground_truth\"] = frozen_res[\"gts\"]\n    trial_data[\"stream\"] = {\n        \"frozen_updates\": frozen_res[\"updates\"],\n        \"entropy_updates\": entropy_res[\"updates\"],\n        \"consistency_updates\": consistency_res[\"updates\"],\n        \"frozen_rolling_acc\": frozen_res[\"rolling_acc\"],\n        \"entropy_rolling_acc\": entropy_res[\"rolling_acc\"],\n        \"consistency_rolling_acc\": consistency_res[\"rolling_acc\"],\n        \"frozen_confidences\": frozen_res[\"confidences\"],\n        \"entropy_confidences\": entropy_res[\"confidences\"],\n        \"consistency_confidences\": consistency_res[\"confidences\"],\n    }\n    return trial_data\n\n\n# Data\nworld = SyntheticWorld(dim=16, num_classes=4, seed=7)\ntrain_ds = SyntheticVLMDataset(world, n=2500, shift=False, seed=11)\nval_ds = SyntheticVLMDataset(world, n=500, shift=False, seed=13)\ntest_stream_ds = SyntheticVLMDataset(world, n=700, shift=True, seed=17)\nnormalizer = FeatureNormalizer.from_dataset(train_ds)\n\nbatch_sizes = [32, 64, 128]\nall_summaries = []\n\nfor bs in batch_sizes:\n    trial_key = f\"batch_size_{bs}\"\n    trial_res = train_one_trial(\n        bs, train_ds, val_ds, test_stream_ds, normalizer, epochs=15\n    )\n    experiment_data[\"batch_size_tuning\"][\"synthetic_vlm_stream\"][\"trials\"][\n        trial_key\n    ] = trial_res\n\n    test_metrics = {m[\"name\"]: m for m in trial_res[\"metrics\"][\"test\"]}\n    summary_row = {\n        \"batch_size\": bs,\n        \"best_val_loss\": trial_res[\"best_val_loss\"],\n        \"best_epoch\": trial_res[\"best_epoch\"],\n        \"best_val_acc\": float(max([x[1] for x in trial_res[\"metrics\"][\"val\"]])),\n        \"frozen_acc\": test_metrics[\"frozen\"][\"acc\"],\n        \"frozen_stability_adjusted_acc\": test_metrics[\"frozen\"][\n            \"stability_adjusted_acc\"\n        ],\n        \"entropy_acc\": test_metrics[\"entropy\"][\"acc\"],\n        \"entropy_stability_adjusted_acc\": test_metrics[\"entropy\"][\n            \"stability_adjusted_acc\"\n        ],\n        \"consistency_acc\": test_metrics[\"consistency\"][\"acc\"],\n        \"consistency_stability_adjusted_acc\": test_metrics[\"consistency\"][\n            \"stability_adjusted_acc\"\n        ],\n    }\n    all_summaries.append(summary_row)\n\nranking = sorted(\n    all_summaries,\n    key=lambda x: (x[\"best_val_loss\"], -x[\"consistency_stability_adjusted_acc\"]),\n)\nbest_by_val = ranking[0][\"batch_size\"]\nbest_by_stream = sorted(\n    all_summaries, key=lambda x: -x[\"consistency_stability_adjusted_acc\"]\n)[0][\"batch_size\"]\n\nexperiment_data[\"batch_size_tuning\"][\"synthetic_vlm_stream\"][\"summary\"][\n    \"ranking\"\n] = ranking\nexperiment_data[\"batch_size_tuning\"][\"synthetic_vlm_stream\"][\"summary\"][\n    \"best_batch_size_by_val\"\n] = best_by_val\nexperiment_data[\"batch_size_tuning\"][\"synthetic_vlm_stream\"][\"summary\"][\n    \"best_batch_size_by_stream_consistency\"\n] = best_by_stream\n\nprint(\"\\nBatch size tuning summary:\")\nfor row in ranking:\n    print(\n        f\"batch_size={row['batch_size']}, \"\n        f\"best_val_loss={row['best_val_loss']:.4f}, \"\n        f\"consistency_stability_adjusted_acc={row['consistency_stability_adjusted_acc']:.4f}, \"\n        f\"entropy_stability_adjusted_acc={row['entropy_stability_adjusted_acc']:.4f}, \"\n        f\"frozen_stability_adjusted_acc={row['frozen_stability_adjusted_acc']:.4f}\"\n    )\n\nprint(f\"\\nSelected by validation loss: batch_size={best_by_val}\")\nprint(\n    f\"Best downstream consistency stability-adjusted accuracy: batch_size={best_by_stream}\"\n)\n\n# Save all plottable arrays per trial\nfor bs in batch_sizes:\n    trial_key = f\"batch_size_{bs}\"\n    d = experiment_data[\"batch_size_tuning\"][\"synthetic_vlm_stream\"][\"trials\"][\n        trial_key\n    ]\n\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_losses.npy\"),\n        np.array(d[\"losses\"][\"train\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_losses.npy\"),\n        np.array(d[\"losses\"][\"val\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_train_metrics.npy\"),\n        np.array(d[\"metrics\"][\"train\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_val_metrics.npy\"),\n        np.array(d[\"metrics\"][\"val\"], dtype=object),\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_test_metrics.npy\"),\n        np.array(d[\"metrics\"][\"test\"], dtype=object),\n    )\n\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_preds_frozen.npy\"),\n        d[\"predictions\"][\"frozen\"],\n    )\n    np.save(\n        os.path.join(working_dir, f\"{trial_key}_preds_entropy.npy\"),\n        d[\"predictions\"][\"entropy re methodological/implementation bugs affecting\nresult validity. Main issue: the required 'TWO more new datasets from\nHuggingFace' was not satisfied\u2014only AI2D-like and TextVQA-like were added, and\nboth may silently fall back to synthetic pseudo-features rather than real HF\nmultimodal data. This means the experiment may not actually evaluate on the\nintended Hugging Face benchmarks. Also, labels are generated via\n`abs(hash(str(a))) % num_classes`, which is process-dependent and semantically\narbitrary, making results unstable and not meaningful as benchmark accuracy.\nAnother issue is likely split-name mismatch for some HF datasets (e.g.,\n`validation`/`test` may not exist), causing fallback without failing loudly.\nFinally, the consistency method underperformed on the shown dataset, so the\nhypothesis is not supported by this run. Fixes: add two actual new HF datasets\nbeyond the prior stage (e.g., ChartQA and ScienceQA or DocVQA/InfographicVQA if\navailable), verify split names with explicit assertions, fail hard instead of\nsilent fallback when HF loading is required, use real dataset labels/answer\nmappings rather than hashed labels, and log per-dataset source resolution\nprominently in the final summary.", ""], "exc_type": [null, null, null, null, null], "exc_info": [null, null, null, null, null], "exc_stack": [null, null, null, null, null], "exp_name": "0-run", "metrics": [{"metric_names": [{"metric_name": "train accuracy", "lower_is_better": false, "description": "Model accuracy on the training set.", "data": [{"dataset_name": "synthetic_vlm_stream", "final_value": 1.0, "best_value": 1.0}]}, {"metric_name": "validation accuracy", "lower_is_better": false, "description": "Model accuracy on the validation set.", "data": [{"dataset_name": "synthetic_vlm_stream", "final_value": 1.0, "best_value": 1.0}]}, {"metric_name": "train loss", "lower_is_better": true, "description": "Loss on the training set.", "data": [{"dataset_name": "synthetic_vlm_stream", "fi
