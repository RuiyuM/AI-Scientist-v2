      if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') {
          let lastModified = '';

          // Check for file changes every second
          setInterval(async () => {
              try {
                  const response = await fetch(window.location.href, { method: 'HEAD' });
                  // get a timestamp that shows when the file was last changed
                  const currentModified = response.headers.get('last-modified');

                  if (lastModified && lastModified !== currentModified) {
                      window.location.reload();
                  }

                  lastModified = currentModified;
              } catch (e) {
                  console.error('Error checking for updates:', e);
              }
          }, 1000);
      }

      const bgCol = "#FFFFFF";
const accentCol = "#1a439e";

hljs.initHighlightingOnLoad();

// Function to update background color globally
function updateBackgroundColor(color) {
  // Update the JS variable
  window.bgColCurrent = color;

  // Update body background
  document.body.style.backgroundColor = color;

  // Update canvas container background
  const canvasContainer = document.getElementById('canvas-container');
  if (canvasContainer) {
    canvasContainer.style.backgroundColor = color;
  }
}

// Store tree data for each stage
const stageData = {
  Stage_1: null,
  Stage_2: null,
  Stage_3: null,
  Stage_4: null
};

// Keep track of current selected stage
let currentStage = null;
let currentSketch = null;
let availableStages = [];

// Class definitions for nodes and edges
class Node {
  constructor(x, y, id, isRoot = false) {
    this.x = x;
    this.y = y;
    this.id = id;
    this.visible = isRoot; // Only root nodes are visible initially
    this.appearProgress = 0;
    this.popEffect = 0;
    this.selected = false;
    this.isRootNode = isRoot;
  }

  update() {
    if (this.visible) {
      // Handle the main appearance animation
      if (this.appearProgress < 1) {
        this.appearProgress += 0.06;

        // When we reach full size, trigger the pop effect
        if (this.appearProgress >= 1) {
          this.appearProgress = 1; // Cap at 1
          this.popEffect = 1; // Start the pop effect
        }
      }

      // Handle the pop effect animation
      if (this.popEffect > 0) {
        this.popEffect -= 0.15; // Control how quickly it shrinks back
        if (this.popEffect < 0) this.popEffect = 0; // Don't go negative
      }
    }
  }

  startAnimation() {
    this.visible = true;
  }

  color() {
    if (this.selected) {
      return accentCol; // Use the global accent color variable for selected node
    }
    return '#4263eb'; // Default blue color
  }

  render(p5) {
    if (this.visible) {
      const popBonus = this.popEffect * 0.1;
      const nodeScale = p5.map(this.appearProgress, 0, 1, 0, 1) + popBonus;
      const alpha = p5.map(this.appearProgress, 0, 1, 0, 255);

      p5.push();
      p5.translate(this.x, this.y);

      // Shadow effect
      p5.noStroke();
      p5.rectMode(p5.CENTER);

      for (let i = 1; i <= 4; i++) {
        p5.fill(0, 0, 0, alpha * 0.06);
        p5.rect(i, i, 30 * nodeScale, 30 * nodeScale, 10);
      }

      // Main square - use node's color with alpha
      let nodeColor = p5.color(this.color());
      nodeColor.setAlpha(alpha);
      p5.fill(nodeColor);
      p5.rect(0, 0, 30 * nodeScale, 30 * nodeScale, 10);

      // Draw checkmark icon if the node is selected
      if (this.selected && this.appearProgress >= 1) {
        p5.stroke(255);
        p5.strokeWeight(2 * nodeScale);
        p5.noFill();
        // Draw checkmark
        p5.beginShape();
        p5.vertex(-8, 0);
        p5.vertex(-3, 5);
        p5.vertex(8, -6);
        p5.endShape();
      }

      p5.pop();
    }
  }

  isMouseOver(p5) {
    return this.visible &&
           p5.mouseX > this.x - 15 &&
           p5.mouseX < this.x + 15 &&
           p5.mouseY > this.y - 15 &&
           p5.mouseY < this.y + 15;
  }

  // Connect this node to a child node
  child(childNode) {
    // Create an edge from this node to the child
    let isLeft = childNode.x < this.x;
    let isRight = childNode.x > this.x;
    let edge = new Edge(this, childNode, isLeft, isRight);
    return edge;
  }
}

class Edge {
  constructor(parent, child, isLeft, isRight) {
    this.parent = parent;
    this.child = child;
    this.isLeft = isLeft;
    this.isRight = isRight;
    this.progress = 0;

    // Calculate the midpoint where branching occurs
    this.midY = parent.y + (child.y - parent.y) * 0.6;

    // Use the actual child x-coordinate
    // This ensures the edge will connect directly to the child node
    this.branchX = child.x;
  }

  update() {
    if (this.parent.visible && this.progress < 1) {
      this.progress += 0.01; // Adjust animation speed
    }
    if (this.progress >= 1) {
      this.child.visible = true;
    }
  }

  color() {
    return this.child.color();
  }

  render(p5) {
    if (!this.parent.visible) return;

    // Calculate path lengths
    const verticalDist1 = this.midY - this.parent.y;
    const horizontalDist = Math.abs(this.branchX - this.parent.x);
    const verticalDist2 = this.child.y - this.midY;
    const totalLength = verticalDist1 + horizontalDist + verticalDist2;

    // Calculate how much of each segment to draw
    const currentLength = totalLength * this.progress;

    p5.stroke(180, 190, 205);
    p5.strokeWeight(1.5);
    p5.noFill();

    // Always draw the first vertical segment from parent
    if (currentLength > 0) {
      const firstSegmentLength = Math.min(currentLength, verticalDist1);
      const currentMidY = p5.lerp(this.parent.y, this.midY, firstSegmentLength / verticalDist1);
      p5.line(this.parent.x, this.parent.y, this.parent.x, currentMidY);
    }

    if (currentLength > verticalDist1) {
      // Draw second segment (horizontal)
      const secondSegmentLength = Math.min(currentLength - verticalDist1, horizontalDist);
      const currentBranchX = p5.lerp(this.parent.x, this.branchX, secondSegmentLength / horizontalDist);
      p5.line(this.parent.x, this.midY, currentBranchX, this.midY);

      if (currentLength > verticalDist1 + horizontalDist) {
        // Draw third segment (vertical to child)
        const thirdSegmentLength = currentLength - verticalDist1 - horizontalDist;
        const currentChildY = p5.lerp(this.midY, this.child.y, thirdSegmentLength / verticalDist2);
        p5.line(this.branchX, this.midY, this.branchX, currentChildY);
      }
    }
  }
}

// Create a modified sketch for each stage
function createTreeSketch(stageId) {
  return function(p5) {
    let nodes = [];
    let edges = [];
    let treeData = stageData[stageId];

    p5.setup = function() {
      const canvas = p5.createCanvas(p5.windowWidth * 0.4, p5.windowHeight);
      canvas.parent('canvas-container');
      p5.smooth();
      p5.frameRate(60);

      if (treeData) {
        createTreeFromData(treeData);
      }
    };

    p5.windowResized = function() {
      p5.resizeCanvas(p5.windowWidth * 0.4, p5.windowHeight);
    };

    function createTreeFromData(data) {
      // Clear existing nodes and edges
      nodes = [];
      edges = [];

      // Add defensive checks to prevent errors
      if (!data || !data.layout || !Array.isArray(data.layout) || !data.edges || !Array.isArray(data.edges)) {
        console.error("Invalid tree data format:", data);
        return; // Exit if data structure is invalid
      }

      // Find all parent nodes in edges
      const parentNodes = new Set();
      for (const [parentId, childId] of data.edges) {
        parentNodes.add(parentId);
      }

      // Create nodes
      for (let i = 0; i < data.layout.length; i++) {
        const [nx, ny] = data.layout[i];
        // A node is a root if it's a parent and not a child in any edge
        const isRoot = parentNodes.has(i) && data.edges.every(edge => edge[1] !== i);

        const node = new Node(
          nx * p5.width * 0.8 + p5.width * 0.1,
          ny * p5.height * 0.8 + p5.height * 0.1,
          i,
          isRoot
        );
        nodes.push(node);
      }

      // If no root was found, make the first parent node visible
      if (!nodes.some(node => node.visible) && parentNodes.size > 0) {
        // Get the first parent node
        const firstParentId = [...parentNodes][0];
        if (nodes[firstParentId]) {
          nodes[firstParentId].visible = true;
        }
      }

      // Create edges
      for (const [parentId, childId] of data.edges) {
        const parent = nodes[parentId];
        const child = nodes[childId];
        if (parent && child) { // Verify both nodes exist
          const isLeft = child.x < parent.x;
          const isRight = child.x > parent.x;
          edges.push(new Edge(parent, child, isLeft, isRight));
        }
      }

      // Select the first node by default
      if (nodes.length > 0) {
        nodes[0].selected = true;
        updateNodeInfo(0);
      }
    }

    p5.draw = function() {
      // Use the global background color if available, otherwise use the default bgCol
      const currentBgColor = window.bgColCurrent || bgCol;
      p5.background(currentBgColor);

      // Update and render edges
      for (const edge of edges) {
        edge.update();
        edge.render(p5);
      }

      // Update and render nodes
      for (const node of nodes) {
        node.update();
        node.render(p5);
      }

      // Handle mouse hover
      p5.cursor(p5.ARROW);
      for (const node of nodes) {
        if (node.isMouseOver(p5)) {
          p5.cursor(p5.HAND);
        }
      }
    };

    p5.mousePressed = function() {
      // Check if any node was clicked
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].visible && nodes[i].isMouseOver(p5)) {
          // Deselect all nodes
          nodes.forEach(n => n.selected = false);
          // Select the clicked node
          nodes[i].selected = true;
          // Update the right panel with node info
          updateNodeInfo(i);
          break;
        }
      }
    };

    function updateNodeInfo(nodeIndex) {
      if (treeData) {
        setNodeInfo(
          treeData.code[nodeIndex],
          treeData.plan[nodeIndex],
          treeData.plot_code?.[nodeIndex],
          treeData.plot_plan?.[nodeIndex],
          treeData.metrics?.[nodeIndex],
          treeData.exc_type?.[nodeIndex] || '',
          treeData.exc_info?.[nodeIndex]?.args?.[0] || '',
          treeData.exc_stack?.[nodeIndex] || [],
          treeData.plots?.[nodeIndex] || [],
          treeData.plot_analyses?.[nodeIndex] || [],
          treeData.vlm_feedback_summary?.[nodeIndex] || '',
          treeData.datasets_successfully_tested?.[nodeIndex] || [],
          treeData.exec_time_feedback?.[nodeIndex] || '',
          treeData.exec_time?.[nodeIndex] || ''
        );
      }
    }
  };
}

// Start a new p5 sketch for the given stage
function startSketch(stageId) {
  if (currentSketch) {
    currentSketch.remove();
  }

  if (stageData[stageId]) {
    currentSketch = new p5(createTreeSketch(stageId));

    // Update stage info
    const stageNumber = stageId.split('_')[1];
    let stageDesc = '';
    switch(stageId) {
      case 'Stage_1': stageDesc = 'Preliminary Investigation'; break;
      case 'Stage_2': stageDesc = 'Baseline Tuning'; break;
      case 'Stage_3': stageDesc = 'Research Agenda Execution'; break;
      case 'Stage_4': stageDesc = 'Ablation Studies'; break;
    }

    document.getElementById('stage-info').innerHTML =
      `<strong>Current Stage: ${stageNumber} - ${stageDesc}</strong>`;
  }
}

// Handle tab selection
function selectStage(stageId) {
  if (!stageData[stageId] || !availableStages.includes(stageId)) {
    return; // Don't allow selection of unavailable stages
  }

  // Update active tab styles
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
  });
  document.querySelector(`.tab[data-stage="${stageId}"]`).classList.add('active');

  // Start the new sketch
  currentStage = stageId;
  startSketch(stageId);
}

// Function to load the tree data for all stages
async function loadAllStageData(baseTreeData) {
  console.log("Loading stage data with base data:", baseTreeData);

  // The base tree data is for the current stage
  const currentStageId = baseTreeData.current_stage || 'Stage_1';

  // Ensure base tree data is valid and has required properties
  if (baseTreeData && baseTreeData.layout && baseTreeData.edges) {
    stageData[currentStageId] = baseTreeData;
    availableStages.push(currentStageId);
    console.log(`Added current stage ${currentStageId} to available stages`);
  } else {
    console.warn(`Current stage ${currentStageId} data is invalid:`, baseTreeData);
  }

  // Use relative path to load other stage trees
  const logDirPath = baseTreeData.log_dir_path || '.';
  console.log("Log directory path:", logDirPath);

  // Load data for each stage if available
  const stageNames = ['Stage_1', 'Stage_2', 'Stage_3', 'Stage_4'];
  const stageNames2actualNames = {
    'Stage_1': 'stage_1_initial_implementation_1_preliminary',
    'Stage_2': 'stage_2_baseline_tuning_1_first_attempt',
    'Stage_3': 'stage_3_creative_research_1_first_attempt',
    'Stage_4': 'stage_4_ablation_studies_1_first_attempt'
    }

  for (const stage of stageNames) {

    if (baseTreeData.completed_stages && baseTreeData.completed_stages.includes(stage)) {
      try {
        console.log(`Attempting to load data for ${stage} from ${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);
        const response = await fetch(`${logDirPath}/${stageNames2actualNames[stage]}/tree_data.json`);

        if (response.ok) {
          const data = await response.json();

          // Validate the loaded data
          if (data && data.layout && data.edges) {
            stageData[stage] = data;
            availableStages.push(stage);
            console.log(`Successfully loaded and validated data for ${stage}`);
          } else {
            console.warn(`Loaded data for ${stage} is invalid:`, data);
          }
        } else {
          console.warn(`Failed to load data for ${stage} - HTTP status ${response.status}`);
        }
      } catch (error) {
        console.error(`Error loading data for ${stage}:`, error);
      }
    } else {
      console.log(`Skipping stage ${stage} - not in completed stages list:`, baseTreeData.completed_stages);
    }
  }

  // Update tab visibility based on available stages
  updateTabVisibility();

  // Start with the first available stage
  if (availableStages.length > 0) {
    selectStage(availableStages[0]);
  } else {
    console.warn("No stages available to display");
    // Display a message in the canvas area
    document.getElementById('canvas-container').innerHTML =
      '<div style="padding: 20px; color: #333; text-align: center;"><h3>No valid tree data available to display</h3></div>';
  }
}

// Update tab visibility based on available stages
function updateTabVisibility() {
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(tab => {
    const stageId = tab.getAttribute('data-stage');
    if (availableStages.includes(stageId)) {
      tab.classList.remove('disabled');
    } else {
      tab.classList.add('disabled');
    }
  });
}

// Utility function to set the node info in the right panel
const setNodeInfo = (code, plan, plot_code, plot_plan, metrics = null, exc_type = '', exc_info = '',
    exc_stack = [], plots = [], plot_analyses = [], vlm_feedback_summary = '',
    datasets_successfully_tested = [], exec_time_feedback = '', exec_time = '') => {
  const codeElm = document.getElementById("code");
  if (codeElm) {
    if (code) {
      codeElm.innerHTML = hljs.highlight(code, { language: "python" }).value;
    } else {
      codeElm.innerHTML = '<p>No code available</p>';
    }
  }

  const planElm = document.getElementById("plan");
  if (planElm) {
    if (plan) {
      planElm.innerHTML = hljs.highlight(plan, { language: "plaintext" }).value;
    } else {
      planElm.innerHTML = '<p>No plan available</p>';
    }
  }

  const plot_codeElm = document.getElementById("plot_code");
  if (plot_codeElm) {
    if (plot_code) {
      plot_codeElm.innerHTML = hljs.highlight(plot_code, { language: "python" }).value;
    } else {
      plot_codeElm.innerHTML = '<p>No plot code available</p>';
    }
  }

  const plot_planElm = document.getElementById("plot_plan");
  if (plot_planElm) {
    if (plot_plan) {
      plot_planElm.innerHTML = hljs.highlight(plot_plan, { language: "plaintext" }).value;
    } else {
      plot_planElm.innerHTML = '<p>No plot plan available</p>';
    }
  }

  const metricsElm = document.getElementById("metrics");
  if (metricsElm) {
      let metricsContent = `<h3>Metrics:</h3>`;
      if (metrics && metrics.metric_names) {
          for (const metric of metrics.metric_names) {
              metricsContent += `<div class="metric-group">`;
              metricsContent += `<h4>${metric.metric_name}</h4>`;
              metricsContent += `<p><strong>Description:</strong> ${metric.description || 'N/A'}</p>`;
              metricsContent += `<p><strong>Optimization:</strong> ${metric.lower_is_better ? 'Minimize' : 'Maximize'}</p>`;

              // Create table for dataset values
              metricsContent += `<table class="metric-table">
                  <tr>
                      <th>Dataset</th>
                      <th>Final Value</th>
                      <th>Best Value</th>
                  </tr>`;

              for (const dataPoint of metric.data) {
                  metricsContent += `<tr>
                      <td>${dataPoint.dataset_name}</td>
                      <td>${dataPoint.final_value?.toFixed(4) || 'N/A'}</td>
                      <td>${dataPoint.best_value?.toFixed(4) || 'N/A'}</td>
                  </tr>`;
              }

              metricsContent += `</table></div>`;
          }
      } else if (metrics === null) {
          metricsContent += `<p>No metrics available</p>`;
      }
      metricsElm.innerHTML = metricsContent;
  }

  // Add plots display
  const plotsElm = document.getElementById("plots");
  if (plotsElm) {
      if (plots && plots.length > 0) {
          let plotsContent = '';
          plots.forEach(plotPath => {
              plotsContent += `
                  <div class="plot-item">
                      <img src="${plotPath}" alt="Experiment Plot" onerror="console.error('Failed to load plot:', this.src)"/>
                  </div>`;
          });
          plotsElm.innerHTML = plotsContent;
      } else {
          plotsElm.innerHTML = '';
      }
  }

  // Add error info display
  const errorElm = document.getElementById("exc_info");
  if (errorElm) {
    if (exc_type) {
      let errorContent = `<h3 style="color: #ff5555">Exception Information:</h3>
                          <p><strong>Type:</strong> ${exc_type}</p>`;

      if (exc_info) {
        errorContent += `<p><strong>Details:</strong> <pre>${JSON.stringify(exc_info, null, 2)}</pre></p>`;
      }

      if (exc_stack) {
        errorContent += `<p><strong>Stack Trace:</strong> <pre>${exc_stack.join('\n')}</pre></p>`;
      }

      errorElm.innerHTML = errorContent;
    } else {
      errorElm.innerHTML = "No exception info available";
    }
  }

  const exec_timeElm = document.getElementById("exec_time");
  if (exec_timeElm) {
    let exec_timeContent = '<div id="exec_time"><h3>Execution Time (in seconds):</h3><p>' + exec_time + '</p></div>';
    exec_timeElm.innerHTML = exec_timeContent;
  }

  const exec_time_feedbackElm = document.getElementById("exec_time_feedback");
  if (exec_time_feedbackElm) {
    let exec_time_feedbackContent = '<div id="exec_time_feedback_content">'
    exec_time_feedbackContent += '<h3>Execution Time Feedback:</h3>'
    exec_time_feedbackContent += '<p>' + exec_time_feedback + '</p>'
    exec_time_feedbackContent += '</div>';
    exec_time_feedbackElm.innerHTML = exec_time_feedbackContent;
  }

  const vlm_feedbackElm = document.getElementById("vlm_feedback");
  if (vlm_feedbackElm) {
      let vlm_feedbackContent = '';

      if (plot_analyses && plot_analyses.length > 0) {
          vlm_feedbackContent += `<h3>Plot Analysis:</h3>`;
          plot_analyses.forEach(analysis => {
              if (analysis && analysis.plot_path) {  // Add null check
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <h4>Analysis for ${analysis.plot_path.split('/').pop()}</h4>
                          <p>${analysis.analysis || 'No analysis available'}</p>
                          <ul class="key-findings">
                              ${(analysis.key_findings || []).map(finding => `<li>${finding}</li>`).join('')}
                          </ul>
                      </div>`;
              } else {
                  console.warn('Received invalid plot analysis:', analysis);
                  vlm_feedbackContent += `
                      <div class="plot-analysis">
                          <p>Invalid plot analysis data received</p>
                      </div>`;
              }
          });
      }

      // Add actionable insights if available
      if (vlm_feedback_summary && typeof vlm_feedback_summary === 'string') {
          vlm_feedbackContent += `
              <div class="vlm_feedback">
                  <h3>VLM Feedback Summary:</h3>
                  <p>${vlm_feedback_summary}</p>
              </div>`;
      }

      console.log("Datasets successfully tested:", datasets_successfully_tested);
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          vlm_feedbackContent += `
              <div id="datasets_successfully_tested">
                  <h3>Datasets Successfully Tested:</h3>
                  <p>${datasets_successfully_tested.join(', ')}</p>
              </div>`;
      }

      if (!vlm_feedbackContent) {
          vlm_feedbackContent = '<p>No insights available for this experiment.</p>';
      }

      vlm_feedbackElm.innerHTML = vlm_feedbackContent;
  }

  const datasets_successfully_testedElm = document.getElementById("datasets_successfully_tested");
  if (datasets_successfully_testedElm) {
      let datasets_successfully_testedContent = '';
      if (datasets_successfully_tested && datasets_successfully_tested.length > 0) {
          datasets_successfully_testedContent = `<h3>Datasets Successfully Tested:</h3><ul>`;
          datasets_successfully_tested.forEach(dataset => {
              datasets_successfully_testedContent += `<li>${dataset}</li>`;
          });
          datasets_successfully_testedContent += `</ul>`;
      } else {
          datasets_successfully_testedContent = '<p>No datasets tested yet</p>';
      }
      datasets_successfully_testedElm.innerHTML = datasets_successfully_testedContent;
  }

 \"val\": [], \"stream\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": [],\n        \"ground_truth\": [],\n        \"segment_ids\": [],\n        \"entropies\": {\"no_adapt\": [], \"always_on\": [], \"gated\": []},\n        \"segment_accs\": {\"no_adapt\": [], \"always_on\": [], \"gated\": []},\n        \"timestamps\": [],\n    },\n}\n\n\nclass NumpyDataset(Dataset):\n    def __init__(self, x, y):\n        self.x = torch.tensor(x, dtype=torch.float32)\n        self.y = torch.tensor(y, dtype=torch.long)\n\n    def __len__(self):\n        return len(self.x)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.x[idx], \"y\": self.y[idx]}\n\n\ndef make_gaussian_data(n, means, cov_scale=0.8, shift=None):\n    xs, ys = [], []\n    for c, m in enumerate(means):\n        mean = np.array(m, dtype=np.float32)\n        if shift is not None:\n            mean = shift(mean, c)\n        cov = np.eye(len(mean)) * cov_scale\n        pts = np.random.multivariate_normal(mean, cov, size=n)\n        xs.append(pts)\n        ys.append(np.full(n, c))\n    x = np.concatenate(xs, axis=0).astype(np.float32)\n    y = np.concatenate(ys, axis=0).astype(np.int64)\n    idx = np.random.permutation(len(x))\n    return x[idx], y[idx]\n\n\nbase_means = [(-2, -2), (2, -2), (0, 2.5)]\nnum_classes, input_dim = 3, 2\n\ntrain_x, train_y = make_gaussian_data(500, base_means, cov_scale=0.7)\nval_x, val_y = make_gaussian_data(150, base_means, cov_scale=0.7)\n\n# normalize inputs based on train stats\nmu = train_x.mean(axis=0, keepdims=True)\nsigma = train_x.std(axis=0, keepdims=True) + 1e-6\ntrain_x = (train_x - mu) / sigma\nval_x = (val_x - mu) / sigma\n\ntrain_loader = DataLoader(NumpyDataset(train_x, train_y), batch_size=64, shuffle=True)\nval_loader = DataLoader(NumpyDataset(val_x, val_y), batch_size=128, shuffle=False)\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.base = nn.Linear(in_features, out_features)\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(in_features, rank))\n        self.B = nn.Parameter(torch.zeros(rank, out_features))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        return self.base(x) + (x @ self.A @ self.B) * (self.alpha / self.rank)\n\n\nclass SmallNet(nn.Module):\n    def __init__(self, in_dim=2, hidden=32, out_dim=3, rank=4):\n        super().__init__()\n        self.feat = nn.Sequential(\n            nn.Linear(in_dim, hidden),\n            nn.ReLU(),\n            nn.Linear(hidden, hidden),\n            nn.ReLU(),\n        )\n        self.head = LoRALinear(hidden, out_dim, rank=rank, alpha=1.0)\n\n    def forward(self, x):\n        h = self.feat(x)\n        return self.head(h)\n\n\nmodel = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\n\ndef evaluate(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            total_loss += loss.item() * x.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n    return total_loss / total, total_correct / total\n\n\nepochs = 20\nfor epoch in range(1, epochs + 1):\n    model.train()\n    running_loss, running_correct, total = 0.0, 0, 0\n    for batch in train_loader:\n        batch = {\n            k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n        }\n        x, y = batch[\"x\"], batch[\"y\"]\n        optimizer.zero_grad()\n        logits = mode  m = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    m.load_state_dict(copy.deepcopy(base_state))\n    freeze_except_lora(m)\n    opt = torch.optim.SGD([m.head.A, m.head.B], lr=lr)\n    all_preds, all_gt, all_seg, all_ent = [], [], [], []\n    seg_accs = []\n    for x_np, y_np, sid in stream_segments:\n        ds = NumpyDataset(x_np, y_np)\n        loader = DataLoader(ds, batch_size=64, shuffle=False)\n        seg_correct, seg_total = 0, 0\n        for batch in loader:\n            batch = {\n                k: v.to(device) for k, v in batch.items() if isinstance(v, torch.Tensor)\n            }\n            x, y = batch[\"x\"], batch[\"y\"]\n            m.eval()\n            with torch.no_grad():\n                logits = m(x)\n                ent = entropy_from_logits(logits).item()\n                preds = logits.argmax(dim=1)\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent > entropy_threshold\n            )\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent = entropy_from_logits(logits).item()\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent.extend([ent] * x.size(0))\n        seg_accs.append(seg_correct / seg_total)\n    shift_robust_acc = float(np.mean(seg_accs))\n    return {\n      preds = logits.argmax(dim=1)\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent > entropy_threshold\n            )\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent = entropy_from_logits(logits).item()\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent.extend([ent] * x.size(0))\n        seg_accs.append(seg_correct / seg_total)\n    return {\n        \"shift_robust_acc\": float(np.mean(seg_accs)),\n        \"predictions\": np.array(all_preds),\n        \"ground_truth\": np.array(all_gt),\n        \"segment_ids\": np.array(all_seg),\n        \"entropies\": np.array(all_ent),\n        \"segment_accs\": np.array(seg_accs),\n    }\n\n\ndef train_model(num_epochs):\n    model = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n    train_metrics, val_metrics = [], []\n    train_losses, val_losses = [], []\n    timestamps = []\n    best_val_acc, best_val_loss = -1.0, float(\"inf\")\n\n    for epoch in range(1, num_epochs + 1):\n        model.train()\n        running_loss, running_correct, total = 0.0, 0, 0\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            loss.backward()\n            optimizer.step()\n            running_loss += loss.item() * x.size(0)\n            running_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n\n        train_loss = running_loss / total\n        train_acc = running_correct / total\n        val_loss, val_acc = evaluate(model, val_loader)\n        best_val_acc = max(best_val_acc, val_acc)\n        best_val_loss = min(best_val_loss, val_loss)\n\n        print(\n            f\"[epochs={num_epochs}] epoch {epoch:02d}/{num_epochs} \"\n            f\"train_loss={train_loss:.4f} train_acc={train_acc:.4f} \"\n            f\"val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n        train_metrics.append((epoch, train_acc))\n        val_metrics.append((epoch, val_acc))\n        train_losses.append((epoch, train_loss))\n        val_losses.append((epoch, val_loss))\n        timestamps.append(time.time())\n\n    return {\n        \"state_dict\": copy.deepcopy(model.state_dict()),\n        \"train_metrics\": train_metrics,\n        \"val_metrics\": val_metrics,\n        \"train_losses\": train_losses,\n        \"val_losses\": val_losses,\n        \"timestamps\": timestamps,\n        \"best_val_acc\": best_val_acc,\n        \"best_val_loss\": best_val_loss,\n        \"final_val_acc\": val_metrics[-1][1],\n        \"final_val_loss\": val_losses[-1][1],\n    }\n\n\nepoch_candidates = [20, 50]\nall_results = {}\n\nfor ep in epoch_candidates:\n    trained = train_model(ep)\n    base_state = trained[\"state_dict\"]\n\n    results_none = run_stream(base_state, \"none\")\n    results_always = run_stream(base_state, \"always\", adapt_steps=1, lr=5e-2)\n    results_gated = run_stream(\n        base_state, \"gated\", entropy_threshold=0.75, adapt_steps=1, lr=5e-2\n    )\n\n    print(\n        f\"[epochs={ep}] No adaptation Shift-Robust Accuracy: {results_none['shif .legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"best_epoch_entropy_stream.png\"))\nplt.close()\n\nprint(\"\\nSummary:\")\nfor ep in epoch_candidates:\n    key = f\"epochs_{ep}\"\n    s = experiment_data[\"hyperparam_tuning_epochs\"][\"synthetic_shift_stream\"][\n        \"summary\"\n    ][key]\n    m = experiment_data[\"hyperparam_tuning_epochs\"][\"synthetic_shift_stream\"][\n        \"metrics\"\n    ][\"stream\"][key]\n    print(\n        f\"{key}: best_val_acc={s['best_val_acc']:.4f}, best_val_loss={s['best_val_loss']:.4f}, \"\n        f\"stream_no={m['no_adapt']:.4f}, stream_always={m['always_on']:.4f}, stream_gated={m['gated']:.4f}\"\n    )\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"learning_rate\": {\n        \"synthetic_shift_stream\": {\n            \"lr_candidates\": [],\n            \"per_lr\": {},\n            \"summary\": {\n                \"best_lr_by_val\": None,\n                \"best_val_acc\": None,\n                \"best_lr_by_stream_no_adapt\": None,\n                \"best_stream_no_adapt\": None,\n                \"best_lr_by_stream_gated\": None,\n                \"best_stream_gated\": None,\n            },\n        }\n    }\n}\n\n\nclass NumpyDataset(Dataset):\n    def __init__(self, x, y):\n        self.x = torch.tensor(x, dtype=torch.float32)\n        self.y = torch.tensor(y, dtype=torch.long)\n\n    def __len__(self):\n        return len(self.x)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.x[idx], \"y\": self.y[idx]}\n\n\ndef make_gaussian_data(n, means, cov_scale=0.8, shift=None):\n    xs, ys = [], []\n    for c, m in enumerate(means):\n        mean = np.array(m, dtype=np.float32)\n        if shift is not None:\n            mean = shift(mean, c)\n        cov = np.eye(len(mean), dtype=np.float32) * cov_scale\n        pts = np.random.multivariate_normal(mean, cov, size=n)\n        xs.append(pts)\n        ys.append(np.full(n, c))\n    x = np.concatenate(xs, axis=0).astype(np.float32)\n    y = np.concatenate(ys, axis=0).astype(np.int64)\n    idx = np.random.permutation(len(x))\n    return x[idx], y[idx]\n\n\nbase_means = [(-2, -2), (2, -2), (0, 2.5)]\nnum_classes, input_dim = 3, 2\n\ntrain_x, train_y = make_gaussian_data(500, base_means, cov_scale=0.7)\nval_x, val_y = make_gaussian_data(150, base_means, cov_scale=0.7)\n\nmu = train_x.mean(axis=0, keepdims=True)\nsigma = train_x.std(axis=0, keepdims=True) + 1e-6\ntrain_x = (train_x - mu) / sigma\nval_x = (val_x - mu) / sigma\n\ntrain_loader = DataLoader(NumpyDataset(train_x, train_y), batch_size=64, shuffle=True)\nval_loader = DataLoader(NumpyDataset(val_x, val_y), batch_size=128, shuffle=False)\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.base = nn.Linear(in_features, out_features)\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(in_features, rank))\n        self.B = nn.Parameter(torch.zeros(rank, out_features))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        return self.base(x) + (x @ self.A @ self.B) * (self.alpha / self.rank)\n\n\nclass SmallNet(nn.Module):\n    def __init__(self, in_dim=2, hidden=32, out_dim=3, rank=4):\n        super().__init__()\n        self.feat = nn.Sequential(\n            nn.Linear(in_dim, hidden),\n            nn.ReLU(),\n            nn.Linear(hidden, hidden),\n            nn.ReLU(),\n        )\n        self.head = LoRALinear(hidden, out_dim, rank=rank, alpha=1.0)\n\n    def forward(self, x):\n        return self.head(self.feat(x))\n\n\ndef evaluate(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            total_loss += loss.item() * x.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n    return total_loss / total, total_correct / total\n\n\ndef freeze_except_lora(m):\n    for p in m.parameters():\n        p.requires_grad = False\n    m.head.A.requires_grad = True\n    m.head.B.requires_grad = True\n\n\ndef entropy_from_logits(logits):\n    p = torch.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef build_stream():\n    segs = []\n    shifts = [\n        lambda mean, c: mean,\n        lambda mean, c: mean + np.array([1.0, -0.5], dtype=np.float32),\n        lambda mean, c: mean * np.array([0.6, 1.3], dtype=np.float32),\n        lambda mean, c: np.array([mean[1], mean[0]], dtype=np.float32) * 0.9,\n    ]\n    for sid, sh in enumerate(shifts):\n        x, y = make_gaussian_data(\n            90, base_means, cov_scale=0.95 if sid > 0 else 0.7, shift=sh\n        )\n        x = (x - mu) / sigma\n        segs.append((x, y, sid))\n    return segs\n\n\nstream_segments = build_stream()\n\n\ndef run_stream(\n    base_state, adapt_mode=\"none\", entropy_threshold=0.75, adapt_steps=1, lr=5e-2\n):\n    m = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    m.load_state_dict(copy.deepcopy(base_state))\n    freeze_except_lora(m)\n    opt = torch.optim.SGD([m.head.A, m.head.B], lr=lr)\n    all_preds, all_gt, all_seg, all_ent = [], [], [], []\n    seg_accs = []\n    for x_np, y_np, sid in stream_segments:\n        ds = NumpyDataset(x_np, y_np)\n        loader = DataLoader(ds, batch_size=64, shuffle=False)\n        seg_correct, seg_total = 0, 0\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            m.eval()\n            with torch.no_grad():\n                logits = m(x)\n                ent = entropy_from_logits(logits).item()\n                preds = logits.argmax(dim=1)\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent > entropy_threshold\n            )\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent = entropy_from_logits(logits).item()\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent.extend([ent] * x.size(0))\n        seg_accs.append(seg_correct / seg_total)\n    return {\n        \"shift_robust_acc\": float(np.mean(seg_accs)),\n        \"predictions\": np.array(all_preds),\n        \"ground_truth\": np.array(all_gt),\n        \"segment_ids\": np.array(all_seg),\n        \"entropies\": np.array(all_ent),\n        \"segment_accs\": np.array(seg_accs),\n    }\n\n\ndef train_and_evaluate_base_lr(base_lr, epochs=20):\n    torch.manual_seed(42)\n    np.random.seed(42)\n\n    model = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=base_lr)\n\n    train_metrics, val_metrics = [], []\n    train_losses, val_losses = [], []\n    timestamps = []\n    best_state, best_val_acc = None, -1.0\n    best_val_loss = None\n    best_epoch = -1\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        running_loss, running_correct, total = 0.0, 0, 0\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            loss.backward()\n            optimizer.step()\n            running_loss += loss.item() * x.size(0)\n            running_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n\n        train_loss = running_loss / total\n        train_acc = running_correct / total\n        val_loss, val_acc = evaluate(model, val_loader)\n\n        train_metrics.append((epoch, train_acc))\n        val_metrics.append((epoch, val_acc))\n        train_losses.append((epoch, train_loss))\n        val_losses.append((epoch, val_loss))\n        timestamps.append(time.time())\n\n        if val_acc > best_val_acc:\n            best_val_acc = val_acc\n            best_val_loss = val_loss\n            best_epoch = epoch\n            best_state = copy.deepcopy(model.state_dict())\n\n        print(\n            f\"LR {base_lr:.1e} | Epoch {epoch:02d}/{epochs} | \"\n            f\"train_loss={train_loss:.4f} train_acc={train_acc:.4f} | \"\n            f\"val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n\n    results_none = run_stream(best_state, \"none\")\n    results_always = run_stream(best_state, \"always\", adapt_steps=1, lr=5e-2)\n    results_gated = run_stream(\n        best_state, \"gated\", entropy_threshold=0.75, adapt_steps=1, lr=5e-2\n    )\n\n    return {\n        \"metrics\": {\n            \"train\": train_metrics,\n            \"val\": val_metrics,\n            \"stream\": [\n                {\n                    \"no_adapt\": results_none[\"shift_robust_acc\"],\n                    \"always_on\": results_always[\"shift_robust_acc\"],\n                    \"gated\": results_gated[\"shift_robust_acc\"],\n                }\n            ],\n        },\n        \"losses\": {\"train\": train_losses, \"val\": val_losses},\n        \"predictions\": {\n            \"no_adapt\": results_none[\"predictions\"],\n            \"always_on\": results_always[\"predictions\"],\n            \"gated\": results_gated[\"predictions\"],\n        },\n        \"ground_truth\": results_none[\"ground_truth\"],\n        \"segment_ids\": results_none[\"segment_ids\"],\n        \"entropies\": {\n            \"no_adapt\": results_none[\"entropies\"],\n            \"always_on\": results_always[\"entropies\"],\n            \"gated\": results_gated[\"entropies\"],\n        },\n        \"segment_accs\": {\n            \"no_adapt\": results_none[\"segment_accs\"],\n            \"always_on\": results_always[\"segment_accs\"],\n            \"gated\": results_gated[\"segment_accs\"],\n        },\n        \"timestamps\": timestamps,\n        \"best_epoch\": best_epoch,\n        \"best_val_acc\": best_val_acc,\n        \"best_val_loss\": best_val_loss,\n        \"base_lr\": base_lr,\n    }\n\n\nlr_candidates = [1e-3, 3e-4, 1e-4, 3e-3]\nepochs = 20\ndataset_store = experiment_data[\"learning_rate\"][\"synthetic_shift_stream\"]\ndataset_store[\"lr_candidates\"] = np.array(lr_candidates, dtype=np.float32)\n\nfor lr in lr_candidates:\n    key = f\"lr_{lr:.0e}\" if lr in [1e-3, 1e-4] else f\"lr_{lr}\"\n    key = key.replace(\".\", \"p\").replace(\"-\", \"m\")\n    result = train_and_evaluate_base_lr(lr, epochs=epochs)\n    dataset_store[\"per_lr\"][key] = result\n    print(\n        f\"Completed base LR={lr:.1e} | best_val_acc={result['best_val_acc']:.4f} | \"\n        f\"stream(no_adapt)={result['metrics']['stream'][0]['no_adapt']:.4f} | \"\n        f\"stream(gated)={result['metrics']['stream'][0]['gated']:.4f}\"\n    )\n\nval_scores = []\nstream_no_adapt_scores = []\nstream_gated_scores = []\nstream_always_scores = []\nkeys = list(dataset_store[\"per_lr\"].keys())\n\nfor key in keys:\n    entry = dataset_store[\"per_lr\"][key]\n    val_scores.append(entry[\"best_val_acc\"])\n    stream_no_adapt_scores.append(entry[\"metrics\"][\"stream\"][0][\"no_adapt\"])\n    stream_always_scores.append(entry[\"metrics\"][\"stream\"][0][\"always_on\"])\n    stream_gated_scores.append(entry[\"metrics\"][\"stream\"][0][\"gated\"])\n\nbest_val_idx = int(np.argmax(val_scores))\nbest_no_adapt_idx = int(np.argmax(stream_no_adapt_scores))\nbest_gated_idx = int(np.argmax(stream_gated_scores))\n\ndataset_store[\"summary\"][\"best_lr_by_val\"] = dataset_store[\"per_lr\"][\n    keys[best_val_idx]\n][\"base_lr\"]\ndataset_store[\"summary\"][\"best_val_acc\"] = float(val_scores[best_val_idx])\ndataset_store[\"summary\"][\"best_lr_by_stream_no_adapt\"] = dataset_store[\"per_lr\"][\n    keys[best_no_adapt_idx]\n][\"base_lr\"]\ndataset_store[\"summary\"][\"best_stream_no_adapt\"] = float(\n    stream_no_adapt_scores[best_no_adapt_idx]\n)\ndataset_store[\"summary\"][\"best_lr_by_stream_gated\"] = dataset_store[\"per_lr\"][\n    keys[best_gated_idx]\n][\"base_lr\"]\ndataset_store[\"summary\"][\"best_stream_gated\"] = float(\n    stream_gated_scores[best_gated_idx]\n)\n\nprint(\"\\nLearning-rate tuning summary\")\nfor key in keys:\n    e = dataset_store[\"per_lr\"][key]\n    print(\n        f\"LR={e['base_lr']:.1e} | best_epoch={e['best_epoch']} | \"\n        f\"best_val_acc={e['best_val_acc']:.4f} | \"\n        f\"stream_none={e['metrics']['stream'][0]['no_adapt']:.4f} | \"\n        f\"stream_always={e['metrics']['stream'][0]['always_on']:.4f} | \"\n        f\"stream_gated={e['metrics']['stream'][0]['gated']:.4f}\"\n    )\n\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\nsummary_table =
