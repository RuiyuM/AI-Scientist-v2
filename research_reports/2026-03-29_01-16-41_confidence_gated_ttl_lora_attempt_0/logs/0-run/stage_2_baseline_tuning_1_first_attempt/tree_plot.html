title(\"Stream Robustness by Base Training LR\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"lr_tuning_stream_accuracy.png\"))\nplt.close()\n", "import os\nimport copy\nimport time\nimport random\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nSEED = 42\ntorch.manual_seed(SEED)\nnp.random.seed(SEED)\nrandom.seed(SEED)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed_all(SEED)\n\nexperiment_data = {\n    \"batch_size_tuning\": {\n        \"synthetic_shift_stream\": {\n            \"config\": {\n                \"batch_sizes\": [32, 64, 128],\n                \"epochs\": 20,\n                \"lr\": 1e-3,\n                \"val_batch_size\": 128,\n                \"stream_batch_size\": 64,\n                \"adapt_steps\": 1,\n                \"adapt_lr\": 5e-2,\n                \"entropy_threshold\": 0.75,\n                \"seed\": SEED,\n            },\n            \"runs\": {},\n            \"summary\": {\n                \"batch_sizes\": [],\n                \"best_val_acc\": [],\n                \"final_val_acc\": [],\n                \"shift_robust_acc_no_adapt\": [],\n                \"shift_robust_acc_always_on\": [],\n                \"shift_robust_acc_gated\": [],\n            },\n        }\n    }\n}\n\n\nclass NumpyDataset(Dataset):\n    def __init__(self, x, y):\n        self.x = torch.tensor(x, dtype=torch.float32)\n        self.y = torch.tensor(y, dtype=torch.long)\n\n    def __len__(self):\n        return len(self.x)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.x[idx], \"y\": self.y[idx]}\n\n\ndef make_gaussian_data(n, means, cov_scale=0.8, shift=None):\n    xs, ys = [], []\n    for c, m in enumerate(means):\n        mean = np.array(m, dtype=np.float32)\n        if shift is not None:\n            mean = shift(mean, c)\n        cov = np.eye(len(mean)) * cov_scale\n        pts = np.random.multivariate_normal(mean, cov, size=n)\n        xs.append(pts)\n        ys.append(np.full(n, c))\n    x = np.concatenate(xs, axis=0).astype(np.float32)\n    y = np.concatenate(ys, axis=0).astype(np.int64)\n    idx = np.random.permutation(len(x))\n    return x[idx], y[idx]\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.base = nn.Linear(in_features, out_features)\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(in_features, rank))\n        self.B = nn.Parameter(torch.zeros(rank, out_features))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        return self.base(x) + (x @ self.A @ self.B) * (self.alpha / self.rank)\n\n\nclass SmallNet(nn.Module):\n    def __init__(self, in_dim=2, hidden=32, out_dim=3, rank=4):\n        super().__init__()\n        self.feat = nn.Sequential(\n            nn.Linear(in_dim, hidden),\n            nn.ReLU(),\n            nn.Linear(hidden, hidden),\n            nn.ReLU(),\n        )\n        self.head = LoRALinear(hidden, out_dim, rank=rank, alpha=1.0)\n\n    def forward(self, x):\n        h = self.feat(x)\n        return self.head(h)\n\n\ndef evaluate(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            total_loss += loss.item() * x.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n    return total_loss / total, total_correct / total\n\n\ndef freeze_except_lora(m):\n    for p in m.parameters():\n        p.requires_grad = False\n    m.head.A.requires_grad = True\n    m.head.B.requires_grad = True\n\n\ndef entropy_from_logits(logits):\n    p = torch.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef build_stream(base_means, mu, sigma):\n    segs = []\n    shifts = [\n        lambda mean, c: mean,\n        lambda mean, c: mean + np.array([1.0, -0.5]),\n        lambda mean, c: mean * np.array([0.6, 1.3]),\n        lambda mean, c: np.array([mean[1], mean[0]]) * 0.9,\n    ]\n    for sid, sh in enumerate(shifts):\n        x, y = make_gaussian_data(\n            90, base_means, cov_scale=0.95 if sid > 0 else 0.7, shift=sh\n        )\n        x = (x - mu) / sigma\n        segs.append((x, y, sid))\n    return segs\n\n\ndef run_stream(\n    base_state,\n    stream_segments,\n    input_dim,\n    num_classes,\n    adapt_mode=\"none\",\n    entropy_threshold=0.75,\n    adapt_steps=1,\n    lr=5e-2,\n    stream_batch_size=64,\n):\n    m = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    m.load_state_dict(copy.deepcopy(base_state))\n    freeze_except_lora(m)\n    opt = torch.optim.SGD([m.head.A, m.head.B], lr=lr)\n\n    all_preds, all_gt, all_seg, all_ent = [], [], [], []\n    seg_accs = []\n    for x_np, y_np, sid in stream_segments:\n        ds = NumpyDataset(x_np, y_np)\n        loader = DataLoader(ds, batch_size=stream_batch_size, shuffle=False)\n        seg_correct, seg_total = 0, 0\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n\n            m.eval()\n            with torch.no_grad():\n                logits = m(x)\n                ent = entropy_from_logits(logits).item()\n                preds = logits.argmax(dim=1)\n\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent > entropy_threshold\n            )\n\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent = entropy_from_logits(logits).item()\n\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent.extend([ent] * x.size(0))\n\n        seg_accs.append(seg_correct / seg_total)\n\n    return {\n        \"shift_robust_acc\": float(np.mean(seg_accs)),\n        \"predictions\": np.array(all_preds),\n        \"ground_truth\": np.array(all_gt),\n        \"segment_ids\": np.array(all_seg),\n        \"entropies\": np.array(all_ent),\n        \"segment_accs\": np.array(seg_accs),\n    }\n\n\n# data\nbase_means = [(-2, -2), (2, -2), (0, 2.5)]\nnum_classes, input_dim = 3, 2\ntrain_x, train_y = make_gaussian_data(500, base_means, cov_scale=0.7)\nval_x, val_y = make_gaussian_data(150, base_means, cov_scale=0.7)\n\nmu = train_x.mean(axis=0, keepdims=True)\nsigma = train_x.std(axis=0, keepdims=True) + 1e-6\ntrain_x = (train_x - mu) / sigma\nval_x = (val_x - mu) / sigma\n\nval_loader = DataLoader(\n    NumpyDataset(train_x[:0], train_y[:0]), batch_size=128, shuffle=False\n)  # placeholder\nval_loader = DataLoader(NumpyDataset(val_x, val_y), batch_size=128, shuffle=False)\nstream_segments = build_stream(base_means, mu, sigma)\n\nbatch_sizes = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"config\"][\n    \"batch_sizes\"\n]\nepochs = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"config\"][\n    \"epochs\"\n]\ntrain_lr = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"config\"][\n    \"lr\"\n]\nstream_batch_size = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\n    \"config\"\n][\"stream_batch_size\"]\nadapt_steps = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"config\"][\n    \"adapt_steps\"\n]\nadapt_lr = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"config\"][\n    \"adapt_lr\"\n]\nentropy_threshold = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\n    \"config\"\n][\"entropy_threshold\"]\n\nfor bs in batch_sizes:\n    print(f\"\\n=== Training with batch size {bs} ===\")\n    train_loader = DataLoader(\n        NumpyDataset(train_x, train_y), batch_size=bs, shuffle=True\n    )\n\n    model = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=train_lr)\n\n    run_data = {\n        \"metrics\": {\"train\": [], \"val\": [], \"stream\": []},\n        \"losses\": {\"train\": [], \"val\": []},\n        \"predictions\": {},\n        \"ground_truth\": None,\n        \"segment_ids\": None,\n        \"entropies\": {\"no_adapt\": [], \"always_on\": [], \"gated\": []},\n        \"segment_accs\": {\"no_adapt\": [], \"always_on\": [], \"gated\": []},\n        \"timestamps\": [],\n        \"config\": {\n            \"train_batch_size\": bs,\n            \"val_batch_size\": 128,\n            \"epochs\": epochs,\n            \"lr\": train_lr,\n            \"adapt_steps\": adapt_steps,\n            \"adapt_lr\": adapt_lr,\n            \"entropy_threshold\": entropy_threshold,\n            \"stream_batch_size\": stream_batch_size,\n        },\n    }\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        running_loss, running_correct, total = 0.0, 0, 0\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            loss.backward()\n            optimizer.step()\n\n            running_loss += loss.item() * x.size(0)\n            running_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n\n        train_loss = running_loss / total\n        train_acc = running_correct / total\n        val_loss, val_acc = evaluate(model, val_loader)\n\n        print(\n            f\"Batch {bs} | Epoch {epoch:02d} | \"\n            f\"train_loss {train_loss:.4f} | train_acc {train_acc:.4f} | \"\n            f\"val_loss {val_loss:.4f} | val_acc {val_acc:.4f}\"\n        )\n\n        run_data[\"metrics\"][\"train\"].append((epoch, train_acc))\n        run_data[\"metrics\"][\"val\"].append((epoch, val_acc))\n        run_data[\"losses\"][\"train\"].append((epoch, train_loss))\n        run_data[\"losses\"][\"val\"].append((epoch, val_loss))\n        run_data[\"timestamps\"].append(time.time())\n\n    base_state = copy.deepcopy(model.state_dict())\n\n    results_none = run_stream(\n        base_state,\n        stream_segments,\n        input_dim,\n        num_classes,\n        adapt_mode=\"none\",\n        entropy_threshold=entropy_threshold,\n        adapt_steps=adapt_steps,\n        lr=adapt_lr,\n        stream_batch_size=stream_batch_size,\n    )\n    results_always = run_stream(\n        base_state,\n        stream_segments,\n        input_dim,\n        num_classes,\n        adapt_mode=\"always\",\n        entropy_threshold=entropy_threshold,\n        adapt_steps=adapt_steps,\n        lr=adapt_lr,\n        stream_batch_size=stream_batch_size,\n    )\n    results_gated = run_stream(\n        base_state,\n        stream_segments,\n        input_dim,\n        num_classes,\n        adapt_mode=\"gated\",\n        entropy_threshold=entropy_threshold,\n        adapt_steps=adapt_steps,\n        lr=adapt_lr,\n        stream_batch_size=stream_batch_size,\n    )\n\n    print(\n        f\"Batch {bs} No adaptation Shift-Robust Accuracy: {results_none['shift_robust_acc']:.4f}\"\n    )\n    print(\n        f\"Batch {bs} Always-on LoRA TTA Shift-Robust Accuracy: {results_always['shift_robust_acc']:.4f}\"\n    )\n    print(\n        f\"Batch {bs} Confidence-gated LoRA TTA Shift-Robust Accuracy: {results_gated['shift_robust_acc']:.4f}\"\n    )\n\n    run_data[\"metrics\"][\"stream\"].append(\n        {\n            \"no_adapt\": results_none[\"shift_robust_acc\"],\n            \"always_on\": results_always[\"shift_robust_acc\"],\n            \"gated\": results_gated[\"shift_robust_acc\"],\n        }\n    )\n    run_data[\"predictions\"] = {\n        \"no_adapt\": results_none[\"predictions\"],\n        \"always_on\": results_always[\"predictions\"],\n        \"gated\": results_gated[\"predictions\"],\n    }\n    run_data[\"ground_truth\"] = results_none[\"ground_truth\"]\n    run_data[\"segment_ids\"] = results_none[\"segment_ids\"]\n    run_data[\"entropies\"][\"no_adapt\"] = results_none[\"entropies\"]\n    run_data[\"entropies\"][\"always_on\"] = results_always[\"entropies\"]\n    run_data[\"entropies\"][\"gated\"] = results_gated[\"entropies\"]\n    run_data[\"segment_accs\"][\"no_adapt\"] = results_none[\"segment_accs\"]\n    run_data[\"segment_accs\"][\"always_on\"] = results_always[\"segment_accs\"]\n    run_data[\"segment_accs\"][\"gated\"] = results_gated[\"segment_accs\"]\n\n    key = f\"batch_size_{bs}\"\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"runs\"][\n        key\n    ] = run_data\n\n    val_accs = [x[1] for x in run_data[\"metrics\"][\"val\"]]\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"batch_sizes\"\n    ].append(bs)\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"best_val_acc\"\n    ].append(float(np.max(val_accs)))\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"final_val_acc\"\n    ].append(float(val_accs[-1]))\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"shift_robust_acc_no_adapt\"\n    ].append(results_none[\"shift_robust_acc\"])\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"shift_robust_acc_always_on\"\n    ].append(results_always[\"shift_robust_acc\"])\n    experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"][\n        \"shift_robust_acc_gated\"\n    ].append(results_gated[\"shift_robust_acc\"])\n\n# save all plottable data to a single required file\nnp.save(\n    os.path.join(working_dir, \"experiment_data.npy\"), experiment_data, allow_pickle=True\n)\n\n# plots\nsummary = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"summary\"]\nbs_arr = np.array(summary[\"batch_sizes\"])\nbest_val_arr = np.array(summary[\"best_val_acc\"])\nfinal_val_arr = np.array(summary[\"final_val_acc\"])\nnone_arr = np.array(summary[\"shift_robust_acc_no_adapt\"])\nalways_arr = np.array(summary[\"shift_robust_acc_always_on\"])\ngated_arr = np.array(summary[\"shift_robust_acc_gated\"])\n\nplt.figure(figsize=(7, 4))\nfor bs in batch_sizes:\n    run = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"runs\"][\n        f\"batch_size_{bs}\"\n    ]\n    epochs_arr = np.array([x[0] for x in run[\"metrics\"][\"val\"]])\n    val_accs = np.array([x[1] for x in run[\"metrics\"][\"val\"]])\n    plt.plot(epochs_arr, val_accs, marker=\"o\", label=f\"bs={bs}\")\nplt.xlabel(\"Epoch\")\nplt.ylabel(\"Validation Accuracy\")\nplt.title(\"Validation Accuracy by Train Batch Size\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"batch_size_val_accuracy.png\"))\nplt.close()\n\nplt.figure(figsize=(7, 4))\nplt.plot(bs_arr, best_val_arr, marker=\"o\", label=\"best_val_acc\")\nplt.plot(bs_arr, final_val_arr, marker=\"s\", label=\"final_val_acc\")\nplt.xlabel(\"Train Batch Size\")\nplt.ylabel(\"Accuracy\")\nplt.title(\"Validation Accuracy Summary\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"batch_size_val_summary.png\"))\nplt.close()\n\nplt.figure(figsize=(7, 4))\nplt.plot(bs_arr, none_arr, marker=\"o\", label=\"no_adapt\")\nplt.plot(bs_arr, always_arr, marker=\"o\", label=\"always_on\")\nplt.plot(bs_arr, gated_arr, marker=\"o\", label=\"gated\")\nplt.xlabel(\"Train Batch Size\")\nplt.ylabel(\"Shift-Robust Accuracy\")\nplt.title(\"Shift Robustness vs Train Batch Size\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"batch_size_shift_robust_summary.png\"))\nplt.close()\n\nbest_idx = int(np.argmax(gated_arr))\nbest_bs = int(bs_arr[best_idx])\nbest_run = experiment_data[\"batch_size_tuning\"][\"synthetic_shift_stream\"][\"runs\"][\n    f\"batch_size_{best_bs}\"\n]\n\nseg_idx = np.arange(len(best_run[\"segment_accs\"][\"no_adapt\"]))\nplt.figure(figsize=(7, 4))\nplt.plot(seg_idx, best_run[\"segment_accs\"][\"no_adapt\"], marker=\"o\", label=\"no_adapt\")\nplt.plot(seg_idx, best_run[\"segment_accs\"][\"always_on\"], marker=\"o\", label=\"always_on\")\nplt.plot(seg_idx, best_run[\"segment_accs\"][\"gated\"], marker=\"o\", label=\"gated\")\nplt.xlabel(\"Stream segment\")\nplt.ylabel(\"Accuracy\")\nplt.title(f\"Segment Accuracy under Shift (best gated bs={best_bs})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"best_batch_size_segment_accuracy.png\"))\nplt.close()\n\nplt.figure(figsize=(8, 4))\nplt.plot(best_run[\"entropies\"][\"no_adapt\"], label=\"no_adapt\", alpha=0.8)\nplt.plot(best_run[\"entropies\"][\"always_on\"], label=\"always_on\", alpha=0.8)\nplt.plot(best_run[\"entropies\"][\"gated\"], label=\"gated\", alpha=0.8)\nplt.xlabel(\"Stream sample index\")\nplt.ylabel(\"Predictive entropy\")\nplt.title(f\"Entropy over Evaluation Stream (best gated bs={best_bs})\")\nplt.legend()\nplt.tight_layout()\nplt.savefig(os.path.join(working_dir, \"best_batch_size_entropy_stream.png\"))\nplt.close()\n\nprint(\"\\n=== Summary ===\")\nfor i, bs in enumerate(bs_arr):\n    print(\n        f\"bs={int(bs)} | best_val={best_val_arr[i]:.4f} | final_val={final_val_arr[i]:.4f} | \"\n        f\"no_adapt={none_arr[i]:.4f} | always_on={always_arr[i]:.4f} | gated={gated_arr[i]:.4f}\"\n    )\nprint(f\"Saved experiment data to: {os.path.join(working_dir, 'experiment_data.npy')}\")\n", "import os\nimport copy\nimport time\nimport random\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\nSEED = 42\ntorch.manual_seed(SEED)\nnp.random.seed(SEED)\nrandom.seed(SEED)\nif torch.cuda.is_available():\n    torch.cuda.manual_seed_all(SEED)\n\nexperiment_data = {\n    \"lora_rank_tuning\": {\n        \"synthetic_shift_stream\": {\n            \"rank_values\": [],\n            \"metrics\": {\n                \"train\": {},\n                \"val\": {},\n                \"stream\": {},\n            },\n            \"losses\": {\n                \"train\": {},\n                \"val\": {},\n            },\n            \"predictions\": {},\n            \"ground_truth\": {},\n            \"segment_ids\": {},\n            \"entropies\": {},\n            \"segment_accs\": {},\n            \"summary\": [],\n            \"timestamps\": {},\n        }\n    }\n}\n\n\nclass NumpyDataset(Dataset):\n    def __init__(self, x, y):\n        self.x = torch.tensor(x, dtype=torch.float32)\n        self.y = torch.tensor(y, dtype=torch.long)\n\n    def __len__(self):\n        return len(self.x)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.x[idx], \"y\": self.y[idx]}\n\n\ndef make_gaussian_data(n, means, cov_scale=0.8, shift=None):\n    xs, ys = [], []\n    for c, m in enumerate(means):\n        mean = np.array(m, dtype=np.float32)\n        if shift is not None:\n            mean = shift(mean, c)\n        cov = np.eye(len(mean), dtype=np.float32) * cov_scale\n        pts = np.random.multivariate_normal(mean, cov, size=n)\n        xs.append(pts)\n        ys.append(np.full(n, c))\n    x = np.concatenate(xs, axis=0).astype(np.float32)\n    y = np.concatenate(ys, axis=0).astype(np.int64)\n    idx = np.random.permutation(len(x))\n    return x[idx], y[idx]\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.base = nn.Linear(in_features, out_features)\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(in_features, rank))\n        self.B = nn.Parameter(torch.zeros(rank, out_features))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        return self.base(x) + (x @ self.A @ self.B) * (self.alpha / max(self.rank, 1))\n\n\nclass SmallNet(nn.Module):\n    def __init__(self, in_dim=2, hidden=32, out_dim=3, rank=4):\n        super().__init__()\n        self.feat = nn.Sequential(\n            nn.Linear(in_dim, hidden),\n            nn.ReLU(),\n            nn.Linear(hidden, hidden),\n            nn.ReLU(),\n        )\n        self.head = LoRALinear(hidden, out_dim, rank=rank, alpha=1.0)\n\n    def forward(self, x):\n        h = self.feat(x)\n        return self.head(h)\n\n\ndef evaluate(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            total_loss += loss.item() * x.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n    return total_loss / total, total_correct / total\n\n\ndef freeze_except_lora(m):\n    for p in m.parameters():\n        p.requires_grad = False\n    m.head.A.requires_grad = True\n    m.head.B.requires_grad = True\n\n\ndef entropy_from_logits(logits):\n    p = torch.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef build_stream(base_means, mu, sigma):\n    segs = []\n    shifts = [\n        lambda mean, c: mean,\n        lambda mean, c: mean + np.array([1.0, -0.5], dtype=np.float32),\n        lambda mean, c: mean * np.array([0.6, 1.3], dtype=np.float32),\n        lambda mean, c: np.array([mean[1], mean[0]], dtype=np.float32) * 0.9,\n    ]\n    for sid, sh in enumerate(shifts):\n        x, y = make_gaussian_data(\n            90, base_means, cov_scale=0.95 if sid > 0 else 0.7, shift=sh\n        )\n        x = (x - mu) / sigma\n        segs.append((x, y, sid))\n    return segs\n\n\ndef run_stream(\n    rank,\n    base_state,\n    stream_segments,\n    input_dim,\n    num_classes,\n    adapt_mode=\"none\",\n    entropy_threshold=0.75,\n    adapt_steps=1,\n    lr=5e-2,\n):\n    m = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=rank).to(device)\n    m.load_state_dict(copy.deepcopy(base_state))\n    freeze_except_lora(m)\n    opt = torch.optim.SGD([m.head.A, m.head.B], lr=lr)\n\n    all_preds, all_gt, all_seg, all_ent = [], [], [], []\n    seg_accs = []\n\n    for x_np, y_np, sid in stream_segments:\n        ds = NumpyDataset(x_np, y_np)\n        loader = DataLoader(ds, batch_size=64, shuffle=False)\n        seg_correct, seg_total = 0, 0\n\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n\n            m.eval()\n            with torch.no_grad():\n                logits = m(x)\n                ent = entropy_from_logits(logits).item()\n                preds = logits.argmax(dim=1)\n\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent > entropy_threshold\n            )\n\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent = entropy_from_logits(logits).item()\n\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent.extend([ent] * x.size(0))\n\n        seg_accs.append(seg_correct / seg_total)\n\n    return {\n        \"shift_robust_acc\": float(np.mean(seg_accs)),\n        \"predictions\": np.array(all_preds),\n        \"ground_truth\": np.array(all_gt),\n        \"segment_ids\": np.array(all_seg),\n        \"entropies\": np.array(all_ent),\n        \"segment_accs\": np.array(seg_accs),\n    }\n\n\ndef train_for_rank(\n    rank, train_loader, val_loader, input_dim, num_classes, epochs=20, lr=1e-3\n):\n    model = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=rank).to(device)\n    optimizer = torch.optim.Adam(model.parameters(), lr=lr)\n\n    train_metrics, val_metrics = [], []\n    train_losses, val_losses = [], []\n    timestamps = []\n\n    for epoch in range(1, epochs + 1):\n        model.train()\n        running_loss, running_correct, total = 0.0, 0, 0\n\n        for batch in train_loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n\n            optimizer.zero_grad()\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            loss.backward()\n            optimizer.step()\n\n            running_loss += loss.item() * x.size(0)\n            running_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n\n        train_loss = running_loss / total\n        train_acc = running_correct / total\n        val_loss, val_acc = evaluate(model, val_loader)\n\n        train_metrics.append((epoch, train_acc))\n        val_metrics.append((epoch, val_acc))\n        train_losses.append((epoch, train_loss))\n        val_losses.append((epoch, val_loss))\n        timestamps.append(time.time())\n\n        print(\n            f\"rank={rank:>2} | epoch={epoch:>2} | \"\n            f\"train_loss={train_loss:.4f} train_acc={train_acc:.4f} | \"\n            f\"val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n        )\n\n    return {\n        \"model\": model,\n        \"base_state\": copy.deepcopy(model.state_dict()),\n        \"train_metrics\": train_metrics,\n        \"val_metrics\": val_metrics,\n        \"train_losses\": train_losses,\n        \"val_losses\": val_losses,\n        \"timestamps\": timestamps,\n        \"best_val_acc\": max(x[1] for x in val_metrics),\n        \"final_val_acc\": val_metrics[-1][1],\n        \"final_val_loss\": val_losses[-1][1],\n    }\n\n\ndef plot_rank_curves(ranks, values_dict, ylabel, title, save_path):\n    plt.figure(figsize=(7, 4))\n    for label, vals in values_dict.items():\n        plt.plot(ranks, vals, marker=\"o\", label=label)\n    plt.xlabel(\"LoRA rank\")\n    plt.ylabel(ylabel)\n    plt.title(title)\n    plt.xticks(ranks)\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(save_path)\n    plt.close()\n\n\ndef plot_per_rank_segment_accs(\n    rank, results_none, results_always, results_gated, save_path\n):\n    seg_idx = np.arange(len(results_none[\"segment_accs\"]))\n    plt.figure(figsize=(6, 4))\n    plt.plot(seg_idx, results_none[\"segment_accs\"], marker=\"o\", label=\"no_adapt\")\n    plt.plot(seg_idx, results_always[\"segment_accs\"], marker=\"o\", label=\"always_on\")\n    plt.plot(seg_idx, results_gated[\"segment_accs\"], marker=\"o\", label=\"gated\")\n    plt.xlabel(\"Stream segment\")\n    plt.ylabel(\"Accuracy\")\n    plt.title(f\"Segment Accuracy under Shift (rank={rank})\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(save_path)\n    plt.close()\n\n\ndef plot_per_rank_entropy(rank, results_none, results_always, results_gated, save_path):\n    plt.figure(figsize=(7, 4))\n    plt.plot(results_none[\"entropies\"], label=\"no_adapt\", alpha=0.8)\n    plt.plot(results_always[\"entropies\"], label=\"always_on\", alpha=0.8)\n    plt.plot(results_gated[\"entropies\"], label=\"gated\", alpha=0.8)\n    plt.xlabel(\"Stream sample index\")\n    plt.ylabel(\"Predictive entropy\")\n    plt.title(f\"Entropy over evaluation stream (rank={rank})\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(save_path)\n    plt.close()\n\n\ndef plot_per_rank_train_val(rank, train_losses, val_losses, save_path):\n    epochs_arr = np.arange(1, len(train_losses) + 1)\n    plt.figure(figsize=(6, 4))\n    plt.plot(epochs_arr, [x[1] for x in train_losses], label=\"train_loss\")\n    plt.plot(epochs_arr, [x[1] for x in val_losses], label=\"val_loss\")\n    plt.xlabel(\"Epoch\")\n    plt.ylabel(\"Loss\")\n    plt.title(f\"Train/Val Loss (rank={rank})\")\n    plt.legend()\n    plt.tight_layout()\n    plt.savefig(save_path)\n    plt.close()\n\n\n# Data setup\nbase_means = [(-2, -2), (2, -2), (0, 2.5)]\nnum_classes, input_dim = 3, 2\n\ntrain_x, train_y = make_gaussian_data(500, base_means, cov_scale=0.7)\nval_x, val_y = make_gaussian_data(150, base_means, cov_scale=0.7)\n\nmu = train_x.mean(axis=0, keepdims=True)\nsigma = train_x.std(axis=0, keepdims=True) + 1e-6\ntrain_x = (train_x - mu) / sigma\nval_x = (val_x - mu) / sigma\n\ntrain_loader = DataLoader(NumpyDataset(train_x, train_y), batch_size=64, shuffle=True)\nval_loader = DataLoader(NumpyDataset(val_x, val_y), batch_size=128, shuffle=False)\nstream_segments = build_stream(base_means, mu, sigma)\n\n# Hyperparameter sweep\nrank_values = [1, 2, 4, 8, 16]\nepochs = 20\n\nstore = experiment_data[\"lora_rank_tuning\"][\"synthetic_shift_stream\"]\nstore[\"rank_values\"] = rank_values\n\nsummary_best_val = []\nsummary_final_val = []\nsummary_stream_none = []\nsummary_stream_always = []\nsummary_stream_gated = []\n\nfor rank in rank_values:\n    train_out = train_for_rank(\n        rank=rank,\n        train_loader=train_loader,\n        val_loader=val_loader,\n        input_dim=input_dim,\n        num_classes=num_classes,\n        epochs=epochs,\n        lr=1e-3,\n    )\n\n    results_none = run_stream(\n        rank=rank,\n        base_state=train_out[\"base_state\"],\n        stream_segments=stream_segments,\n        input_dim=input_dim,\n        num_classes=num_classes,\n        adapt_mode=\"none\",\n    )\n    results_always = run_stream(\n        rank=rank,\n        base_state=train_out[\"base_state\"],\n        stream_segments=stream_segments,\n        input_dim=input_dim,\n        num_classes=num_classes,\n        adapt_mode=\"always\",\n        adapt_steps=1,\n        lr=5e-2,\n    )\n    results_gated = run_stream(\n        rank=rank,\n        base_state=train_out[\"base_state\"],\n        stream_segments=stream_segments,\n        input_dim=input_dim,\n        num_classes=num_classes,\n        adapt_mode=\"gated\",\n        entropy_threshold=0.75,\n        adapt_steps=1,\n        lr=5e-2,\n    )\n\n    rank_key = f\"rank_{rank}\"\n    store[\"metrics\"][\"train\"][rank_key] = np.array(\n        train_out[\"train_metrics\"], dtype=np.float32\n    )\n    store[\"metrics\"][\"val\"][rank_key] = np.array(\n        train_out[\"val_metrics\"], dtype=np.float32\n    )\n    store[\"losses\"][\"train\"][rank_key] = np.array(\n        train_out[\"train_losses\"], dtype=np.float32\n    )\n    store[\"losses\"][\"val\"][rank_key] = np.array(\n        train_out[\"val_losses\"], dtype=np.float32\n    )\n    store[\"metrics\"][\"stream\"][rank_key] = {\n        \"no_adapt\": results_none[\"shift_robust_acc\"],\n        \"always_on\": results_always[\"shift_robust_acc\"],\n        \"gated\": results_gated[\"shift_robust_acc\"],\n    }\n    store[\"predictions\"][rank_key] = {\n        \"no_adapt\": results_none[\"predictions\"],\n        \"always_on\": results_always[\"predictions\"],\n        \"gated\": results_gated[\"predictions\"],\n    }\n    store[\"ground_truth\"][rank_key] = results_none[\"ground_truth\"]\n    store[\"segment_ids\"][rank_key] = results_none[\"segment_ids\"]\n    store[\"entropies\"][rank_key] = {\n        \"no_adapt\": results_none[\"entropies\"],\n        \"always_on\": results_always[\"entropies\"],\n        \"gated\": results_gated[\"entropies\"],\n    }\n    store[\"segment_accs\"][rank_key] = {\n        \"no_adapt\": results_none[\"segment_accs\"],\n        \"always_on\": results_always[\"segment_accs\"],\n        \"gated\": results_gated[\"segment_accs\"],\n    }\n    store[\"timestamps\"][rank_key] = np.array(train_out[\"timestamps\"], dtype=np.float64)\n\n    row = {\n        \"rank\": rank,\n        \"best_val_acc\": train_out[\"best_val_acc\"],\n        \"final_val_acc\": train_out[\"final_val_acc\"],\n        \"final_val_loss\": train_out[\"final_val_loss\"],\n        \"stream_no_adapt\": results_none[\"shift_robust_acc\"],\n        \"stream_always_on\": results_always[\"shift_robust_acc\"],\n        \"stream_gated\": results_gated[\"shift_robust_acc\"],\n    }\n    store[\"summary\"].append(row)\n\n    summary_best_val.append(train_out[\"best_val_acc\"])\n    summary_final_val.append(train_out[\"final_val_acc\"])\n    summary_stream_none.append(results_none[\"shift_robust_acc\"])\n    summary_stream_always.append(results_always[\"shift_robust_acc\"])\n    summary_stream_gated.append(results_gated[\"shift_robust_acc\"])\n\n    print(\n        f\"rank={rank:>2} | best_val_acc={train_out['best_val_acc']:.4f} | \"\n        f\"stream none={results_none['shift_robust_acc']:.4f} \"\n        f\"always={results_always['shift_robust_acc']:.4f} \"\n        f\"gated={results_gated['shift_robust_acc']:.4f}\"\n    )\n\n    plot_per_rank_train_val(\n        rank,\n        train_out[\"train_losses\"],\n        train_out[\"val_losses\"],\n        os.path.join(working_dir, f\"train_val_loss_rank_{rank}.png\"),\n    )\n    plot_per_rank_segment_accs(\n        rank,\n        results_none,\n        results_always,\n        results_gated,\n        os.path.join(working_dir, f\"segment_accuracy_rank_{rank}.png\"),\n    )\n    plot_per_rank_entropy(\n        rank,\n        results_none,\n        results_always,\n        results_gated,\n        os.path.join(working_dir, f\"entropy_stream_rank_{rank}.png\"),\n    )\n\n# Summary arrays\nstore[\"summary\"] = np.array(store[\"summary\"], dtype=object)\nsummary_table = np.array(\n    [\n        [\n            rank_values[i],\n            summary_best_val[i],\n            summary_final_val[i],\n            summary_stream_none[i],\n            summary_stream_always[i],\n            summary_stream_gated[i],\n        ]\n        for i in range(len(rank_values))\n    ],\n    dtype=np.float32,\n)\n\n# Plots across ranks\nplot_rank_curves(\n    rank_values,\n    {\n        \"best_val_acc\": summary_best_val,\n        \"final_val_acc\": summary_final_val,\n    },\n    ylabel=\"Accuracy\",\n    title=\"Validation Accuracy vs LoRA Rank\",\n    save_path=os.path.join(working_dir, \"val_accuracy_vs_rank.png\"),\n)\n\nplot_rank_curves(\n    rank_values,\n    {\n        \"no_adapt\": summary_stream_none,\n        \"always_on\": summary_stream_always,\n        \"gated\": summary_stream_gated,\n    },\n    ylabel=\"Shift-Robust Accuracy\",\n    title=\"Stream Shift-Robust Accuracy vs LoRA Rank\",\n    save_path=os.path.join(working_dir, \"stream_accuracy_vs_rank.png\"),\n)\n\nbest_by_gated_idx = int(np.argmax(summary_stream_gated))\nbest_by_always_idx = int(np.argmax(summary_stream_always))\nbest_by_val_idx = int(np.argmax(summary_best_val))\n\nprint(\n    \"\\nSummary table columns: [rank, best_val_acc, final_val_acc, stream_none, stream_always, stream_gated]\"\n)\nprint(summary_table)\nprint(f\"Best rank by best validation accuracy: {rank_values[best_by_val_idx]}\")\nprint(f\"Best rank by always-on stream accuracy: {rank_values[best_by_always_idx]}\")\nprint(f\"Best rank by gated stream accuracy: {rank_values[best_by_gated_idx]}\")\n\n# Save all plottable data in the required filename only\nnp.save(os.path.join(working_dir, \"experiment_data.npy\"), experiment_data)\n", "import os\nimport copy\nimport time\nimport numpy as np\nimport torch\nimport torch.nn as nn\nimport torch.nn.functional as F\nimport matplotlib.pyplot as plt\nfrom torch.utils.data import Dataset, DataLoader\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ndevice = torch.device(\"cuda\" if torch.cuda.is_available() else \"cpu\")\nprint(f\"Using device: {device}\")\n\ntorch.manual_seed(42)\nnp.random.seed(42)\n\nexperiment_data = {\n    \"entropy_threshold\": {\n        \"synthetic_shift_stream\": {\n            \"metrics\": {\n                \"train\": [],\n                \"val\": [],\n                \"stream\": {\"none\": None, \"always\": None, \"gated_sweep\": []},\n            },\n            \"losses\": {\"train\": [], \"val\": []},\n            \"predictions\": {\"none\": None, \"always\": None, \"gated\": {}},\n            \"ground_truth\": None,\n            \"segment_ids\": None,\n            \"entropies\": {\"none\": None, \"always\": None, \"gated\": {}},\n            \"segment_accs\": {\"none\": None, \"always\": None, \"gated\": {}},\n            \"gating_rates\": {\"gated\": {}},\n            \"tuning_summary\": {\n                \"thresholds\": [],\n                \"shift_robust_accs\": [],\n                \"best_threshold\": None,\n                \"best_shift_robust_acc\": None,\n                \"best_vs_always_delta\": None,\n                \"best_vs_none_delta\": None,\n            },\n            \"timestamps\": [],\n        }\n    }\n}\n\n\nclass NumpyDataset(Dataset):\n    def __init__(self, x, y):\n        self.x = torch.tensor(x, dtype=torch.float32)\n        self.y = torch.tensor(y, dtype=torch.long)\n\n    def __len__(self):\n        return len(self.x)\n\n    def __getitem__(self, idx):\n        return {\"x\": self.x[idx], \"y\": self.y[idx]}\n\n\ndef make_gaussian_data(n, means, cov_scale=0.8, shift=None):\n    xs, ys = [], []\n    for c, m in enumerate(means):\n        mean = np.array(m, dtype=np.float32)\n        if shift is not None:\n            mean = shift(mean, c)\n        cov = np.eye(len(mean), dtype=np.float32) * cov_scale\n        pts = np.random.multivariate_normal(mean, cov, size=n)\n        xs.append(pts)\n        ys.append(np.full(n, c))\n    x = np.concatenate(xs, axis=0).astype(np.float32)\n    y = np.concatenate(ys, axis=0).astype(np.int64)\n    idx = np.random.permutation(len(x))\n    return x[idx], y[idx]\n\n\nbase_means = [(-2, -2), (2, -2), (0, 2.5)]\nnum_classes, input_dim = 3, 2\n\ntrain_x, train_y = make_gaussian_data(500, base_means, cov_scale=0.7)\nval_x, val_y = make_gaussian_data(150, base_means, cov_scale=0.7)\n\nmu = train_x.mean(axis=0, keepdims=True)\nsigma = train_x.std(axis=0, keepdims=True) + 1e-6\ntrain_x = (train_x - mu) / sigma\nval_x = (val_x - mu) / sigma\n\ntrain_loader = DataLoader(NumpyDataset(train_x, train_y), batch_size=64, shuffle=True)\nval_loader = DataLoader(NumpyDataset(val_x, val_y), batch_size=128, shuffle=False)\n\n\nclass LoRALinear(nn.Module):\n    def __init__(self, in_features, out_features, rank=4, alpha=1.0):\n        super().__init__()\n        self.base = nn.Linear(in_features, out_features)\n        self.rank = rank\n        self.alpha = alpha\n        self.A = nn.Parameter(torch.zeros(in_features, rank))\n        self.B = nn.Parameter(torch.zeros(rank, out_features))\n        nn.init.normal_(self.A, std=0.02)\n        nn.init.zeros_(self.B)\n\n    def forward(self, x):\n        return self.base(x) + (x @ self.A @ self.B) * (self.alpha / self.rank)\n\n\nclass SmallNet(nn.Module):\n    def __init__(self, in_dim=2, hidden=32, out_dim=3, rank=4):\n        super().__init__()\n        self.feat = nn.Sequential(\n            nn.Linear(in_dim, hidden),\n            nn.ReLU(),\n            nn.Linear(hidden, hidden),\n            nn.ReLU(),\n        )\n        self.head = LoRALinear(hidden, out_dim, rank=rank, alpha=1.0)\n\n    def forward(self, x):\n        return self.head(self.feat(x))\n\n\ndef evaluate(model, loader):\n    model.eval()\n    total_loss, total_correct, total = 0.0, 0, 0\n    with torch.no_grad():\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n            logits = model(x)\n            loss = F.cross_entropy(logits, y)\n            total_loss += loss.item() * x.size(0)\n            total_correct += (logits.argmax(dim=1) == y).sum().item()\n            total += x.size(0)\n    return total_loss / total, total_correct / total\n\n\ndef freeze_except_lora(m):\n    for p in m.parameters():\n        p.requires_grad = False\n    m.head.A.requires_grad = True\n    m.head.B.requires_grad = True\n\n\ndef entropy_from_logits(logits):\n    p = torch.softmax(logits, dim=-1)\n    return -(p * torch.log(p + 1e-8)).sum(dim=-1).mean()\n\n\ndef build_stream():\n    segs = []\n    shifts = [\n        lambda mean, c: mean,\n        lambda mean, c: mean + np.array([1.0, -0.5], dtype=np.float32),\n        lambda mean, c: mean * np.array([0.6, 1.3], dtype=np.float32),\n        lambda mean, c: np.array([mean[1], mean[0]], dtype=np.float32) * 0.9,\n    ]\n    for sid, sh in enumerate(shifts):\n        x, y = make_gaussian_data(\n            90, base_means, cov_scale=0.95 if sid > 0 else 0.7, shift=sh\n        )\n        x = (x - mu) / sigma\n        segs.append((x, y, sid))\n    return segs\n\n\nstream_segments = build_stream()\n\nmodel = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\noptimizer = torch.optim.Adam(model.parameters(), lr=1e-3)\n\nepochs = 20\nfor epoch in range(1, epochs + 1):\n    model.train()\n    running_loss, running_correct, total = 0.0, 0, 0\n    for batch in train_loader:\n        x = batch[\"x\"].to(device)\n        y = batch[\"y\"].to(device)\n        optimizer.zero_grad()\n        logits = model(x)\n        loss = F.cross_entropy(logits, y)\n        loss.backward()\n        optimizer.step()\n        running_loss += loss.item() * x.size(0)\n        running_correct += (logits.argmax(dim=1) == y).sum().item()\n        total += x.size(0)\n    train_loss = running_loss / total\n    train_acc = running_correct / total\n    val_loss, val_acc = evaluate(model, val_loader)\n    print(\n        f\"Epoch {epoch}: train_acc={train_acc:.4f} val_loss={val_loss:.4f} val_acc={val_acc:.4f}\"\n    )\n    d = experiment_data[\"entropy_threshold\"][\"synthetic_shift_stream\"]\n    d[\"metrics\"][\"train\"].append((epoch, train_acc))\n    d[\"metrics\"][\"val\"].append((epoch, val_acc))\n    d[\"losses\"][\"train\"].append((epoch, train_loss))\n    d[\"losses\"][\"val\"].append((epoch, val_loss))\n    d[\"timestamps\"].append(time.time())\n\nbase_state = copy.deepcopy(model.state_dict())\n\n\ndef run_stream(adapt_mode=\"none\", entropy_threshold=0.75, adapt_steps=1, lr=5e-2):\n    m = SmallNet(in_dim=input_dim, out_dim=num_classes, rank=4).to(device)\n    m.load_state_dict(copy.deepcopy(base_state))\n    freeze_except_lora(m)\n    opt = torch.optim.SGD([m.head.A, m.head.B], lr=lr)\n\n    all_preds, all_gt, all_seg = [], [], []\n    all_ent_before, all_ent_after = [], []\n    batch_trigger_flags = []\n    seg_accs, seg_trigger_rates = [], []\n\n    for x_np, y_np, sid in stream_segments:\n        ds = NumpyDataset(x_np, y_np)\n        loader = DataLoader(ds, batch_size=64, shuffle=False)\n        seg_correct, seg_total = 0, 0\n        seg_batch_triggers = []\n        for batch in loader:\n            x = batch[\"x\"].to(device)\n            y = batch[\"y\"].to(device)\n\n            m.eval()\n            with torch.no_grad():\n                logits = m(x)\n                ent_before = entropy_from_logits(logits).item()\n                preds = logits.argmax(dim=1)\n\n            do_adapt = (adapt_mode == \"always\") or (\n                adapt_mode == \"gated\" and ent_before > entropy_threshold\n            )\n\n            ent_after = ent_before\n            if adapt_mode != \"none\" and do_adapt:\n                m.train()\n                for _ in range(adapt_steps):\n                    opt.zero_grad()\n                    logits_adapt = m(x)\n                    loss_adapt = entropy_from_logits(logits_adapt)\n                    loss_adapt.backward()\n                    opt.step()\n                m.eval()\n                with torch.no_grad():\n                    logits = m(x)\n                    preds = logits.argmax(dim=1)\n                    ent_after = entropy_from_logits(logits).item()\n\n            seg_correct += (preds == y).sum().item()\n            seg_total += x.size(0)\n\n            all_preds.extend(preds.detach().cpu().numpy().tolist())\n            all_gt.extend(y.detach().cpu().numpy().tolist())\n            all_seg.extend([sid] * x.size(0))\n            all_ent_before.extend([ent_before] * x.size(0))\n            all_ent_after.extend([ent_after] * x.size(0))\n            batch_trigger_flags.append(int(do_adapt))\n            seg_batch_triggers.append(int(do_adapt))\n\n        seg_accs.append(seg_correct / seg_total)\n        seg_trigger_rates.append(\n            float(np.mean(seg_batch_triggers)) if len(seg_batch_triggers) else 0.0\n        )\n\n    return {\n        \"shift_robust_acc 0', '\\n', 'Epoch 11: train_acc=0.9920 val_loss=0.0470\nval_acc=0.9822', '\\n', 'Epoch 12: train_acc=0.9920 val_loss=0.0460\nval_acc=0.9800', '\\n', 'Epoch 13: train_acc=0.9927 val_loss=0.0438\nval_acc=0.9844', '\\n', 'Epoch 14: train_acc=0.9920 val_loss=0.0439\nval_acc=0.9800', '\\n', 'Epoch 15: train_acc=0.9920 val_loss=0.0426\nval_acc=0.9822', '\\n', 'Epoch 16: train_acc=0.9920 val_loss=0.0427\nval_acc=0.9800', '\\n', 'Epoch 17: train_acc=0.9920 val_loss=0.0421\nval_acc=0.9844', '\\n', 'Epoch 18: train_acc=0.9913 val_loss=0.0424\nval_acc=0.9822', '\\n', 'Epoch 19: train_acc=0.9913 val_loss=0.0424\nval_acc=0.9822', '\\n', 'Epoch 20: train_acc=0.9913 val_loss=0.0419\nval_acc=0.9844', '\\n', 'Gated threshold=0.50 | shift_robust_acc=0.7926 |\ntrigger_rate=0.0000', '\\n', 'Gated threshold=0.65 | shift_robust_acc=0.7926 |\ntrigger_rate=0.0000', '\\n', 'Gated threshold=0.75 | shift_robust_acc=0.7926 |\ntrigger_rate=0.0000', '\\n', 'Gated threshold=0.85 | shift_robust_acc=0.7926 |\ntrigger_rate=0.0000', '\\n', 'Gated threshold=1.00 | shift_robust_acc=0.7926 |\ntrigger_rate=0.0000', '\\n', 'No adaptation Shift-Robust Accuracy: 0.7926', '\\n',\n'Always-on LoRA TTA Shift-Robust Accuracy: 0.7935', '\\n', 'Best gated threshold:\n0.50 | Shift-Robust Accuracy: 0.7926', '\\n', 'Execution time: a second seconds\n(time limit is 2 hours).']"], "analysis": ["", "The script runs successfully, but there are important experimental/design bugs\nrelative to the stated research goal. (1) The implementation does not use any\nHugging Face benchmark datasets or open LLM/VLMs; it only evaluates a tiny\nsynthetic 2D Gaussian classifier, so it fails the sub-stage requirement to add\ntwo new HF datasets and does not test the paper hypothesis in the intended\nsetting. Fix: replace or extend the synthetic setup with actual HF datasets such\nas allenai/ai2_arc, qiaojin/PubMedQA, cais/mmlu, lmms-lab/ScienceQA, and add two\nmore like truthful_qa and winogrande (text) or MMMU/MathVista if multimodal\nresources allow. (2) The confidence-gated adaptation appears ineffective because\nthe entropy threshold is likely too high or poorly calibrated for a 3-class\nproblem; gated results exactly match no-adaptation for both epoch settings,\nsuggesting the gate rarely/never fires. Fix: log adaptation trigger counts per\nbatch/segment, inspect entropy distributions, and tune threshold (e.g., sweep\n0.3\u20131.0) or use per-sample gating / margin-based gating. (3) The adaptation\nobjective minimizes predictive entropy on unlabeled test batches, which can\nreinforce wrong confident predictions and cause collapse; the tiny gains for\nalways-on and none for gated suggest this objective is not helping. Fix: compare\nalternative TTA losses (pseudo-label CE with confidence filtering, consistency\nunder augmentation, marginal entropy with anti-collapse regularization, reset\nbaselines). (4) The reported stream metric is mean of segment accuracies, which\nis fine here because segments are equal-sized, but the code stores per-sample\nentropy as a repeated batch-level mean, making the entropy plot misleading. Fix:\nstore entropy per sample or at least per batch separately. (5) The experiment\nonly tunes number of epochs, despite the sub-stage explicitly asking to change\nhyperparameters such as learning rate, epochs, batch size, etc. Fix: add a real\nhyperparameter sweep over train LR, TTA LR, adapt_steps, batch size, and\nthreshold. So execution did not crash, but the experiment has substantive\nbugs/omissions that make the findings weak and partially invalid for the\nintended study.", "The script completed successfully, but there are important experimental/design\nbugs relative to the stated goal. (1) The required 'TWO more new datasets from\nHuggingFace' were not introduced at all; the run only uses a synthetic Gaussian\nstream, so the sub-stage goal was not met. Fix: add at least two HF benchmark\ndatasets (e.g., cais/mmlu subject subsets and qiaojin/PubMedQA for text, or\nlmms-lab/ScienceQA and HuggingFaceM4/ChartQA for multimodal) and report results\non them. (2) The confidence-gated adaptation appears effectively inactive or\nindistinguishable from always-on in most settings: gated and no-adapt are often\nexactly equal, and gated equals always-on for some LRs. This suggests the\nentropy threshold is poorly calibrated for the trained model/stream or the\nadaptation objective is too weak. Fix: log per-batch entropies and adaptation\ntrigger counts, sweep entropy_threshold, and consider per-sample/per-batch\nmargin- or perplexity-based gating. (3) The adaptation loss minimizes prediction\nentropy on unlabeled test batches, which can reinforce wrong confident\npredictions and may not reflect robust test-time learning. Fix: compare against\nsafer TTA objectives (e.g., entropy minimization with reset/regularization,\npseudo-label filtering, consistency losses) and add drift diagnostics. (4) The\nsummary is based on a single random seed despite reseeding each run identically,\nso LR comparisons may be brittle and not statistically meaningful. Fix: evaluate\nmultiple seeds and aggregate mean/std. (5) Minor logging issue: final line says\n'Execution time: 2 seconds seconds'. Fix the print format string.", "The script runs to completion, but the core experimental result is likely\ninvalid because test-time LoRA adaptation is effectively a no-op. Evidence: for\nevery batch size, shift-robust accuracy is exactly identical across no\nadaptation, always-on, and gated modes. In the code, LoRA parameters are trained\njointly during base training, then reused at test time; however LoRA B is\ninitialized to zeros, and the entropy-minimization adaptation may produce\nnegligible or zero effective updates in this setup. More importantly, the\nadaptation objective uses only batch predictive entropy on the same test batch,\nwhich can collapse confidence without improving accuracy, and the chosen\nthreshold may never differentiate gated from always/none. There is also a\nmethodological bug relative to the stage goals: the experiment does not\nintroduce two new Hugging Face datasets and does not evaluate open LLM/VLM\nbenchmarks at all, instead using a synthetic Gaussian toy dataset. Additional\ncode issues: (1) the placeholder val_loader assignment is dead code, (2) best\nbatch size is selected by gated accuracy even though all gated accuracies tie,\nso selection is arbitrary, and (3) no logging of whether gated adaptation\nactually triggered, making it impossible to verify the confidence gate. Fixes:\nreinitialize/freeze the base model properly and keep LoRA adapters zeroed during\nbase training if adaptation-only behavior is intended, or train base weights\nseparately then attach fresh LoRA for TTA; log parameter delta norms and trigger\ncounts; verify gated condition by printing batch entropies vs threshold;\nconsider a supervised proxy or consistency objective that yields nontrivial\ngradients; and, to satisfy the research stage, replace/add the synthetic setup\nwith at least two Hugging Face datasets such as allenai/ai2_arc and\nqiaojin/PubMedQA for text, plus optionally ScienceQA/ChartQA for multimodal.", "The script runs to completion, but there is a clear experimental bug: test-time\nadaptation has no effect at all. For every rank, stream accuracy is exactly\nidentical across no_adapt, always_on, and gated, which strongly suggests the\nadaptation path is effectively inert. The main cause is that LoRA parameters are\ntrained jointly with the base model during initial supervised training, then\nonly LoRA is updated at test time using entropy minimization. Because the base\nmodel is not frozen during initial training, the learned solution may rely\nmostly on the base weights, leaving LoRA updates too weak to change predictions.\nIn addition, the adaptation objective minimizes batch-mean entropy on the same\nunlabeled batch being evaluated, which can produce tiny gradients or reinforce\nexisting confident predictions without improving accuracy. The gating threshold\nmay also rarely differentiate behavior. Fixes: (1) freeze the base model during\nthe supervised phase if the goal is to study LoRA-only adaptation, or at least\ncompare against a model where LoRA carries meaningful capacity; (2) verify\nadaptation is active by logging parameter delta norms for A/B, number of gated\nupdates triggered, and pre/post-adaptation prediction changes; (3) tune\nadaptation hyperparameters more aggressively (more steps, different LR, smaller\nbatch/window adaptation, reset strategy); (4) consider a stronger uncertainty\nsignal and adaptation loss, e.g. margin/perplexity gating, pseudo-label CE on\nconfident samples, or Tent-style entropy minimization with normalization layers\nif applicable; (5) print per-mode trigger counts and pre/post entropy to confirm\ngated and always-on actually differ. There is also a research-design bug\nrelative to the stated stage goals: the code does not introduce two new Hugging\nFace datasets at all, and the experiment is purely synthetic rather than using\nthe proposed benchmark datasets.", "The script ran to completion, but the main experimental result is effectively\ndegenerate: confidence-gated adaptation never triggered for any tested threshold\n(all trigger_rate=0.0000), so the gated method collapsed to the no-adaptation\nbaseline. This indicates a bug or design flaw in the thresholding setup rather\nthan a meaningful negative result. Most likely causes: (1) entropy is averaged\nover the batch and compared to thresholds that are too high for a 3-class\nproblem after training; predictive entropy is bounded by log(3)\u22481.10 and\nconfident batches can easily stay below 0.5\u20131.0, especially when averaging over\n64 samples; (2) gating is done at batch level using mean entropy, which\nsuppresses localized uncertainty and makes triggering unlikely; (3) thresholds\nwere not calibrated from observed stream entropy statistics before sweeping.\nFixes: log min/mean/max entropies on the stream before adaptation, use per-\nsample entropy or a higher-quantile batch statistic instead of batch mean, sweep\nlower thresholds (e.g. 0.05\u20130.5) or normalize entropy by log(num_classes), and\nverify trigger logic with assertions/tests that at least some thresholds produce\nnonzero and nonone trigger rates. Also, the experiment does not satisfy the\nstated sub-stage goal of introducing two additional Hugging Face datasets; it\nremains a synthetic Gaussian benchmark only."], "exc_type": [null, null, null, null, null, null], "exc_info": [null, null, null, null, null, null], "exc_stack": [null, null, null, null, null, null], "exp_name": "0-run", "metrics": [{"metric_names": [{"metric_name": "train accuracy", "lower_is_better": false, "description": "Classification accuracy on the training set.", "data": [{"dataset_name": "synthetic_shift_stream", "final_value": 0.991333, "best_value": 0.991333}]}, {"metric_name": "validation accuracy", "lower_is_better": false, "description": "Classification accuracy on the validation set.", "data": [{"dataset_name": "synthetic_shift_stream", "final_value": 0.984444, "best_value": 0.988889}]}, {"metric_name": "train loss", "lower_is_better": true, "description": "Training loss.", "data": [{"dataset_name": "synthetic_shift_stream", "final_value": 0.021895, "best_value": 0.021895}]}, {"metric_name": "validation loss", "lower_is_better": true, "description": "Validation loss.", "data": [{"dataset_name": "synthetic_shift_stream", "final_value": 0.041878, "best_value": 0.041878}]}, {"metric_name": "stream shift-robust accuracy without adaptation", "lower_is_better": false, "description": "Final stream shift-robust accuracy measured without adaptation.", "data": [{"dataset_name": "synthetic_shift_stream", "final_value": 0.792593, "best_value": 0.792593}]}, {"metric_name": "stream shift-robust accuracy with always-on adaptation", "lower_is_better": false, "description": "Final stream shift-robust accuracy me py_over_stream.png", "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_samples_per_segment.png", "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_no_adapt_confusion_matrix.png", "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_always_on_confusion_matrix.png", "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_gated_confusion_matrix.png"], [], [], [], [], []], "plot_analyses": [[{"analysis": "Training and validation loss decrease smoothly and rapidly from about 1.0/0.88 to roughly 0.03/0.04, with the curves staying close throughout. This indicates the base model and optimization pipeline are functioning correctly on the synthetic task, with no strong sign of overfitting. Most learning happens in the first 5\u20137 epochs, after which gains are marginal, so later epochs mainly confirm stability rather than add performance.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_train_val_loss.png"}, {"analysis": "Segment-wise accuracy under shift starts near perfect, stays high for the next two segments, and then collapses sharply to around 0.35 in the final segment. All three methods overlap almost exactly. This is the most important result for the adaptation idea: the stream shift is real enough to break performance in the hardest segment, but neither always-on nor gated adaptation provides any visible robustness benefit. At this stage, the adaptation mechanism is either inactive, too weak, triggered too rarely, or operating on signals that do not separate easy from shifted examples.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_segment_accuracy.png"}, {"analysis": "Predictive entropy rises over the stream, with step-like increases later in the evaluation sequence, consistent with growing uncertainty under shift. However, the no_adapt, always_on, and gated curves are visually indistinguishable. That weakens the case that adaptation is changing model confidence or calibration. If gating is based on entropy, this plot suggests either the same predictions are being produced across modes or the updates are too small to affect uncertainty.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_entropy_stream.png"}, {"analysis": "Training and validation accuracy rise quickly to about 0.98\u20130.99 and remain flat with very small oscillations. This again supports that the base supervised setup is implemented correctly and the synthetic dataset is easy in-distribution. The narrow train\u2013validation gap suggests good fit without obvious memorization, but it also means the benchmark may be too simple to reveal nuanced benefits of selective test-time LoRA.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_train_val_accuracy.png"}, {"analysis": "This loss plot is consistent with the earlier convergence figure: rapid optimization in early epochs, then a low stable plateau. The close alignment between train and validation losses is reassuring for functional correctness. For the broader research goal, though, this only validates pretraining/fine-tuning behavior and does not yet say anything positive about online adaptation.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_train_val_loss.png"}, {"analysis": "Overall stream accuracy is approximately the same, around 0.79, for no_adapt, always_on, and gated. This is strong negative evidence for the current experimental setup: selective adaptation is not outperforming the baselines, and always-on adaptation is not hurting either. That pattern often means the adaptation path is effectively a no-op, the update budget is too small, or the evaluation metric is too coarse to capture any transient effects.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_overall_stream_accuracy_bar.png"}, {"analysis": "The segment-wise accuracy plot again shows near-identical trajectories across adaptation modes: very high accuracy in early segments, modest degradation in middle segments, and severe failure in the last segment. Because the final segment is where the hypothesis would predict gated adaptation to help most, the lack of separation is especially informative. The current implementation does not yet support the claim that confidence-gated updates improve robustness under shift.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_segment_wise_accuracy.png"}, {"analysis": "Entropy increases as the stream progresses, indicating the synthetic stream does induce uncertainty changes. But adaptation modes remain overlapped throughout, including in the high-entropy late region where gated updates should be most active. This suggests a key implementation check: verify that gating decisions are actually being triggered and that LoRA parameters are updated and applied during inference rather than only logged.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_entropy_over_stream.png"}, {"analysis": "The confusion matrix for no_adapt is strongly diagonal overall, showing the model is competent on the aggregate dataset, but there are nontrivial off-diagonal confusions between classes 1 and 2 and some between 0 and 1. This aligns with the overall accuracy near 0.79 rather than near-perfect stream robustness. Since the stream results show a late collapse, an aggregate confusion matrix may be hiding where errors concentrate; segment-conditioned confusion matrices would be more diagnostic.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_samples_per_segment.png"}, {"analysis": "The confusion matrix for gated appears visually identical to the no_adapt matrix. That is a critical sign that gated adaptation is not changing the prediction distribution in any meaningful way. Either the gated branch is not updating, the updates are reset before affecting outputs, or the synthetic task does not create enough opportunity for adaptation to alter decisions. A direct comparison of parameter deltas, trigger counts, and per-sample prediction flips would help determine which explanation is correct.", "plot_path": "experiments/2026-03-29_01-16-41_confidence_gated_ttl_lora_attempt_0/logs/0-run/experiment_results/experiment_01b6f23367e64e489e580d3ba2777679_proc_7447/synthetic_shift_stream_no_adapt_confusion_matrix.png"}], [], [], [], [], []], "vlm_feedback_summary": ["The plots show successful basic training convergence on a synthetic shift-stream\ndataset, but almost no observable difference between no adaptation, always-on\nadaptation, and confidence-gated adaptation. Segment-wise accuracy, entropy\ntrajectories, and even confusion matrices are effectively overlapping across\nmodes, suggesting the current implementation likely does not yet realize\nmeaningful test-time adaptation or the synthetic shift is not challenging enough\nto expose differences. The main useful outcome is implementation sanity for base\ntraining, not evidence for the paper hypothesis.", "[]", "[]", "[]", "[]", "[]"], "exec_time": [1.418022632598877, 2.5431618690490723, 2.8417351245880127, 2.5272464752197266, 3.919741153717041, 1.5832669734954834], "exec_time_feedback": ["", "", "", "", "", ""], "datasets_successfully_tested": [["synthetic_shift_stream"], [], [], [], [], []], "plot_code": ["import matplotlib.pyplot as plt\nimport numpy as np\nimport os\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nos.makedirs(working_dir, exist_ok=True)\n\ntry:\n    experiment_data = np.load(\n        os.path.join(working_dir, \"experiment_data.npy\"), allow_pickle=True\n    ).item()\nexcept Exception as e:\n    print(f\"Error loading experiment data: {e}\")\n    experiment_data = {}\n\nds_name = \"synthetic_shift_stream\"\nds = experiment_data.get(ds_name, {})\nmetrics = ds.get(\"metrics\", {})\nlosses = ds.get(\"losses\", {})\npreds = ds.get(\"predictions\", {})\ngt = np.array(ds.get(\"ground_truth\", []))\nsegment_ids = np.array(ds.get(\"segment_ids\", []))\nentropies = ds.get(\"entropies\", {})\nsegment_accs = ds.get(\"segment_accs\", {})\n\nstream_metrics = metrics.get(\"stream\", [])\nif len(stream_metrics) > 0 and isinstance(stream_metrics[0], dict):\n    overall = stream_metrics[0]\n    for k, v in overall.items():\n        print(f\"{k}_shift_robust_acc: {float(v):.4f}\")\nfor k, v in segment_accs.items():\n    arr = np.array(v)\n    if arr.size:\n        print(f\"{k}_mean_segment_acc: {arr.mean():.4f}\")\n\ntry:\n    tr = metrics.get(\"train\", [])\n    va = metrics.get(\"val\", [])\n    if len(tr) and len(va):\n        tr = np.array(tr, dtype=object)\n        va = np.array(va, dtype=object)\n        plt.figure(figsize=(6, 4))\n        plt.plot(tr[:, 0].astype(float), tr[:, 1].astype(float), label=\"Train Accuracy\")\n        plt.plot(\n            va[:, 0].astype(float), va[:, 1].astype(float), label=\"Validation Accuracy\"\n        )\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Accuracy\")\n        plt.title(\"Synthetic Shift Stream Dataset\\nTraining and Validation Accuracy\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_train_val_accuracy.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating train/val accuracy plot: {e}\")\n    plt.close()\n\ntry:\n    tr = losses.get(\"train\", [])\n    va = losses.get(\"val\", [])\n    if len(tr) and len(va):\n        tr = np.array(tr, dtype=object)\n        va = np.array(va, dtype=object)\n        plt.figure(figsize=(6, 4))\n        plt.plot(tr[:, 0].astype(float), tr[:, 1].astype(float), label=\"Train Loss\")\n        plt.plot(\n            va[:, 0].astype(float), va[:, 1].astype(float), label=\"Validation Loss\"\n        )\n        plt.xlabel(\"Epoch\")\n        plt.ylabel(\"Loss\")\n        plt.title(\"Synthetic Shift Stream Dataset\\nTraining and Validation Loss\")\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_train_val_loss.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating train/val loss plot: {e}\")\n    plt.close()\n\ntry:\n    if isinstance(overall, dict) and len(overall):\n        keys = list(overall.keys())\n        vals = [float(overall[k]) for k in keys]\n        plt.figure(figsize=(6, 4))\n        plt.bar(keys, vals)\n        plt.ylim(0, 1)\n        plt.ylabel(\"Shift-Robust Accuracy\")\n        plt.title(\n            \"Synthetic Shift Stream Dataset\\nOverall Stream Accuracy by Adaptation Mode\"\n        )\n        plt.tight_layout()\n        plt.savefig(\n            os.path.join(working_dir, f\"{ds_name}_overall_stream_accuracy_bar.png\")\n        )\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating overall stream accuracy plot: {e}\")\n    plt.close()\n\ntry:\n    if isinstance(segment_accs, dict) and len(segment_accs):\n        plt.figure(figsize=(7, 4))\n        for k, v in segment_accs.items():\n            arr = np.array(v, dtype=float)\n            if arr.size:\n                plt.plot(np.arange(arr.size), arr, marker=\"o\", label=k)\n        plt.xlabel(\"Stream Segment\")\n        plt.ylabel(\"Accuracy\")\n        plt.title(\n            \"Synthetic Shift Stream Dataset\\nSegment-wise Accuracy Across Adaptation Modes\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_segment_wise_accuracy.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating segment accuracy plot: {e}\")\n    plt.close()\n\ntry:\n    if isinstance(entropies, dict) and len(entropies):\n        plt.figure(figsize=(8, 4))\n        for k, v in entropies.items():\n            arr = np.array(v, dtype=float)\n            if arr.size:\n                plt.plot(arr, label=k, alpha=0.8)\n        plt.xlabel(\"Stream Sample Index\")\n        plt.ylabel(\"Predictive Entropy\")\n        plt.title(\n            \"Synthetic Shift Stream Dataset\\nEntropy over Evaluation Stream by Adaptation Mode\"\n        )\n        plt.legend()\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_entropy_over_stream.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating entropy plot: {e}\")\n    plt.close()\n\ntry:\n    if gt.size and segment_ids.size:\n        uniq = np.unique(segment_ids)\n        counts = [np.sum(segment_ids == s) for s in uniq]\n        plt.figure(figsize=(6, 4))\n        plt.bar([str(int(u)) for u in uniq], counts)\n        plt.xlabel(\"Segment ID\")\n        plt.ylabel(\"Number of Samples\")\n        plt.title(\n            \"Synthetic Shift Stream Dataset\\nEvaluation Stream Samples per Segment\"\n        )\n        plt.tight_layout()\n        plt.savefig(os.path.join(working_dir, f\"{ds_name}_samples_per_segment.png\"))\n        plt.close()\nexcept Exception as e:\n    print(f\"Error creating samples-per-segment plot: {e}\")\n    plt.close()\n\n\ndef confusion_matrix(y_true, y_pred, n_classes=None):\n    y_true, y_pred = np.asarray(y_true, int), np.asarray(y_pred, int)\n    if n_classes is None:\n        n_classes = int(\n            max(y_true.max() if y_true.size else 0, y_pred.max() if y_pred.size else 0)\n            + 1\n        )\n    cm = np.zeros((n_classes, n_classes), dtype=int)\n    for t, p in zip(y_true, y_pred):\n        cm[t, p] += 1\n    return cm\n\n\nfor mode in [\"no_adapt\", \"always_on\", \"gated\"]:\n    try:\n        if gt.size and isinstance(preds, dict) and mode in preds:\n            yp = np.array(preds[mode])\n            if yp.size == gt.size:\n                cm = confusion_matrix(gt, yp)\n                plt.figure(figsize=(5, 4))\n                plt.imshow(cm, interpolation=\"nearest\")\n                plt.colorbar()\n                plt.xlabel(\"Predicted Label\")\n                plt.ylabel(\"True Label\")\n                plt.title(\n                    f\"Synthetic Shift Stream Dataset\\nConfusion Matrix for {mode}\"\n                )\n                plt.tight_layout()\n                plt.savefig(\n                    os.path.join(working_dir, f\"{ds_name}_{mode}_confusion_matrix.png\")\n                )\n                plt.close()\n    except Exception as e:\n        print(f\"Error creating confusion matrix for {mode}: {e}\")\n        plt.close()\n", null, null, null, null, null], "plot_plan": ["I\u2019ll load the saved experiment dictionary, inspect the `synthetic_shift_stream` entries, and produce only plots supported by the stored arrays. The code will create standard training/validation curves for both accuracy and loss if those histories exist. It will also visualize stream robustness with a bar chart for overall shift-robust accuracy, a line plot for segment-wise accuracy across adaptation modes, and an entropy-over-stream plot. To summarize prediction quality without raw feature coordinates, I\u2019ll add confusion matrices for each available mode using the stored ground truth and predictions. Each figure is wrapped in its own try-except block, given a clear title mentioning the synthetic dataset, saved with descriptive filenames in `working_dir`, and explicitly closed. I\u2019ll also print key scalar metrics recovered from the saved experiment data, including overall stream accuracies and mean segment accuracies when available. The code avoids inventing data and works directly from `experiment_data.npy`. If any field is missing or malformed, the corresponding plot will be skipped gracefully with an error message. This provides a compact but complete posthoc visualization suite for the recorded synthetic shift-stream experiment.", null, null, null, null, null], "ablation_name": [null, null, null, null, null, null], "hyperparam_name": [null, "epochs", "learning rate", "batch size", "LoRA rank", "entropy_threshold"], "is_seed_node": [false, false, false, false, false, false], "is_seed_agg_node": [false, false, false, false, false, false], "parse_metrics_plan": ["I\u2019ll load the saved `experiment_data.npy` from the `working` directory, unpack\nits nested dictionary structure, and summarize the final or best values for the\nrecorded metrics. For each dataset, I\u2019ll print the dataset name first, then\nclearly labeled metrics such as final train accuracy, best validation accuracy,\nfinal validation loss, and stream shift-robust accuracies for each adaptation\nmode. I\u2019ll also report segment-wise and entropy summaries where available, using\nprecise metric names and avoiding any plotting.", "I\u2019ll load the saved NumPy dictionary from the required working directory,\ntraverse its nested structure, and extract the final or best summary values for\neach dataset entry. For each dataset, I\u2019ll print clearly labeled metrics such as\nbest validation accuracy, final validation loss, and stream shift-robust\naccuracies for each adaptation mode. I\u2019ll also include safe handling for missing\nkeys so the script remains robust to minor structure variations, and I will not\ngenerate any plots.", "I\u2019ll write a small analysis script that loads `experiment_data.npy` from\n`os.path.join(os.getcwd(), \"working\")`, traverses the saved nested dictionary\nstructure, and prints a concise report for each dataset. For each learning-rate\nentry, it will extract and print the final training accuracy, final training\nloss, final validation accuracy, final validation loss, best validation\naccuracy, best validation loss, best epoch, and the stream robustness metrics.\nIt will also print the dataset-level summary metrics such as the best learning\nrate by validation accuracy and by stream performance, while always labeling\neach metric clearly and avoiding any plotting.", "I\u2019ll write a small analysis script that loads `experiment_data.npy` from\n`os.path.join(os.getcwd(), \"working\")`, inspects the nested experiment\nstructure, and prints the final or best metrics in a clear, labeled format. For\neach dataset found in the experiment file, the script will print the dataset\nname first, then print summary metrics such as best validation accuracy, final\nvalidation accuracy, and final shift-robust accuracies for each adaptation mode.\nIt will also inspect per-run data to report the final training/validation losses\nand accuracies for each batch-size configuration, always using explicit metric\nnames and without generating any plots.", "I\u2019ll write a small analysis script that loads `working/experiment_data.npy`,\nwalks the nested dictionary structure, and prints a concise summary for each\ndataset found. For each rank within a dataset, it will extract the final\ntraining accuracy/loss, best and final validation accuracy, final validation\nloss, and the final stream shift-robust accuracies for each adaptation mode. It\nwill also print the best rank summaries at the dataset level using the stored\n`summary` table, while keeping all execution at global scope and avoiding any\nplotting.", "I\u2019ll write a small analysis script that loads `experiment_data.npy` from the\n`working` directory, unwraps the nested dictionary structure, and prints the\nfinal training/validation metrics plus the best stream/adaptation summary for\neach dataset. The script will use clear metric names like \u201cfinal train\naccuracy,\u201d \u201cfinal validation loss,\u201d and \u201cbest gated shift-robust accuracy,\u201d and\nit will always print the dataset name before the metrics. It will also handle\nthe saved tuple/list formats in the arrays and avoid plotting entirely, as\nrequested."], "parse_metrics_code": ["import os\nimport numpy as np\n\nworking_dir = os.path.join(os.getcwd(), \"working\")\nexperiment_data_path = os.path.join(working_dir, \"experiment_data.npy\")\n\nexperiment_data = np.load(experiment_data_path, allow_pickle=True).item()\n\n\ndef safe_float(x):\n    try:\n        return float(x)\n    except Exception:\n        return x\n\n\ndef format_value(x):\n    if isinstance(x, (float, np.floating)):\n        return f\"{float(x):.6f}\"\n    if isinstance(x, (int, np.integer)):\n        return str(int(x))\n    return str(x)\n\n\ndef get_final_pair_value(seq):\n    if seq is None or len(seq) == 0:\n        return None\n    item = seq[-1]\n    if isinstance(item, (list, tuple, np.ndarray)) and len(item) >= 2:\n        return safe_float(item[1])\n    return safe_float(item)\n\n\ndef get_best_pair_value(seq, mode=\"max\"):\n    if seq is None or len(seq) == 0:\n
